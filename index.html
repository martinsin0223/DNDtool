<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>战争迷雾</title>
<style>
/* ============== Theme tokens ============== */
:root {
  --theme-bg: var(--t-bg);
  --theme-bg-panel: var(--t-surface);
  --theme-panel-blur-alpha: 0.85;
  --theme-bg-input: var(--t-surface-raised);
  --theme-border: var(--t-border);
  --theme-text: var(--t-text);
  --theme-text-muted: var(--t-text-muted);
  --theme-accent: var(--t-accent);
  --theme-danger: var(--t-danger);
  --theme-warn: var(--t-warn);
  --theme-shadow-color: rgba(0,0,0,0.4);
  --theme-shadow-spread: 0 4px 16px;
  --theme-radius-sm: 4px;
  --theme-radius-md: 8px;
  --theme-radius-lg: 12px;
  --theme-font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --theme-splash-text: var(--t-text-muted);
  --theme-loading-spinner: var(--t-accent);
  color-scheme: dark;
}

/* ============== Reset / 基础 ============== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  position: fixed;
  overscroll-behavior: none;
}
body {
  font-family: var(--theme-font-family);
  background: var(--theme-bg);
  color: var(--theme-text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}
canvas {
  display: block;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
}
button {
  min-height: 36px;
  background: var(--theme-bg-input);
  color: var(--theme-text);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-md);
  padding: 6px 12px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  white-space: nowrap;
}
button:hover { background: color-mix(in srgb, var(--theme-bg-input) 60%, var(--theme-accent) 40%); }
button:focus-visible { outline: 2px solid var(--theme-accent); outline-offset: 2px; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.active { background: var(--theme-accent); border-color: var(--theme-accent); color: #fff; }
button.icon { padding: 6px 10px; }

#app {
  width: 100vw; height: 100vh;
  position: fixed; top: 0; left: 0;
  display: flex; flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ============== Toolbar ============== */
#toolbar {
  min-height: 56px;
  background: var(--theme-bg-panel);
  border-bottom: 1px solid var(--theme-bg-input);
  display: flex;
  align-items: center;
  padding: 8px 12px;
  gap: 8px;
  flex-shrink: 0;
  transition: opacity 250ms, transform 250ms;
  z-index: 30;
  flex-wrap: wrap;
}
.toolbar-divider {
  width: 1px; height: 28px;
  background: var(--theme-border);
  margin: 0 2px;
}
.toolbar-group {
  display: flex; align-items: center; gap: 6px;
}
.toolbar-label { font-size: 12px; color: var(--theme-text-muted); }
#btn-surface-toggle {
  border-color: color-mix(in srgb, var(--theme-accent) 60%, var(--theme-border));
}
#app.surface-edit #btn-surface-toggle {
  background: var(--theme-accent);
  border-color: var(--theme-accent);
  color: #fff;
}
#app.surface-live [data-surface="edit"] { display: none; }

/* ============== Canvas 区 ============== */
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: color-mix(in srgb, var(--theme-bg) 50%, black);
  min-height: 0;
}
#main {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ============== Status bar ============== */
#status-bar {
  height: 24px;
  background: color-mix(in srgb, var(--theme-bg) 80%, black);
  border-top: 1px solid var(--theme-bg-input);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  color: var(--theme-text-muted);
  gap: 16px;
  flex-shrink: 0;
  transition: opacity 200ms, height 200ms, padding 200ms, border-color 200ms;
  overflow: hidden;
}
#status-bar .seg { white-space: nowrap; }
#status-bar .error { color: var(--theme-danger); font-weight: 500; }
#status-bar .toast { color: var(--theme-warn); }

/* ============== Brush rail（触屏右侧竖滑条） ============== */
#brush-rail {
  position: absolute;
  right: 8px;
  top: 12px;
  bottom: 12px;
  width: 36px;
  background: color-mix(in srgb, var(--theme-bg-panel) calc(var(--theme-panel-blur-alpha) * 100%), transparent);
  border-radius: 18px;
  border: 1px solid var(--theme-bg-input);
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  z-index: 8;
  backdrop-filter: blur(6px);
}
@media (pointer: coarse) {
  #brush-rail { display: flex; }
}
#brush-rail input[type="range"] {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
  writing-mode: bt-lr;
  width: 8px;
  flex: 1;
  margin: 8px 0;
}
#brush-rail .label { font-size: 10px; color: var(--theme-text-muted); }

/* ============== Grid calibration ============== */
#grid-calibration-panel {
  position: absolute;
  left: 12px;
  bottom: 12px;
  width: min(420px, calc(100vw - 24px));
  background: color-mix(in srgb, var(--theme-bg-panel) 95%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  padding: 10px 12px;
  z-index: 18;
  display: grid;
  gap: 8px;
  backdrop-filter: blur(8px);
}

/* ============== Reveal zones ============== */
#reveal-zone-panel {
  position: fixed;
  left: 50%;
  bottom: calc(78px + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 45;
  min-width: min(520px, calc(100vw - 24px));
  max-width: calc(100vw - 24px);
  background: color-mix(in srgb, var(--theme-panel) 94%, #000 6%);
  border: 1px solid var(--theme-border);
  border-radius: 8px;
  box-shadow: 0 16px 40px rgba(0,0,0,.42);
  padding: 10px 12px;
}
#reveal-zone-panel .panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--theme-text);
  margin-bottom: 4px;
}
#reveal-zone-panel .panel-meta {
  font-size: 12px;
  color: var(--theme-text-muted);
  margin-bottom: 8px;
}
#reveal-zone-panel .panel-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  flex-wrap: wrap;
}
#grid-calibration-panel .panel-title {
  font-weight: 600;
  color: var(--theme-text);
}
#grid-calibration-panel .panel-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
#grid-calibration-panel .panel-row input[type="range"] {
  flex: 1;
}
#grid-calibration-panel .panel-meta {
  font-size: 12px;
  color: var(--theme-text-muted);
}
#grid-calibration-panel .panel-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ============== Token / 标注 / 网格框选浮动操作条 ============== */
#token-action-bar,
#annotation-action-bar,
#grid-mask-action-bar {
  position: absolute;
  background: color-mix(in srgb, var(--theme-bg-panel) 95%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  padding: 6px 8px;
  display: none;
  align-items: center;
  gap: 6px;
  z-index: 9;
  backdrop-filter: blur(8px);
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
}
#token-action-bar.visible,
#annotation-action-bar.visible,
#grid-mask-action-bar.visible { display: flex; }
#token-action-bar input[type="range"],
#annotation-action-bar input[type="range"] { width: 100px; }
#token-action-bar button,
#annotation-action-bar button,
#grid-mask-action-bar button { min-height: 32px; padding: 4px 10px; font-size: 13px; }
#grid-mask-action-bar .grid-mask-count {
  color: var(--theme-text-muted);
  font-size: 12px;
  padding: 0 4px;
  white-space: nowrap;
}

/* ============== 编辑态对象侧栏 ============== */
#object-panel {
  position: absolute;
  top: 12px;
  right: 12px;
  bottom: 12px;
  width: min(340px, calc(100vw - 24px));
  background: color-mix(in srgb, var(--theme-bg-panel) 94%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-md);
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  backdrop-filter: blur(8px);
  z-index: 12;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#app.surface-edit #object-panel { display: flex; }
.object-panel-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--theme-bg-input);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.object-panel-header > div {
  min-width: 0;
}
.object-panel-title { font-weight: 600; }
.object-panel-meta {
  color: var(--theme-text-muted);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#object-panel-live {
  flex: 0 0 auto;
}
.object-panel-tools {
  border-bottom: 1px solid var(--theme-bg-input);
  padding: 8px;
  display: grid;
  gap: 7px;
}
.object-panel-search {
  width: 100%;
  min-height: 34px;
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  background: var(--theme-bg-input);
  color: var(--theme-text);
  padding: 0 10px;
  font-size: 13px;
}
.object-filter-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}
.object-filter {
  min-height: 30px;
  padding: 0 6px;
  font-size: 12px;
}
.object-filter.active {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 18%, var(--theme-bg-input));
}
.object-panel-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 8px;
}
.object-section-title {
  color: var(--theme-text-muted);
  font-size: 12px;
  padding: 8px 4px 5px;
}
.object-row {
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  color: var(--theme-text);
  border-radius: var(--theme-radius-sm);
  min-height: 48px;
  padding: 6px 6px;
  margin-bottom: 4px;
  display: grid;
  grid-template-columns: 34px 1fr 32px 32px;
  gap: 8px;
  align-items: center;
  text-align: left;
}
.object-row:hover { background: var(--theme-bg-input); }
.object-row.selected {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 22%, transparent);
}
.object-row.tag-active {
  border-color: var(--theme-warn);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--theme-warn) 55%, transparent);
}
.object-thumb {
  width: 32px;
  height: 32px;
  border-radius: var(--theme-radius-sm);
  background: var(--theme-bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-size: 17px;
}
.object-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.object-main {
  min-width: 0;
  display: grid;
  gap: 2px;
}
.object-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
}
.object-sub {
  color: var(--theme-text-muted);
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.object-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 2px;
}
.object-tag-chip,
.info-tag-chip {
  border: 1px solid color-mix(in srgb, var(--theme-accent) 42%, transparent);
  border-radius: var(--theme-radius-sm);
  background: color-mix(in srgb, var(--theme-bg-input) 76%, transparent);
  color: var(--theme-text);
  font-size: 11px;
  line-height: 1.2;
  padding: 2px 6px;
}
.object-tag-chip.active,
.info-tag-chip.active {
  border-color: var(--theme-warn);
  background: color-mix(in srgb, var(--theme-warn) 24%, var(--theme-bg-input));
  color: var(--theme-text);
}
.object-locate,
.object-edit {
  width: 32px;
  height: 32px;
  min-height: 32px;
  padding: 0;
  border-radius: var(--theme-radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--theme-text-muted);
}
.object-locate:hover,
.object-edit:hover {
  background: color-mix(in srgb, var(--theme-accent) 18%, transparent);
  color: var(--theme-text);
}
.object-empty {
  color: var(--theme-text-muted);
  font-size: 13px;
  padding: 18px 8px;
  text-align: center;
}
.info-tag-list {
  display: grid;
  gap: 8px;
  max-height: min(56vh, 520px);
  overflow: auto;
  padding-right: 2px;
}
.info-tag-row {
  width: 100%;
  min-height: 48px;
  padding: 8px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  text-align: left;
  border: 1px solid var(--theme-border);
  background: var(--theme-bg-input);
  color: var(--theme-text);
  border-radius: var(--theme-radius-sm);
}
.info-tag-row.active {
  border-color: var(--theme-warn);
  background: color-mix(in srgb, var(--theme-warn) 20%, var(--theme-bg-input));
}
.info-tag-name {
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.info-tag-count {
  color: var(--theme-text-muted);
  font-size: 12px;
  white-space: nowrap;
}
.entry-picker-list,
.entry-manager-list {
  display: grid;
  gap: 8px;
}
.entry-picker-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.entry-pick {
  min-height: 30px;
  padding: 4px 9px;
  border-radius: var(--theme-radius-sm);
  border: 1px solid var(--theme-border);
  background: var(--theme-bg-input);
  color: var(--theme-text);
}
.entry-pick.selected {
  border-color: var(--entry-color, var(--theme-warn));
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--entry-color, var(--theme-warn)) 60%, transparent);
}
.entry-new-row {
  display: grid;
  grid-template-columns: 1fr 54px auto;
  gap: 8px;
}
.entry-manager-row {
  display: grid;
  grid-template-columns: 34px minmax(120px, 1fr) 54px minmax(100px, 0.7fr) minmax(112px, 0.8fr) 84px 76px 64px;
  gap: 8px;
  align-items: center;
  border: 1px solid var(--theme-border);
  background: var(--theme-bg-input);
  border-radius: var(--theme-radius-sm);
  padding: 8px;
}
.entry-manager-new-row {
  display: grid;
  grid-template-columns: 1fr 54px minmax(100px, 0.7fr) minmax(112px, 0.8fr) auto;
  gap: 8px;
}
.entry-hotkey-input {
  text-transform: uppercase;
  text-align: center;
  font-weight: 700;
}
.entry-hotkey-action,
.entry-purpose-select {
  min-width: 0;
}
.entry-hotkey-action-badge {
  color: var(--theme-text-muted);
  font-size: 12px;
  white-space: nowrap;
}
.entry-hotkey-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  padding: 0 6px;
  border: 1px solid color-mix(in srgb, var(--theme-warn) 58%, transparent);
  border-radius: var(--theme-radius-sm);
  background: color-mix(in srgb, var(--theme-warn) 18%, var(--theme-bg-input));
  color: var(--theme-text);
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
}
.entry-color-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.55);
  box-shadow: 0 0 0 2px rgba(0,0,0,0.28);
}
#btn-entry-spotlight.active {
  border-color: var(--entry-color, var(--theme-warn));
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--entry-color, var(--theme-warn)) 65%, transparent), 0 0 14px color-mix(in srgb, var(--entry-color, var(--theme-warn)) 32%, transparent);
}

/* ============== 事件小卡片 ============== */
#event-card {
  position: absolute;
  background: color-mix(in srgb, var(--theme-bg-panel) 95%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  padding: 12px 14px;
  z-index: 11;
  min-width: 220px;
  max-width: 320px;
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  backdrop-filter: blur(8px);
  display: none;
}
#event-card.visible { display: block; }
.event-card-header {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 600;
  margin-bottom: 8px;
  word-break: break-all;
}
.event-card-icon {
  font-size: 22px;
  width: 28px; height: 28px;
  display: inline-flex;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.event-card-icon img {
  width: 100%; height: 100%; object-fit: contain;
}
.event-card-content {
  font-size: 13px;
  color: var(--theme-text);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 10px;
  line-height: 1.5;
}
.event-card-actions {
  display: flex; gap: 6px; justify-content: flex-end;
}
.event-card-actions button { min-height: 32px; padding: 4px 10px; font-size: 13px; }
.event-card-link {
  border-top: 1px solid var(--theme-border);
  margin: 8px 0 10px;
  padding-top: 10px;
}
.event-card-link button {
  width: 100%;
  justify-content: center;
}
.event-card-link-meta {
  color: var(--theme-text-muted);
  font-size: 12px;
  margin-top: 6px;
  text-align: center;
}

#top-hover-zone {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 24px;
  z-index: 25;
  display: none;
}

#app.surface-live .event-card-actions { display: none; }

/* ============== Dropdown menu ============== */
#dropdown-menu {
  position: absolute;
  background: var(--theme-bg-panel);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-md);
  padding: 4px;
  display: none;
  z-index: 50;
  min-width: 240px;
  box-shadow: 0 8px 24px var(--theme-shadow-color);
}
#dropdown-menu.visible { display: block; }
.menu-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: var(--theme-radius-sm);
  font-size: 14px;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--theme-text);
  text-align: left;
  min-height: 36px;
}
.menu-item:hover { background: var(--theme-bg-input); }
.menu-item.danger { color: var(--theme-danger); }
.menu-item:disabled { opacity: 0.4; cursor: not-allowed; }
.menu-section {
  padding: 8px 12px;
  font-size: 12px;
  color: var(--theme-text-muted);
}
.menu-section input[type="range"] { width: 100%; margin-top: 6px; }
.menu-divider {
  border-top: 1px solid var(--theme-bg-input);
  margin: 4px 0;
}
.fog-color-presets {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.fog-color-btn {
  width: 26px; height: 26px; padding: 0;
  border: 2px solid var(--theme-border);
  border-radius: 50%;
  cursor: pointer;
  min-height: unset; min-width: unset;
  transition: transform 80ms, border-color 80ms;
}
.fog-color-btn:hover { transform: scale(1.1); }
.fog-color-btn.selected {
  border-color: var(--theme-accent);
  transform: scale(1.2);
}
.fog-color-hex {
  flex: 1;
  min-width: 70px;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 4px 8px;
  color: var(--theme-text);
  font-size: 12px;
  font-family: monospace;
}

/* ============== 场景管理 modal ============== */
.scene-list { max-height: 360px; overflow-y: auto; margin: 12px 0; }
.scene-row {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  margin-bottom: 6px;
  gap: 12px;
}
.scene-row.current {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 12%, var(--theme-bg-input));
}
.scene-name { flex: 1; font-size: 14px; font-weight: 500; }
.scene-meta { font-size: 11px; color: var(--theme-text-muted); white-space: nowrap; }
.scene-actions { display: flex; gap: 4px; }
.scene-actions button {
  min-height: 28px;
  padding: 4px 8px;
  font-size: 12px;
}

/* ============== Modal ============== */
#modal-root {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, black 60%, transparent);
  backdrop-filter: blur(4px);
  z-index: 1000;
  padding: 16px;
}
#modal-root.visible { display: flex; }
.modal-card {
  background: color-mix(in srgb, var(--theme-bg-panel) 90%, white 5%);
  border-radius: var(--theme-radius-lg);
  padding: 24px;
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--theme-border);
}
.modal-card.entry-manager-modal {
  max-width: min(820px, calc(100vw - 28px));
}
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.modal-desc { font-size: 13px; color: var(--theme-text-muted); margin-bottom: 16px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
  flex-wrap: wrap;
}
.modal-actions button.primary { background: var(--theme-accent); border-color: var(--theme-accent); color: #fff; }
.modal-actions button.primary:hover { background: color-mix(in srgb, var(--theme-accent) 80%, black 20%); }
.modal-actions button.danger { background: var(--theme-danger); border-color: var(--theme-danger); color: #fff; }
.modal-actions button.danger:hover { background: color-mix(in srgb, var(--theme-danger) 80%, black 20%); }

.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 13px; color: var(--theme-text-muted); margin-bottom: 6px; }
.form-row input[type="text"],
.form-row textarea,
.form-row select,
.entry-hotkey-action,
.entry-purpose-select {
  width: 100%;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 10px 12px;
  color: var(--theme-text);
  font-family: inherit;
  font-size: 14px;
}
.form-row input[type="text"],
.form-row textarea {
  resize: vertical;
}
.form-row textarea { min-height: 96px; max-height: 240px; line-height: 1.5; }
.form-row input[type="password"],
.form-row input[type="url"] {
  width: 100%;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 10px 12px;
  color: var(--theme-text);
  font-family: inherit;
  font-size: 14px;
}
.form-note {
  color: var(--theme-text-muted);
  font-size: 12px;
  line-height: 1.45;
}
.form-note.danger { color: var(--theme-danger); }
.form-check {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  color: var(--theme-text);
  font-size: 13px;
}
.cloud-status-list {
  display: grid;
  gap: 8px;
  margin: 12px 0 4px;
  font-size: 13px;
}
.cloud-status-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--theme-bg-input);
  padding-bottom: 8px;
}
.cloud-status-row span:first-child { color: var(--theme-text-muted); }
.cloud-status-row span:last-child {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
}
.cloud-error {
  color: var(--theme-danger);
  border: 1px solid color-mix(in srgb, var(--theme-danger) 45%, transparent);
  border-radius: var(--theme-radius-sm);
  padding: 9px 10px;
  margin: 10px 0;
  background: color-mix(in srgb, var(--theme-danger) 10%, transparent);
  font-size: 13px;
}

/* ============== Dice ============== */
#btn-dice {
  position: fixed;
  top: max(12px, env(safe-area-inset-top));
  right: max(12px, env(safe-area-inset-right));
  width: 44px;
  height: 44px;
  border-radius: 8px;
  z-index: 760;
  font-size: 20px;
  line-height: 1;
}
#btn-dice.active {
  background: var(--theme-accent);
  border-color: var(--theme-accent);
  color: #fff;
}
#dice-overlay {
  position: fixed;
  inset: 0;
  z-index: 980;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: color-mix(in srgb, black 62%, transparent);
  backdrop-filter: blur(3px);
}
#dice-overlay.visible { display: flex; }
.dice-panel {
  width: min(720px, calc(100vw - 28px));
  max-height: min(760px, calc(100vh - 32px));
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr) auto;
  gap: 14px;
  padding: 18px;
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  background: color-mix(in srgb, var(--theme-bg-panel) 94%, black 6%);
  box-shadow: 0 24px 80px rgba(0,0,0,0.55);
}
.dice-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.dice-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0;
}
.dice-input-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 8px;
}
#dice-expression {
  width: 100%;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  color: var(--theme-text);
  padding: 11px 12px;
  font: 600 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.dice-result {
  min-height: 72px;
  border: 1px solid color-mix(in srgb, var(--theme-border) 80%, transparent);
  border-radius: var(--theme-radius-md);
  padding: 12px;
  background: color-mix(in srgb, var(--theme-bg-input) 82%, transparent);
}
.dice-total {
  font-size: 32px;
  line-height: 1.1;
  font-weight: 800;
  color: var(--theme-accent);
}
.dice-detail {
  margin-top: 6px;
  color: var(--theme-text-muted);
  font-size: 13px;
  line-height: 1.45;
}
.dice-history {
  min-height: 120px;
  overflow: auto;
  display: grid;
  align-content: start;
  gap: 8px;
  padding-right: 2px;
}
.dice-history-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  text-align: left;
  width: 100%;
  border: 1px solid color-mix(in srgb, var(--theme-border) 70%, transparent);
  border-radius: var(--theme-radius-sm);
  background: color-mix(in srgb, var(--theme-bg-input) 72%, transparent);
  padding: 9px 10px;
}
.dice-history-row:hover {
  background: color-mix(in srgb, var(--theme-bg-input) 58%, var(--theme-accent) 12%);
}
.dice-history-total {
  min-width: 52px;
  font-weight: 800;
  color: var(--theme-accent);
  font-size: 18px;
}
.dice-history-main { min-width: 0; }
.dice-history-expression {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 650;
}
.dice-history-detail {
  margin-top: 2px;
  color: var(--theme-text-muted);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dice-history-time {
  color: var(--theme-text-muted);
  font-size: 12px;
}
.dice-foot {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  color: var(--theme-text-muted);
  font-size: 12px;
}
@media (max-width: 640px) {
  #btn-dice { width: 40px; height: 40px; }
  .dice-input-row { grid-template-columns: 1fr; }
  .dice-panel { padding: 14px; }
  .dice-total { font-size: 28px; }
}
.shape-options, .color-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.option-btn {
  background: var(--theme-bg-input);
  border: 2px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 8px 14px;
  cursor: pointer;
  color: var(--theme-text);
  font-size: 13px;
}
.option-btn.selected {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 30%, var(--theme-bg-input));
}
.color-swatch {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  position: relative;
}
.color-swatch.selected { border-color: var(--theme-text); }
.color-swatch.player { background: var(--theme-accent); }
.color-swatch.enemy { background: var(--theme-danger); border-style: dashed; }
.color-swatch.npc { background: var(--theme-warn); }
.color-swatch.npc::after {
  content: ''; position: absolute; inset: 4px; border-radius: 50%;
  border: 1px solid color-mix(in srgb, black 40%, transparent);
}
.color-swatch.none {
  background: var(--theme-text-muted);
}

/* ============== 事件 icon 选择器 ============== */
.icon-source-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.icon-source-tab {
  flex: 1;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  color: var(--theme-text);
  text-align: center;
}
.icon-source-tab.selected {
  background: color-mix(in srgb, var(--theme-accent) 30%, var(--theme-bg-input));
  border-color: var(--theme-accent);
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}
.emoji-cell {
  background: var(--theme-bg-input);
  border: 2px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 8px 0;
  cursor: pointer;
  font-size: 22px;
  text-align: center;
  user-select: none;
  transition: transform 80ms;
}
.emoji-cell:hover { transform: scale(1.1); }
.emoji-cell.selected {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 30%, var(--theme-bg-input));
}
.icon-custom-input {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.icon-custom-input input {
  flex: 1;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 8px 12px;
  color: var(--theme-text);
  font-family: inherit;
  font-size: 16px;
  text-align: center;
}
#event-icon-preview {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: color-mix(in srgb, white 85%, transparent);
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  border: 2px solid var(--theme-border);
  overflow: hidden;
}
#event-icon-preview img {
  width: 100%; height: 100%; object-fit: contain;
}

/* ============== Token 上传弹窗预览 ============== */
#token-preview {
  width: 96px; height: 96px;
  border-radius: var(--theme-radius-md);
  background: var(--theme-bg-input);
  margin: 0 auto 12px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ============== Loading overlay ============== */
#loading-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: color-mix(in srgb, black 85%, transparent);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  flex-direction: column;
  color: var(--theme-text);
  font-size: 14px;
}
#loading-overlay.visible { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--theme-border);
  border-top-color: var(--theme-loading-spinner);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay .loading-actions {
  margin-top: 14px;
}
#loading-overlay .loading-actions button {
  min-width: 112px;
}
#cloud-sync-pending-banner {
  position: fixed;
  top: 72px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1750;
  display: none;
  max-width: min(880px, calc(100vw - 24px));
  padding: 10px 12px;
  border: 1px solid color-mix(in srgb, var(--theme-warn) 45%, var(--theme-border));
  background: color-mix(in srgb, var(--theme-panel) 92%, black 8%);
  box-shadow: var(--shadow-lg);
  border-radius: var(--theme-radius-md);
  align-items: center;
  gap: 10px;
}
#cloud-sync-pending-banner.visible {
  display: flex;
}
#cloud-sync-pending-banner .banner-text {
  flex: 1;
  min-width: 0;
  font-size: 13px;
  color: var(--theme-text);
}
#cloud-sync-pending-banner .banner-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
#cloud-sync-pending-banner .banner-actions button {
  white-space: nowrap;
}

/* ============== Splash ============== */
#splash {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: var(--theme-splash-text);
  pointer-events: none;
  z-index: 4;
}
#splash h1 { font-size: 28px; font-weight: 300; margin-bottom: 12px; color: var(--theme-text-muted); }
#splash p { font-size: 14px; }

/* ============== 通用 input ============== */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  background: var(--theme-border);
  height: 4px;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px; height: 18px;
  background: var(--theme-accent);
  border-radius: 50%;
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 18px; height: 18px;
  background: var(--theme-accent);
  border-radius: 50%;
  cursor: pointer;
  border: none;
}
input[type="number"] {
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  color: var(--theme-text);
  padding: 6px 8px;
  width: 64px;
  font-family: inherit;
  font-size: 13px;
  text-align: center;
}
.hidden-input { display: none; }

/* ============== Toast ============== */
.toast-message {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--theme-bg-input);
  color: var(--theme-text);
  padding: 10px 20px;
  border-radius: var(--theme-radius-md);
  z-index: 500;
  border: 1px solid var(--theme-border);
  font-size: 13px;
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  animation: toast-in 200ms ease-out;
}
@keyframes toast-in {
  from { transform: translate(-50%, 12px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

/* ============== 响应式 ============== */
@media (max-width: 1024px) {
  .toolbar-label { display: none; }
  #toolbar { padding: 6px; gap: 4px; }
  #toolbar button { padding: 6px 8px; font-size: 13px; }
  #object-panel {
    width: min(320px, calc(100vw - 16px));
    right: 8px;
    top: 8px;
    bottom: 8px;
  }
}
/* ============== Theme System ============== */

/* 默认主题 = stone */
:root,
[data-theme="stone"] {
  --t-bg: #1a1816;
  --t-surface: #211f1c;
  --t-surface-raised: #2a2724;
  --t-surface-hover: #322f2b;
  --t-border: #332f2a;
  --t-border-subtle: rgba(255,255,255,0.04);
  --t-text: #d8d0c4;
  --t-text-secondary: #9c9283;
  --t-text-muted: #6b6157;
  --t-accent: #e8943a;
  --t-accent-text: #1a1210;
  --t-accent-soft: rgba(232,148,58,0.14);
  --t-accent-glow: rgba(232,148,58,0.25);
  --t-danger: #d4493a;
  --t-warn: #e8943a;
  --t-icon-color: #e8943a;
  --t-icon-glow: drop-shadow(0 0 4px rgba(232,148,58,0.2));
  --t-active-bg: #e8943a;
  --t-active-text: #1a1210;
  --t-active-shadow: 0 0 20px rgba(232,148,58,0.25), 0 2px 8px rgba(0,0,0,0.3);
  --t-map-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.3);
  --t-panel-shadow: 0 8px 32px rgba(0,0,0,0.4);
  --t-grain: 1;  /* 1=有噪点, 0=无噪点 */
  --t-grain-opacity: 0.35;
  --t-grain-blend: overlay;
  --t-grain-frequency: 0.85;
  --t-canvas-bg: #141210;
  --t-toolbar-bg: var(--t-surface);
  --t-statusbar-bg: #131110;
  --t-btn-radius: 8px;
  --t-panel-radius: 12px;
}

[data-theme="ink-gold"] {

  --t-surface: #0a0a08;
  --t-surface-raised: #121210;
  --t-surface-hover: #1a1a16;
  --t-border: rgba(201,168,76,0.12);
  --t-border-subtle: rgba(201,168,76,0.08);
  --t-text: #c9a84c;
  --t-text-secondary: #5a5345;
  --t-text-muted: #3d3828;

  --t-active-bg: transparent;
  --t-active-text: #c9a84c;
  --t-active-shadow: 0 1px 0 #c9a84c;
  --t-active-border-bottom: 2px solid #c9a84c;
  --t-map-shadow: 0 0 0 1px rgba(201,168,76,0.15), 0 24px 64px rgba(0,0,0,0.7);
  --t-panel-shadow: 0 12px 40px rgba(0,0,0,0.6);
  --t-grain: 0;
  --t-grain-opacity: 0;
  --t-canvas-bg: #030303;
  --t-toolbar-bg: transparent;
  --t-statusbar-bg: transparent;
  --t-btn-radius: 0px;

}

[data-theme="parchment"] {

  --t-surface-hover: rgba(210,198,176,0.9);

  --t-border-subtle: #d8ccb4;

  --t-text-secondary: #7a6548;
  --t-text-muted: #a08868;
  --t-accent: #6b3a2a;
  --t-accent-text: #f0e8d8;
  --t-accent-soft: rgba(107,58,42,0.08);

  --t-danger: #8b2a1a;
  --t-warn: #8b5a24;

  --t-icon-glow: none;
  --t-active-bg: #6b3a2a;
  --t-active-text: #f0e8d8;
  --t-active-shadow: 0 2px 8px rgba(107,58,42,0.3);

  --t-panel-shadow: 0 8px 24px rgba(80,50,20,0.15);
  --t-grain: 1;
  --t-grain-opacity: 0.45;
  --t-grain-blend: multiply;
  --t-grain-frequency: 1.2;
  --t-canvas-bg: #d8ccb4;
  --t-toolbar-bg: var(--t-surface);
  --t-statusbar-bg: rgba(220,208,186,0.7);
  --t-btn-radius: 6px;
  --t-panel-radius: 12px;
  color-scheme: light;
}

[data-theme="blueprint"] {
  --t-bg: #0e1a28;
  --t-surface: #101e2e;
  --t-surface-raised: #162840;
  --t-surface-hover: #1c3050;
  --t-border: rgba(91,155,213,0.12);
  --t-border-subtle: rgba(91,155,213,0.06);
  --t-text: #8ab8e0;
  --t-text-secondary: #4a6a88;
  --t-text-muted: #2a4058;
  --t-accent: #d4a03a;
  --t-accent-text: #0e1420;
  --t-accent-soft: rgba(212,160,58,0.1);
  --t-accent-glow: rgba(212,160,58,0.2);
  --t-danger: #c44030;
  --t-warn: #d4a03a;
  --t-icon-color: #d4a03a;
  --t-icon-glow: drop-shadow(0 0 3px rgba(212,160,58,0.15));
  --t-active-bg: #d4a03a;
  --t-active-text: #0e1420;
  --t-active-shadow: 0 0 16px rgba(212,160,58,0.2), 0 2px 8px rgba(0,0,0,0.3);
  --t-map-shadow: 0 0 0 1px rgba(91,155,213,0.12), 0 20px 56px rgba(0,0,0,0.5);
  --t-panel-shadow: 0 8px 32px rgba(0,0,0,0.4);
  --t-grain: 0;
  --t-grain-opacity: 0;
  --t-canvas-bg: #0a1420;
  --t-toolbar-bg: var(--t-surface);
  --t-statusbar-bg: #0a1218;
  --t-btn-radius: 6px;
  --t-panel-radius: 12px;

}

  --t-danger: #c44030;
  --t-warn: #c4956a;
  --t-icon-color: #c4956a;
  --t-icon-glow: drop-shadow(0 0 3px rgba(196,149,106,0.15));
  --t-active-bg: linear-gradient(135deg, #a04030, #c46838);
  --t-active-text: #f8e8d8;
  --t-active-shadow: 0 0 24px rgba(180,70,50,0.2), 0 2px 8px rgba(0,0,0,0.4);
  --t-map-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 80px rgba(80,20,20,0.08);

  --t-grain-blend: overlay;
  --t-grain-frequency: 0.9;
  --t-canvas-bg: #0a0708;
  --t-toolbar-bg: #1a0f11;
  --t-statusbar-bg: #0d0809;
  --t-btn-radius: 8px;

[data-theme="forest"] {
  --t-bg: #0e1610;
  --t-surface: #121c14;
  --t-surface-raised: #1a2a1e;
  --t-surface-hover: #223528;
  --t-border: rgba(107,186,122,0.1);
  --t-border-subtle: rgba(107,186,122,0.05);
  --t-text: #8ad098;
  --t-text-secondary: #4a7a50;
  --t-text-muted: #3a5840;
  --t-accent: #d4a03a;
  --t-accent-text: #0e1610;
  --t-accent-soft: rgba(212,160,58,0.1);
  --t-accent-glow: rgba(212,160,58,0.22);
  --t-danger: #c44030;
  --t-warn: #d4a03a;
  --t-icon-color: #d4a03a;
  --t-icon-glow: drop-shadow(0 0 4px rgba(212,160,58,0.18));
  --t-active-bg: #d4a03a;
  --t-active-text: #0e1610;
  --t-active-shadow: 0 0 18px rgba(212,160,58,0.22), 0 2px 8px rgba(0,0,0,0.3);
  --t-map-shadow: 0 20px 56px rgba(0,0,0,0.5), 0 0 40px rgba(40,80,50,0.08);
  --t-panel-shadow: 0 8px 32px rgba(0,0,0,0.4);
  --t-grain: 1;
  --t-grain-opacity: 0.3;
  --t-grain-blend: overlay;
  --t-grain-frequency: 0.7;
  --t-canvas-bg: #0a120c;
  --t-toolbar-bg: var(--t-surface);
  --t-statusbar-bg: #090f0a;
  --t-btn-radius: 10px;
  --t-panel-radius: 12px;

/* ============== Theme Application ============== */

body {
  background: var(--t-bg);
  color: var(--t-text);
}

/* 噪点纹理层 — 通过 --t-grain 控制显隐 */
#app::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: var(--t-grain-opacity, 0);
  mix-blend-mode: var(--t-grain-blend, overlay);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* 工具栏 */
#toolbar {
  background: var(--t-toolbar-bg);
  border-bottom-color: var(--t-border-subtle);
  box-shadow: none;
}
#toolbar::after { display: none; }

/* 工具栏分隔线 */
.toolbar-divider {
  background: var(--t-border-subtle) !important;
  box-shadow: none !important;
  height: 24px !important;
  width: 1px !important;
}

/* 按钮通用 */
button,
#toolbar button,
.top-command,
.object-filter,
.modal-actions button,
#dropdown-menu button,
#token-action-bar button,
#annotation-action-bar button {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--t-btn-radius);
  color: var(--t-text-secondary);
  box-shadow: none;
  text-shadow: none;
  font-weight: 500;
}

button:hover,
#toolbar button:hover,
.top-command:hover,
.object-filter:hover,
.modal-actions button:hover,
#dropdown-menu button:hover {
  background: var(--t-surface-raised);
  border-color: transparent;
  color: var(--t-text);
  box-shadow: none;
}

/* 按钮激活态 */
#toolbar button.active,
button.active,
#app.surface-edit #btn-surface-toggle,
.object-filter.active {
  background: var(--t-active-bg);
  color: var(--t-active-text);
  border-color: transparent;
  font-weight: 650;
  box-shadow: var(--t-active-shadow);
  text-shadow: none;
}

/* ink-gold 主题的特殊激活态 (下划线) */
[data-theme="ink-gold"] #toolbar button.active,
[data-theme="ink-gold"] button.active {
  background: transparent;
  border-bottom: 2px solid var(--t-accent);
  border-radius: 0;
}

/* theater 主题的渐变激活态 */
[data-theme="theater"] #toolbar button.active,
[data-theme="theater"] button.active,
[data-theme="theater"] #app.surface-edit #btn-surface-toggle,
[data-theme="theater"] .object-filter.active {
  background: linear-gradient(135deg, #a04030, #c46838);
}

/* 按钮禁用态 */
#toolbar button:disabled {
  color: var(--t-text-muted);
  opacity: 0.5;
  border-color: transparent;
}

/* 图标颜色 */
.nav-ico {
  color: var(--t-icon-color);
  filter: var(--t-icon-glow);
}
button.active .nav-ico,
#app.surface-edit #btn-surface-toggle .nav-ico {
  color: var(--t-active-text);
  filter: none;
}

/* 画布区域 */
#canvas-container {
  background: var(--t-canvas-bg);
  border-left: none;
  border-right: none;
}
#canvas-container::after { display: none; }

/* blueprint 主题的网格暗纹 */
[data-theme="blueprint"] #canvas-container {
  background:
    repeating-linear-gradient(0deg, rgba(91,155,213,0.06) 0 1px, transparent 1px 40px),
    repeating-linear-gradient(90deg, rgba(91,155,213,0.06) 0 1px, transparent 1px 40px),
    var(--t-canvas-bg);
}

/* theater 主题的顶部红光 */
[data-theme="theater"] #canvas-container {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(80,20,20,0.15), transparent 50%),
    var(--t-canvas-bg);
}

/* Splash 页面 */
#splash {
  color: var(--t-text-muted);
  text-shadow: none;
}
#splash h1 {
  color: var(--t-text-muted);
  font-weight: 300;
  letter-spacing: 4px;
}
#splash h1::after {
  background: linear-gradient(90deg, transparent, var(--t-accent), transparent);
  opacity: 0.5;
  height: 2px;
}
#splash p {
  color: var(--t-text-muted);
}

/* 状态栏 */
#status-bar {
  background: var(--t-statusbar-bg);
  border-top-color: var(--t-border-subtle);
  color: var(--t-text-muted);
  height: 32px;
  box-shadow: none;
}
#status-bar::before { display: none; }

/* 状态栏装饰件简化 */
.status-crest { display: none; }
.status-plaque,
.status-map-title,
#status-mode,
#status-saved {
  background: transparent;
  border: none;
  box-shadow: none;
  color: var(--t-text-secondary);
  text-shadow: none;
  font-weight: 500;
  font-size: 12px;
  min-height: unset;
  padding: 0;
}
.status-plaque {
  min-width: unset;
  width: auto;
  max-width: unset;
  font-size: 12px;
  font-weight: 600;
}
.status-chapter-number {
  color: var(--t-accent);
}
.status-map-title {
  position: static;
  transform: none;
  width: auto;
  min-height: unset;
  font-size: 12px;
  font-weight: 500;
}
.status-separator {
  background: var(--t-border-subtle);
  height: 14px;
}
#status-saved[data-save-state="dirty"] {
  color: var(--t-warn);
  font-weight: 600;
}
.status-label { color: var(--t-text-muted); font-size: 11px; }

/* 面板通用 */
#object-panel,
#grid-calibration-panel,
#reveal-zone-panel,
#event-card,
#token-action-bar,
#annotation-action-bar,
#grid-mask-action-bar {
  background: var(--t-surface);
  border-color: var(--t-border);
  border-radius: var(--t-panel-radius);
  box-shadow: var(--t-panel-shadow);
  backdrop-filter: blur(8px);
}

.object-panel-header {
  border-bottom-color: var(--t-border-subtle);
}
.object-panel-tools {
  border-bottom-color: var(--t-border-subtle);
}
.object-panel-search {
  background: var(--t-surface-raised);
  border-color: var(--t-border);
  color: var(--t-text);
}

/* 下拉菜单 */
#dropdown-menu {
  background: var(--t-surface);
  border-color: var(--t-border);
  border-radius: var(--t-panel-radius);
  box-shadow: var(--t-panel-shadow);
}
.menu-item {
  color: var(--t-text-secondary);
  border-radius: calc(var(--t-btn-radius) - 2px);
}
.menu-item:hover {
  background: var(--t-surface-raised);
  color: var(--t-text);
}
.menu-item.danger { color: var(--t-danger); }
.menu-section { color: var(--t-text-muted); }
.menu-divider { border-top-color: var(--t-border-subtle); }

/* Modal */
.modal-card {
  background: var(--t-surface);
  border-color: var(--t-border);
  border-radius: var(--t-panel-radius);
}
.modal-title { color: var(--t-text); }
.modal-desc { color: var(--t-text-secondary); }
.modal-actions button.primary {
  background: var(--t-accent) !important;
  border-color: var(--t-accent) !important;
  color: var(--t-accent-text) !important;
}

/* 骰子面板 */
.dice-panel {
  background: var(--t-surface);
  border-color: var(--t-border);
  box-shadow: var(--t-panel-shadow);
}
.dice-total { color: var(--t-accent); }
.dice-detail { color: var(--t-text-secondary); }

/* 表单元素 */
.form-row input[type="text"],
.form-row textarea,
.form-row select,
.form-row input[type="password"],
.form-row input[type="url"],
.entry-hotkey-action,
#brush-size-input,
#dice-expression {
  background: var(--t-surface-raised);
  border-color: var(--t-border);
  color: var(--t-text);
}
.form-row label { color: var(--t-text-secondary); }
.form-note { color: var(--t-text-muted); }

/* 滚动条 (Webkit) */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--t-border);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: var(--t-text-muted); }

/* parchment 主题需要 color-scheme: light */
[data-theme="parchment"] button.active .nav-ico { color: var(--t-accent-text); }
[data-theme="parchment"] .toolbar-label { color: var(--t-text-muted); }
[data-theme="parchment"] #status-bar { color: var(--t-text-muted); }
</style>

// ============== Hex 网格几何（pointy-top） ==============
// size = 顶点到中心距离，宽 = sqrt(3)*size，高 = 2*size
// axial 坐标 (q, r)：q 横向，r 斜向
const SQRT3 = Math.sqrt(3);
function rotateAroundOrigin(x, y, ox, oy, rad) {
  if (!rad) return [x, y];
  const dx = x - ox, dy = y - oy;
  const c = Math.cos(rad), s = Math.sin(rad);
  return [ox + dx * c - dy * s, oy + dx * s + dy * c];
}
function hexCenter(q, r, size, ox, oy, rotation = 0) {
  const x = size * SQRT3 * (q + r / 2) + ox;
  const y = size * 1.5 * r + oy;
  return rotateAroundOrigin(x, y, ox, oy, rotation * Math.PI / 180);
}
function hexAtPoint(x, y, size, ox, oy, rotation = 0) {
  const [ux, uy] = rotateAroundOrigin(x, y, ox, oy, -rotation * Math.PI / 180);
  const px = ux - ox, py = uy - oy;
  // 像素 → fractional axial
  const q = (SQRT3 / 3 * px - py / 3) / size;
  const r = (2 / 3 * py) / size;
  // round to nearest hex (cube round)
  return hexRound(q, r);
}
function hexRound(qf, rf) {
  const sf = -qf - rf;
  let q = Math.round(qf), r = Math.round(rf), s = Math.round(sf);
  const qd = Math.abs(q - qf), rd = Math.abs(r - rf), sd = Math.abs(s - sf);
  if (qd > rd && qd > sd) q = -r - s;
  else if (rd > sd) r = -q - s;
  return { q, r };
}
function hexVertices(cx, cy, size, rotation = 0) {
  // pointy-top：顶点角度从 -30° 开始
  const verts = [];
  for (let i = 0; i < 6; i++) {
    const ang = Math.PI / 180 * (60 * i - 30 + rotation);
    verts.push([cx + size * Math.cos(ang), cy + size * Math.sin(ang)]);

  return verts;
}
function hexPath(ctx, cx, cy, size, rotation = 0) {
  const v = hexVertices(cx, cy, size, rotation);
  ctx.beginPath();
  ctx.moveTo(v[0][0], v[0][1]);
  for (let i = 1; i < 6; i++) ctx.lineTo(v[i][0], v[i][1]);
  ctx.closePath();
}

// ============== 通用网格几何（hex / square） ==============
// square：offset 表示网格线交点原点，cellSize 表示方格边长。
function squareCenter(col, row, size, ox, oy, rotation = 0) {
  const x = ox + (col + 0.5) * size;
  const y = oy + (row + 0.5) * size;
  return rotateAroundOrigin(x, y, ox, oy, rotation * Math.PI / 180);
}
function squareAtPoint(x, y, size, ox, oy, rotation = 0) {
  const [ux, uy] = rotateAroundOrigin(x, y, ox, oy, -rotation * Math.PI / 180);
  return {
    col: Math.floor((ux - ox) / size),
    row: Math.floor((uy - oy) / size),
  };
}
function squareVertices(col, row, size, ox, oy, rotation = 0) {
  const x = ox + col * size;
  const y = oy + row * size;
  const corners = [[x, y], [x + size, y], [x + size, y + size], [x, y + size]];
  const rad = rotation * Math.PI / 180;
  return corners.map(([px, py]) => rotateAroundOrigin(px, py, ox, oy, rad));
}
function pathFromVertices(ctx, verts) {
  ctx.beginPath();
  ctx.moveTo(verts[0][0], verts[0][1]);
  for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0], verts[i][1]);
  ctx.closePath();
}
function gridCellAtPoint(mx, my, grid) {
  const type = normalizeGridType(grid.type);
  const rotation = normalizeGridRotationForType(type, grid.rotation || 0);
  if (type === 'square') {
    const p = squareAtPoint(mx, my, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
    return { type, col: p.col, row: p.row };
  }
  const p = hexAtPoint(mx, my, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  return { type, q: p.q, r: p.r };
}
function gridCellCenter(cell, grid) {
  const type = normalizeGridType(grid.type);
  const rotation = normalizeGridRotationForType(type, grid.rotation || 0);
  if (type === 'square') return squareCenter(cell.col, cell.row, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  return hexCenter(cell.q, cell.r, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
}
function gridCellVertices(cell, grid) {
  const type = normalizeGridType(grid.type);
  const rotation = normalizeGridRotationForType(type, grid.rotation || 0);
  if (type === 'square') return squareVertices(cell.col, cell.row, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  const [cx, cy] = hexCenter(cell.q, cell.r, grid.cellSize, grid.offsetX, grid.offsetY, rotation);

}
function gridCellPath(ctx, cell, grid) {

}
function gridCellBounds(cell, grid) {
  const verts = gridCellVertices(cell, grid);

function diceRandomInt(maxInclusive) {
  const max = Math.floor(maxInclusive);
  if (!Number.isFinite(max) || max < 1) throw new Error('骰面不正确');
  const range = 0x100000000;
  const limit = range - (range % max);
  const buf = new Uint32Array(1);
  do { crypto.getRandomValues(buf); } while (buf[0] >= limit);
  return (buf[0] % max) + 1;
}

function parseDiceExpression(raw) {
  const expression = normalizeDiceExpression(raw);
  if (!expression) throw new Error('请输入骰子表达式');
  if (!/^[0-9d+*]+$/.test(expression)) throw new Error('只支持数字、d、+、*');
  const terms = expression.split('+');
  if (!terms.length || terms.length > DICE_MAX_TERMS) throw new Error(`最多支持 ${DICE_MAX_TERMS} 项`);
  return terms.map((term) => {
    if (!term) throw new Error('表达式不完整');
    const parts = term.split('*');
    if (parts.length > 2) throw new Error('每项最多一个倍率');
    const base = parts[0];
    const multiplier = parts[1] == null ? 1 : Number(parts[1]);
    if (!Number.isInteger(multiplier) || multiplier < 1 || multiplier > DICE_MAX_MULTIPLIER) throw new Error(`倍率必须是 1-${DICE_MAX_MULTIPLIER} 的整数`);
    const diceMatch = base.match(/^(\d*)d(\d+)$/);
    if (diceMatch) {
      const count = diceMatch[1] ? Number(diceMatch[1]) : 1;
      const sides = Number(diceMatch[2]);
      if (!Number.isInteger(count) || count < 1 || count > DICE_MAX_COUNT) throw new Error(`骰子数量必须是 1-${DICE_MAX_COUNT}`);
      if (!Number.isInteger(sides) || sides < 2 || sides > DICE_MAX_SIDES) throw new Error(`骰面必须是 2-${DICE_MAX_SIDES}`);
      return { type: 'dice', count, sides, multiplier };
    }
    if (!/^\d+$/.test(base)) throw new Error(`无法识别：${term}`);
    const value = Number(base);
    if (!Number.isInteger(value) || value > DICE_MAX_FLAT) throw new Error(`固定加值最大 ${DICE_MAX_FLAT}`);
    if (multiplier !== 1) throw new Error('固定加值不支持倍率');
    return { type: 'flat', value, multiplier: 1 };
  });
}

function rollDiceExpression(raw) {
  const terms = parseDiceExpression(raw);
  let total = 0;
  const details = [];
  for (const term of terms) {
    if (term.type === 'flat') {
      total += term.value;
      details.push(`+${term.value}`);
      continue;
    }
    const rolls = [];
    for (let i = 0; i < term.count; i++) rolls.push(diceRandomInt(term.sides));
    const subtotal = rolls.reduce((sum, n) => sum + n, 0);
    const final = subtotal * term.multiplier;
    total += final;
    const multText = term.multiplier > 1 ? ` ×${term.multiplier} 暴击翻倍 = ${final}` : ` = ${final}`;
    details.push(`${term.count}d${term.sides} [${rolls.join(', ')}]${multText}`);
  }
  return { id: uuid(), expression: normalizeDiceExpression(raw), total, detail: details.join('；'), createdAt: Date.now() };
}

    if (state.placeEventMode) togglePlaceEventMode(false);
    clearSelection({ render: false });
    hideObjectPanel();
  }
  updateSurfaceChrome();
  refreshSelectionUi();
  hideDropdown();
  scheduleRender('all');
}

function updateSurfaceChrome() {
  const app = $('app');
  if (!app) return;
  app.classList.toggle('surface-edit', isEditSurface());
  app.classList.toggle('surface-live', isLiveSurface());
  const btn = $('btn-surface-toggle');
  if (btn) {
    const label = btn.querySelector('.label-only');
    if (label) label.textContent = isEditSurface() ? '回到跑团' : '编辑';
    else btn.textContent = isEditSurface() ? '回到跑团' : '编辑';
    btn.title = isEditSurface() ? '回到跑团态' : '进入编辑态';
  }
  const status = $('status-saved');
  if (status) status.dataset.surface = state.surfaceMode;
}

function canUseEditTools() {
  return isEditSurface() && !state.gridCalibration &&
    state.uiMode !== 'modal' && state.uiMode !== 'grid-calibration' && state.uiMode !== 'reveal-zone';
}

function requireEditSurface() {
  if (canUseEditTools()) return true;
  if (state.gridCalibration) showToast('请先完成或取消网格校准');
  else if (state.revealZoneDraft) showToast('请先保存或取消揭示区域选择');
  else showToast('请先进入编辑态');
  return false;
}

function refreshSelectionUi() {
  updateTokenActionBar();
  updateAnnotationActionBar();
  updateObjectPanel();
}

function getSelectedObject() {
  if (state.selectedTokenId) {
    const item = state.tokens.find((t) => t.id === state.selectedTokenId);
    if (item) return { kind: 'token', item };
  }
  if (state.selectedAnnotationId) {
    const item = state.annotations.find((a) => a.id === state.selectedAnnotationId);
    if (item) return { kind: 'annotation', item };
  }
  if (state.selectedEventId) {
    const item = state.events.find((e) => e.id === state.selectedEventId);
    if (item) return { kind: 'event', item };
  }
  return null;
}

function setSelectedObject(kind, id, opts = {}) {
  if (state.gridMaskSelection) cancelGridMaskSelection();
  state.selectedTokenId = kind === 'token' ? id : null;
  state.selectedAnnotationId = kind === 'annotation' ? id : null;
  state.selectedEventId = kind === 'event' ? id : null;
  if (kind !== 'event' || !opts.keepEventCard) hideEventCard();
  refreshSelectionUi();
  if (opts.locate) locateSelectedObject();
  if (opts.render !== false) scheduleRender('all');
}

function clearSelection(opts = {}) {
  if (!state.selectedTokenId && !state.selectedAnnotationId && !state.selectedEventId && !state.eventCardOpenId) return;
  state.selectedTokenId = null;
  state.selectedAnnotationId = null;
  state.selectedEventId = null;
  if (!opts.keepEventCard) hideEventCard();
  refreshSelectionUi();
  if (opts.render !== false) scheduleRender('all');
}

function hideObjectPanel() {
  const panel = $('object-panel');
  if (panel) panel.innerHTML = '';
}

let ENTRY_COLORS = DEFAULT_ENTRY_COLORS.slice();

function normalizeEntryName(name) {
  return String(name || '').replace(/\s+/g, ' ').trim().slice(0, 40);
}

function entryNameKey(name) {
  return normalizeEntryName(name).toLowerCase();
}

function normalizeEntryHotkey(value) {
  const text = String(value || '').trim().toUpperCase();
  return /^[A-Z]$/.test(text) ? text : '';
}

function getEntryByHotkey(value) {
  const key = normalizeEntryHotkey(value);
  if (!key) return null;
  return (state.entries || []).find((entry) => entry.hotkey === key) || null;
}

function entryHotkeyInUse(hotkey, exceptId = null) {
  const key = normalizeEntryHotkey(hotkey);
  if (!key) return null;
  return (state.entries || []).find((entry) => entry.hotkey === key && entry.id !== exceptId) || null;
}

function entryDisplayName(entry, opts = {}) {
  if (!entry) return '';
  if (opts.withHotkey === false || !entry.hotkey) return entry.name;
  return `${entry.hotkey} ${entry.name}`;
}

function bindEntryHotkeyInput(input) {
  if (!input) return;
  input.addEventListener('input', () => {
    input.value = normalizeEntryHotkey(input.value);
  });
}

function normalizeEntryHotkeyAction(action) {
  return action === 'reveal-zones' ? 'reveal-zones' : 'spotlight';
}

function entryHotkeyActionLabel(action) {
  return normalizeEntryHotkeyAction(action) === 'reveal-zones' ? '切换区域显示' : '切换事件上层';
}

function normalizeEntryPurpose(purpose) {
  return purpose === 'reveal-zone' || purpose === 'spotlight' || purpose === 'both' ? purpose : 'both';
}

function entryPurposeLabel(purpose) {
  const clean = normalizeEntryPurpose(purpose);
  if (clean === 'reveal-zone') return '揭示区域';
  if (clean === 'spotlight') return '事件显露';
  return '两者都用';
}

function entryCanSpotlight(entry) {
  const purpose = normalizeEntryPurpose(entry?.purpose);
  return purpose === 'spotlight' || purpose === 'both';
}

function entryCanRevealZone(entry) {
  const purpose = normalizeEntryPurpose(entry?.purpose);
  return purpose === 'reveal-zone' || purpose === 'both';
}

function entryPurposeOptionsHTML(current) {
  const cur = normalizeEntryPurpose(current);
  return `
    <option value="reveal-zone"${cur === 'reveal-zone' ? ' selected' : ''}>揭示区域</option>
    <option value="spotlight"${cur === 'spotlight' ? ' selected' : ''}>事件显露</option>
    <option value="both"${cur === 'both' ? ' selected' : ''}>两者都用</option>
  `;
}

function normalizeEntryIdsForEntries(value, entries) {
  const source = Array.isArray(value) ? value : (value ? [value] : []);
  const known = new Set((entries || []).map((e) => e.id));
  const out = [];
  const seen = new Set();
  for (const id of source) {
    const clean = String(id || '').trim();
    if (!clean || seen.has(clean) || (known.size && !known.has(clean))) continue;
    seen.add(clean);
    out.push(clean);
  }
  return out;
}

function normalizeEntryIds(value) {
  return normalizeEntryIdsForEntries(value, state.entries || []);
}

function cleanEntryIds(value) {
  const source = Array.isArray(value) ? value : (value ? [value] : []);
  const out = [];
  const seen = new Set();
  for (const id of source) {
    const clean = String(id || '').trim();
    if (!clean || seen.has(clean)) continue;
    seen.add(clean);
    out.push(clean);
  }
  return out;
}

function normalizeEntries(entries) {
  const out = [];
  const seenNames = new Set();
  const seenIds = new Set();
  const seenHotkeys = new Set();
  for (const raw of (Array.isArray(entries) ? entries : [])) {
    const name = normalizeEntryName(raw?.name);
    const key = entryNameKey(name);
    if (!name || seenNames.has(key)) continue;
    let id = String(raw?.id || '').trim();
    if (!id || seenIds.has(id)) id = uuid();
    seenNames.add(key);
    seenIds.add(id);
    let hotkey = normalizeEntryHotkey(raw?.hotkey);
    if (hotkey && seenHotkeys.has(hotkey)) hotkey = '';
    if (hotkey) seenHotkeys.add(hotkey);
    out.push({
      id,
      name,
      purpose: normalizeEntryPurpose(raw?.purpose),
      hotkey,
      hotkeyAction: normalizeEntryHotkeyAction(raw?.hotkeyAction),
      color: normalizeHex(raw?.color || ENTRY_COLORS[out.length % ENTRY_COLORS.length]),
      livePicker: raw?.livePicker !== false,
      sortOrder: Number.isFinite(raw?.sortOrder) ? raw.sortOrder : out.length,
      createdAt: raw?.createdAt || Date.now(),
      updatedAt: raw?.updatedAt || Date.now(),
    });
  }
  out.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0) || a.name.localeCompare(b.name, 'zh-Hans-CN'));
  return out;
}

function getEntryById(id) {
  return (state.entries || []).find((e) => e.id === id) || null;
}

function objectEntryIds(item) {
  return normalizeEntryIds(item?.entryIds || []);
}

function objectHasEntry(item, entryId) {
  if (!entryId) return false;
  return objectEntryIds(item).includes(entryId);
}

function objectHasActiveEntry(item) {
  if (!entryCanSpotlight(getEntryById(state.activeEntryId))) return false;
  return objectHasEntry(item, state.activeEntryId);
}

function objectEntryNames(item) {
  return objectEntryIds(item)
    .map((id) => getEntryById(id))
    .filter(Boolean)
    .map((entry) => entry.name);
}

function collectEntryCounts() {
  const counts = new Map((state.entries || []).map((entry) => [entry.id, { event: 0, token: 0, annotation: 0, zone: 0, total: 0 }]));
  const add = (kind, item) => {
    for (const id of objectEntryIds(item)) {
      if (!counts.has(id)) counts.set(id, { event: 0, token: 0, annotation: 0, zone: 0, total: 0 });
      const row = counts.get(id);
      row[kind] += 1;
      row.total += 1;
    }
  };
  state.events.forEach((item) => add('event', item));
  state.tokens.forEach((item) => add('token', item));
  state.annotations.forEach((item) => add('annotation', item));
  (state.revealZones || []).forEach((item) => add('zone', item));
  return counts;
}

function createEntry(name, opts = {}) {
  const cleanName = normalizeEntryName(name);
  if (!cleanName) { showToast('词条名不能为空'); return null; }
  const key = entryNameKey(cleanName);
  const existing = (state.entries || []).find((entry) => entryNameKey(entry.name) === key);
  if (existing) return existing;
  const hotkey = normalizeEntryHotkey(opts.hotkey);
  const hotkeyOwner = hotkey ? entryHotkeyInUse(hotkey) : null;
  if (hotkeyOwner) {
    showToast(`${hotkey} 已经绑定给「${hotkeyOwner.name}」`);
    return null;
  }
  const entry = {
    id: uuid(),
    name: cleanName,
    purpose: normalizeEntryPurpose(opts.purpose),
    hotkey,
    hotkeyAction: normalizeEntryHotkeyAction(opts.hotkeyAction),
    color: normalizeHex(opts.color || ENTRY_COLORS[(state.entries || []).length % ENTRY_COLORS.length]),
    livePicker: opts.livePicker !== false,
    sortOrder: state.entries.length,
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
  state.entries.push(entry);
  state.entries = normalizeEntries(state.entries);
  updateEntryButton();
  updateObjectPanel();
  triggerDebouncedSave();
  return entry;
}

function pruneEntryReferences() {
  state.entries = normalizeEntries(state.entries);
  const liveIds = new Set(state.entries.map((entry) => entry.id));
  const prune = (item) => { item.entryIds = (item.entryIds || []).filter((id) => liveIds.has(id)); };
  state.events.forEach(prune);
  state.tokens.forEach(prune);
  state.annotations.forEach(prune);
  (state.revealZones || []).forEach(prune);
  if (state.activeEntryId && !liveIds.has(state.activeEntryId)) state.activeEntryId = null;
}

function normalizeRevealZoneLayer(layer) {
  if (layer === 'event' || layer === 'all') return layer;
  return 'terrain';
}

function revealZoneLayerLabel(layer) {
  const clean = normalizeRevealZoneLayer(layer);
  if (clean === 'all') return '双层';
  return clean === 'event' ? '事件层' : '地形层';
}

function cloneRevealZoneGrid(grid) {
  const g = normalizeGridSettings(grid || state.grid);
  return {
    enabled: true,
    type: normalizeGridType(g.type),
    cellSize: g.cellSize,
    offsetX: g.offsetX,
    offsetY: g.offsetY,
    rotation: normalizeGridRotationForType(g.type, g.rotation || 0),
    lineColor: g.lineColor,
    lineOpacity: g.lineOpacity,
  };
}

function parseGridCellKey(key) {
  const raw = String(key || '');
  let m = raw.match(/^hex:(-?\d+),(-?\d+)$/);
  if (m) return { type: 'hex', q: parseInt(m[1], 10), r: parseInt(m[2], 10) };
  m = raw.match(/^square:(-?\d+),(-?\d+)$/);
  if (m) return { type: 'square', col: parseInt(m[1], 10), row: parseInt(m[2], 10) };
  return null;
}

function normalizeRevealZoneCells(cells) {
  const out = [];
  const seen = new Set();
  for (const key of cells || []) {
    const cell = parseGridCellKey(key);
    if (!cell) continue;
    const clean = gridCellKey(cell);
    if (seen.has(clean)) continue;
    seen.add(clean);
    out.push(clean);
  }
  return out.sort();
}

function normalizeRevealZones(zones, entries = state.entries) {
  const cleanEntries = normalizeEntries(entries || []);
  return (zones || []).map((zone) => {
    const grid = cloneRevealZoneGrid(zone.grid || state.grid);
    const cells = normalizeRevealZoneCells(zone.cells || []).filter((key) => key.startsWith(`${grid.type}:`));
    if (!cells.length) return null;
    return {
      id: zone.id || uuid(),
      name: String(zone.name || '揭示区域').trim().slice(0, 40) || '揭示区域',
      layer: normalizeRevealZoneLayer(zone.layer),
      entryIds: normalizeEntryIdsForEntries(zone.entryIds || [], cleanEntries),
      cells,
      grid,
      createdAt: zone.createdAt || Date.now(),
      updatedAt: zone.updatedAt || zone.createdAt || Date.now(),
    };
  }).filter(Boolean);
}

function revealZoneEntryNames(zone) {
  return objectEntryIds(zone).map((id) => getEntryById(id)).filter(Boolean).map((entry) => entry.name);
}

function revealZonesForEntry(entryId) {
  if (!entryId) return [];
  const entry = getEntryById(entryId);
  if (!entryCanRevealZone(entry)) return [];
  return (state.revealZones || []).filter((zone) => objectEntryIds(zone).includes(entryId));
}

function setActiveEntry(entryId) {
  const entry = getEntryById(entryId);
  const next = entry && entryCanSpotlight(entry) ? entryId : null;
  state.activeEntryId = next;
  updateEntryButton();
  updateObjectPanel();
  scheduleRender('all');
}

function updateEntryButton() {
  const btn = $('btn-entry-spotlight');
  if (!btn) return;
  const entry = getEntryById(state.activeEntryId);
  btn.classList.toggle('active', !!entry);
  btn.style.setProperty('--entry-color', entry ? entry.color : '');
  const label = btn.querySelector('.label-only');
  if (label) label.textContent = entry ? `词条: ${entryDisplayName(entry)}` : '词条';
}

function entryChipsHTML(entryIds) {
  const ids = new Set(normalizeEntryIds(entryIds));
  return objectEntryIds({ entryIds: Array.from(ids) }).map((id) => {
    const entry = getEntryById(id);
    if (!entry) return '';
    const active = state.activeEntryId === id ? ' active' : '';
    return `<span class="object-tag-chip${active}" style="border-color:${escapeHtml(entry.color)}">${escapeHtml(entryDisplayName(entry))}</span>`;
  }).join('');
}

function entryAssignmentHTML(selectedIds, opts = {}) {
  const ids = new Set(normalizeEntryIds(selectedIds));
  const defaultPurpose = normalizeEntryPurpose(opts.defaultPurpose);
  const chips = (state.entries || []).map((entry) => `
    <button type="button" class="entry-pick${ids.has(entry.id) ? ' selected' : ''}" data-entry-id="${escapeHtml(entry.id)}" style="--entry-color:${escapeHtml(entry.color)}" title="${escapeHtml(entryPurposeLabel(entry.purpose))}">${escapeHtml(entryDisplayName(entry))}</button>
  `).join('');
  return `
    <div class="form-row">
      <label>词条</label>
      <div class="entry-picker-list">
        <div class="entry-picker-chips" id="entry-picker-chips">${chips || '<span class="object-empty" style="padding:4px 0;text-align:left;">暂无词条</span>'}</div>
        <div class="entry-new-row">
          <input id="entry-new-name" type="text" maxlength="40" placeholder="新建词条">
          <input id="entry-new-hotkey" class="entry-hotkey-input" type="text" maxlength="1" placeholder="键">
          <select id="entry-new-purpose" class="entry-purpose-select" title="词条用途">${entryPurposeOptionsHTML(defaultPurpose)}</select>
          <button id="entry-new-add" type="button">新建</button>
        </div>
      </div>
    </div>
  `;
}

function mountEntryAssignmentControl(initialIds, opts = {}) {
  const selected = new Set(normalizeEntryIds(initialIds));
  const defaultPurpose = normalizeEntryPurpose(opts.defaultPurpose);
  const render = () => {
    const box = $('entry-picker-chips');
    if (!box) return;
    box.innerHTML = (state.entries || []).map((entry) => `
      <button type="button" class="entry-pick${selected.has(entry.id) ? ' selected' : ''}" data-entry-id="${escapeHtml(entry.id)}" style="--entry-color:${escapeHtml(entry.color)}" title="${escapeHtml(entryPurposeLabel(entry.purpose))}">${escapeHtml(entryDisplayName(entry))}</button>
    `).join('') || '<span class="object-empty" style="padding:4px 0;text-align:left;">暂无词条</span>';
    box.querySelectorAll('.entry-pick').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.entryId;
        if (selected.has(id)) selected.delete(id);
        else selected.add(id);
        render();
      });
    });
  };
  render();
  const addBtn = $('entry-new-add');
  const input = $('entry-new-name');
  const hotkeyInput = $('entry-new-hotkey');
  const purposeInput = $('entry-new-purpose');
  bindEntryHotkeyInput(hotkeyInput);
  if (purposeInput) purposeInput.value = defaultPurpose;
  if (addBtn && input) {
    const add = () => {
      const entry = createEntry(input.value, { hotkey: hotkeyInput?.value, purpose: purposeInput?.value || defaultPurpose });
      if (!entry) return;
      selected.add(entry.id);
      input.value = '';
      if (hotkeyInput) hotkeyInput.value = '';
      if (purposeInput) purposeInput.value = defaultPurpose;
      render();
    };
    addBtn.addEventListener('click', add);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); add(); }
    });
    if (hotkeyInput) {
      hotkeyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); add(); }
      });
    }
  }
  return () => normalizeEntryIds(Array.from(selected));
}

function objectMaskLabel(kind, item) {
  if (objectHasActiveEntry(item)) {
    const entry = getEntryById(state.activeEntryId);
    return `词条动作：${entry ? entry.name : '已激活'}`;
  }
  if (kind === 'event') return isSceneLinkEvent(item)
    ? `场景转移 · ${sceneLinkTargetName(item)}`
    : (item.layer === 0 ? '公开事件' : '受事件雾');
  if (kind === 'annotation') {
    const mode = normalizeAnnotationMaskMode(item.maskMode);
    if (mode === 'terrain') return isAnnotationVisible(item) ? '受地形雾 · 可见' : '受地形雾 · 被遮挡';
    if (mode === 'event') return isAnnotationVisible(item) ? '受事件雾 · 可见' : '受事件雾 · 被遮挡';
    return '公开标注';
  }
  return 'Token';
}

function objectKindLabel(kind) {
  if (kind === 'event') return '事件';
  if (kind === 'token') return 'Token';
  if (kind === 'annotation') return '标注';
  return '对象';
}

function objectTitle(kind, item) {
  if (kind === 'event') return item.title || '（未命名事件）';
  if (kind === 'annotation') {
    if (item.type === 'text') return item.text || '（空文字）';
    return '图片标注';
  }
  return item.name || 'Token';
}

function objectThumb(kind, item) {
  if (kind === 'event') {
    if (item.icon && item.icon.type === 'emoji') return escapeHtml(item.icon.value || '？');
    return '事';
  }
  if (kind === 'annotation') return item.type === 'text' ? '文' : '图';
  return 'T';
}

function objectSizeSummary(kind, item) {
  if (kind === 'event') return `${Math.round(item.size || EVENT_DEFAULT_SIZE)}px`;
  if (kind === 'annotation') return `${Math.round(annotationPrimarySize(item))}px`;
  return `${Math.round(item.size || TOKEN_DEFAULT_SIZE)}px`;
}

function objectMatchesPanelQuery(kind, item, q) {
  if (!q) return true;
  const haystack = [
    objectKindLabel(kind),
    objectTitle(kind, item),
    objectMaskLabel(kind, item),
    objectSizeSummary(kind, item),
    objectEntryNames(item).join(' '),
    kind === 'event' ? item.content : '',
    kind === 'annotation' && item.type === 'text' ? item.text : '',
  ].join(' ').toLowerCase();
  return haystack.includes(q);
}

function getFilteredObjectPanelItems() {
  const filter = ['all', 'event', 'token', 'annotation'].includes(state.objectPanelFilter)
    ? state.objectPanelFilter
    : 'all';
  const query = String(state.objectPanelQuery || '').trim().toLowerCase();
  const itemsAll = [
    ...state.events.filter((item) => !isSceneLinkEvent(item)).map((item) => ({ kind: 'event', item })),
    ...state.tokens.map((item) => ({ kind: 'token', item })),
    ...state.annotations.map((item) => ({ kind: 'annotation', item })),
  ];
  const items = itemsAll.filter((row) => (
    (filter === 'all' || row.kind === filter) &&
    objectMatchesPanelQuery(row.kind, row.item, query)
  ));
  return { filter, itemsAll, items };
}

function renderObjectPanelList() {
  const panel = $('object-panel');
  const list = $('object-panel-list');
  if (!panel || !list || !isEditSurface()) return;
  const { itemsAll, items } = getFilteredObjectPanelItems();
  const selected = getSelectedObject();
  const sceneName = state.currentSceneId && state.scenes[state.currentSceneId]
    ? (state.scenes[state.currentSceneId].name || '当前场景')
    : '当前场景';
  const meta = $('object-panel-meta');
  if (meta) meta.textContent = `${sceneName} · ${items.length}/${itemsAll.length} 项`;
  list.innerHTML = '';
  if (itemsAll.length === 0) {
    list.innerHTML = '<div class="object-empty">当前场景还没有事件、Token 或标注。</div>';
    return;
  }
  if (items.length === 0) {
    list.innerHTML = '<div class="object-empty">没有匹配的对象。</div>';
    return;
  }
  const sections = [
    ['event', '事件', items.filter((x) => x.kind === 'event')],
    ['token', 'Token', items.filter((x) => x.kind === 'token')],
    ['annotation', '标注', items.filter((x) => x.kind === 'annotation')],
  ];
  for (const [, label, rows] of sections) {
    if (rows.length === 0) continue;
    const title = document.createElement('div');
    title.className = 'object-section-title';
    title.textContent = `${label} · ${rows.length}`;
    list.appendChild(title);
    for (const row of rows) {
      const isSelected = selected && selected.kind === row.kind && selected.item.id === row.item.id;
      const btn = document.createElement('button');
      btn.className = 'object-row' + (isSelected ? ' selected' : '') + (objectHasActiveEntry(row.item) ? ' tag-active' : '');
      btn.dataset.kind = row.kind;
      btn.dataset.id = row.item.id;
      btn.innerHTML = `
        <span class="object-thumb">${objectThumb(row.kind, row.item)}</span>
        <span class="object-main">
          <span class="object-name">${escapeHtml(objectTitle(row.kind, row.item))}</span>
          <span class="object-sub">${escapeHtml(objectMaskLabel(row.kind, row.item))} · ${escapeHtml(objectSizeSummary(row.kind, row.item))}</span>
          ${objectEntryIds(row.item).length ? `<span class="object-tags">${entryChipsHTML(row.item.entryIds)}</span>` : ''}
        </span>
        <span class="object-locate" title="定位">⌖</span>
        <span class="object-edit" title="编辑">✎</span>
      `;
      btn.addEventListener('click', (e) => {
        const locate = Boolean(e.target.closest('.object-locate'));
        const edit = Boolean(e.target.closest('.object-edit'));
        if (edit) {
          setSelectedObject(row.kind, row.item.id, { render: false });
          editObjectFromPanel(row.kind, row.item.id);
          return;
        }
        setSelectedObject(row.kind, row.item.id, { locate });
      });
      btn.addEventListener('dblclick', () => editObjectFromPanel(row.kind, row.item.id));
      list.appendChild(btn);
    }
  }
}

function updateObjectPanel() {
  const panel = $('object-panel');
  if (!panel || !isEditSurface()) return;

function locateSelectedObject() {
  const selected = getSelectedObject();

  const item = selected.item;

  const panel = $('object-panel');

  let panelW = 0;

    if (panelRect.height > rect.height * 0.7) panelW = panelRect.width;
    else panelH = panelRect.height;
  }
  const targetCx = Math.max(1, rect.width - panelW) / 2;
  const targetCy = Math.max(1, rect.height - panelH) / 2;
  state.view.x = targetCx - item.x * state.view.scale;
  state.view.y = targetCy - item.y * state.view.scale;
  state.viewIsPristineFit = false;

function applyRestoredView(savedView, opts = {}) {
  if (opts.fitViewAfterRestore || !savedView) {
    fitView();
    return;
  }
  const scale = Number(savedView.scale);
  const x = Number(savedView.x);
  const y = Number(savedView.y);
  if (!Number.isFinite(scale) || !Number.isFinite(x) || !Number.isFinite(y)) {
    fitView();
    return;
  }
  const clampedScale = clamp(scale, SCALE_MIN, SCALE_MAX);
  const rect = state.mainCanvas.parentElement.getBoundingClientRect();
  const mapW = state.mapCanvas.width * clampedScale;
  const mapH = state.mapCanvas.height * clampedScale;
  const hasVisibleArea = x < rect.width - 24 && y < rect.height - 24 && x + mapW > 24 && y + mapH > 24;
  if (!hasVisibleArea) {

  updateZoomStatus();
  hideEventCard();
}
function assertFogBitmapMatchesMap(bitmap, label) {

function drawFogBitmapToLayer(layerKey, bitmap) {

async function decodeAndValidateFogPair(saved, mapSize) {
  let terrainBmp = null;
  let eventFogBmp = null;
  try {
    terrainBmp = await createImageBitmap(saved.fogLayers.terrain.blob);
    eventFogBmp = await createImageBitmap(saved.fogLayers.event.blob);
    const w = mapSize.w;
    const h = mapSize.h;
    if (terrainBmp.width !== w || terrainBmp.height !== h) {
      throw new Error(`地形迷雾尺寸 ${terrainBmp.width}×${terrainBmp.height} 与当前地图 ${w}×${h} 不一致`);
    }
    if (eventFogBmp.width !== w || eventFogBmp.height !== h) {
      throw new Error(`事件迷雾尺寸 ${eventFogBmp.width}×${eventFogBmp.height} 与当前地图 ${w}×${h} 不一致`);
    }
    return { terrainBmp, eventFogBmp };
  } catch (e) {
    if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
    if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();

function loadImageElementFromBlob(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(blob);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('图片格式不支持'));
    };
    img.src = objectUrl;
  });
}
async function prepareMapFromBlob(blob, opts = {}) {

  let h = img.naturalHeight || img.height;
