// ============== Modal ==============
function showModal(html, opts) {
  const root = $('modal-root');
  root.innerHTML = '<div class="modal-card">' + html + '</div>';
  root.classList.add('visible');
  state.uiMode = state.presentMode ? 'present+modal' : 'modal';
  if (opts && opts.onMounted) opts.onMounted(root);
}
function closeModal() {
  $('modal-root').classList.remove('visible');
  $('modal-root').innerHTML = '';
  state.uiMode = state.presentMode ? 'present' : 'normal';
}
function showConfirm(title, desc, onYes, opts) {
  opts = opts || {};
  const danger = opts.danger ? 'danger' : 'primary';
  const yesText = opts.yesText || '确定';
  const noText = opts.noText || '取消';
  showModal(`
    <div class="modal-title">${escapeHtml(title)}</div>
    ${desc ? `<div class="modal-desc">${escapeHtml(desc)}</div>` : ''}
    <div class="modal-actions">
      <button id="modal-no">${escapeHtml(noText)}</button>
      <button id="modal-yes" class="${danger}">${escapeHtml(yesText)}</button>
    </div>
  `, {
    onMounted: () => {
      $('modal-no').addEventListener('click', () => { closeModal(); if (opts.onNo) opts.onNo(); });
      $('modal-yes').addEventListener('click', () => { closeModal(); onYes(); });
    }
  });
}

async function validateSceneFogForPreparedMap(scene, w, h) {
  const pair = await decodeAndValidateFogPair(scene, { w, h });
  if (pair.terrainBmp && typeof pair.terrainBmp.close === 'function') pair.terrainBmp.close();
  if (pair.eventFogBmp && typeof pair.eventFogBmp.close === 'function') pair.eventFogBmp.close();
}

async function restoreSceneWithPreparedMap(sceneId, file, preparedMap, nextFingerprint, w, h) {
  const scene = state.scenes[sceneId];
  if (!scene) { showToast('场景不存在'); return; }
  try {
    const preparedRestore = await prepareSavedRestore(scene, { w, h });
    commitPreparedMap(preparedMap);
    state.mapFingerprint = nextFingerprint;
    scene.mapBlob = file;
    scene.mapSize = { w, h };
    state.currentSceneId = sceneId;
    const restored = await restoreFromSaved(scene, { preparedRestore });
    if (restored) {
      await loadCheckpoints();
      setupBrushSizeFromState();
    }
  } catch (e) {
    console.error(e);
    hideLoading();
    showToast('恢复失败：' + (e.message || e));
  }
}

function resetSceneWithPreparedMap(sceneId, file, preparedMap, nextFingerprint, w, h) {
  const scene = state.scenes[sceneId];
  if (!scene) { showToast('场景不存在'); return; }
  commitPreparedMap(preparedMap);
  state.mapFingerprint = nextFingerprint;
  scene.mapBlob = file;
  scene.mapSize = { w, h };
  state.currentSceneId = sceneId;
  clearAnnotationRuntimeResources();
  state.tokens = []; state.events = []; state.annotations = [];
  clearSelection({ render: false });
  state.undoStack = [];
  updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus(); updateUndoButton();
  refreshSelectionUi();
  fitView();
  setupBrushSizeFromState();
  promptInitialFog();
}

function createSceneWithPreparedMap(file, preparedMap, nextFingerprint, w, h) {
  commitPreparedMap(preparedMap);
  hideLoading();
  state.mapFingerprint = nextFingerprint;
  const newId = uuid();
  state.scenes[newId] = {
    version: 2,
    name: `场景 ${Object.keys(state.scenes).length + 1}`,
    mapBlob: file,
    mapFingerprint: nextFingerprint,
    mapSize: { w, h },
    createdAt: Date.now(),
    lastUsedAt: Date.now(),
  };
  state.currentSceneId = newId;
  clearAnnotationRuntimeResources();
  state.tokens = []; state.events = []; state.annotations = [];
  clearSelection({ render: false });
  state.undoStack = [];
  state.grid = defaultGridSettings();
  updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus(); updateUndoButton();
  refreshSelectionUi();
  promptInitialFog();
}

function showMatchedSceneChooser(matchedSceneIds, file, preparedMap, nextFingerprint, w, h) {
  const rows = matchedSceneIds
    .sort((a, b) => ((state.scenes[b]?.lastUsedAt || 0) - (state.scenes[a]?.lastUsedAt || 0)))
    .map((id) => {
      const s = state.scenes[id] || {};
      const ago = s.lastUsedAt ? Math.max(1, Math.round((Date.now() - s.lastUsedAt) / 60000)) + ' 分钟前' : '未知时间';
      return `
        <div class="scene-row">
          <span class="scene-name">${escapeHtml(s.name || '场景')}</span>
          <span class="scene-meta">${escapeHtml(ago)}</span>
          <div class="scene-actions"><button class="matched-scene-restore" data-id="${escapeHtml(id)}">恢复</button></div>
        </div>
      `;
    }).join('');
  hideLoading();
  showModal(`
    <div class="modal-title">选择要恢复的场景</div>
    <div class="modal-desc">这张地图对应多个场景。请选择要恢复的场景，或把它作为新场景加载。</div>
    <div class="scene-list">${rows}</div>
    <div class="modal-actions">
      <button id="matched-scene-new">作为新场景加载</button>
      <button id="matched-scene-cancel" class="primary">取消</button>
    </div>
  `, {
    onMounted: () => {
      document.querySelectorAll('.matched-scene-restore').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          closeModal();
          await restoreSceneWithPreparedMap(id, file, preparedMap, nextFingerprint, w, h);
        });
      });
      $('matched-scene-new').addEventListener('click', () => {
        closeModal();
        createSceneWithPreparedMap(file, preparedMap, nextFingerprint, w, h);
        fitView();
        setupBrushSizeFromState();
      });
      $('matched-scene-cancel').addEventListener('click', closeModal);
    }
  });
}

// ============== 加载地图 ==============
async function loadMapFile(file) {
  await ensureDb();
  if (!file) return;
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  const lower = file.name.toLowerCase();
  if (file.type === 'image/heic' || file.type === 'image/heif' || lower.endsWith('.heic') || lower.endsWith('.heif')) {
    showConfirm('格式不支持', 'iPad 上请用截图代替（HEIC 格式浏览器不支持）。', closeModal);
    return;
  }
  setLoading('加载地图中…');
  // v3: 加载新图前先保存当前场景（如果有），防止切场景时未保存的笔触丢失
  if (state.hasMap && state.currentSceneId && state.scenes[state.currentSceneId]) {
    try {
      const sceneCore = await serializeActiveSceneData();
      if (sceneCore) {
        const prev = state.scenes[state.currentSceneId];
        state.scenes[state.currentSceneId] = {
          ...sceneCore,
          mapBlob: prev.mapBlob || null,
          mapSize: sceneCore.mapSize,
          name: prev.name || '场景',
          createdAt: prev.createdAt || Date.now(),
          lastUsedAt: Date.now(),
        };
      }
    } catch (_) {}
  }
  try {
      const preparedMap = await prepareMapFromBlob(file, { showDownsampleToast: true });
      const w = preparedMap.w, h = preparedMap.h;
      const nextFingerprint = `${file.name}-${file.size}-${file.lastModified || 0}-${w}x${h}`;

      // v3: 在已有 scenes 中查匹配 fingerprint；同一地图可能对应多个场景，不能静默取第一个。
      const matchedSceneIds = [];
      for (const id in state.scenes) {
        if (state.scenes[id].mapFingerprint === nextFingerprint) {
          matchedSceneIds.push(id);
        }
      }
      if (matchedSceneIds.length > 1) {
        for (const id of matchedSceneIds) {
          try {
            await validateSceneFogForPreparedMap(state.scenes[id], w, h);
          } catch (e) {
            hideLoading();
            showToast('恢复失败：' + e.message);
            return;
          }
        }
        showMatchedSceneChooser(matchedSceneIds, file, preparedMap, nextFingerprint, w, h);
      } else if (matchedSceneIds.length === 1) {
        const matchedSceneId = matchedSceneIds[0];
        const scene = state.scenes[matchedSceneId];
        try {
          await validateSceneFogForPreparedMap(scene, w, h);
        } catch (e) {
          hideLoading();
          showToast('恢复失败：' + e.message);
          return;
        }
        hideLoading();
        const ago = Math.max(1, Math.round((Date.now() - (scene.lastUsedAt || scene.ts || 0)) / 60000));
        showConfirm(
          '检测到上次进度',
          `场景"${scene.name || '场景'}"，上次保存约 ${ago} 分钟前。是否恢复？`,
          () => restoreSceneWithPreparedMap(matchedSceneId, file, preparedMap, nextFingerprint, w, h),
          {
            yesText: '恢复', noText: '新建（清除此场景）',
            onNo: () => resetSceneWithPreparedMap(matchedSceneId, file, preparedMap, nextFingerprint, w, h),
          }
        );
      } else {
        createSceneWithPreparedMap(file, preparedMap, nextFingerprint, w, h);
      }
      fitView();
      setupBrushSizeFromState();
    } catch (e) {
      console.error(e);
      hideLoading();
      showToast('加载失败：' + e.message);
    }
}

function normalizeRestoredSettings(settings) {
  if (!settings) settings = {};
  const fogOpacity = (settings.fogOpacity != null) ? settings.fogOpacity : 1.0;
  return {
    brushSize: settings.brushSize || BRUSH_DEFAULT,
    brushMode: settings.brushMode || 'reveal',
    currentLayer: settings.currentLayer || 'terrain',
    fogOpacity,
    terrainFogOpacity: (settings.terrainFogOpacity != null) ? settings.terrainFogOpacity : fogOpacity,
    eventFogOpacity: (settings.eventFogOpacity != null) ? settings.eventFogOpacity : fogOpacity,
    terrainFogColor: normalizeHex(settings.terrainFogColor || '#000000'),
    eventFogColor: normalizeHex(settings.eventFogColor || '#000000'),
    grid: normalizeGridSettings(settings.grid),
  };
}

async function prepareSavedRestore(saved, mapSize) {
  let terrainBmp = null;
  let eventFogBmp = null;
  try {
    const pair = await decodeAndValidateFogPair(saved, mapSize);
    terrainBmp = pair.terrainBmp;
    eventFogBmp = pair.eventFogBmp;
    const tokens = [];
    for (const s of (saved.tokens || [])) {
      tokens.push(await rebuildTokenFromSerialized(s));
    }
    const events = [];
    for (const s of (saved.events || [])) {
      events.push(await deserializeEvent(s));
    }
    const annotations = [];
    for (const s of (saved.annotations || [])) {
      annotations.push(await deserializeAnnotation(s));
    }
    return {
      terrainBmp, eventFogBmp,
      tokens, events, annotations,
      view: saved.view || null,
      settings: normalizeRestoredSettings(saved.settings),
      customTheme: saved.customTheme || null,
    };
  } catch (e) {
    if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
    if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
    throw e;
  }
}

function applyPreparedRestore(prepared, opts = {}) {
  try {
    drawFogBitmapToLayer('terrain', prepared.terrainBmp);
    drawFogBitmapToLayer('event', prepared.eventFogBmp);
    clearAnnotationRuntimeResources();
    state.tokens = prepared.tokens;
    state.events = prepared.events;
    state.annotations = prepared.annotations || [];
    clearSelection({ render: false });
    applyRestoredView(prepared.view, opts);
    if (prepared.settings) {
      state.brush.sizeScreen = prepared.settings.brushSize;
      state.brush.mode = prepared.settings.brushMode;
      state.currentLayer = prepared.settings.currentLayer;
      state.fogOpacity = prepared.settings.fogOpacity;
      state.terrainFogOpacity = prepared.settings.terrainFogOpacity;
      state.eventFogOpacity = prepared.settings.eventFogOpacity;
      state.terrainFogColor = prepared.settings.terrainFogColor;
      state.eventFogColor = prepared.settings.eventFogColor;
      state.grid = prepared.settings.grid;
    }
    // 主题（如果有自定义）
    if (prepared.customTheme) {
      try { loadCustomTheme(prepared.customTheme); } catch (e) { console.warn('恢复主题失败', e); }
    }
    setBrushMode(state.brush.mode);
    setLayer(state.currentLayer);
    setBrushSize(state.brush.sizeScreen);
    state.undoStack = [];
    updateUndoButton();
    updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus();
    refreshSelectionUi();
    updateZoomStatus();
    scheduleRender('all');
    showToast('已恢复上次进度');
    return true;
  } finally {
    if (prepared.terrainBmp && typeof prepared.terrainBmp.close === 'function') prepared.terrainBmp.close();
    if (prepared.eventFogBmp && typeof prepared.eventFogBmp.close === 'function') prepared.eventFogBmp.close();
  }
}

async function restoreFromSaved(saved, opts = {}) {
  closeModal();
  setLoading('恢复进度中…');
  try {
    const prepared = opts.preparedRestore || await prepareSavedRestore(saved, { w: state.mapCanvas.width, h: state.mapCanvas.height });
    applyPreparedRestore(prepared, opts);
    hideLoading();
    return true;
  } catch (e) {
    console.error(e);
    showToast('恢复失败：' + e.message);
    hideLoading();
    return false;
  }
}

  // file: 上传的 image 文件（可选，点上传图片后传）

    : { type: 'emoji', value: DEFAULT_EMOJIS[0] };

  const initContent = editing ? editing.content : '';

    <div class="modal-title">${editing ? '编辑事件' : '添加事件'}</div>
    <div id="event-icon-preview"></div>
    <div class="icon-source-tabs">
      <div class="icon-source-tab" data-src="emoji">默认 emoji</div>
      <div class="icon-source-tab" data-src="custom">自定义符号</div>
      <div class="icon-source-tab" data-src="image">上传图片</div>
    </div>
    <div class="form-row" id="emoji-section">
      <div class="emoji-grid">
        ${DEFAULT_EMOJIS.map((emo) => `<div class="emoji-cell" data-emo="${escapeHtml(emo)}">${escapeHtml(emo)}</div>`).join('')}
      </div>
    </div>
    <div class="form-row" id="custom-section" style="display:none">
      <label>输入任意 emoji、字符、数字（如 ①、陷、A）</label>
      <div class="icon-custom-input">
        <input id="custom-icon-input" type="text" maxlength="8" placeholder="例：⭐ / ① / 陷 / A1">
      </div>
    </div>
    <div class="form-row" id="image-section" style="display:none">
      <label>上传图标图片（建议 64×64 以上，PNG/JPG/WebP）</label>
      <button id="event-icon-upload-btn">选择图片</button>
      <span id="event-icon-image-name" style="margin-left:8px;color:var(--theme-text-muted);font-size:12px;"></span>
    </div>
    <div class="form-row">
      <label>标题（可选）</label>
      <input id="event-title" type="text" maxlength="50">
    </div>
    <div class="form-row">
      <label>内容（DM 看的描述、剧情、提醒等）</label>
      <textarea id="event-content" rows="6"></textarea>
    </div>
    <div class="form-row">
      <label>显示层级</label>
      <div class="shape-options">
        <button class="option-btn" data-layer="1">被事件遮罩遮住（默认）</button>
        <button class="option-btn" data-layer="0">永远可见（剧情关键信息）</button>
      </div>
    </div>
    <div class="modal-actions">
      ${editing ? '<button id="event-delete-in-edit" class="danger">删除</button>' : ''}
      <button id="event-cancel">取消</button>
      <button id="event-confirm" class="primary">${editing ? '保存' : '添加'}</button>
    </div>
  `, {
    onMounted: () => {
      let curIcon = initIcon;
      let imageBlobUrl = null;
      let pendingImageBlob = (initIcon.type === 'image' ? initIcon.blob : null);

      const renderPreview = () => {
        const preview = $('event-icon-preview');
        preview.innerHTML = '';
        if (curIcon.type === 'emoji') {
          preview.textContent = curIcon.value;
        } else if (curIcon.type === 'image' && (curIcon.blob || pendingImageBlob)) {
          const blob = curIcon.blob || pendingImageBlob;
          if (imageBlobUrl) try { URL.revokeObjectURL(imageBlobUrl); } catch (_) {}
          imageBlobUrl = URL.createObjectURL(blob);
          const img = document.createElement('img');
          img.src = imageBlobUrl;
          preview.appendChild(img);
        } else if (curIcon.type === 'svg-symbol') {
          preview.textContent = '❓';
        } else {
          preview.textContent = curIcon.value || '?';
        }
      };

      // tab 切换
      const tabs = document.querySelectorAll('.icon-source-tab');
      const sections = {
        emoji: $('emoji-section'),
        custom: $('custom-section'),
        image: $('image-section'),
      };
      const switchTab = (which) => {
        tabs.forEach((t) => t.classList.toggle('selected', t.dataset.src === which));
        for (const k in sections) sections[k].style.display = (k === which ? '' : 'none');
      };
      const initialTab = curIcon.type === 'image' ? 'image'
        : (curIcon.type === 'emoji' && DEFAULT_EMOJIS.includes(curIcon.value)) ? 'emoji'
        : 'custom';
      switchTab(initialTab);

      tabs.forEach((t) => {
        t.addEventListener('click', () => {
          switchTab(t.dataset.src);
          if (t.dataset.src === 'emoji') {
            // 默认选中第一个或保留
            if (curIcon.type !== 'emoji' || !DEFAULT_EMOJIS.includes(curIcon.value)) {
              curIcon = { type: 'emoji', value: DEFAULT_EMOJIS[0] };
            }
            renderPreview();
            updateEmojiSelected();
          } else if (t.dataset.src === 'custom') {
            const inp = $('custom-icon-input');
            inp.value = (curIcon.type === 'emoji' ? curIcon.value : '');
            inp.focus();
          } else if (t.dataset.src === 'image') {
            // 点击 tab 不直接弹文件选择，让用户点按钮
          }
        });
      });

      // emoji grid
      const updateEmojiSelected = () => {
        document.querySelectorAll('.emoji-cell').forEach((c) => {
          c.classList.toggle('selected', curIcon.type === 'emoji' && c.dataset.emo === curIcon.value);
        });
      };
      document.querySelectorAll('.emoji-cell').forEach((c) => {
        c.addEventListener('click', () => {
          curIcon = { type: 'emoji', value: c.dataset.emo };
          renderPreview();
          updateEmojiSelected();
        });
      });
      updateEmojiSelected();

      // 自定义符号
      $('custom-icon-input').addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (v) {
          curIcon = { type: 'emoji', value: v };
          renderPreview();
        }
      });
      if (curIcon.type === 'emoji') $('custom-icon-input').value = curIcon.value;

      // 上传图片
      $('event-icon-upload-btn').addEventListener('click', () => {
        $('file-input-event-icon').click();
      });
      const onIconFile = async (e) => {
        const f = e.target.files[0];
        e.target.value = '';
        if (!f) return;
        const lower = f.name.toLowerCase();
        if (f.type === 'image/heic' || lower.endsWith('.heic')) {
          showToast('HEIC 格式不支持，请用 PNG/JPG');
          return;
        }
        try {
          const bm = await createImageBitmap(f);
          curIcon = { type: 'image', blob: f, bitmap: bm };
          pendingImageBlob = f;
          $('event-icon-image-name').textContent = f.name;
          renderPreview();
          switchTab('image');
        } catch (err) { showToast('图片解析失败'); }
      };
      $('file-input-event-icon').addEventListener('change', onIconFile);

      // 标题/内容
      $('event-title').value = initTitle;
      $('event-content').value = initContent;

      // layer 选择
      let selLayer = editing ? (editing.layer === 0 ? 0 : 1) : 1;
      const layerBtns = document.querySelectorAll('.option-btn[data-layer]');
      layerBtns.forEach((b) => {
        if (parseInt(b.dataset.layer, 10) === selLayer) b.classList.add('selected');
        b.addEventListener('click', () => {
          layerBtns.forEach((x) => x.classList.remove('selected'));
          b.classList.add('selected');
          selLayer = parseInt(b.dataset.layer, 10);
        });
      });

      renderPreview();

      const cleanup = () => {
        if (imageBlobUrl) try { URL.revokeObjectURL(imageBlobUrl); } catch (_) {}
        $('file-input-event-icon').removeEventListener('change', onIconFile);
      };

      $('event-cancel').addEventListener('click', () => { cleanup(); closeModal(); });
      const delBtn = $('event-delete-in-edit');
      if (delBtn) {
        delBtn.style.background = 'var(--theme-danger)';
        delBtn.style.borderColor = 'var(--theme-danger)';
        delBtn.style.color = '#fff';
        delBtn.addEventListener('click', () => {
          cleanup(); closeModal();
          showConfirm('删除事件', `确定删除"${initTitle || '（未命名）'}"？可用 Ctrl+Z 撤销。`, () => {
            deleteEvent(eventId);
          }, { danger: true, yesText: '删除' });
        });
      }
      $('event-confirm').addEventListener('click', async () => {
        const title = $('event-title').value.trim();
        const content = $('event-content').value;
        cleanup(); closeModal();
        if (editing) {
          await modifyEvent(eventId, { icon: curIcon, title, content, layer: selLayer });
          scheduleRender('all');
        } else {
          createEvent({
            x: mapX != null ? mapX : state.mapCanvas.width / 2,
            y: mapY != null ? mapY : state.mapCanvas.height / 2,
            icon: curIcon, title, content, layer: selLayer,
          });
        }
      });
    }
  });
}

// 改色：用 source-in 把已有覆盖区域重涂为新色（保留 alpha 不影响揭示形状）
function applyEventFogColor(newColor) {
  applyFogColor('event', newColor);
}
function applyTerrainFogColor(newColor) {
  applyFogColor('terrain', newColor);
}
function applyFogColor(layerKey, newColor) {
  if (!newColor) return;
  newColor = normalizeHex(newColor);
  const field = layerKey + 'FogColor';
  if (state[field].toLowerCase() === newColor.toLowerCase()) return;
  state[field] = newColor;
  recolorFogLayer(layerKey, newColor);
  scheduleRender('all');
  triggerImmediateSave();
}

function normalizeHex(hex) {
  if (!hex || typeof hex !== 'string') return '#000000';
  hex = hex.trim().toLowerCase();
  if (!hex.startsWith('#')) hex = '#' + hex;
  // 3 位扩展为 6 位
  if (/^#[0-9a-f]{3}$/.test(hex)) {
    const c = hex.slice(1);
    return '#' + c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
  }
  if (/^#[0-9a-f]{6}$/.test(hex)) return hex;
  return '#000000';
}
function mkMenuItem(text) {
  const b = document.createElement('button');
  b.className = 'menu-item';
  b.textContent = text;
  return b;
}
function appendMenuDivider(menu) {
  const d = document.createElement('div');

function hideDropdown() { $('dropdown-menu').classList.remove('visible'); }

function showCheckpointList() {
  if (state.checkpoints.length === 0) return;
  const items = state.checkpoints.slice().reverse().map((cp, i) => {
    const ago = Math.max(1, Math.round((Date.now() - cp.ts) / 60000));
    return `<button class="menu-item" data-idx="${state.checkpoints.length - 1 - i}">约 ${ago} 分钟前</button>`;
  }).join('');
  showModal(`
    <div class="modal-title">恢复到 Checkpoint</div>
    <div class="modal-desc">选择一个时间点恢复两层迷雾。当前撤销栈会被清空。</div>
    <div style="display:flex;flex-direction:column;gap:6px;">${items}</div>
    <div class="modal-actions"><button id="cp-cancel">取消</button></div>
  `, {
    onMounted: () => {
      $('cp-cancel').addEventListener('click', closeModal);
      document.querySelectorAll('#modal-root .menu-item').forEach((b) => {
        b.addEventListener('click', async () => {
          const idx = parseInt(b.dataset.idx, 10);
          const cp = state.checkpoints[idx];
          if (!cp) return;
          closeModal();
          setLoading('恢复中…');
          try {
            let terrainBmp = null;
            let eventFogBmp = null;
            try {
              if (cp.terrainBlob) terrainBmp = await createImageBitmap(cp.terrainBlob);
              if (cp.eventFogBlob) eventFogBmp = await createImageBitmap(cp.eventFogBlob);
              if (!cp.terrainBlob && cp.fogBlob) terrainBmp = await createImageBitmap(cp.fogBlob); // 兼容老 checkpoint
              if (terrainBmp) assertFogBitmapMatchesMap(terrainBmp, '地形迷雾');
              if (eventFogBmp) assertFogBitmapMatchesMap(eventFogBmp, '事件迷雾');
              if (terrainBmp) drawFogBitmapToLayer('terrain', terrainBmp);
              if (eventFogBmp) drawFogBitmapToLayer('event', eventFogBmp);
            } finally {
              if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
              if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
            }
            state.undoStack = [];
            updateUndoButton();
            scheduleRender('all');
            triggerImmediateSave();
            showToast('已恢复到 Checkpoint');
          } catch (e) { showToast('恢复失败：' + e.message); }
          hideLoading();
        });
      });
    }
  });
}

// ============== visibilitychange / hydrate ==============
async function onVisibilityChange() {
  if (document.hidden) {
    state.hiddenAt = performance.now();
    flushAllPendingSaves();
  } else {
    if (state.hiddenAt) {
      state.lastCheckpointAt += (performance.now() - state.hiddenAt);
      state.hiddenAt = 0;
    }
    if (!state.hasMap) return;
    // v3: 从 main.scenes[currentSceneId] 读 fog 数据
    const main = await loadAndMigrateMain();
    if (!main || !main.scenes || !state.currentSceneId) return;
    const scene = main.scenes[state.currentSceneId];
    if (scene && scene.mapFingerprint === state.mapFingerprint && scene.fogLayers) {
      try {
        const [terrainBmp, eventFogBmp] = await Promise.all([
          createImageBitmap(scene.fogLayers.terrain.blob),
          createImageBitmap(scene.fogLayers.event.blob),
        ]);
        try {
          assertFogBitmapPairMatchesMap(terrainBmp, eventFogBmp);
          drawFogBitmapToLayer('terrain', terrainBmp);
          drawFogBitmapToLayer('event', eventFogBmp);
        } finally {
          if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
          if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
        }
        if (state.undoStack.length > 0) {
          state.undoStack = [];
          updateUndoButton();
          showToast('已从后台恢复，撤销栈已重置');
        }
        scheduleRender('all');
      } catch (e) {
        console.warn('后台恢复迷雾失败', e);
      }
    }
  }
}

async function init() {
  state.mainCanvas = $('main');
  state.mainCtx = state.mainCanvas.getContext('2d');
  state.mapCtx = state.mapCanvas.getContext('2d');
  // fogLayers ctx 已在 state 定义时创建

  // 应用默认主题
  applyTheme(DEFAULT_DARK_THEME);

  resizeMainCanvas();
  await ensureDb();

  setupEventListeners();
  updateSurfaceChrome();
  setBrushMode('reveal');
  setLayer('terrain');
  setupBrushSizeFromState();
  updateTokensStatus();
  updateEventsStatus();
  updateAnnotationsStatus();
  updateZoomStatus();
  updateSceneStatus();

  // v3: 启动时尝试自动加载 currentScene（如果它有 mapBlob）
  await tryAutoLoadCurrentScene();
  updateSceneStatus();
  updateObjectPanel();
}

async function tryAutoLoadCurrentScene() {
  const main = await loadAndMigrateMain();
  if (!main) return;
  state.scenes = main.scenes || {};
  state.currentSceneId = main.currentSceneId || null;
  if (main.customTheme) {
    try { loadCustomTheme(main.customTheme); } catch (_) {}
  }
  const id = state.currentSceneId;
  if (!id || !state.scenes[id]) return;
  const scene = state.scenes[id];
  if (!scene.mapBlob) {
    // v2 迁移过来无 mapBlob —— 等用户加载地图
    showToast('上次场景需要重新加载地图（升级后图片需重选）', 5000);
    return;
  }
  // 自动加载图 + 恢复 scene
  setLoading('恢复场景中…');
  try {
    const preparedMap = await prepareMapFromBlob(scene.mapBlob);
    const preparedRestore = await prepareSavedRestore(scene, { w: preparedMap.w, h: preparedMap.h });
    const mapInfo = preparedMap;
    commitPreparedMap(preparedMap);
    state.mapFingerprint = scene.mapFingerprint;
    $('splash').style.display = 'none';
    scene.mapSize = { w: mapInfo.w, h: mapInfo.h };
    const restored = await restoreFromSaved(scene, { preparedRestore });
    if (!restored) return;
    await loadCheckpoints();
    fitView();
    setupBrushSizeFromState();
    showToast('已恢复场景 "' + (scene.name || '场景') + '"', 2500);
  } catch (e) {
    console.error(e);
    showToast('恢复场景失败：' + e.message);
  }
  hideLoading();
}

function setupEventListeners() {
  const cv = state.mainCanvas;
  cv.addEventListener('pointerdown', onPointerDown);
  cv.addEventListener('pointermove', onPointerMove);
  cv.addEventListener('pointerup', onPointerUp);
  cv.addEventListener('pointercancel', onPointerCancel);
  cv.addEventListener('pointerleave', onPointerLeave);
  cv.addEventListener('wheel', onWheel, { passive: false });

  // 双击：先尝试编辑事件 → 再尝试编辑 token → 否则 fitView
  cv.addEventListener('dblclick', (e) => {
    if (state.uiMode !== 'normal' && state.uiMode !== 'present') return;
    const off = getCanvasOffset();
    const x = e.clientX - off.x, y = e.clientY - off.y;
    const hitEvent = findTopEventAt(x, y, e.pointerType || 'mouse');
    if (hitEvent && !state.presentMode && isEditSurface()) {
      hideEventCard();
      openEventEditDialog(null, hitEvent.id);
      return;
    }
    const [mx, my] = screenToMap(x, y);
    const hitToken = findTopTokenAt(mx, my);
    if (hitToken && !state.presentMode && isEditSurface()) {
      openEditTokenModal(hitToken.id);
      return;
    }
    const hitAnnotation = findTopAnnotationAt(mx, my);
    if (hitAnnotation && !state.presentMode && isEditSurface()) {
      openAnnotationEditDialog(hitAnnotation.id);
      return;
    }
    fitView();
  });

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('visibilitychange', onVisibilityChange);
  window.addEventListener('pagehide', () => flushAllPendingSaves());
  window.addEventListener('beforeunload', () => flushAllPendingSaves());
  window.addEventListener('resize', () => {
    resizeMainCanvas();
    if (state.viewIsPristineFit) fitView();

  if (window.visualViewport) {
    visualViewport.addEventListener('resize', () => {
      if (state.viewIsPristineFit) fitView();

  $('btn-load-map').addEventListener('click', () => {
    if (!requireEditSurface()) return;

    undo();
  });

  $('btn-surface-toggle').addEventListener('click', () => setSurfaceMode(isEditSurface() ? 'live' : 'edit'));
  $('btn-present').addEventListener('click', () => togglePresentMode());
  $('present-handle').addEventListener('click', () => togglePresentMode(false));

  $('top-hover-zone').addEventListener('pointerenter', peekToolbar);
  $('top-hover-zone').addEventListener('pointermove', (e) => {
    if (e.pointerType !== 'mouse') return;
    peekToolbar();
  });
  let topPull = null;
  $('top-hover-zone').addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse') return;
    topPull = { startY: e.clientY };
  });
  $('top-hover-zone').addEventListener('pointermove', (e) => {
    if (e.pointerType === 'mouse' || !topPull) return;
    if (e.clientY - topPull.startY > 30) { peekToolbar(); topPull = null; }
  });
  $('top-hover-zone').addEventListener('pointerup', () => { topPull = null; });

  $('btn-more').addEventListener('click', (e) => {
    e.stopPropagation();
    if ($('dropdown-menu').classList.contains('visible')) hideDropdown();
    else showDropdown();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#dropdown-menu') && !e.target.closest('#btn-more')) hideDropdown();
    // 点击事件卡片外部关闭卡片
    if (state.eventCardOpenId && !e.target.closest('#event-card')) {
      // 但要避免点击事件 icon 立即被这里关掉——pointerup 的事件互动逻辑会重新打开
      // 这里只在非 canvas 区域关
      if (!e.target.closest('#main') && !e.target.closest('#canvas-container')) {
        hideEventCard();
      }
    }
  });

  // 拖拽上传
  document.addEventListener('dragover', (e) => { e.preventDefault(); });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    if (state.gridCalibration) {
      showToast('请先完成或取消网格校准');
      return;
    }
    if (state.uiMode === 'modal' || state.uiMode === 'present+modal') {
      showToast('请先关闭当前弹窗');
      return;
    }
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (!requireEditSurface()) return;
    if (state.hasMap) {
      showConfirm('文件用途', '把拖入的图片作为？', () => {
        loadMapFile(f);
      }, {
        yesText: '替换地图', noText: '作为 Token',
        onNo: () => openTokenUploadDialog(f),
      });
    } else {
      loadMapFile(f);
    }
  });
}

// ============== 启动 ==============
init().catch((e) => {
  console.error(e);
  setStatusError('初始化失败：' + e.message);
});

// 暴露给开发调试
window.__fogState = state;
</script>
</body>
</html>
