    moveGridCalibration(info, x, y);
  } else if (info.role === 'reveal-zone-select') {
    applyRevealZonePointerCell(x, y, info.removeFromZone);
  } else if (info.role === 'grid-mask-select') {
    updateGridMaskSelection(x, y);
  } else if (state.pointers.size >= 2 && info.role === 'pinch') {
    onPinchMove();
    info.lastX = x; info.lastY = y;
    return;
  } else if (info.role === 'reveal' || info.role === 'cover' || info.role === 'reveal-all') {
    interpolatePaintBrush(info.lastX, info.lastY, x, y);
  } else if (info.role === 'token-drag') {
    const t = state.tokens.find((tt) => tt.id === info.tokenId);
    if (t) {
      const [mx, my] = screenToMap(x, y);
      const dx = mx - info.dragStartMapX;
      const dy = my - info.dragStartMapY;
      t.x = info.tokenStartX + dx;
      t.y = info.tokenStartY + dy;
      clampTokenToMap(t);
      if (t.explorerEnabled && dist(info.startX, info.startY, x, y) > EVENT_DRAG_THRESHOLD) {
        paintTokenExploreDrag(info, t);
      }
      scheduleRender('all');
      positionTokenActionBar();
    }
  } else if (info.role === 'annotation-drag') {
    const ann = state.annotations.find((a) => a.id === info.annotationId);
    if (ann) {
      const [mx, my] = screenToMap(x, y);
      const dx = mx - info.dragStartMapX;
      const dy = my - info.dragStartMapY;
      ann.x = info.annotationStartX + dx;
      ann.y = info.annotationStartY + dy;
      clampAnnotationToMap(ann);
      scheduleRender('all');
      positionAnnotationActionBar();
    }
  } else if (info.role === 'event-interact' || info.role === 'event-drag') {
    // 距起点超过阈值则进入 drag
    const ds = dist(info.startX, info.startY, x, y);
    if (info.role === 'event-interact' && isEditSurface() && ds > EVENT_DRAG_THRESHOLD) {
      info.role = 'event-drag';
    }
    if (info.role === 'event-drag') {
      const ev = state.events.find((e) => e.id === info.eventId);
      if (ev) {
        const [mx, my] = screenToMap(x, y);
        const dx = mx - info.dragStartMapX;
        const dy = my - info.dragStartMapY;
        ev.x = clamp(info.eventStartX + dx, 0, state.mapCanvas.width);
        ev.y = clamp(info.eventStartY + dy, 0, state.mapCanvas.height);
        scheduleRender('all');
      }
    }
  } else if (info.role === 'pan') {
    const moved = dist(info.startX, info.startY, x, y);
    if (info.safeSelect && !info.panStarted) {
      if (moved <= SAFE_SELECT_CLICK_TOLERANCE) {
        info.lastX = x; info.lastY = y;
        scheduleRender('all');
        return;
      }
      info.panStarted = true;
      hideEventCard();
    }
    const dx = x - info.startX;
    const dy = y - info.startY;
    state.view.x = state.panAnchor.x + dx;
    state.view.y = state.panAnchor.y + dy;
    state.viewIsPristineFit = false;
    scheduleRender('all');
    hideEventCard();
  }
  info.lastX = x; info.lastY = y;
}

function onPointerUp(e) {
  const info = state.pointers.get(e.pointerId);
  cancelLongPress();
  if (!info) return;
  if (info.role === 'grid-calibration') {
    if (state.gridCalibration) state.gridCalibration.pointerId = null;
  } else if (info.role === 'reveal-zone-select') {
    if (state.revealZoneDraft) state.revealZoneDraft.lastCell = null;
  } else if (info.role === 'grid-mask-select') {
    finishGridMaskSelection(info);
  } else if (info.role === 'reveal' || info.role === 'cover' || info.role === 'reveal-all') {
    onStrokeEnd(false);
  } else if (info.role === 'token-drag') {
    const t = state.tokens.find((tt) => tt.id === info.tokenId);
    const moved = t && dist(info.startX, info.startY, info.lastX, info.lastY) > EVENT_DRAG_THRESHOLD;
    if (moved && t?.explorerEnabled) {
      paintTokenExploreDrag(info, t, { force: true });
      finishTokenExploreDrag(info);
    }
    triggerImmediateSave();
  } else if (info.role === 'annotation-drag') {
    const ann = state.annotations.find((a) => a.id === info.annotationId);
    if (ann && (ann.x !== info.annotationStartX || ann.y !== info.annotationStartY)) {
      pushUndo({ type: 'annotation-move', id: ann.id, prevX: info.annotationStartX, prevY: info.annotationStartY });
    }
    triggerImmediateSave();
  } else if (info.role === 'event-drag') {
    const ev = state.events.find((e) => e.id === info.eventId);
    if (ev) pushUndo({ type: 'event-move', id: ev.id, prevX: info.eventStartX, prevY: info.eventStartY });
    triggerImmediateSave();
  } else if (info.role === 'pan' && info.safeSelect && !info.panStarted) {
    safeSelectAt(info.lastX, info.lastY, info.type);
  } else if (info.role === 'annotation-select') {
    // 跑团态标注只选中查看，不移动或保存对象。
  } else if (info.role === 'event-interact') {
    // 单击：根据是否双击决定
    const now = performance.now();
    const isDouble = state.lastEventClickId === info.eventId &&
                     (now - state.lastEventClickTime) < DBL_CLICK_MS;
    state.lastEventClickId = info.eventId;
    state.lastEventClickTime = now;
    setSelectedObject('event', info.eventId, { render: false, keepEventCard: true });
    if (isDouble && isEditSurface()) {
      hideEventCard();
      openEventEditDialog(null, info.eventId);
    } else {
      showEventCard(info.eventId);
    }
    scheduleRender('all');
  } else if (info.role === 'create-event') {
    openEventEditDialog(null, null, info.createMx, info.createMy, info.createEventPreset || null);
    if (state.placeEventMode) togglePlaceEventMode(false);
  }
  state.pointers.delete(e.pointerId);
  if (state.pointers.size < 2) state.pinchAnchor = null;
  try { state.mainCanvas.releasePointerCapture(e.pointerId); } catch (_) {}
}

function onPointerCancel(e) {
  const info = state.pointers.get(e.pointerId);
  cancelLongPress();
  if (!info) return;
  if (info.role === 'grid-calibration') {
    if (state.gridCalibration) state.gridCalibration.pointerId = null;
  } else if (info.role === 'reveal-zone-select') {
    if (state.revealZoneDraft) state.revealZoneDraft.lastCell = null;
  } else if (info.role === 'grid-mask-select') {
    cancelGridMaskSelection();
  } else if (info.role === 'reveal' || info.role === 'cover' || info.role === 'reveal-all') {
    if (state.activeStroke && state.activeStroke.affectedTiles.size >= 1) onStrokeEnd(true);
    else state.activeStroke = null;
  }
  if (info.role === 'token-drag') {
    const t = state.tokens.find((tt) => tt.id === info.tokenId);
    if (t) { t.x = info.tokenStartX; t.y = info.tokenStartY; scheduleRender('all'); }
  }
  if (info.role === 'annotation-drag') {
    const ann = state.annotations.find((a) => a.id === info.annotationId);
    if (ann) { ann.x = info.annotationStartX; ann.y = info.annotationStartY; scheduleRender('all'); positionAnnotationActionBar(); }
  }
  if (info.role === 'event-drag') {
    const ev = state.events.find((e) => e.id === info.eventId);
    if (ev) { ev.x = info.eventStartX; ev.y = info.eventStartY; scheduleRender('all'); }
  }
  state.pointers.delete(e.pointerId);
  if (state.pointers.size < 2) state.pinchAnchor = null;
  try { state.mainCanvas.releasePointerCapture(e.pointerId); } catch (_) {}
}

function onPointerLeave() {
  state.cursorScreenX = -1000;
  state.cursorScreenY = -1000;
  state.showBrushPreview = false;
  cancelLongPress();
  scheduleRender('all');
}

// ============== 双指 Pinch+Pan ==============
function enterPinch() {
  const ps = [...state.pointers.values()];
  if (ps.length < 2) return;
  const [a, b] = ps;
  const midScreen = { x: (a.lastX + b.lastX) / 2, y: (a.lastY + b.lastY) / 2 };
  const startDist = Math.max(1, dist(a.lastX, a.lastY, b.lastX, b.lastY));
  const [mmx, mmy] = screenToMap(midScreen.x, midScreen.y);
  state.pinchAnchor = { midMapX: mmx, midMapY: mmy, startDist, startScale: state.view.scale };
}
function onPinchMove() {
  const ps = [...state.pointers.values()].filter((p) => p.role === 'pinch');
  if (ps.length < 2 || !state.pinchAnchor) return;
  const [a, b] = ps;
  const midScreen = { x: (a.lastX + b.lastX) / 2, y: (a.lastY + b.lastY) / 2 };
  const d = Math.max(1, dist(a.lastX, a.lastY, b.lastX, b.lastY));
  const factor = d / state.pinchAnchor.startDist;
  const newScale = clamp(state.pinchAnchor.startScale * factor, SCALE_MIN, SCALE_MAX);
  state.view.scale = newScale;
  state.view.x = midScreen.x - state.pinchAnchor.midMapX * newScale;
  state.view.y = midScreen.y - state.pinchAnchor.midMapY * newScale;
  state.viewIsPristineFit = false;
  scheduleRender('all');
  updateZoomStatus();
  hideEventCard();
}

// ============== 滚轮 ==============
function onWheel(e) {
  if (!state.hasMap) return;
  if (state.uiMode === 'modal') return;
  e.preventDefault();
  const off = getCanvasOffset();
  const x = e.clientX - off.x;
  const y = e.clientY - off.y;
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  if (state.gridCalibration) {
    if (e.shiftKey) {
      state.grid.rotation = normalizeGridRotationForType(state.grid.type, (state.grid.rotation || 0) + (e.deltaY > 0 ? -0.5 : 0.5));
    } else {
      state.grid.cellSize = clamp(Math.round(state.grid.cellSize * factor), 20, 240);
    }
    updateGridCalibrationPanel();
    invalidateGridCache();
    scheduleRender('all');
  } else if (isEditSurface() && state.selectedTokenId && !e.shiftKey) {
    const t = state.tokens.find((tt) => tt.id === state.selectedTokenId);
    if (t) {
      const maxSize = Math.min(state.mapCanvas.width, state.mapCanvas.height) / 2;
      t.size = clamp(t.size * factor, BRUSH_MIN, maxSize);
      scheduleRender('all');
      positionTokenActionBar();
      updateObjectPanel();
      triggerDebouncedSave();
    }
  } else if (isEditSurface() && state.selectedAnnotationId && !e.shiftKey) {
    const ann = state.annotations.find((a) => a.id === state.selectedAnnotationId);
    if (ann) {
      setAnnotationPrimarySize(ann, annotationPrimarySize(ann) * factor);
      scheduleRender('all');
      positionAnnotationActionBar();
      updateObjectPanel();
      triggerDebouncedSave();
    }
  } else if (isEditSurface() && state.selectedEventId && !e.shiftKey) {
    const ev = state.events.find((e2) => e2.id === state.selectedEventId);
    if (ev) {
      ev.size = clamp(ev.size * factor, 16, 96);
      scheduleRender('all');
      updateObjectPanel();
      triggerDebouncedSave();
    }
  } else {
    zoomAt(x, y, factor);
    triggerDebouncedSave();
  }
}

// ============== 键盘 ==============
function handleEntryHotkeyDown(e) {
  if (e.ctrlKey || e.metaKey || e.altKey) return false;
  const key = normalizeEntryHotkey(e.key);
  if (!key || !state.hasMap) return false;
  pruneEntryReferences();
  const entry = getEntryByHotkey(key);
  if (!entry) return false;
  if (!isEditSurface() && entry.livePicker === false) return false;
  const purpose = normalizeEntryPurpose(entry.purpose);
  const action = normalizeEntryHotkeyAction(entry.hotkeyAction);
  if (entryCanRevealZone(entry) && (purpose === 'reveal-zone' || action === 'reveal-zones')) {
    revealZonesForEntryId(entry.id);
    e.preventDefault();
    return true;
  }
  if (!entryCanSpotlight(entry)) return false;
  toggleEventsForEntryId(entry.id);
  e.preventDefault();
  return true;
}

function onKeyDown(e) {
  if (state.dicePanelOpen) {
    if (e.key === 'Escape') { e.preventDefault(); closeDicePanel(); }
    return;
  }
  if (state.gridCalibration && e.key === 'Escape') {
    finishGridCalibration(false);
    e.preventDefault();
    return;
  }
  if (state.gridCalibration && e.key === 'Enter') {
    finishGridCalibration(true);
    e.preventDefault();
    return;
  }
  if (state.revealZoneDraft && e.key === 'Escape') {
    cancelRevealZoneDraft();
    e.preventDefault();
    return;
  }
  if (state.gridMaskSelection && e.key === 'Escape') {
    cancelGridMaskSelection();
    e.preventDefault();
    return;
  }
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    openDicePanel();
    return;
  }
  if (state.gridCalibration) {
    e.preventDefault();
    return;
  }
  if (state.uiMode === 'modal') {
    if (e.key === 'Escape') { e.preventDefault(); closeModal(); }
    return;
  }

  // Ctrl+Shift+T 主题输入（开发者快捷键）
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 't' || e.key === 'T')) {
    e.preventDefault();
    openThemePrompt();
    return;
  }

  if (handleEntryHotkeyDown(e)) return;

  // Space 平移（按住）
  if (e.code === 'Space') {
    if (!state.spaceHeld) {
      state.spaceHeld = true;
      document.body.style.cursor = 'grab';
      state.showBrushPreview = false;
      updateModeStatus();
      scheduleRender('all');
    }
    e.preventDefault();
    return;
  }

  // 拖 token / 事件 / 标注 时 ESC 还原
  if (e.key === 'Escape') {
    let dragging = null;
    for (const [, p] of state.pointers) {
      if (p.role === 'token-drag' || p.role === 'event-drag' || p.role === 'annotation-drag') { dragging = p; break; }
    }
    if (dragging) {
      if (dragging.role === 'token-drag') {
        const t = state.tokens.find((tt) => tt.id === dragging.tokenId);
        if (t) {
          cancelTokenExploreDrag(dragging);
          t.x = dragging.tokenStartX; t.y = dragging.tokenStartY; scheduleRender('all');
        }
      } else if (dragging.role === 'annotation-drag') {
        const ann = state.annotations.find((a) => a.id === dragging.annotationId);
        if (ann) { ann.x = dragging.annotationStartX; ann.y = dragging.annotationStartY; scheduleRender('all'); positionAnnotationActionBar(); }
      } else {
        const ev = state.events.find((e2) => e2.id === dragging.eventId);
        if (ev) { ev.x = dragging.eventStartX; ev.y = dragging.eventStartY; scheduleRender('all'); }
      }
      try { state.mainCanvas.releasePointerCapture(dragging.id); } catch (_) {}
      state.pointers.delete(dragging.id);
      e.preventDefault();
      return;
    }
  }

  if (e.key === 'Escape') {
    if (state.placeEventMode) {
      togglePlaceEventMode(false);
      e.preventDefault();
      return;
    }
    if (state.eventCardOpenId) {
      hideEventCard();
      e.preventDefault();
      return;
    }
    if (state.selectedTokenId || state.selectedEventId || state.selectedAnnotationId) {
      clearSelection();
      e.preventDefault();
      return;
    }
  }
  if (e.key === 'e' || e.key === 'E') { setBrushMode('reveal'); e.preventDefault(); return; }
  if (e.key === 'r' || e.key === 'R') { setBrushMode('cover'); e.preventDefault(); return; }
  if (e.key === 'q' || e.key === 'Q') { setBrushMode('reveal-all'); e.preventDefault(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) { undo(); e.preventDefault(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (!isEditSurface()) { showToast('删除对象请先进入编辑态'); e.preventDefault(); return; }
    if (state.selectedEventId) { deleteEvent(state.selectedEventId); e.preventDefault(); return; }
    if (state.selectedTokenId) { deleteSelectedToken(); e.preventDefault(); return; }
    if (state.selectedAnnotationId) { deleteSelectedAnnotation(); e.preventDefault(); return; }
  }
  if (e.key === '1') { setBrushSize(40); e.preventDefault(); return; }
  if (e.key === '2') { setBrushSize(120); e.preventDefault(); return; }
  if (e.key === '3') { setBrushSize(220); e.preventDefault(); return; }
}

function onKeyUp(e) {
  if (e.code === 'Space') {
    state.spaceHeld = false;
    document.body.style.cursor = '';
    updateModeStatus();
    scheduleRender('all');
  }
}

function setLayer(layer) {
  // 切层前若有进行中 stroke，先 commit
  if (state.activeStroke) onStrokeEnd(false);
  if (state.gridMaskSelection) cancelGridMaskSelection();
  state.currentLayer = layer;
  $('btn-layer-terrain').classList.toggle('active', layer === 'terrain');
  $('btn-layer-event').classList.toggle('active', layer === 'event');
  updateModeStatus();
  scheduleRender('all');
  triggerDebouncedSave();
}

function setBrushMode(mode) {
  if (state.activeStroke) onStrokeEnd(false);
  if (state.gridMaskSelection) cancelGridMaskSelection();
  if (!['reveal', 'cover', 'reveal-all'].includes(mode)) mode = 'reveal';
  state.brush.mode = mode;
  $('btn-mode-reveal').classList.toggle('active', mode === 'reveal');
  $('btn-mode-reveal-all').classList.toggle('active', mode === 'reveal-all');
  $('btn-mode-cover').classList.toggle('active', mode === 'cover');
  updateModeStatus();
  scheduleRender('all');
  triggerDebouncedSave();
}

function updateModeStatus() {
  if (state.spaceHeld) {
    $('status-mode').textContent = '安全选择';
    return;
  }
  const layer = state.brush.mode === 'reveal-all'
    ? '双层'
    : (state.currentLayer === 'terrain' ? '地形' : '事件');
  const mode = state.brush.mode === 'cover' ? '盖' : (state.brush.mode === 'reveal-all' ? '全揭' : '揭');
  $('status-mode').textContent = `${layer}·${mode}`;
}

function setBrushSize(v) {
  v = clamp(v, BRUSH_MIN, BRUSH_MAX);
  state.brush.sizeScreen = v;
  $('brush-size-input').value = Math.round(v);
  $('brush-size-rail').value = v;
  scheduleRender('all');
  triggerDebouncedSave();
}

function togglePlaceEventMode(force, preset = null) {
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  const next = (force === undefined) ? !state.placeEventMode : force;
  if (next && !isEditSurface()) { showToast('放置事件请先进入编辑态'); return; }
  if (next && state.gridMaskSelection) cancelGridMaskSelection();
  const prev = state.placeEventMode;
  const nextPreset = next ? (preset || null) : null;
  state.placeEventMode = next;
  state.placeEventPreset = nextPreset;
  $('btn-place-event').classList.toggle('active', next && nextPreset !== EVENT_ACTION_SCENE_LINK);
  $('btn-place-scene-link').classList.toggle('active', next && nextPreset === EVENT_ACTION_SCENE_LINK);
  state.mainCanvas.style.cursor = next ? 'crosshair' : '';
  if (state.activeStroke) onStrokeEnd(false);
  // 状态栏提示
  $('status-place-event').textContent = next
    ? (nextPreset === EVENT_ACTION_SCENE_LINK ? '↪ 放置场景转移点 · 点击地图添加 · Esc 退出' : '🎯 放置事件中 · 点击地图添加 · Esc 退出')
    : '';
  $('app').classList.toggle('placing-event', next);
  // 进入时弹一次 toast 强调
  if (next && !prev) showToast(nextPreset === EVENT_ACTION_SCENE_LINK ? '放置场景转移点：点击地图添加，Esc 退出' : '放置事件模式：点击地图添加，Esc 退出', 3000);
}

// ============== Modal ==============
function showModal(html, opts) {
  if (state.gridMaskSelection) cancelGridMaskSelection();
  const root = $('modal-root');
  const extraClass = opts?.className ? ` ${escapeHtml(opts.className)}` : '';
  root.innerHTML = `<div class="modal-card${extraClass}">` + html + '</div>';
  root.classList.add('visible');
  state.uiMode = 'modal';
  if (opts && opts.onMounted) opts.onMounted(root);
}
function closeModal() {
  $('modal-root').classList.remove('visible');
  $('modal-root').innerHTML = '';
  state.uiMode = 'normal';
}
function showConfirm(title, desc, onYes, opts) {
  opts = opts || {};
  const danger = opts.danger ? 'danger' : 'primary';
  const yesText = opts.yesText || '确定';
  const noText = opts.noText || '取消';
  showModal(`
    <div class="modal-title">${escapeHtml(title)}</div>
    ${desc ? `<div class="modal-desc">${escapeHtml(desc)}</div>` : ''}
    <div class="modal-actions">
      <button id="modal-no">${escapeHtml(noText)}</button>
      <button id="modal-yes" class="${danger}">${escapeHtml(yesText)}</button>
    </div>
  `, {
    onMounted: () => {
      $('modal-no').addEventListener('click', () => { closeModal(); if (opts.onNo) opts.onNo(); });
      $('modal-yes').addEventListener('click', () => { closeModal(); onYes(); });
    }
  });
}

async function validateSceneFogForPreparedMap(scene, w, h) {
  const pair = await decodeAndValidateFogPair(scene, { w, h });
  if (pair.terrainBmp && typeof pair.terrainBmp.close === 'function') pair.terrainBmp.close();
  if (pair.eventFogBmp && typeof pair.eventFogBmp.close === 'function') pair.eventFogBmp.close();
}

async function restoreSceneWithPreparedMap(sceneId, file, preparedMap, nextFingerprint, w, h, opts = {}) {
  const scene = state.scenes[sceneId];
  if (!scene) { showToast('场景不存在'); return; }
  try {
    const preparedRestore = await prepareSavedRestore(scene, { w, h });
    commitPreparedMap(preparedMap);
    state.mapFingerprint = nextFingerprint;
    scene.mapBlob = file;
    scene.mapMissing = false;
    scene.mapSource = opts.mapSource || null;
    scene.mapSize = { w, h };
    scene.mapFingerprint = nextFingerprint;
    state.currentSceneId = sceneId;
    const restored = await restoreFromSaved(scene, { preparedRestore });
    if (restored) {
      await loadCheckpoints();
      setupBrushSizeFromState();
      updateSceneStatus();
      await triggerImmediateSave();
      showToast('已绑定本机地图并恢复场景', 2600);
    }
  } catch (e) {
    console.error(e);
    hideLoading();
    showToast('恢复失败：' + (e.message || e));
  }
}

function resetSceneWithPreparedMap(sceneId, file, preparedMap, nextFingerprint, w, h) {
  const scene = state.scenes[sceneId];
  if (!scene) { showToast('场景不存在'); return; }
  commitPreparedMap(preparedMap);
  state.mapFingerprint = nextFingerprint;
  scene.mapBlob = file;
  scene.mapMissing = false;
  scene.mapSource = null;
  scene.mapSize = { w, h };
  scene.mapFingerprint = nextFingerprint;
  scene.entries = [];
  state.currentSceneId = sceneId;
  clearAnnotationRuntimeResources();
  state.tokens = []; state.events = []; state.annotations = [];
  state.entries = [];
  state.revealZones = [];
  state.activeEntryId = null;
  clearSelection({ render: false });
  state.undoStack = [];
  updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus(); updateEntryButton(); updateUndoButton();
  refreshSelectionUi();
  fitView();
  setupBrushSizeFromState();
  promptInitialFog();
}

function createSceneWithPreparedMap(file, preparedMap, nextFingerprint, w, h) {
  commitPreparedMap(preparedMap);
  hideLoading();
  state.mapFingerprint = nextFingerprint;
  const newId = uuid();
  state.scenes[newId] = {
    version: 2,
    name: `场景 ${Object.keys(state.scenes).length + 1}`,
    chapterNumber: DEFAULT_CHAPTER_NUMBER,
    chapterTitle: DEFAULT_CHAPTER_TITLE,
    mapBlob: file,
    mapMissing: false,
    mapSource: null,
    mapFingerprint: nextFingerprint,
    mapSize: { w, h },
    entries: [],
    revealZones: [],
    createdAt: Date.now(),
    lastUsedAt: Date.now(),
  };
  state.currentSceneId = newId;
  clearAnnotationRuntimeResources();
  state.tokens = []; state.events = []; state.annotations = [];
  state.entries = [];
  state.revealZones = [];
  state.activeEntryId = null;
  clearSelection({ render: false });
  state.undoStack = [];
  state.grid = defaultGridSettings();
  updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus(); updateEntryButton(); updateUndoButton();
  refreshSelectionUi();
  promptInitialFog();
}

function showMatchedSceneChooser(matchedSceneIds, file, preparedMap, nextFingerprint, w, h) {
  const rows = matchedSceneIds
    .sort((a, b) => ((state.scenes[b]?.lastUsedAt || 0) - (state.scenes[a]?.lastUsedAt || 0)))
    .map((id) => {
      const s = state.scenes[id] || {};
      const ago = s.lastUsedAt ? Math.max(1, Math.round((Date.now() - s.lastUsedAt) / 60000)) + ' 分钟前' : '未知时间';
      return `
        <div class="scene-row">
          <span class="scene-name">${escapeHtml(s.name || '场景')}</span>
          <span class="scene-meta">${escapeHtml(ago)}</span>
          <div class="scene-actions"><button class="matched-scene-restore" data-id="${escapeHtml(id)}">恢复</button></div>
        </div>
      `;
    }).join('');
  hideLoading();
  showModal(`
    <div class="modal-title">选择要恢复的场景</div>
    <div class="modal-desc">这张地图对应多个场景。请选择要恢复的场景，或把它作为新场景加载。</div>
    <div class="scene-list">${rows}</div>
    <div class="modal-actions">
      <button id="matched-scene-new">作为新场景加载</button>
      <button id="matched-scene-cancel" class="primary">取消</button>
    </div>
  `, {
    onMounted: () => {
      document.querySelectorAll('.matched-scene-restore').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          closeModal();
          await restoreSceneWithPreparedMap(id, file, preparedMap, nextFingerprint, w, h);
        });
      });
      $('matched-scene-new').addEventListener('click', () => {
        closeModal();
        createSceneWithPreparedMap(file, preparedMap, nextFingerprint, w, h);
        fitView();
        setupBrushSizeFromState();
      });
      $('matched-scene-cancel').addEventListener('click', closeModal);
    }
  });
}

// ============== 加载地图 ==============
async function loadMapFile(file) {
  await ensureDb();
  if (!file) return;
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  const lower = file.name.toLowerCase();
  if (file.type === 'image/heic' || file.type === 'image/heif' || lower.endsWith('.heic') || lower.endsWith('.heif')) {
    showConfirm('格式不支持', 'iPad 上请用截图代替（HEIC 格式浏览器不支持）。', closeModal);
    return;
  }
  setLoading('加载地图中…');
  // v3: 加载新图前先保存当前场景（如果有），防止切场景时未保存的笔触丢失
  if (state.hasMap && state.currentSceneId && state.scenes[state.currentSceneId]) {
    try {
      const sceneCore = await serializeActiveSceneData();
      if (sceneCore) {
        const prev = state.scenes[state.currentSceneId];
        state.scenes[state.currentSceneId] = {
          ...sceneCore,
          ...sceneMapRuntimeFields(prev),
          mapSize: sceneCore.mapSize,
          name: prev.name || '场景',
          chapterNumber: sceneChapterNumber(prev),
          chapterTitle: sceneChapterTitle(prev),
          createdAt: prev.createdAt || Date.now(),
          lastUsedAt: Date.now(),
        };
      }
    } catch (_) {}
  }
  try {
      const preparedMap = await prepareMapFromBlob(file, { showDownsampleToast: true });
      const w = preparedMap.w, h = preparedMap.h;
      const nextFingerprint = `${file.name}-${file.size}-${file.lastModified || 0}-${w}x${h}`;

      const bindTargetSceneId = cloudSync_getPlaceholderRestoreTargetSceneId();
      const currentScene = bindTargetSceneId ? state.scenes[bindTargetSceneId] : (state.currentSceneId ? state.scenes[state.currentSceneId] : null);
      if (sceneNeedsLocalMap(currentScene)) {
        const expected = currentScene.mapSize;
        if (expected.w !== w || expected.h !== h) {
          cloudSync_clearPlaceholderRestoreTarget();
          hideLoading();
          showToast(`地图尺寸不一致：需要 ${expected.w}×${expected.h}，当前是 ${w}×${h}`, 5200);
          return;
        }
        hideLoading();
        showConfirm(
          '绑定本机地图',
          `这张图尺寸匹配当前占位场景。绑定后会保留遮罩、Token、事件和标注。`,
          () => {
            const targetSceneId = bindTargetSceneId || state.currentSceneId;
            cloudSync_clearPlaceholderRestoreTarget();
            return restoreSceneWithPreparedMap(targetSceneId, file, preparedMap, nextFingerprint, w, h);
          },
          { yesText: '绑定', noText: '取消', onNo: cloudSync_clearPlaceholderRestoreTarget }
        );
        return;
      }

      // v3: 在已有 scenes 中查匹配 fingerprint；同一地图可能对应多个场景，不能静默取第一个。
      const matchedSceneIds = [];
      for (const id in state.scenes) {
        if (state.scenes[id].mapFingerprint === nextFingerprint) {
          matchedSceneIds.push(id);
        }
      }
      if (matchedSceneIds.length > 1) {
        for (const id of matchedSceneIds) {
          try {
            await validateSceneFogForPreparedMap(state.scenes[id], w, h);
          } catch (e) {
            hideLoading();
            showToast('恢复失败：' + e.message);
            return;
          }
        }
        showMatchedSceneChooser(matchedSceneIds, file, preparedMap, nextFingerprint, w, h);
      } else if (matchedSceneIds.length === 1) {
        const matchedSceneId = matchedSceneIds[0];
        const scene = state.scenes[matchedSceneId];
        try {
          await validateSceneFogForPreparedMap(scene, w, h);
        } catch (e) {
          hideLoading();
          showToast('恢复失败：' + e.message);
          return;
        }
        hideLoading();
        const ago = Math.max(1, Math.round((Date.now() - (scene.lastUsedAt || scene.ts || 0)) / 60000));
        showConfirm(
          '检测到上次进度',
          `场景"${scene.name || '场景'}"，上次保存约 ${ago} 分钟前。是否恢复？`,
          () => restoreSceneWithPreparedMap(matchedSceneId, file, preparedMap, nextFingerprint, w, h),
          {
            yesText: '恢复', noText: '新建（清除此场景）',
            onNo: () => resetSceneWithPreparedMap(matchedSceneId, file, preparedMap, nextFingerprint, w, h),
          }
        );
      } else {
        createSceneWithPreparedMap(file, preparedMap, nextFingerprint, w, h);
      }
      fitView();
      setupBrushSizeFromState();
    } catch (e) {
      console.error(e);
      hideLoading();
      showToast('加载失败：' + e.message);
    }
}

function promptInitialFog() {
  // 默认两层都全部覆盖（玩家什么都看不见）。给"全部揭示"作选项
  showModal(`
    <div class="modal-title">迷雾初始状态</div>
    <div class="modal-desc">推荐"全部覆盖"开局——两层都不透明，玩家什么都看不见。跑团时再用揭示笔刷一点点露出。</div>
    <div class="modal-actions">
      <button id="init-clear">全部揭示</button>
      <button id="init-fill" class="primary">全部覆盖</button>
    </div>
  `, {
    onMounted: () => {
      $('init-fill').addEventListener('click', () => {
        fillFogLayer('terrain'); fillFogLayer('event');
        refreshSelectionUi();
        scheduleRender('all'); triggerImmediateSave(); closeModal();
      });
      $('init-clear').addEventListener('click', () => {
        clearFogLayer('terrain'); clearFogLayer('event');
        refreshSelectionUi();
        scheduleRender('all'); triggerImmediateSave(); closeModal();
      });
    }
  });
}

function normalizeRestoredSettings(settings) {
  if (!settings) settings = {};
  const fogOpacity = (settings.fogOpacity != null) ? settings.fogOpacity : 1.0;
  return {
    brushSize: settings.brushSize || BRUSH_DEFAULT,
    brushMode: settings.brushMode || 'reveal',
    currentLayer: settings.currentLayer || 'terrain',
    fogOpacity,
    terrainFogOpacity: (settings.terrainFogOpacity != null) ? settings.terrainFogOpacity : fogOpacity,
    eventFogOpacity: (settings.eventFogOpacity != null) ? settings.eventFogOpacity : fogOpacity,
    terrainFogColor: normalizeHex(settings.terrainFogColor || '#000000'),
    eventFogColor: normalizeHex(settings.eventFogColor || '#000000'),
    grid: normalizeGridSettings(settings.grid),
  };
}

async function prepareSavedRestore(saved, mapSize) {
  let terrainBmp = null;
  let eventFogBmp = null;
  try {
    const pair = await decodeAndValidateFogPair(saved, mapSize);
    terrainBmp = pair.terrainBmp;
    eventFogBmp = pair.eventFogBmp;
    const entries = normalizeEntries(saved.entries || []);
    const tokens = [];
    for (const s of (saved.tokens || [])) {
      s.entryIds = normalizeEntryIdsForEntries(s.entryIds || [], entries);
      tokens.push(await rebuildTokenFromSerialized(s));
    }
    const events = [];
    for (const s of (saved.events || [])) {
      s.entryIds = normalizeEntryIdsForEntries(s.entryIds || [], entries);
      events.push(await deserializeEvent(s));
    }
    const annotations = [];
    for (const s of (saved.annotations || [])) {
      s.entryIds = normalizeEntryIdsForEntries(s.entryIds || [], entries);
      annotations.push(await deserializeAnnotation(s));
    }
    return {
      terrainBmp, eventFogBmp,
      tokens, events, annotations,
      revealZones: normalizeRevealZones(saved.revealZones || [], entries),
      entries,
      view: saved.view || null,
      settings: normalizeRestoredSettings(saved.settings),
      customTheme: saved.customTheme || null,
    };
  } catch (e) {
    if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
    if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
    throw e;
  }
}

function applyPreparedRestore(prepared, opts = {}) {
  try {
    drawFogBitmapToLayer('terrain', prepared.terrainBmp);
    drawFogBitmapToLayer('event', prepared.eventFogBmp);
    clearAnnotationRuntimeResources();
    state.tokens = prepared.tokens;
    state.events = prepared.events;
    state.annotations = prepared.annotations || [];
    state.entries = normalizeEntries(prepared.entries || []);
    state.revealZones = normalizeRevealZones(prepared.revealZones || [], state.entries);
    state.activeEntryId = null;
    pruneEntryReferences();
    clearSelection({ render: false });
    applyRestoredView(prepared.view, opts);
    if (prepared.settings) {
      state.brush.sizeScreen = prepared.settings.brushSize;
      state.brush.mode = prepared.settings.brushMode;
      state.currentLayer = prepared.settings.currentLayer;
      state.fogOpacity = prepared.settings.fogOpacity;
      state.terrainFogOpacity = prepared.settings.terrainFogOpacity;
      state.eventFogOpacity = prepared.settings.eventFogOpacity;
      state.terrainFogColor = prepared.settings.terrainFogColor;
      state.eventFogColor = prepared.settings.eventFogColor;
      state.grid = prepared.settings.grid;
    }
    // 主题（如果有自定义）
    if (prepared.customTheme) {
      try { loadCustomTheme(prepared.customTheme); } catch (e) { console.warn('恢复主题失败', e); }
    }
    setBrushMode(state.brush.mode);
    setLayer(state.currentLayer);
    setBrushSize(state.brush.sizeScreen);
    state.undoStack = [];
    updateUndoButton();
    updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus();
    updateEntryButton();
    refreshSelectionUi();
    updateZoomStatus();
    scheduleRender('all');
    showToast('已恢复上次进度');
    return true;
  } finally {
    if (prepared.terrainBmp && typeof prepared.terrainBmp.close === 'function') prepared.terrainBmp.close();
    if (prepared.eventFogBmp && typeof prepared.eventFogBmp.close === 'function') prepared.eventFogBmp.close();
  }
}

async function restoreFromSaved(saved, opts = {}) {
  closeModal();
  setLoading('恢复进度中…');
  try {
    const prepared = opts.preparedRestore || await prepareSavedRestore(saved, { w: state.mapCanvas.width, h: state.mapCanvas.height });
    applyPreparedRestore(prepared, opts);
    hideLoading();
    return true;
  } catch (e) {
    console.error(e);
    showToast('恢复失败：' + e.message);
    hideLoading();
    return false;
  }
}

function setupBrushSizeFromState() {
  $('brush-size-input').value = Math.round(state.brush.sizeScreen);
  $('brush-size-rail').value = state.brush.sizeScreen;
}

function setLoading(text, opts = {}) {
  $('loading-text').textContent = text || '加载中…';
  const cancelBtn = $('loading-cancel');
  if (cancelBtn) {
    cancelBtn.style.display = opts.onCancel ? 'inline-flex' : 'none';
    cancelBtn.onclick = opts.onCancel || null;
  }
  $('loading-overlay').classList.add('visible');
}
function hideLoading() {
  $('loading-overlay').classList.remove('visible');
  const cancelBtn = $('loading-cancel');
  if (cancelBtn) {
    cancelBtn.style.display = 'none';
    cancelBtn.onclick = null;
  }
}

    crypto.getRandomValues(bytes);
    id = Array.from(bytes, (b) => b.toString(16).padStart(2, '0')).join('');
    localStorage.setItem(CLOUD_SYNC_DEVICE_ID_KEY, id);

  for (let i = 0; i < bytes.length; i += chunkSize) {
    const chunk = bytes.subarray(i, i + chunkSize);
    binary += String.fromCharCode.apply(null, Array.from(chunk));

  return btoa(binary);
}
function cloudSync_base64ToBytes(base64) {
  const clean = String(base64 || '').replace(/\s+/g, '');
  const binary = atob(clean);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
async function cloudSync_streamToBytes(stream) {

function cloudSync_formatTime(iso) {

function cloudSync_formatBytes(bytes) {
  if (!Number.isFinite(bytes) || bytes < 0) return '0 B';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;

function cloudSync_manualMapMatchStatus(manualMap, scene) {
  if (!sceneNeedsLocalMap(scene)) return { status: 'none', label: '当前场景不可绑定', canBind: false };
  const expected = scene.mapSize;
  const actual = manualMap?.mapSize || null;
  if (!isValidMapSize(expected)) return { status: 'unknown', label: '占位尺寸未知', canBind: false };
  if (!isValidMapSize(actual)) return { status: 'unknown', label: '需下载后校验尺寸', canBind: true };
  if (actual.w === expected.w && actual.h === expected.h) return { status: 'match', label: '尺寸匹配', canBind: true };
  return { status: 'mismatch', label: `索引不匹配，需要 ${expected.w}×${expected.h}；仍可下载实测`, canBind: true };

  const total = chunks.reduce((sum, item) => sum + item.length, 0);
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const chunk of chunks) {
    merged.set(chunk, offset);
    offset += chunk.length;
  }
  const bundleBytes = await cloudSync_decompressBytes(merged, manifest.state_compression || 'gzip');
  return JSON.parse(cloudSync_bytesToString(bundleBytes));
}
async function cloudSync_downloadMapBlob({ owner, repo, token, mapMeta }) {
  if (cloudSync_isManualRemoteMapEntry(mapMeta)) {
    return await cloudSync_getRawBlobFile({
      owner,
      repo,
      token,
      path: mapMeta.map_path,
      mime: mapMeta.mime || cloudSync_guessMimeFromPath(mapMeta.map_path),
    });
  }
  let blob = await cloudSync_readCachedMap(mapMeta.map_sha256);
  if (blob) return blob;
  let chunkCount = mapMeta.map_chunk_count || 1;
  if (chunkCount <= 1 && mapMeta.map_path) {
    try {
      const chunkEntries = await cloudSync_listContents({ owner, repo, token, path: `${mapMeta.map_path}chunks`, allowMissing: true });
      const indexes = chunkEntries
        .filter((entry) => entry.type === 'file' && /^\d{4}\.bin\.b64$/.test(entry.name || ''))
        .map((entry) => parseInt(String(entry.name).slice(0, 4), 10))
        .filter((index) => Number.isFinite(index));
      if (indexes.length) chunkCount = Math.max(chunkCount, Math.max(...indexes) + 1);
    } catch (err) {
      console.warn('cloudSync list map chunks fallback failed:', err);
    }
  }
  const parts = [];
  for (let i = 0; i < chunkCount; i++) {
    const chunkText = await cloudSync_getRawTextFile({
      owner,
      repo,
      token,
      path: `${mapMeta.map_path}chunks/${cloudSync_chunkName(i)}`,
    });
    parts.push(cloudSync_base64ToBytes(chunkText));
  }
  const total = parts.reduce((sum, item) => sum + item.length, 0);
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const part of parts) {
    merged.set(part, offset);
    offset += part.length;
  }
  blob = new Blob([merged], { type: mapMeta.mime || 'application/octet-stream' });
  await cloudSync_writeCachedMap(mapMeta.map_sha256, blob);
  return blob;
}
async function cloudSync_restoreSnapshot({ owner, repo, token, snapshotId }) {
  if (state.cloudSync.busy) {
    showToast('云存档正在忙，请稍等');
    return false;
  }
  cloudSync_setBusy(true);
  try {
    setLoading('正在拉取快照...');
    const manifest = await cloudSync_loadSnapshotManifest({ owner, repo, token, snapshotId });
    const bundleJson = await cloudSync_downloadStateBundleFromManifest({ owner, repo, token, manifest });
    const mapBlobsBySceneId = {};
    const remoteMaps = manifest.maps.filter(cloudSync_isRemoteMapEntry);
    for (let i = 0; i < remoteMaps.length; i++) {
      const mapMeta = remoteMaps[i];
      setLoading(`下载地图... ${i + 1}/${remoteMaps.length}`);
      mapBlobsBySceneId[mapMeta.scene_id] = await cloudSync_downloadMapBlob({ owner, repo, token, mapMeta });
    }
    const mapSourceBySceneId = new Map();
    for (const mapMeta of manifest.maps) {
      const source = cloudSync_mapSourceFromManifest(mapMeta);
      if (source) mapSourceBySceneId.set(mapMeta.scene_id, source);
    }
    if (mapSourceBySceneId.size) {
      for (const scenePayload of bundleJson.scenes || []) {
        const source = mapSourceBySceneId.get(scenePayload.sceneId);
        if (!source) continue;
        scenePayload.mapSource = scenePayload.mapSource || source;
        scenePayload.mapMissing = true;
      }
    }
    try {
      state.cloudSync.localDraftBeforeOverwrite = await cloudSync_serializeStateBundle();
    } catch (_) {
      state.cloudSync.localDraftBeforeOverwrite = null;
    }
    setLoading('恢复中...');
    await cloudSync_applyStateBundle(bundleJson, mapBlobsBySceneId);
    await triggerImmediateSave();
    state.cloudSync.lastSnapshotId = manifest.snapshot_id;
    state.cloudSync.lastError = null;
    hideLoading();
    const placeholderCount = manifest.maps.filter((item) => cloudSync_isPlaceholderMapEntry(item)).length;
    showToast(placeholderCount ? `已读取云端进度 ✓ ${cloudSync_placeholderNextStepText(placeholderCount)}` : '已读取云端进度 ✓', 6500);
    if (placeholderCount) {
      state.placeholderRestore.sourceSnapshotId = manifest.snapshot_id;
      setTimeout(() => {
        if (isEditSurface()) showPlaceholderRestoreWizard();
      }, 80);
    } else {
      state.placeholderRestore.sourceSnapshotId = null;
      cloudSync_clearPlaceholderRestoreTarget();
    }
    return true;
  } catch (err) {
    hideLoading();
    const errorObject = err && err.userMessage ? err : await cloudSync_classifyError(null, err);
    state.cloudSync.lastError = errorObject;
    console.error('cloudSync restore snapshot failed:', errorObject);
    showToast(errorObject.userMessage || '读取失败', 4200);
    return false;
  } finally {
    cloudSync_setBusy(false);
  }
}
async function cloudSync_downloadLatest({ owner, repo, token }) {

async function cloudSync_listSnapshots({ owner, repo, token }) {
  const dirs = await cloudSync_listContents({ owner, repo, token, path: CLOUD_SYNC_SNAPSHOTS_PREFIX, allowMissing: true });
  const manifests = [];
  for (const entry of dirs) {
    if (entry.type !== 'dir') continue;
    try {
      const manifest = await cloudSync_loadSnapshotManifest({ owner, repo, token, snapshotId: entry.name });
      manifests.push(manifest);
    } catch (err) {
      console.warn('cloudSync listSnapshots skip broken snapshot:', entry.name, err);
    }
  }
  manifests.sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));
  state.cloudSync.snapshots = manifests;
  return manifests;
}

async function cloudSync_detectPendingDraft({ owner, repo, token }) {
  const dirs = await cloudSync_listContents({ owner, repo, token, path: CLOUD_SYNC_PENDING_PREFIX, allowMissing: true });
  const draftDir = dirs.find((entry) => entry.type === 'dir');
  if (!draftDir) {

    state.cloudSync.draftSnapshotId = null;

  state.cloudSync.draftSnapshotId = draftDir.name;
  cloudSync_setPendingBanner(`检测到上次上传未完成：${draftDir.name}`, {
    onResume: async () => { cloudSync_clearPendingBanner(); await cloudSync_resumeDraft({ owner, repo, token, snapshotId: draftDir.name }); },
    onDiscard: async () => { await cloudSync_discardDraft({ owner, repo, token, draftSnapshotId: draftDir.name }); },
    onClose: cloudSync_clearPendingBanner,
  });
  return draftDir.name;
}
async function cloudSync_resumeDraft({ owner, repo, token, snapshotId }) {

    owner,
    repo,

    token,
    note,
    snapshotId,
  });

async function cloudSync_runGC({ owner, repo, token }) {
  if (state.cloudSync.gcRunning) {
    showToast('云端清理正在进行中');
    return false;
  }
  state.cloudSync.gcRunning = true;
  try {
    setLoading('正在扫描云端快照...');
    const snapshots = await cloudSync_listSnapshots({ owner, repo, token });
    const mapDirsLv1 = await cloudSync_listContents({ owner, repo, token, path: CLOUD_SYNC_MAPS_PREFIX, allowMissing: true });
    const allMapDirs = [];
    for (const prefixDir of mapDirsLv1) {
      if (prefixDir.type !== 'dir') continue;
      const leaf = await cloudSync_listContents({ owner, repo, token, path: prefixDir.path, allowMissing: true });
      for (const entry of leaf) if (entry.type === 'dir') allMapDirs.push(entry.path);
    }
    const keepSnapshots = snapshots.slice(0, 30);
    const keepSnapshotIds = new Set(keepSnapshots.map((item) => item.snapshot_id));
    const keepMaps = new Set();
    for (const manifest of snapshots) {
      if (!keepSnapshotIds.has(manifest.snapshot_id) && !manifest.locked) continue;
      for (const map of manifest.maps || []) {
        if (cloudSync_isRemoteMapEntry(map)) keepMaps.add(map.map_sha256);
      }
    }
    let deletedSnapshots = 0;
    let deletedMaps = 0;
    for (const manifest of snapshots) {
      if (keepSnapshotIds.has(manifest.snapshot_id) || manifest.locked) continue;
      await cloudSync_deleteTree({ owner, repo, token, basePath: `${CLOUD_SYNC_SNAPSHOTS_PREFIX}/${manifest.snapshot_id}` });
      deletedSnapshots++;
    }
    for (const path of allMapDirs) {
      const sha = path.split('/').pop();
      if (keepMaps.has(sha)) continue;
      const metaFile = await cloudSync_getJsonFile({ owner, repo, token, path: `${path}/meta.json`, allowMissing: true });
      const createdAt = metaFile && metaFile.json && metaFile.json.created_at ? Date.parse(metaFile.json.created_at) : 0;
      if (createdAt && Date.now() - createdAt < 7 * 24 * 3600 * 1000) continue;
      await cloudSync_deleteTree({ owner, repo, token, basePath: path });
      deletedMaps++;
    }
    hideLoading();
    showToast(`已清理 ${deletedMaps} 张孤儿地图，${deletedSnapshots} 个老快照`, 4200);
    return true;
  } catch (err) {
    hideLoading();
    const errorObject = err && err.userMessage ? err : await cloudSync_classifyError(null, err);
    console.error('cloudSync gc failed:', errorObject);
    showToast(errorObject.userMessage || '云端清理失败', 4200);
    return false;
  } finally {
    state.cloudSync.gcRunning = false;
  }
}

async function cloudSync_bindManualRemoteMapToScene(sceneId, manualMap) {
  const scene = state.scenes[sceneId];
  if (!scene) { showToast('场景不存在'); return false; }
  if (!sceneNeedsLocalMap(scene)) {
    showToast('当前场景不是待绑定占位地图');
    return false;
  }
  const token = cloudSync_getToken();
  if (!token) { showToast('请先连接云存档'); return false; }
  try {
    setLoading(`下载云端地图：${manualMap.name || manualMap.path}`);
    const blob = await cloudSync_getRawBlobFile({
      owner: state.cloudSync.repoOwner,
      repo: state.cloudSync.repoName,
      token,
      path: manualMap.path,
      mime: manualMap.mime || cloudSync_guessMimeFromPath(manualMap.path),
    });
    const preparedMap = await prepareMapFromBlob(blob, { showDownsampleToast: true });
    const w = preparedMap.w;
    const h = preparedMap.h;
    const expected = scene.mapSize;
    if (!expected || expected.w !== w || expected.h !== h) {
      if (state.placeholderRestore.targetSceneId === sceneId) {
        cloudSync_clearPlaceholderRestoreTarget();
      }
      hideLoading();
      showToast(`地图尺寸不一致：需要 ${expected?.w || '?'}×${expected?.h || '?'}，云端是 ${w}×${h}`, 6200);
      return false;
    }
    const nextFingerprint = `manual:${manualMap.path}-${manualMap.sha || manualMap.size || 0}-${w}x${h}`;
    const mapSource = cloudSync_buildManualRemoteMapSource(manualMap, {
      mapSize: { w, h },
      mapFingerprint: nextFingerprint,
    });
    await restoreSceneWithPreparedMap(sceneId, blob, preparedMap, nextFingerprint, w, h, { mapSource });
    hideLoading();
    showToast('已绑定云端地图库地图 ✓', 3600);
    return true;
  } catch (err) {
    if (state.placeholderRestore.targetSceneId === sceneId) {
      cloudSync_clearPlaceholderRestoreTarget();
    }
    hideLoading();
    console.error('cloudSync bind manual map failed:', err);
    showToast('绑定云端地图失败：' + (err.userMessage || err.message || err), 5200);
    return false;
  }
}

async function onClickConnect() {
  const token = $('cloud-sync-token-input').value.trim();
  const trusted = $('cloud-sync-trust-input').checked;
  if (!token) { showToast('钥匙不能空'); return; }
  setLoading('正在连接云存档…');
  state.cloudSync.status = 'busy';
  const result = await cloudSync_testConnection({
    owner: state.cloudSync.repoOwner,
    repo: state.cloudSync.repoName,
    token,
  });
  if (result.ok) {
    cloudSync_setToken(token, trusted);
    state.cloudSync.status = 'connected';
    state.cloudSync.lastConnectAt = new Date().toISOString();
    state.cloudSync.tokenIsReadonly = !!result.tokenIsReadonly;
    state.cloudSync.lastError = null;
    hideLoading();
    showToast('已连上你的云存档保险柜 ✓');
    cloudSync_detectPendingDraft({
      owner: state.cloudSync.repoOwner,
      repo: state.cloudSync.repoName,
      token,
    }).catch((err) => console.warn('cloudSync detectPendingDraft failed:', err));
    showCloudSyncStatusView();
    return;
  }
  const errorObject = result.error || { code: 'unknown', userMessage: '云存档连接失败。' };
  state.cloudSync.status = 'error';
  state.cloudSync.lastError = errorObject;
  hideLoading();
  showToast(errorObject.userMessage, 3800);
  console.error('cloudSync connect failed:', errorObject);
  showCloudSyncConnectForm();
}

function cloudSync_bootstrap() {
  state.cloudSync.deviceId = cloudSync_getDeviceId();
  state.cloudSync.deviceLabel = cloudSync_getDeviceLabel();
  const token = cloudSync_getToken();
  if (!token) {
    state.cloudSync.status = 'disconnected';
    return;
  }
  state.cloudSync.status = 'busy';
  cloudSync_testConnection({
    owner: state.cloudSync.repoOwner,
    repo: state.cloudSync.repoName,
    token,
  }).then((result) => {
    if (result.ok) {
      state.cloudSync.status = 'connected';
      state.cloudSync.lastConnectAt = new Date().toISOString();
      state.cloudSync.tokenIsReadonly = !!result.tokenIsReadonly;
      state.cloudSync.lastError = null;
      console.info('cloudSync bootstrap connected:', state.cloudSync.repoOwner + '/' + state.cloudSync.repoName);
      cloudSync_detectPendingDraft({
        owner: state.cloudSync.repoOwner,
        repo: state.cloudSync.repoName,
        token,
      }).catch((err) => console.warn('cloudSync detectPendingDraft failed:', err));
      return;
    }
    state.cloudSync.status = 'error';
    state.cloudSync.lastError = result.error || { code: 'unknown', userMessage: '云存档连接失败。' };
    console.warn('cloudSync bootstrap failed:', state.cloudSync.lastError);
  }).catch((err) => {
    state.cloudSync.status = 'error';
    state.cloudSync.lastError = { code: 'network', userMessage: '连不上 GitHub。检查一下网络再试。', raw: err };
    console.warn('cloudSync bootstrap failed:', err);
  });
}

function openTokenUploadDialog(file, existingId) {
  state.uploadingTokenFile = file;
  state.editingTokenId = existingId || null;
  const editing = existingId ? state.tokens.find((t) => t.id === existingId) : null;
  const initShape = editing ? editing.shape : 'circle';
  const initColor = editing ? editing.borderColor : '#3b82f6';
  const initName = editing ? editing.name : '';
  const initEntryIds = editing ? editing.entryIds : [];
  const initExplorerEnabled = editing ? !!editing.explorerEnabled : false;
  const initExploreRadius = editing ? normalizeTokenExploreRadius(editing.exploreRadius) : TOKEN_EXPLORE_RADIUS_DEFAULT;
  showModal(`
    <div class="modal-title">${editing ? '编辑 Token' : '添加 Token'}</div>
    <div id="token-preview"></div>
    <div class="form-row">
      <label>形状</label>
      <div class="shape-options">
        <button class="option-btn" data-shape="circle">圆形</button>
        <button class="option-btn" data-shape="square">方形</button>
        <button class="option-btn" data-shape="original">原图比例</button>
      </div>
    </div>
    <div class="form-row">
      <label>描边（区分阵营）</label>
      <div class="color-options">
        <div class="color-swatch player" data-color="#3b82f6" data-pattern="solid" title="玩家小队（蓝实线）"></div>
        <div class="color-swatch enemy" data-color="#ef4444" data-pattern="dashed" title="敌人（红虚线）"></div>
        <div class="color-swatch npc" data-color="#eab308" data-pattern="double" title="NPC（黄双线）"></div>
        <div class="color-swatch none" data-color="" data-pattern="none" title="无描边"></div>
      </div>
    </div>
    <div class="form-row">
      <label>名字（可选）</label>
      <input id="token-name" type="text" maxlength="40" placeholder="留空不显示标签">
    </div>
    <div class="form-row">
      <label class="form-check" style="margin-bottom:8px;"><input id="token-explorer-enabled" type="checkbox"${initExplorerEnabled ? ' checked' : ''}> 探索 Token</label>
      <input id="token-explore-radius" type="range" min="${TOKEN_EXPLORE_RADIUS_MIN}" max="${TOKEN_EXPLORE_RADIUS_MAX}" step="5" value="${Math.round(initExploreRadius)}">
      <div class="form-note">清雾半径：<span id="token-explore-radius-value">${Math.round(initExploreRadius)}</span> px。拖动时清除地形层和事件层遮罩。</div>
    </div>
    ${entryAssignmentHTML(initEntryIds, { defaultPurpose: 'spotlight' })}
    <div class="modal-actions">
      <button id="token-cancel">取消</button>
      <button id="token-confirm" class="primary">${editing ? '保存' : '添加'}</button>
    </div>
  `, {
    onMounted: async () => {
      const preview = $('token-preview');
      let blobToPreview = file || (editing ? editing.blob : null);
      let previewUrl = null;
      if (blobToPreview) {
        previewUrl = URL.createObjectURL(blobToPreview);
        preview.style.backgroundImage = `url(${previewUrl})`;
      }
      let selShape = initShape;
      const shapeBtns = document.querySelectorAll('.shape-options .option-btn');
      shapeBtns.forEach((b) => {
        if (b.dataset.shape === selShape) b.classList.add('selected');
        b.addEventListener('click', () => {
          shapeBtns.forEach((x) => x.classList.remove('selected'));
          b.classList.add('selected');
          selShape = b.dataset.shape;
          if (selShape === 'circle') preview.style.borderRadius = '50%';
          else preview.style.borderRadius = '8px';
        });
      });
      if (selShape === 'circle') preview.style.borderRadius = '50%';
      const getEntryIds = mountEntryAssignmentControl(initEntryIds, { defaultPurpose: 'spotlight' });

      let selColor = initColor;
      let selPattern = editing ? editing.borderPattern : 'solid';
      if (!initColor) selPattern = 'none';
      const swatches = document.querySelectorAll('.color-swatch');
      swatches.forEach((s) => {
        if (s.dataset.color === (initColor || '')) s.classList.add('selected');
        s.addEventListener('click', () => {
          swatches.forEach((x) => x.classList.remove('selected'));
          s.classList.add('selected');
          selColor = s.dataset.color || null;
          selPattern = s.dataset.pattern;
        });
      });
      $('token-name').value = initName;
      const explorerInput = $('token-explorer-enabled');
      const radiusInput = $('token-explore-radius');
      const radiusValue = $('token-explore-radius-value');
      const syncExplorerControls = () => {
        const enabled = !!explorerInput.checked;
        radiusInput.disabled = !enabled;
        radiusValue.textContent = Math.round(normalizeTokenExploreRadius(radiusInput.value));
      };
      explorerInput.addEventListener('change', syncExplorerControls);
      radiusInput.addEventListener('input', syncExplorerControls);
      syncExplorerControls();
      const cleanup = () => { if (previewUrl) try { URL.revokeObjectURL(previewUrl); } catch (_) {} };
      $('token-cancel').addEventListener('click', () => { cleanup(); closeModal(); });
      $('token-confirm').addEventListener('click', async () => {
        const name = $('token-name').value.trim();
        const opts = {
          shape: selShape,
          borderColor: selColor || null,
          borderPattern: selPattern,
          name,
          entryIds: getEntryIds(),
          explorerEnabled: !!explorerInput.checked,
          exploreRadius: normalizeTokenExploreRadius(radiusInput.value),
        };
        cleanup();
        closeModal();
        if (editing) {
          editing.shape = opts.shape;
          editing.borderColor = opts.borderColor;
          editing.borderPattern = opts.borderPattern;
          editing.name = opts.name;
          editing.entryIds = opts.entryIds;
          editing.explorerEnabled = opts.explorerEnabled;
          editing.exploreRadius = opts.exploreRadius;
          scheduleRender('all');
          updateObjectPanel();
          triggerImmediateSave();
        } else {
          if (!file) return;
          setLoading('添加 Token 中…');
          try { await createTokenFromFile(file, opts); }
          catch (e) { showToast('添加失败：' + e.message); }
          hideLoading();
        }
      });
    }
  });
}

        t.addEventListener('click', () => {
          switchTab(t.dataset.src);
          if (t.dataset.src === 'emoji') {
            // 默认选中第一个或保留
            if (curIcon.type !== 'emoji' || !DEFAULT_EMOJIS.includes(curIcon.value)) {
              curIcon = { type: 'emoji', value: DEFAULT_EMOJIS[0] };

      const updateEmojiSelected = () => {
        document.querySelectorAll('.emoji-cell').forEach((c) => {
          c.classList.toggle('selected', curIcon.type === 'emoji' && c.dataset.emo === curIcon.value);
        });
      };
      document.querySelectorAll('.emoji-cell').forEach((c) => {
        c.addEventListener('click', () => {
          curIcon = { type: 'emoji', value: c.dataset.emo };
          renderPreview();
          updateEmojiSelected();
        });
      });
      updateEmojiSelected();

      // 自定义符号
      $('custom-icon-input').addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (v) {
          curIcon = { type: 'emoji', value: v };
          renderPreview();
        }
      });
      if (curIcon.type === 'emoji') $('custom-icon-input').value = curIcon.value;

      // 上传图片
      $('event-icon-upload-btn').addEventListener('click', () => {
        $('file-input-event-icon').click();
      });
      const onIconFile = async (e) => {
        const f = e.target.files[0];
        e.target.value = '';
        if (!f) return;
        const lower = f.name.toLowerCase();
        if (f.type === 'image/heic' || lower.endsWith('.heic')) {
          showToast('HEIC 格式不支持，请用 PNG/JPG');
          return;
        }
        try {
          const bm = await createImageBitmap(f);
          curIcon = { type: 'image', blob: f, bitmap: bm };
          pendingImageBlob = f;
          $('event-icon-image-name').textContent = f.name;
          renderPreview();
          switchTab('image');
        } catch (err) { showToast('图片解析失败'); }
      };
      $('file-input-event-icon').addEventListener('change', onIconFile);

      // 标题/内容
      $('event-title').value = initTitle;
      $('event-content').value = initContent;
      $('event-action-label').value = initActionLabel;

      const actionTypeInput = $('event-action-type');
      const targetSceneInput = $('event-target-scene');
      const sceneLinkOptions = $('event-scene-link-options');
      const syncActionOptions = () => {
        const isLink = actionTypeInput.value === EVENT_ACTION_SCENE_LINK;
        sceneLinkOptions.style.display = isLink ? '' : 'none';
      };
      actionTypeInput.addEventListener('change', syncActionOptions);
      syncActionOptions();

      // layer 选择
      let selLayer = editing ? (editing.layer === 0 ? 0 : 1) : 1;
      const layerBtns = document.querySelectorAll('.option-btn[data-layer]');
      layerBtns.forEach((b) => {
        if (parseInt(b.dataset.layer, 10) === selLayer) b.classList.add('selected');
        b.addEventListener('click', () => {
          layerBtns.forEach((x) => x.classList.remove('selected'));
          b.classList.add('selected');
          selLayer = parseInt(b.dataset.layer, 10);
        });
      });

      renderPreview();

      const cleanup = () => {
        if (imageBlobUrl) try { URL.revokeObjectURL(imageBlobUrl); } catch (_) {}
        $('file-input-event-icon').removeEventListener('change', onIconFile);
      };

      $('event-cancel').addEventListener('click', () => { cleanup(); closeModal(); });
      const delBtn = $('event-delete-in-edit');
      if (delBtn) {
        delBtn.style.background = 'var(--theme-danger)';
        delBtn.style.borderColor = 'var(--theme-danger)';
        delBtn.style.color = '#fff';
        delBtn.addEventListener('click', () => {
          cleanup(); closeModal();
          showConfirm('删除事件', `确定删除"${initTitle || '（未命名）'}"？可用 Ctrl+Z 撤销。`, () => {
            deleteEvent(eventId);
          }, { danger: true, yesText: '删除' });
        });
      }
      $('event-confirm').addEventListener('click', async () => {
        const title = $('event-title').value.trim();
        const content = $('event-content').value;
        const entryIds = getEntryIds();
        const actionType = normalizeEventActionType(actionTypeInput.value);
        const targetSceneId = actionType === EVENT_ACTION_SCENE_LINK ? normalizeEventTargetSceneId(targetSceneInput.value) : null;
        const actionLabel = actionType === EVENT_ACTION_SCENE_LINK ? normalizeEventActionLabel($('event-action-label').value) : '';
        if (actionType === EVENT_ACTION_SCENE_LINK && !targetSceneId) {
          showToast('请选择目标场景');
          return;
        }
        cleanup(); closeModal();
        if (editing) {
          await modifyEvent(eventId, { icon: curIcon, title, content, layer: selLayer, entryIds, actionType, targetSceneId, actionLabel });
          scheduleRender('all');
        } else {
          createEvent({
            x: mapX != null ? mapX : state.mapCanvas.width / 2,
            y: mapY != null ? mapY : state.mapCanvas.height / 2,
            icon: curIcon, title, content, layer: selLayer, entryIds, actionType, targetSceneId, actionLabel,
          });
        }
      });
    }
  });
}

function eventQuickMatches(ev, query) {
  if (isSceneLinkEvent(ev)) return false;
  if (!query) return true;
  return [
    ev.title || '',
    ev.content || '',
    ev.icon?.type === 'emoji' ? ev.icon.value : '',
    objectEntryNames(ev).join(' '),
    ev.layer === 0 ? '公开 显露 上层' : '隐藏 事件雾 遮罩',
  ].join(' ').toLowerCase().includes(query);
}

function eventQuickLayerLabel(ev) {
  return ev.layer === 0 ? '遮罩上层' : '事件遮罩下';
}

function renderEventQuickList(query = '') {
  const list = $('event-quick-list');
  if (!list) return;
  const q = String(query || '').trim().toLowerCase();
  const matches = state.events
    .filter((ev) => eventQuickMatches(ev, q))
    .sort((a, b) => (b.zOrder || 0) - (a.zOrder || 0));
  if (!state.events.length) {
    list.innerHTML = '<div class="object-empty">当前场景还没有事件。</div>';
    return;
  }
  if (!matches.length) {
    list.innerHTML = '<div class="object-empty">没有匹配的事件。</div>';
    return;
  }
  list.innerHTML = matches.map((ev) => {
    const title = ev.title || '（未命名事件）';
    const icon = ev.icon?.type === 'emoji' ? (ev.icon.value || '◆') : '◆';
    const action = ev.layer === 0 ? '放回遮罩下' : '显露到上层';
    const actionClass = ev.layer === 0 ? '' : 'primary';
    return `
      <div class="scene-row event-quick-row" data-event-id="${escapeHtml(ev.id)}">
        <span class="object-thumb">${escapeHtml(icon)}</span>
        <span class="object-main">
          <span class="object-name">${escapeHtml(title)}</span>
          <span class="object-sub">${escapeHtml(eventQuickLayerLabel(ev))} · ${Math.round(ev.x)}, ${Math.round(ev.y)}</span>
        </span>
        <div class="scene-actions">
          <button class="event-quick-locate" data-id="${escapeHtml(ev.id)}">定位</button>
          <button class="event-quick-toggle ${actionClass}" data-id="${escapeHtml(ev.id)}">${action}</button>
        </div>
      </div>
    `;
  }).join('');
  document.querySelectorAll('.event-quick-locate').forEach((btn) => {
    btn.addEventListener('click', () => {
      setSelectedObject('event', btn.dataset.id, { locate: true, render: true });
    });
  });
  document.querySelectorAll('.event-quick-toggle').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const ev = state.events.find((item) => item.id === btn.dataset.id);
      if (!ev) return;
      const nextLayer = ev.layer === 0 ? 1 : 0;
      await modifyEvent(ev.id, { layer: nextLayer });
      renderEventQuickList($('event-quick-search')?.value || '');
      showToast(nextLayer === 0 ? '事件已显露到遮罩上层' : '事件已放回事件遮罩下', 2200);
    });
  });
}

function openEventQuickToggleModal() {
  if (!state.hasMap) { showToast('请先加载地图'); return; }
  if (!requireEditSurface()) return;
  showModal(`

// ============== 词条动作 ==============
function openEntrySpotlightModal() {
  if (!state.hasMap) { showToast('请先加载地图'); return; }
  pruneEntryReferences();
  const counts = collectEntryCounts();
  const canManage = isEditSurface();
  const entries = (state.entries || []).filter((entry) => {
    if (!entryCanSpotlight(entry) && !entryCanRevealZone(entry)) return false;
    if (canManage) return true;
    const row = counts.get(entry.id);
    return entry.livePicker !== false && row && row.total > 0;
  });
  const rows = entries.map((entry) => {
    const row = counts.get(entry.id) || { event: 0, token: 0, annotation: 0, total: 0 };
    const zoneText = row.zone ? ` · ${row.zone} 区` : '';
    const eventText = row.event ? ` · ${row.event} 事件` : '';
    const actionText = entryCanRevealZone(entry) && !entryCanSpotlight(entry)
      ? `切换区域${zoneText}`
      : `切换事件${eventText}`;
    return `
      <button class="info-tag-row" data-entry-id="${escapeHtml(entry.id)}">
        <span style="display:flex;align-items:center;gap:8px;min-width:0;">
          <span class="entry-color-dot" style="background:${escapeHtml(entry.color)}"></span>
          ${entry.hotkey ? `<span class="entry-hotkey-badge">${escapeHtml(entry.hotkey)}</span>` : ''}
          <span class="info-tag-name">${escapeHtml(entry.name)}</span>
          ${normalizeEntryPurpose(entry.purpose) !== 'spotlight' ? `<span class="entry-hotkey-action-badge">${escapeHtml(entryPurposeLabel(entry.purpose))}</span>` : ''}
          ${entry.hotkey && normalizeEntryHotkeyAction(entry.hotkeyAction) === 'reveal-zones' ? '<span class="entry-hotkey-action-badge">切换</span>' : ''}
        </span>
        <span class="info-tag-count">${canManage ? `${row.total} 项${zoneText}${eventText}` : actionText}</span>
      </button>
    `;
  }).join('');
  showModal(`
    <div class="modal-title">词条动作</div>
    <div class="modal-desc">${canManage ? '选择词条可切换绑定事件的显示层级，或切换绑定揭示区域；管理入口只在编辑态开放。' : '选择一个现场词条，切换绑定事件到遮罩上层，或切换绑定区域显示。'}</div>
    <div class="info-tag-list">${rows || '<div class="object-empty">当前场景还没有可用词条。</div>'}</div>
    <div class="modal-actions">
      ${canManage ? '<button id="entry-manage">管理词条</button>' : ''}
      <button id="entry-close" class="primary">关闭</button>
    </div>
  `, {
    onMounted: () => {
      document.querySelectorAll('.info-tag-row[data-entry-id]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.entryId;
          const entry = getEntryById(id);
          closeModal();
          if (entryCanRevealZone(entry) && !entryCanSpotlight(entry)) revealZonesForEntryId(id);
          else await toggleEventsForEntryId(id);
          openEntrySpotlightModal();
        });
      });
      const manage = $('entry-manage');
      if (manage) manage.addEventListener('click', () => { closeModal(); openEntryManagerModal(); });
      $('entry-close').addEventListener('click', closeModal);
    }
  });
}

  `, {

      $('reveal-zone-editor-cancel').onclick = closeModal;
      $('reveal-zone-editor-start').onclick = () => {

function deleteRevealZone(zoneId) {
  const zone = state.revealZones.find((item) => item.id === zoneId);
  if (!zone) return;
  showConfirm('删除揭示区域', `确定删除"${zone.name}"？这不会改变已经揭开的迷雾。`, () => {
    state.revealZones = state.revealZones.filter((item) => item.id !== zoneId);
    triggerImmediateSave();
    scheduleRender('all');
    openRevealZonesModal();
  }, { danger: true, yesText: '删除' });
}

function openRevealZonesModal() {
  if (!state.hasMap) { showToast('请先加载地图'); return; }
  state.revealZones = normalizeRevealZones(state.revealZones, state.entries);
  const canManage = isEditSurface();
  const zones = state.revealZones || [];
  const rows = zones.map((zone) => {
    const entries = revealZoneEntryNames(zone);
    const entryText = entries.length ? ` · 词条：${entries.join('、')}` : '';
    return `
      <div class="scene-row">
        <div style="flex:1;min-width:0;">
          <div class="scene-name">${escapeHtml(zone.name)}</div>
          <div class="scene-meta">${revealZoneLayerLabel(zone.layer)} · ${zone.cells.length} 格${escapeHtml(entryText)}</div>
        </div>
        <div class="scene-actions">
          <button class="reveal-zone-apply" data-zone-id="${escapeHtml(zone.id)}">揭示</button>
          ${canManage ? `<button class="reveal-zone-edit" data-zone-id="${escapeHtml(zone.id)}">编辑</button>` : ''}
          ${canManage ? `<button class="reveal-zone-delete danger" data-zone-id="${escapeHtml(zone.id)}">删除</button>` : ''}
        </div>
      </div>
    `;
  }).join('') || '<div class="modal-desc">当前场景还没有揭示区域。</div>';
  showModal(`
    <div class="modal-title">揭示区域</div>
    <div class="modal-desc">${canManage ? '提前选好网格区域，跑团时一键揭示。不会自动触发，始终由 DM 手动执行。' : '选择一个预设区域，直接揭开对应迷雾。'}</div>
    <div class="scene-list">${rows}</div>
    <div class="modal-actions">
      ${canManage ? '<button id="reveal-zone-new">新建区域</button>' : ''}
      <button id="reveal-zone-close" class="primary">关闭</button>
    </div>
  `, {
    onMounted: () => {
      document.querySelectorAll('.reveal-zone-apply').forEach((btn) => {
        btn.onclick = () => { revealZoneById(btn.dataset.zoneId); closeModal(); };
      });
      document.querySelectorAll('.reveal-zone-edit').forEach((btn) => {
        btn.onclick = () => { closeModal(); openRevealZoneEditor(btn.dataset.zoneId); };
      });
      document.querySelectorAll('.reveal-zone-delete').forEach((btn) => {
        btn.onclick = () => deleteRevealZone(btn.dataset.zoneId);
      });
      const newBtn = $('reveal-zone-new');
      if (newBtn) newBtn.onclick = () => { closeModal(); openRevealZoneEditor(); };
      $('reveal-zone-close').onclick = closeModal;
    }
  });
}

function openEntryManagerModal() {
  if (!requireEditSurface()) return;
  pruneEntryReferences();
  const counts = collectEntryCounts();
  const rows = (state.entries || []).map((entry) => {
    const row = counts.get(entry.id) || { total: 0 };

          hotkey: $('entry-manager-new-hotkey')?.value,
          purpose: $('entry-manager-new-purpose')?.value,
          hotkeyAction: $('entry-manager-new-hotkey-action')?.value,
        });

      };
      $('entry-manager-new-add').addEventListener('click', () => {
        addNewEntry();
      });
      $('entry-manager-new-name').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); addNewEntry(); }
      });
      $('entry-manager-new-hotkey').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); addNewEntry(); }
      });
      $('entry-manager-close').addEventListener('click', closeModal);
      document.querySelectorAll('.entry-manager-delete').forEach((btn) => {
        btn.addEventListener('click', () => {
          const row = btn.closest('.entry-manager-row');
          const id = row?.dataset.entryId;
          const entry = getEntryById(id);
          if (!entry) return;
          showConfirm('删除词条', `确定删除"${entry.name}"？它会从所有对象上移除。`, () => {
            state.entries = state.entries.filter((e) => e.id !== id);
            state.events.forEach((item) => item.entryIds = objectEntryIds(item).filter((x) => x !== id));
            state.tokens.forEach((item) => item.entryIds = objectEntryIds(item).filter((x) => x !== id));
            state.annotations.forEach((item) => item.entryIds = objectEntryIds(item).filter((x) => x !== id));
            (state.revealZones || []).forEach((item) => item.entryIds = objectEntryIds(item).filter((x) => x !== id));
            if (state.activeEntryId === id) state.activeEntryId = null;
            updateEntryButton();
            updateObjectPanel();
            scheduleRender('all');
            triggerImmediateSave();
            openEntryManagerModal();
          }, { danger: true, yesText: '删除', onNo: () => openEntryManagerModal() });
        });
      });
      $('entry-manager-save').addEventListener('click', () => {
        const seen = new Set();
        const seenHotkeys = new Set();
        const drafts = [];
        let ok = true;
        let hotkeyError = '';
        document.querySelectorAll('.entry-manager-row').forEach((row, idx) => {
          const id = row.dataset.entryId;
          const entry = getEntryById(id);
          if (!entry) return;
          const name = normalizeEntryName(row.querySelector('.entry-manager-name')?.value);
          const key = entryNameKey(name);
          if (!name || seen.has(key)) { ok = false; return; }
          seen.add(key);
          const hotkey = normalizeEntryHotkey(row.querySelector('.entry-manager-hotkey')?.value);
          if (hotkey && seenHotkeys.has(hotkey)) {
            ok = false;
            hotkeyError = `${hotkey} 已经绑定给别的词条`;
            return;
          }
          if (hotkey) seenHotkeys.add(hotkey);
          drafts.push({
            entry,
            name,
            purpose: normalizeEntryPurpose(row.querySelector('.entry-manager-purpose')?.value),
            hotkey,
            hotkeyAction: normalizeEntryHotkeyAction(row.querySelector('.entry-manager-hotkey-action')?.value),
            color: normalizeHex(row.querySelector('.entry-manager-color')?.value || entry.color),
            livePicker: !!row.querySelector('.entry-manager-live')?.checked,
            sortOrder: idx,
          });
        });
        if (!ok) { showToast(hotkeyError || '词条名不能为空，也不能重名'); return; }
        drafts.forEach((draft) => {
          draft.entry.name = draft.name;
          draft.entry.purpose = draft.purpose;
          draft.entry.hotkey = draft.hotkey;
          draft.entry.hotkeyAction = draft.hotkeyAction;
          draft.entry.color = draft.color;
          draft.entry.livePicker = draft.livePicker;
          draft.entry.sortOrder = draft.sortOrder;
          draft.entry.updatedAt = Date.now();
        });
        state.entries = normalizeEntries(state.entries);
        updateEntryButton();
        updateObjectPanel();
        scheduleRender('all');
        triggerImmediateSave();
        closeModal();
        showToast('词条已保存');
      });
    }
  });
}
