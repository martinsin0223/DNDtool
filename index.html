  const offsetY = Number.isFinite(rawOffsetY) ? clamp(rawOffsetY, -offsetLimit, offsetLimit) : 0;
  const rawOpacity = Number(grid.lineOpacity != null ? grid.lineOpacity : 0.25);
  const lineOpacity = Number.isFinite(rawOpacity) ? clamp(rawOpacity, 0, 1) : 0.25;
  return {
    enabled: !!grid.enabled,
    type,
    cellSize,
    offsetX,
    offsetY,
    rotation: normalizeGridRotationForType(type, grid.rotation || 0),
    lineColor: normalizeHex(grid.lineColor || '#ffffff'),
    lineOpacity,
  };
}

function finishGridCalibration(save) {
  const calibration = state.gridCalibration;
  if (!calibration) return;
  if (!save) {
    state.grid = cloneGridSettings(calibration.originalGrid);
  }
  state.gridCalibration = null;
  state.uiMode = state.presentMode ? 'present' : 'normal';
  cancelLongPress();
  for (const [id] of state.pointers) {
    try { state.mainCanvas.releasePointerCapture(id); } catch (_) {}
  }
  state.pointers.clear();
  state.pinchAnchor = null;
  state.panAnchor = null;
  const panel = $('grid-calibration-panel');
  if (panel) panel.remove();
  invalidateGridCache();
  scheduleRender('all');
  if (save) {
    triggerImmediateSave();
    showToast('网格校准已保存');
  } else {
    triggerImmediateSave();
    showToast('已取消网格校准');
  }
}

function handleGridCalibrationPointerDown(info, e, sx, sy) {
  e.preventDefault();
  cancelLongPress();
  hideEventCard();
  if (state.pointers.size >= 2 || (e.pointerType === 'mouse' && e.button !== 0)) {
    info.role = 'grid-calibration-ignore';
    return;
  }
  const calibration = state.gridCalibration;
  info.role = 'grid-calibration';
  calibration.pointerId = e.pointerId;
  calibration.startX = sx;
  calibration.startY = sy;
  calibration.startOffsetX = state.grid.offsetX || 0;
  calibration.startOffsetY = state.grid.offsetY || 0;
  state.showBrushPreview = false;
}

function moveGridCalibration(info, x, y) {
  const calibration = state.gridCalibration;
  if (!calibration || calibration.pointerId !== info.id) return;
  const dx = (x - calibration.startX) / state.view.scale;
  const dy = (y - calibration.startY) / state.view.scale;
  state.grid.offsetX = calibration.startOffsetX + dx;
  state.grid.offsetY = calibration.startOffsetY + dy;
  updateGridCalibrationPanel();
  invalidateGridCache();
  scheduleRender('all');
}

// ============== 渲染 ==============
function scheduleRender(rectOrAll) {
  if (rectOrAll === 'all') state.dirtyRect = 'all';
  else if (state.dirtyRect !== 'all') {
    if (!state.dirtyRect) state.dirtyRect = { x: rectOrAll.x, y: rectOrAll.y, w: rectOrAll.w, h: rectOrAll.h };
    else mergeRectInto(state.dirtyRect, rectOrAll);
  }
  if (state.rafId != null) return;
  state.rafId = requestAnimationFrame(renderFrame);
}

function mergeRectInto(a, b) {
  const x1 = Math.min(a.x, b.x), y1 = Math.min(a.y, b.y);
  const x2 = Math.max(a.x + a.w, b.x + b.w), y2 = Math.max(a.y + a.h, b.y + b.h);
  a.x = x1; a.y = y1; a.w = x2 - x1; a.h = y2 - y1;
}

function renderFrame() {
  state.rafId = null;
  if (state.dirtyRect == null) return;
  const ctx = state.mainCtx;
  const cv = state.mainCanvas;
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.restore();
  drawAll();
  drawBrushPreview();
  drawSelectedHighlight();
  state.dirtyRect = null;
  positionTokenActionBar();
  positionAnnotationActionBar();
  positionEventCard();
}

function drawAll() {
  if (!state.hasMap) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const setMapTransform = () => ctx.setTransform(state.view.scale * dpr, 0, 0, state.view.scale * dpr, state.view.x * dpr, state.view.y * dpr);
  const setScreenTransform = () => ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // 1. 地图
  setMapTransform();
  ctx.drawImage(state.mapCanvas, 0, 0);

  // 2. 地形层 fog
  ctx.globalAlpha = state.terrainFogOpacity;
  ctx.drawImage(state.fogLayers.terrain.canvas, 0, 0);
  ctx.globalAlpha = 1;

  // 3. 事件 icon · layer 1（屏幕坐标，会被事件 fog 遮）
  setScreenTransform();
  drawAllEvents(ctx, 1);

  // 4. 事件层 fog（地图坐标，遮 layer 1 事件）
  setMapTransform();
  ctx.globalAlpha = state.eventFogOpacity;
  ctx.drawImage(state.fogLayers.event.canvas, 0, 0);
  ctx.globalAlpha = 1;

  // 5. 地图标注（按遮罩中心点判定可见）+ 事件 icon · layer 0（在所有 fog 之上）
  drawAllAnnotations(ctx, 'terrain');
  drawAllAnnotations(ctx, 'event');
  drawAllAnnotations(ctx, 'public');
  setScreenTransform();
  drawAllEvents(ctx, 0);

  // 6. 网格线 overlay（v3.1，地图坐标系，token 之下）
  setMapTransform();
  drawGridOverlay(ctx);

  // 7. Token（最上层，永远可见）
  drawTokens(ctx);
}

function drawTokens(ctx) {
  // 地图坐标系下画 token 图，描边/标签切屏幕坐标
  const sorted = state.tokens.slice().sort((a, b) => {
    if (a.id === state.selectedTokenId) return 1;
    if (b.id === state.selectedTokenId) return -1;
    return a.zOrder - b.zOrder;
  });
  for (const t of sorted) drawSingleToken(ctx, t);
}

function drawSingleToken(ctx, t) {
  const dpr = state._dpr || 1;
  const ratio = t.imageBitmap ? (t.imageBitmap.width / t.imageBitmap.height) : 1;
  let drawW, drawH;
  if (t.shape === 'circle' || t.shape === 'square') {
    drawW = t.size; drawH = t.size;
  } else {
    if (ratio >= 1) { drawW = t.size; drawH = t.size / ratio; }
    else { drawH = t.size; drawW = t.size * ratio; }
  }
  const dx = t.x - drawW / 2;
  const dy = t.y - drawH / 2;
  ctx.save();
  if (t.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    if (t.imageBitmap) ctx.drawImage(t.imageBitmap, dx, dy, drawW, drawH);
  } else {
    if (t.imageBitmap) ctx.drawImage(t.imageBitmap, dx, dy, drawW, drawH);
  }
  ctx.restore();

  // 描边和标签：切屏幕坐标
  if ((t.borderColor && t.borderPattern !== 'none') || t.name) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const [scx, scy] = mapToScreen(t.x, t.y);
    if (t.borderColor && t.borderPattern !== 'none') {
      const halfScreen = (t.size / 2) * state.view.scale;
      ctx.strokeStyle = semanticColorOf(t.borderColor);
      ctx.lineWidth = 3;
      if (t.borderPattern === 'dashed') ctx.setLineDash([8, 6]);
      else ctx.setLineDash([]);
      if (t.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(scx, scy, halfScreen, 0, Math.PI * 2);
        ctx.stroke();
        if (t.borderPattern === 'double') {
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(scx, scy, halfScreen - 4, 0, Math.PI * 2);
          ctx.stroke();
        }
      } else {
        const sw = drawW * state.view.scale, sh = drawH * state.view.scale;
        ctx.strokeRect(scx - sw / 2, scy - sh / 2, sw, sh);
        if (t.borderPattern === 'double') {
          ctx.lineWidth = 2;
          ctx.strokeRect(scx - sw / 2 + 4, scy - sh / 2 + 4, sw - 8, sh - 8);
        }
      }
    }
    if (t.name) {
      const halfScreen = (t.size / 2) * state.view.scale;
      const labelY = scy + halfScreen + 6;
      ctx.font = '600 13px ' + state.theme.fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.lineWidth = 3;
      ctx.strokeStyle = state.theme.textOutline;
      ctx.strokeText(t.name, scx, labelY);
      ctx.fillStyle = '#fff';
      ctx.fillText(t.name, scx, labelY);
    }
    ctx.restore();
  }
}

// ============== 事件 icon 渲染 ==============
function drawAllEvents(ctx, layerFilter) {
  // layerFilter: 0 (永远可见层) 或 1 (被事件 fog 遮的普通层)
  // layer 1 事件：检查事件层 fog 在该位置的 alpha，被遮则不渲染（与 hit-test 一致）
  const sorted = state.events.slice()
    .filter((e) => (e.layer === 0 ? 0 : 1) === layerFilter)
    .filter((e) => layerFilter === 0 ? true : isEventVisible(e))
    .sort((a, b) => {
      if (a.id === state.selectedEventId) return 1;
      if (b.id === state.selectedEventId) return -1;
      return a.zOrder - b.zOrder;
    });
  for (const ev of sorted) drawEventIcon(ctx, ev);
}

function drawEventIcon(ctx, ev) {
  const [scx, scy] = mapToScreen(ev.x, ev.y);
  const r = ev.size / 2;
  // 半透明白底
  ctx.fillStyle = state.theme.eventIconBg;
  ctx.beginPath();
  ctx.arc(scx, scy, r + 2, 0, Math.PI * 2);
  ctx.fill();
  // 描边（轻微深色边）
  ctx.strokeStyle = state.theme.eventIconEdge;
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(scx, scy, r + 2, 0, Math.PI * 2);
  ctx.stroke();

  // icon 本体
  if (ev.icon.type === 'emoji') {
    ctx.font = `${Math.floor(ev.size * 0.7)}px ${state.theme.fontFamily}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000';
    ctx.fillText(ev.icon.value, scx, scy + 1);
  } else if (ev.icon.type === 'image' && ev.icon.bitmap) {
    const bm = ev.icon.bitmap;
    const ratio = bm.width / bm.height;
    let dw, dh;
    if (ratio >= 1) { dw = ev.size * 0.85; dh = dw / ratio; }
    else { dh = ev.size * 0.85; dw = dh * ratio; }
    ctx.save();
    ctx.beginPath();
    ctx.arc(scx, scy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(bm, scx - dw / 2, scy - dh / 2, dw, dh);
    ctx.restore();
  } else if (ev.icon.type === 'svg-symbol') {
    // 占位：v2.0 不实施 SVG 主题包，降级为 ❓
    ctx.font = `${Math.floor(ev.size * 0.7)}px ${state.theme.fontFamily}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000';
    ctx.fillText('❓', scx, scy + 1);
  }
}

function drawSelectedHighlight() {
  if (state.selectedTokenId) drawSelectedTokenHighlight();
  else if (state.selectedAnnotationId) drawSelectedAnnotationHighlight();
  else if (state.selectedEventId) drawSelectedEventHighlight();
}

function drawSelectedTokenHighlight() {
  const t = state.tokens.find((x) => x.id === state.selectedTokenId);
  if (!t) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const [scx, scy] = mapToScreen(t.x, t.y);
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = state.theme.tokenSelectedGlow;
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 3]);
  if (t.shape === 'circle') {
    const r = (t.size / 2) * state.view.scale + 6;
    ctx.beginPath();
    ctx.arc(scx, scy, r, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    let drawW, drawH;
    const ratio = t.imageBitmap ? (t.imageBitmap.width / t.imageBitmap.height) : 1;
    if (t.shape === 'square') { drawW = t.size; drawH = t.size; }
    else { if (ratio >= 1) { drawW = t.size; drawH = t.size / ratio; } else { drawH = t.size; drawW = t.size * ratio; } }
    const sw = drawW * state.view.scale + 12, sh = drawH * state.view.scale + 12;
    ctx.strokeRect(scx - sw / 2, scy - sh / 2, sw, sh);
  }
  ctx.restore();
}

function drawSelectedEventHighlight() {
  const ev = state.events.find((x) => x.id === state.selectedEventId);
  if (!ev) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const [scx, scy] = mapToScreen(ev.x, ev.y);
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = state.theme.eventSelectedGlow;
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.arc(scx, scy, ev.size / 2 + 7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawBrushPreview() {
  if (state.gridCalibration) return;
  if (!state.showBrushPreview || !state.hasMap) return;
  if (state.uiMode !== 'normal' && state.uiMode !== 'present') return;
  if (state.cursorScreenX < 0) return;
  if (state.placeEventMode) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const color = state.brush.mode === 'reveal-all'
    ? state.theme.warn
    : (state.currentLayer === 'terrain' ? state.theme.brushPreviewTerrain : state.theme.brushPreviewEvent);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  if (state.brush.mode === 'reveal' || state.brush.mode === 'reveal-all') ctx.setLineDash([4, 4]);
  else ctx.setLineDash([]);

  let previewRadius;  // 用于文字标签定位
  if (state.grid && state.grid.enabled) {
    // 网格模式：画当前指向格子的轮廓（hex / square）
    const [mx, my] = screenToMap(state.cursorScreenX, state.cursorScreenY);
    const cell = gridCellAtPoint(mx, my, state.grid);
    const verts = gridCellVertices(cell, state.grid).map(([vx, vy]) => mapToScreen(vx, vy));
    ctx.beginPath();
    ctx.moveTo(verts[0][0], verts[0][1]);
    for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0], verts[i][1]);
    ctx.closePath();
    ctx.stroke();
    const [ccx, ccy] = mapToScreen(...gridCellCenter(cell, state.grid));
    previewRadius = Math.max(...verts.map(([vx, vy]) => Math.hypot(vx - ccx, vy - ccy)));
  } else {
    const r = state.brush.sizeScreen / 2;
    ctx.beginPath();
    ctx.arc(state.cursorScreenX, state.cursorScreenY, r, 0, Math.PI * 2);
    ctx.stroke();
    previewRadius = r;
  }
  // 文字标签
  ctx.font = '12px ' + state.theme.fontFamily;
  ctx.fillStyle = state.theme.brushLabelColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.setLineDash([]);
  const labelX = state.cursorScreenX + previewRadius + 8;
  const labelY = state.cursorScreenY;
  const layerLabel = state.brush.mode === 'reveal-all'
    ? '双层'
    : (state.currentLayer === 'terrain' ? '地形' : '事件');
  const modeLabel = state.brush.mode === 'cover' ? '盖' : (state.brush.mode === 'reveal-all' ? '全揭' : '揭');
  const gridLabel = (state.grid && state.grid.enabled) ? '·格' : '';
  const text = layerLabel + '·' + modeLabel + gridLabel;
  ctx.lineWidth = 3;
  ctx.strokeStyle = state.theme.brushLabelOutline;
  ctx.strokeText(text, labelX, labelY);
  ctx.fillText(text, labelX, labelY);
  ctx.restore();
}

function resizeMainCanvas() {
  const cv = state.mainCanvas;
  const dpr = Math.min(window.devicePixelRatio || 1, state.theme.maxDpr || 2);
  const rect = cv.parentElement.getBoundingClientRect();
  cv.width = Math.floor(rect.width * dpr);
  cv.height = Math.floor(rect.height * dpr);
  cv.style.width = rect.width + 'px';
  cv.style.height = rect.height + 'px';
  state._dpr = dpr;
  scheduleRender('all');
}

// ============== 视口 ==============
function fitView() {
  if (!state.hasMap) return;
  const cv = state.mainCanvas;
  const rect = cv.parentElement.getBoundingClientRect();
  const pad = 32;
  const screenW = Math.max(1, rect.width - pad);
  const screenH = Math.max(1, rect.height - pad);
  const scale = Math.min(screenW / state.mapCanvas.width, screenH / state.mapCanvas.height);
  state.view.scale = clamp(scale, SCALE_MIN, SCALE_MAX);
  state.view.x = (rect.width - state.mapCanvas.width * state.view.scale) / 2;
  state.view.y = (rect.height - state.mapCanvas.height * state.view.scale) / 2;
  state.viewIsPristineFit = true;
  scheduleRender('all');
  updateZoomStatus();
  hideEventCard();
}

function zoomAt(sx, sy, factor) {
  const oldScale = state.view.scale;
  const newScale = clamp(oldScale * factor, SCALE_MIN, SCALE_MAX);
  if (newScale === oldScale) return;
  const [mx, my] = screenToMap(sx, sy);
  state.view.scale = newScale;
  state.view.x = sx - mx * newScale;
  state.view.y = sy - my * newScale;
  state.viewIsPristineFit = false;
  scheduleRender('all');
  updateZoomStatus();
  hideEventCard();
}

function updateZoomStatus() {
  $('status-zoom').textContent = Math.round(state.view.scale * 100) + '%';
}

// ============== 笔刷 ==============
function getStrokeLayerKeys(stroke) {
  if (!stroke) return [];
  return stroke.layer === 'all' ? ['terrain', 'event'] : [stroke.layer];
}

function captureStrokeTile(stroke, tx, ty, rect, layerKeys) {
  const key = tx + ',' + ty;
  let snap = stroke.affectedTiles.get(key);
  if (!snap) {
    snap = { rect, images: {} };
    stroke.affectedTiles.set(key, snap);
  }
  for (const layerKey of layerKeys) {
    if (snap.images[layerKey]) continue;
    const ctx = state.fogLayers[layerKey].ctx;
    try {
      snap.images[layerKey] = ctx.getImageData(rect.x, rect.y, rect.w, rect.h);
    } catch (e) {}
  }
}

function paintCircleOnFogLayer(layerKey, mx, my, rMap, mode) {
  const layer = state.fogLayers[layerKey];
  const ctx = layer.ctx;
  ctx.save();
  if (mode === 'reveal' || mode === 'reveal-all') {
    const grad = ctx.createRadialGradient(mx, my, rMap * 0.7, mx, my, rMap);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = grad;
    ctx.fillRect(mx - rMap, my - rMap, rMap * 2, rMap * 2);
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = layerFogColor(layerKey);
    ctx.beginPath();
    ctx.arc(mx, my, rMap, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function paintBrushAt(sx, sy) {
  if (!state.activeStroke) return;
  if (!state.hasMap) return;
  // v3.1: 网格模式分流
  if (state.grid && state.grid.enabled) return paintGridCellAt(sx, sy);
  const layerKeys = getStrokeLayerKeys(state.activeStroke);
  const rScreen = state.brush.sizeScreen / 2;
  let rMap = rScreen / state.view.scale;
  const rMax = Math.min(state.mapCanvas.width, state.mapCanvas.height) / 4;
  if (rMap > rMax) {
    rMap = rMax;
    if (!state._warnedBrushCap) {
      state._warnedBrushCap = true;
      showToast('笔刷过大，已自动限制');
    }
  }
  const [mx, my] = screenToMap(sx, sy);
  // 抓取本 stroke 中首次受影响的 tile
  const minTx = Math.max(0, Math.floor((mx - rMap) / TILE_SIZE));
  const maxTx = Math.min(Math.floor((state.mapCanvas.width - 1) / TILE_SIZE), Math.floor((mx + rMap) / TILE_SIZE));
  const minTy = Math.max(0, Math.floor((my - rMap) / TILE_SIZE));
  const maxTy = Math.min(Math.floor((state.mapCanvas.height - 1) / TILE_SIZE), Math.floor((my + rMap) / TILE_SIZE));
  for (let ty = minTy; ty <= maxTy; ty++) {
    for (let tx = minTx; tx <= maxTx; tx++) {
      const rx = tx * TILE_SIZE, ry = ty * TILE_SIZE;
      const rw = Math.min(TILE_SIZE, state.mapCanvas.width - rx);
      const rh = Math.min(TILE_SIZE, state.mapCanvas.height - ry);
      if (rw > 0 && rh > 0) {
        captureStrokeTile(state.activeStroke, tx, ty, { x: rx, y: ry, w: rw, h: rh }, layerKeys);
      }
    }
  }
  // 绘制
  for (const layerKey of layerKeys) paintCircleOnFogLayer(layerKey, mx, my, rMap, state.activeStroke.mode);
  const dirty = { x: mx - rMap, y: my - rMap, w: rMap * 2, h: rMap * 2 };
  if (!state.activeStroke.bounds) state.activeStroke.bounds = { ...dirty };
  else mergeRectInto(state.activeStroke.bounds, dirty);
  scheduleRender(dirty);
}

function interpolatePaintBrush(prevX, prevY, currX, currY) {
  const d = dist(prevX, prevY, currX, currY);
  // hex 模式：插值步长按 cellSize 的屏幕投影一半，防快拖跳格
  const step = (state.grid && state.grid.enabled)
    ? Math.max(8, state.grid.cellSize * state.view.scale * 0.5)
    : state.brush.sizeScreen / 4;
  const steps = Math.max(1, Math.ceil(d / step));
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    paintBrushAt(lerp(prevX, currX, t), lerp(prevY, currY, t));
  }
}

// 网格模式：按整格揭示/覆盖（hex / square）
function paintGridCellAt(sx, sy) {
  const layerKeys = getStrokeLayerKeys(state.activeStroke);
  const g = state.grid;
  const [mx, my] = screenToMap(sx, sy);
  const cell = gridCellAtPoint(mx, my, g);
  const cellKey = gridCellKey(cell);
  if (state.activeStroke.lastGridCell === cellKey) return;  // 同格不重画
  state.activeStroke.lastGridCell = cellKey;
  const bounds = gridCellBounds(cell, g);
  const minX = bounds.x, maxX = bounds.x + bounds.w;
  const minY = bounds.y, maxY = bounds.y + bounds.h;
  if (maxX < 0 || minX > state.mapCanvas.width) return;
  if (maxY < 0 || minY > state.mapCanvas.height) return;
  // 抓 tile（格子外接矩形）
  const minTx = Math.max(0, Math.floor(minX / TILE_SIZE));
  const maxTx = Math.min(Math.floor((state.mapCanvas.width - 1) / TILE_SIZE), Math.floor(maxX / TILE_SIZE));
  const minTy = Math.max(0, Math.floor(minY / TILE_SIZE));
  const maxTy = Math.min(Math.floor((state.mapCanvas.height - 1) / TILE_SIZE), Math.floor(maxY / TILE_SIZE));
  for (let ty = minTy; ty <= maxTy; ty++) {
    for (let tx = minTx; tx <= maxTx; tx++) {
      const rx = tx * TILE_SIZE, ry = ty * TILE_SIZE;
      const rw = Math.min(TILE_SIZE, state.mapCanvas.width - rx);
      const rh = Math.min(TILE_SIZE, state.mapCanvas.height - ry);
      if (rw > 0 && rh > 0) {
        captureStrokeTile(state.activeStroke, tx, ty, { x: rx, y: ry, w: rw, h: rh }, layerKeys);
      }
    }
  }
  for (const layerKey of layerKeys) {
    const ctx = state.fogLayers[layerKey].ctx;
    ctx.save();
    gridCellPath(ctx, cell, g);
    if (state.activeStroke.mode === 'reveal' || state.activeStroke.mode === 'reveal-all') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = layerFogColor(layerKey);
    }
    ctx.fill();
    ctx.restore();
  }
  const dirty = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  if (!state.activeStroke.bounds) state.activeStroke.bounds = { ...dirty };
  else mergeRectInto(state.activeStroke.bounds, dirty);
  scheduleRender(dirty);
}

// 网格线渲染（地图坐标系下叠加；用 offscreen 缓存避免每帧重画上千格）
function getGridCache(mw, mh) {
  const g = state.grid;
  const type = normalizeGridType(g.type);
  const rotation = normalizeGridRotationForType(type, g.rotation || 0);
  const key = `${type}|${g.cellSize}|${g.offsetX}|${g.offsetY}|${rotation}|${g.lineColor}|${g.lineOpacity}|${mw}|${mh}`;
  if (state._gridCache && state._gridCache.key === key) return state._gridCache.canvas;
  const cv = document.createElement('canvas');
  cv.width = mw; cv.height = mh;
  const cx = cv.getContext('2d');
  cx.strokeStyle = g.lineColor;
  cx.globalAlpha = g.lineOpacity;
  cx.lineWidth = 1;
  const unrotatedCorners = [
    rotateAroundOrigin(0, 0, g.offsetX, g.offsetY, -rotation * Math.PI / 180),
    rotateAroundOrigin(mw, 0, g.offsetX, g.offsetY, -rotation * Math.PI / 180),
    rotateAroundOrigin(0, mh, g.offsetX, g.offsetY, -rotation * Math.PI / 180),
    rotateAroundOrigin(mw, mh, g.offsetX, g.offsetY, -rotation * Math.PI / 180),
  ];
  const xs = unrotatedCorners.map((p) => p[0]);
  const ys = unrotatedCorners.map((p) => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  if (type === 'square') {
    const colMin = Math.floor((minX - g.offsetX) / g.cellSize) - 2;
    const colMax = Math.ceil((maxX - g.offsetX) / g.cellSize) + 2;
    const rowMin = Math.floor((minY - g.offsetY) / g.cellSize) - 2;
    const rowMax = Math.ceil((maxY - g.offsetY) / g.cellSize) + 2;
    const rad = rotation * Math.PI / 180;
    const drawLine = (x1, y1, x2, y2) => {
      const a = rotateAroundOrigin(x1, y1, g.offsetX, g.offsetY, rad);
      const b = rotateAroundOrigin(x2, y2, g.offsetX, g.offsetY, rad);
      cx.beginPath();
      cx.moveTo(a[0], a[1]);
      cx.lineTo(b[0], b[1]);
      cx.stroke();
    };
    const y1 = g.offsetY + rowMin * g.cellSize;
    const y2 = g.offsetY + (rowMax + 1) * g.cellSize;
    const x1 = g.offsetX + colMin * g.cellSize;
    const x2 = g.offsetX + (colMax + 1) * g.cellSize;
    for (let col = colMin; col <= colMax + 1; col++) {
      const x = g.offsetX + col * g.cellSize;
      drawLine(x, y1, x, y2);
    }
    for (let row = rowMin; row <= rowMax + 1; row++) {
      const y = g.offsetY + row * g.cellSize;
      drawLine(x1, y, x2, y);
    }
  } else {
    const rMin = Math.floor((minY - g.offsetY) / (g.cellSize * 1.5)) - 2;
    const rMax = Math.ceil((maxY - g.offsetY) / (g.cellSize * 1.5)) + 2;
    const qMin = Math.floor((minX - g.offsetX) / (g.cellSize * SQRT3) - rMax / 2) - 2;
    const qMax = Math.ceil((maxX - g.offsetX) / (g.cellSize * SQRT3) - rMin / 2) + 2;
    for (let r = rMin; r <= rMax; r++) {
      for (let q = qMin; q <= qMax; q++) {
        const [hx, hy] = hexCenter(q, r, g.cellSize, g.offsetX, g.offsetY, rotation);
        if (hx < -g.cellSize || hx > mw + g.cellSize) continue;
        if (hy < -g.cellSize || hy > mh + g.cellSize) continue;
        gridCellPath(cx, { type: 'hex', q, r }, g);
        cx.stroke();
      }
    }
  }
  state._gridCache = { canvas: cv, key };
  return cv;
}
function invalidateGridCache() { state._gridCache = null; }

function drawGridOverlay(ctx) {
  if (!state.grid || !state.grid.enabled) return;
  if (!state.hasMap) return;
  const cache = getGridCache(state.mapCanvas.width, state.mapCanvas.height);
  ctx.drawImage(cache, 0, 0);
}

// ============== 撤销栈（合并单栈） ==============
function onStrokeStart(layer, mode) {
  state.activeStroke = {
    layer, mode,
    affectedTiles: new Map(),
    bounds: null,
    startedAt: performance.now(),
    lastGridCell: null,  // 网格模式追踪上次操作的格子
  };
}

function onStrokeEnd(cancelled) {
  if (!state.activeStroke) return;
  const stroke = state.activeStroke;
  state.activeStroke = null;
  if (stroke.affectedTiles.size === 0) return;
  pushUndo({
    type: 'fog', kind: 'tiles', layer: stroke.layer,
    tiles: [...stroke.affectedTiles.values()],
  });
  state.strokesSinceCheckpoint += 1;
  maybeCheckpoint();
  refreshSelectionUi();
  triggerImmediateSave();
}

function pushUndo(entry) {
  state.undoStack.push(entry);
  if (state.undoStack.length > UNDO_LIMIT) state.undoStack.shift();
  updateUndoButton();
}

function describeUndoEntry(entry) {
  if (!entry) return '撤销';
  const layerName = entry.layer === 'all' ? '双层' : (entry.layer === 'terrain' ? '地形' : '事件');
  switch (entry.type) {
    case 'fog':
      return `撤销 ${layerName}层笔刷`;
    case 'event-create': return '撤销 创建事件';
    case 'event-delete': return '撤销 删除事件';
    case 'event-modify': return '撤销 编辑事件';
    case 'event-move': return '撤销 移动事件';
    case 'annotation-create': return '撤销 创建标注';
    case 'annotation-delete': return '撤销 删除标注';
    case 'annotation-modify': return '撤销 编辑标注';
    case 'annotation-move': return '撤销 移动标注';
    default: return '撤销';
  }
}

function updateUndoButton() {
  const btn = $('btn-undo');
  if (!btn) return;
  btn.disabled = state.undoStack.length === 0;
  const top = state.undoStack[state.undoStack.length - 1];
  btn.title = top ? `${describeUndoEntry(top)} (Ctrl+Z)` : '无可撤销操作';
}

async function undo() {
  if (state.undoStack.length === 0) return;
  const entry = state.undoStack.pop();
  if (entry.type === 'fog') {
    const layerKeys = entry.layer === 'all' ? ['terrain', 'event'] : [entry.layer];
    if (entry.kind === 'tiles') {
      for (const tile of entry.tiles) {
        if (tile.images) {
          for (const layerKey of layerKeys) {
            const img = tile.images[layerKey];
            if (img) state.fogLayers[layerKey].ctx.putImageData(img, tile.rect.x, tile.rect.y);
          }
        } else if (tile.imageData && entry.layer !== 'all') {
          state.fogLayers[entry.layer].ctx.putImageData(tile.imageData, tile.rect.x, tile.rect.y);
        }
      }
    } else {
      for (const layerKey of layerKeys) {
        const blob = entry.layer === 'all' ? entry.fogBlobs?.[layerKey] : entry.fogBlob;
        if (!blob) continue;
        try {
          const bitmap = await createImageBitmap(blob);
          const layer = state.fogLayers[layerKey];
          layer.ctx.save();
          layer.ctx.globalCompositeOperation = 'copy';
          layer.ctx.drawImage(bitmap, 0, 0);
          layer.ctx.restore();
          if (bitmap && typeof bitmap.close === 'function') bitmap.close();
        } catch (e) { console.warn(e); }
      }
    }
  } else if (entry.type === 'event-create') {
    state.events = state.events.filter((e) => e.id !== entry.event.id);
    if (state.selectedEventId === entry.event.id) state.selectedEventId = null;
    hideEventCard();
  } else if (entry.type === 'event-delete') {
    const restored = await deserializeEvent(entry.event);
    state.events.push(restored);
  } else if (entry.type === 'event-modify') {
    const ev = state.events.find((e) => e.id === entry.id);
    if (ev) {
      ev.title = entry.before.title;
      ev.content = entry.before.content;
      // icon 可能换源
      ev.icon = await deserializeEventIcon(entry.before.icon);
      ev.size = entry.before.size;
      ev.layer = (entry.before.layer === 0 ? 0 : 1);
    }
  } else if (entry.type === 'event-move') {
    const ev = state.events.find((e) => e.id === entry.id);
    if (ev) { ev.x = entry.prevX; ev.y = entry.prevY; }
  } else if (entry.type === 'annotation-create') {
    const idx = state.annotations.findIndex((a) => a.id === entry.annotation.id);
    if (idx >= 0) {
      closeAnnotationBitmap(state.annotations[idx]);
      state.annotations.splice(idx, 1);
    }
    if (state.selectedAnnotationId === entry.annotation.id) state.selectedAnnotationId = null;
  } else if (entry.type === 'annotation-delete') {
    const restored = await deserializeAnnotation(entry.annotation);
    state.annotations.push(restored);
    state.selectedAnnotationId = restored.id;
    state.selectedTokenId = null;
    state.selectedEventId = null;
    hideEventCard();
  } else if (entry.type === 'annotation-modify') {
    await replaceAnnotationFromSerialized(entry.id, entry.before);
    state.selectedTokenId = null;
    state.selectedEventId = null;
    hideEventCard();
  } else if (entry.type === 'annotation-move') {
    const ann = state.annotations.find((a) => a.id === entry.id);
    if (ann) {
      ann.x = entry.prevX;
      ann.y = entry.prevY;
      state.selectedAnnotationId = ann.id;
      state.selectedTokenId = null;
      state.selectedEventId = null;
      hideEventCard();
    }
  }
  updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus();
  refreshSelectionUi();
  scheduleRender('all');
  updateUndoButton();
  showToast(describeUndoEntry(entry).replace('撤销', '已撤销'));
  triggerImmediateSave();
}

async function maybeCheckpoint() {
  const now = performance.now();
  if (state.strokesSinceCheckpoint < CHECKPOINT_STROKE_THRESHOLD) return;
  if (now - state.lastCheckpointAt < CHECKPOINT_TIME_THRESHOLD) return;
  state.strokesSinceCheckpoint = 0;
  state.lastCheckpointAt = now;
  await saveCheckpoint();
}

// ============== 全部覆盖/全部揭示（per-layer） ==============
function layerFogColor(layerKey) {
  if (layerKey === 'terrain') return state.terrainFogColor || state.theme.fogColor || '#000';
  if (layerKey === 'event') return state.eventFogColor || state.theme.fogColor || '#000';
  return '#000';
}

function fillFogLayer(layerKey) {
  const layer = state.fogLayers[layerKey];
  layer.ctx.save();
  layer.ctx.globalCompositeOperation = 'source-over';
  layer.ctx.fillStyle = layerFogColor(layerKey);
  layer.ctx.fillRect(0, 0, layer.canvas.width, layer.canvas.height);
  layer.ctx.restore();
}

// 改色后用 source-in 把已有覆盖区域重涂为新色（保留 alpha 通道）
function recolorFogLayer(layerKey, newColor) {
  const layer = state.fogLayers[layerKey];
  layer.ctx.save();
  layer.ctx.globalCompositeOperation = 'source-in';
  layer.ctx.fillStyle = newColor;
  layer.ctx.fillRect(0, 0, layer.canvas.width, layer.canvas.height);
  layer.ctx.restore();
}
function clearFogLayer(layerKey) {
  const layer = state.fogLayers[layerKey];
  layer.ctx.clearRect(0, 0, layer.canvas.width, layer.canvas.height);
}

function applyFillAll(layerKey) {
  if (!requireEditSurface()) return;
  fillFogLayer(layerKey);
  // 清空与该层相关的 fog 撤销项
  state.undoStack = state.undoStack.filter((e) => !(e.type === 'fog' && (e.layer === layerKey || e.layer === 'all')));
  updateUndoButton();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
}

function applyClearAll(layerKey) {
  if (!requireEditSurface()) return;
  clearFogLayer(layerKey);
  state.undoStack = state.undoStack.filter((e) => !(e.type === 'fog' && (e.layer === layerKey || e.layer === 'all')));
  updateUndoButton();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
}

// ============== Token CRUD ==============
async function createTokenFromFile(file, opts) {
  const bitmap = await createImageBitmap(file);
  const baseSize = Math.max(50, Math.min(state.mapCanvas.width, state.mapCanvas.height) / 30);
  const cv = state.mainCanvas;
  const rect = cv.parentElement.getBoundingClientRect();
  const [cmx, cmy] = screenToMap(rect.width / 2, rect.height / 2);
  const cx = clamp(cmx, 0, state.mapCanvas.width);
  const cy = clamp(cmy, 0, state.mapCanvas.height);
  let name = opts.name || '';
  if (name) {
    let suffix = 1, candidate = name;
    while (state.tokens.some((t) => t.name === candidate)) {
      suffix++;
      candidate = name + ' (' + suffix + ')';
    }
    name = candidate;
  }
  const token = {
    id: uuid(), imageBitmap: bitmap, blob: file,
    shape: opts.shape, borderColor: opts.borderColor, borderPattern: opts.borderPattern,
    name, x: cx, y: cy, size: baseSize, zOrder: state.tokens.length,
  };
  state.tokens.push(token);
  setSelectedObject('token', token.id, { render: false });
  updateTokensStatus();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
}

async function rebuildTokenFromSerialized(s) {
  let bitmap = null;
  try { bitmap = await createImageBitmap(s.blob); } catch (e) {}
  return {
    id: s.id, imageBitmap: bitmap, blob: s.blob, shape: s.shape,
    borderColor: s.borderColor, borderPattern: s.borderPattern, name: s.name,
    x: s.x, y: s.y, size: s.size, zOrder: s.zOrder,
  };
}

function deleteSelectedToken() {
  if (!state.selectedTokenId) return;
  state.tokens = state.tokens.filter((t) => t.id !== state.selectedTokenId);
  clearSelection({ render: false });
  updateTokensStatus();
  scheduleRender('all');
  triggerImmediateSave();
}

function updateTokensStatus() {
  $('status-tokens').textContent = state.tokens.length + ' Token';
  updateObjectPanel();
}
function updateEventsStatus() {
  $('status-events').textContent = state.events.length + ' 事件';
  updateObjectPanel();
}
function updateSceneStatus() {
  const el = $('status-scene');
  if (!el) return;
  const sceneCount = Object.keys(state.scenes).length;
  if (!state.currentSceneId || !state.scenes[state.currentSceneId]) {
    el.textContent = '';
    return;
  }
  const cur = state.scenes[state.currentSceneId];
  const name = cur.name || '场景';
  el.textContent = sceneCount > 1 ? `📚 ${name} (${sceneCount})` : `📚 ${name}`;
}

function findTopTokenAt(mx, my) {
  const sorted = state.tokens.slice().sort((a, b) => b.zOrder - a.zOrder);
  for (const t of sorted) if (hitTestToken(t, mx, my)) return t;
  return null;
}

function hitTestToken(t, mx, my) {
  const ratio = t.imageBitmap ? (t.imageBitmap.width / t.imageBitmap.height) : 1;
  let drawW, drawH;
  if (t.shape === 'circle' || t.shape === 'square') { drawW = t.size; drawH = t.size; }
  else { if (ratio >= 1) { drawW = t.size; drawH = t.size / ratio; } else { drawH = t.size; drawW = t.size * ratio; } }
  if (t.shape === 'circle') return dist(mx, my, t.x, t.y) <= t.size / 2;
  return Math.abs(mx - t.x) <= drawW / 2 && Math.abs(my - t.y) <= drawH / 2;
}

function clampTokenToMap(t) {
  t.x = clamp(t.x, 0, state.mapCanvas.width);
  t.y = clamp(t.y, 0, state.mapCanvas.height);
}

// ============== 地图标注（文字 / 图片） ==============
function normalizeAnnotationMaskMode(v) {
  return ['public', 'terrain', 'event'].includes(v) ? v : 'public';
}

function annotationMaskLabel(mode) {
  const m = normalizeAnnotationMaskMode(mode);
  if (m === 'terrain') return '受地形遮罩';
  if (m === 'event') return '受事件遮罩';
  return '公开';
}

function annotationCenterPoint() {
  const rect = state.mainCanvas.parentElement.getBoundingClientRect();
  const [mx, my] = screenToMap(rect.width / 2, rect.height / 2);
  return {
    x: clamp(mx, 0, state.mapCanvas.width),
    y: clamp(my, 0, state.mapCanvas.height),
  };
}

function nextAnnotationZOrder() {
  return state.annotations.reduce((m, a) => Math.max(m, a.zOrder || 0), 0) + 1;
}

function measureTextAnnotation(ann) {
  const ctx = state.mainCtx || state.mapCtx || document.createElement('canvas').getContext('2d');
  const fontSize = clamp(Number(ann.fontSize) || ANNOTATION_DEFAULT_TEXT_SIZE, ANNOTATION_MIN_SIZE, ANNOTATION_MAX_SIZE);
  const lines = String(ann.text || '文字标注').split(/\r?\n/);
  const pad = Math.max(6, Math.round(fontSize * 0.2));
  const lineHeight = Math.round(fontSize * 1.22);
  ctx.save();
  ctx.font = `700 ${fontSize}px ${state.theme.fontFamily}`;
  let maxW = 1;
  for (const line of lines) maxW = Math.max(maxW, ctx.measureText(line || ' ').width);
  ctx.restore();
  return { lines, pad, lineHeight, w: maxW + pad * 2, h: lines.length * lineHeight + pad * 2 };
}

function annotationBounds(ann) {
  if (ann.type === 'text') {
    const m = measureTextAnnotation(ann);
    return { x: ann.x - m.w / 2, y: ann.y - m.h / 2, w: m.w, h: m.h };
  }
  const w = Math.max(ANNOTATION_MIN_SIZE, Number(ann.width) || ANNOTATION_DEFAULT_IMAGE_WIDTH);
  const h = Math.max(ANNOTATION_MIN_SIZE, Number(ann.height) || w);
  return { x: ann.x - w / 2, y: ann.y - h / 2, w, h };
}

function clampAnnotationToMap(ann) {
  const b = annotationBounds(ann);
  const halfW = b.w / 2;
  const halfH = b.h / 2;
  ann.x = clamp(ann.x, halfW, Math.max(halfW, state.mapCanvas.width - halfW));
  ann.y = clamp(ann.y, halfH, Math.max(halfH, state.mapCanvas.height - halfH));
}

function isFogRevealedAt(layerKey, x, y) {
  try {
    const layer = state.fogLayers[layerKey];
    const px = layer.ctx.getImageData(
      Math.floor(clamp(x, 0, layer.canvas.width - 1)),
      Math.floor(clamp(y, 0, layer.canvas.height - 1)),
      1, 1
    ).data;
    return px[3] < 128;
  } catch (e) { return true; }
}

function isAnnotationVisible(ann) {
  const mode = normalizeAnnotationMaskMode(ann.maskMode);
  if (mode === 'terrain') return isFogRevealedAt('terrain', ann.x, ann.y);
  if (mode === 'event') return isFogRevealedAt('event', ann.x, ann.y);
  return true;
}

function drawAllAnnotations(ctx, maskMode) {
  const sorted = state.annotations.slice()
    .filter((a) => normalizeAnnotationMaskMode(a.maskMode) === maskMode)
    .filter((a) => isAnnotationVisible(a))
    .sort((a, b) => {
      if (a.id === state.selectedAnnotationId) return 1;
      if (b.id === state.selectedAnnotationId) return -1;
      return (a.zOrder || 0) - (b.zOrder || 0);
    });
  for (const ann of sorted) drawAnnotation(ctx, ann);
}

function drawAnnotation(ctx, ann) {
  const b = annotationBounds(ann);
  ctx.save();
  if (ann.type === 'text') {
    const m = measureTextAnnotation(ann);
    ctx.font = `700 ${ann.fontSize || ANNOTATION_DEFAULT_TEXT_SIZE}px ${state.theme.fontFamily}`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.lineJoin = 'round';
    ctx.lineWidth = Math.max(3, (ann.fontSize || ANNOTATION_DEFAULT_TEXT_SIZE) * 0.14);
    ctx.strokeStyle = ann.outlineColor || state.theme.textOutline || 'rgba(0,0,0,0.85)';
    ctx.fillStyle = ann.color || '#ffffff';
    const x = b.x + m.pad;
    let y = b.y + m.pad;
    for (const line of m.lines) {
      ctx.strokeText(line || ' ', x, y);
      ctx.fillText(line || ' ', x, y);
      y += m.lineHeight;
    }
  } else if (ann.type === 'image') {
    if (ann.bitmap) ctx.drawImage(ann.bitmap, b.x, b.y, b.w, b.h);
    else {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.strokeRect(b.x, b.y, b.w, b.h);
    }
  }
  ctx.restore();
}

function drawSelectedAnnotationHighlight() {
  const ann = state.annotations.find((a) => a.id === state.selectedAnnotationId);
  if (!ann || !isAnnotationVisible(ann)) return;
  const b = annotationBounds(ann);
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const [x1, y1] = mapToScreen(b.x, b.y);
  const [x2, y2] = mapToScreen(b.x + b.w, b.y + b.h);
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = state.theme.warn;
  ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(x1 - 6, y1 - 6, (x2 - x1) + 12, (y2 - y1) + 12);
  ctx.setLineDash([]);
  ctx.fillStyle = state.theme.warn;
  const handle = 8;
  ctx.fillRect(x2 + 2, y2 + 2, handle, handle);
  ctx.restore();
}

function hitTestAnnotation(ann, mx, my) {
  const b = annotationBounds(ann);
  return mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
}

function findTopAnnotationAt(mx, my) {
  const sorted = state.annotations.slice().sort((a, b) => (b.zOrder || 0) - (a.zOrder || 0));
  for (const ann of sorted) {
    if (!isAnnotationVisible(ann)) continue;
    if (hitTestAnnotation(ann, mx, my)) return ann;
  }
  return null;
}

function serializeAnnotation(ann) {
  const base = {
    id: ann.id, type: ann.type,
    x: ann.x, y: ann.y,
    maskMode: normalizeAnnotationMaskMode(ann.maskMode),
    zOrder: ann.zOrder || 0,
  };
  if (ann.type === 'text') {
    return {
      ...base,
      text: ann.text || '',
      fontSize: ann.fontSize || ANNOTATION_DEFAULT_TEXT_SIZE,
      color: ann.color || '#ffffff',
      outlineColor: ann.outlineColor || state.theme.textOutline || 'rgba(0,0,0,0.85)',
    };
  }
  return {
    ...base,
    blob: ann.blob,
    width: ann.width || ANNOTATION_DEFAULT_IMAGE_WIDTH,
    height: ann.height || ANNOTATION_DEFAULT_IMAGE_WIDTH,
  };
}

async function deserializeAnnotation(s) {
  const maskMode = normalizeAnnotationMaskMode(s.maskMode);
  if (s.type === 'image') {
    let bitmap = null;
    try { if (s.blob) bitmap = await createImageBitmap(s.blob); } catch (e) {}
    const ratio = bitmap ? (bitmap.width / bitmap.height) : 1;
    const width = Number(s.width) || ANNOTATION_DEFAULT_IMAGE_WIDTH;
    const height = Number(s.height) || (width / ratio);
    return {
      id: s.id || uuid(), type: 'image',
      blob: s.blob || null, bitmap,
      x: Number(s.x) || 0, y: Number(s.y) || 0,
      width, height,
      maskMode,
      zOrder: s.zOrder || nextAnnotationZOrder(),
    };
  }
  return {
    id: s.id || uuid(), type: 'text',
    text: s.text || '文字标注',
    x: Number(s.x) || 0, y: Number(s.y) || 0,
    fontSize: clamp(Number(s.fontSize) || ANNOTATION_DEFAULT_TEXT_SIZE, ANNOTATION_MIN_SIZE, 240),
    color: normalizeHex(s.color || '#ffffff'),
    outlineColor: s.outlineColor || state.theme.textOutline || 'rgba(0,0,0,0.85)',
    maskMode,
    zOrder: s.zOrder || nextAnnotationZOrder(),
  };
}

function closeAnnotationBitmap(ann) {
  if (ann && ann.type === 'image' && ann.bitmap && typeof ann.bitmap.close === 'function') {
    try { ann.bitmap.close(); } catch (_) {}
  }
}

function clearAnnotationRuntimeResources(list) {
  for (const ann of (list || state.annotations || [])) closeAnnotationBitmap(ann);
}

async function replaceAnnotationFromSerialized(id, ser) {
  const idx = state.annotations.findIndex((a) => a.id === id);
  if (idx < 0) return;
  closeAnnotationBitmap(state.annotations[idx]);
  state.annotations[idx] = await deserializeAnnotation(ser);
  state.selectedAnnotationId = state.annotations[idx].id;
}

function createTextAnnotation(opts) {
  const pos = (opts.x != null && opts.y != null) ? { x: opts.x, y: opts.y } : annotationCenterPoint();
  const ann = {
    id: uuid(), type: 'text',
    text: opts.text || '文字标注',
    x: clamp(pos.x, 0, state.mapCanvas.width),
    y: clamp(pos.y, 0, state.mapCanvas.height),
    fontSize: clamp(Number(opts.fontSize) || ANNOTATION_DEFAULT_TEXT_SIZE, ANNOTATION_MIN_SIZE, 240),
    color: normalizeHex(opts.color || '#ffffff'),
    outlineColor: opts.outlineColor || state.theme.textOutline || 'rgba(0,0,0,0.85)',
    maskMode: normalizeAnnotationMaskMode(opts.maskMode),
    zOrder: nextAnnotationZOrder(),
  };
  clampAnnotationToMap(ann);
  state.annotations.push(ann);
  setSelectedObject('annotation', ann.id, { render: false });
  pushUndo({ type: 'annotation-create', annotation: serializeAnnotation(ann) });
  updateAnnotationsStatus();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
  return ann;
}

async function createImageAnnotationFromFile(file, opts) {
  const bitmap = await createImageBitmap(file);
  const pos = (opts.x != null && opts.y != null) ? { x: opts.x, y: opts.y } : annotationCenterPoint();
  const ratio = bitmap.width / bitmap.height;
  const width = clamp(Number(opts.width) || ANNOTATION_DEFAULT_IMAGE_WIDTH, ANNOTATION_MIN_SIZE, ANNOTATION_MAX_SIZE);
  const ann = {
    id: uuid(), type: 'image',
    blob: file, bitmap,
    x: clamp(pos.x, 0, state.mapCanvas.width),
    y: clamp(pos.y, 0, state.mapCanvas.height),
    width,
    height: width / ratio,
    maskMode: normalizeAnnotationMaskMode(opts.maskMode),
    zOrder: nextAnnotationZOrder(),
  };
  clampAnnotationToMap(ann);
  state.annotations.push(ann);
  setSelectedObject('annotation', ann.id, { render: false });
  pushUndo({ type: 'annotation-create', annotation: serializeAnnotation(ann) });
  updateAnnotationsStatus();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
  return ann;
}

async function modifyAnnotation(id, changes) {
  const ann = state.annotations.find((a) => a.id === id);
  if (!ann) return;
  const before = serializeAnnotation(ann);
  if (ann.type === 'text') {
    if (changes.text !== undefined) ann.text = changes.text || '文字标注';
    if (changes.fontSize !== undefined) ann.fontSize = clamp(Number(changes.fontSize) || ANNOTATION_DEFAULT_TEXT_SIZE, ANNOTATION_MIN_SIZE, 240);
    if (changes.color !== undefined) ann.color = normalizeHex(changes.color || '#ffffff');
  }
  if (changes.maskMode !== undefined) ann.maskMode = normalizeAnnotationMaskMode(changes.maskMode);
  if (changes.width !== undefined) setAnnotationPrimarySize(ann, changes.width);
  clampAnnotationToMap(ann);
  pushUndo({ type: 'annotation-modify', id, before, after: serializeAnnotation(ann) });
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
}

function deleteAnnotation(id) {
  const idx = state.annotations.findIndex((a) => a.id === id);
  if (idx < 0) return;
  const ann = state.annotations[idx];
  state.annotations.splice(idx, 1);
  closeAnnotationBitmap(ann);
  if (state.selectedAnnotationId === id) clearSelection({ render: false });
  pushUndo({ type: 'annotation-delete', annotation: serializeAnnotation(ann) });
  updateAnnotationsStatus();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
}

function deleteSelectedAnnotation() {
  if (state.selectedAnnotationId) deleteAnnotation(state.selectedAnnotationId);
}

function annotationPrimarySize(ann) {
  if (ann.type === 'text') return ann.fontSize || ANNOTATION_DEFAULT_TEXT_SIZE;
  return ann.width || ANNOTATION_DEFAULT_IMAGE_WIDTH;
}

function setAnnotationPrimarySize(ann, size) {
  const next = clamp(Number(size) || annotationPrimarySize(ann), ANNOTATION_MIN_SIZE, ANNOTATION_MAX_SIZE);
  if (ann.type === 'text') {
    ann.fontSize = clamp(next, ANNOTATION_MIN_SIZE, 240);
  } else {
    const ratio = ann.height ? ann.width / ann.height : (ann.bitmap ? ann.bitmap.width / ann.bitmap.height : 1);
    ann.width = next;
    ann.height = next / Math.max(0.01, ratio);
  }
  clampAnnotationToMap(ann);
}

function updateAnnotationsStatus() {
  const el = $('status-annotations');
  if (el) el.textContent = state.annotations.length + ' 标注';
  updateObjectPanel();
}

function updateAnnotationActionBar() {
  const bar = $('annotation-action-bar');
  if (!bar) return;
  const ann = state.annotations.find((a) => a.id === state.selectedAnnotationId);
  if (!ann || !isEditSurface() || !isAnnotationVisible(ann)) {
    bar.classList.remove('visible');
    bar.innerHTML = '';
    return;
  }
  const size = Math.round(annotationPrimarySize(ann));
  bar.innerHTML = '';
  const mask = document.createElement('span');
  mask.style.fontSize = '12px';
  mask.style.color = 'var(--theme-text-muted)';
  mask.textContent = annotationMaskLabel(ann.maskMode);
  const sizeInput = document.createElement('input');
  sizeInput.type = 'range';
  sizeInput.min = String(ANNOTATION_MIN_SIZE);
  sizeInput.max = String(ann.type === 'text' ? 240 : ANNOTATION_MAX_SIZE);
  sizeInput.value = String(size);
  sizeInput.addEventListener('input', () => {
    setAnnotationPrimarySize(ann, parseInt(sizeInput.value, 10));
    scheduleRender('all');
    positionAnnotationActionBar();
    updateObjectPanel();
    triggerDebouncedSave();
  });
  const editBtn = document.createElement('button');
  editBtn.textContent = '编辑';
  editBtn.addEventListener('click', () => openAnnotationEditDialog(ann.id));
  const delBtn = document.createElement('button');
  delBtn.textContent = '删除';
  delBtn.classList.add('danger');
  delBtn.style.background = 'var(--theme-danger)';
  delBtn.style.borderColor = 'var(--theme-danger)';
  delBtn.style.color = '#fff';
  delBtn.addEventListener('click', () => deleteAnnotation(ann.id));
  bar.appendChild(mask);
  bar.appendChild(sizeInput);
  bar.appendChild(editBtn);
  bar.appendChild(delBtn);
  bar.classList.add('visible');
  positionAnnotationActionBar();
}

function positionAnnotationActionBar() {
  const bar = $('annotation-action-bar');
  if (!bar || !bar.classList.contains('visible')) return;
  const ann = state.annotations.find((a) => a.id === state.selectedAnnotationId);
  if (!ann) return;
  const b = annotationBounds(ann);
  const [scx, scy] = mapToScreen(b.x + b.w / 2, b.y);
  const [_, sy2] = mapToScreen(b.x, b.y + b.h);
  let top = scy - 52;
  if (top < 8) top = sy2 + 8;
  bar.style.left = scx + 'px';
  bar.style.top = top + 'px';
  bar.style.transform = 'translateX(-50%)';
}

// ============== 事件 CRUD ==============
function nextEventZOrder() {
  return state.events.reduce((m, e) => Math.max(m, e.zOrder), 0) + 1;
}

function createEvent(opts) {
  // opts: { x, y, icon, title, content, layer }
  const ev = {
    id: uuid(),
    x: clamp(opts.x, 0, state.mapCanvas.width),
    y: clamp(opts.y, 0, state.mapCanvas.height),
    icon: opts.icon,
    title: opts.title || '',
    content: opts.content || '',
    size: EVENT_DEFAULT_SIZE,
    zOrder: nextEventZOrder(),
    layer: (opts.layer === 0 ? 0 : 1),  // 0 = 永远可见；1 = 被事件 fog 遮（默认）
  };
  state.events.push(ev);
  setSelectedObject('event', ev.id, { render: false });
  pushUndo({ type: 'event-create', event: serializeEvent(ev) });
  updateEventsStatus();
  scheduleRender('all');
  triggerImmediateSave();
  return ev;
}

function deleteEvent(id) {
  const idx = state.events.findIndex((e) => e.id === id);
  if (idx < 0) return;
  const ev = state.events[idx];
  pushUndo({ type: 'event-delete', event: serializeEvent(ev) });
  state.events.splice(idx, 1);
  if (state.selectedEventId === id || state.eventCardOpenId === id) clearSelection({ render: false });
  updateEventsStatus();
  refreshSelectionUi();
  scheduleRender('all');
  triggerImmediateSave();
}

async function modifyEvent(id, changes) {
  const ev = state.events.find((e) => e.id === id);
  if (!ev) return;
  const before = serializeEvent(ev);
  if (changes.icon) {
    // 释放旧 image bitmap
    if (ev.icon.type === 'image' && ev.icon.bitmap && ev.icon.bitmap.close) {
      try { ev.icon.bitmap.close(); } catch (_) {}
    }
    ev.icon = changes.icon;
  }
  if (changes.title !== undefined) ev.title = changes.title;
  if (changes.content !== undefined) ev.content = changes.content;
  if (changes.size !== undefined) ev.size = changes.size;
  if (changes.layer !== undefined) ev.layer = (changes.layer === 0 ? 0 : 1);
  pushUndo({ type: 'event-modify', id, before, after: serializeEvent(ev) });
  updateObjectPanel();
  scheduleRender('all');
  triggerImmediateSave();
}

function findTopEventAt(screenX, screenY, pointerType) {
  const threshold = pointerType === 'touch' ? 10 : 4;
  // 先扫 layer 0（永远可见，跳过 fog 检查），再扫 layer 1
  const tryLayer = (layerFilter, skipVisibilityCheck) => {
    const candidates = [];
    const sorted = state.events.slice()
      .filter((e) => (e.layer === 0 ? 0 : 1) === layerFilter)
      .sort((a, b) => b.zOrder - a.zOrder);
    for (const ev of sorted) {
      if (!skipVisibilityCheck && !isEventVisible(ev)) continue;
      const [scx, scy] = mapToScreen(ev.x, ev.y);
      const d = dist(screenX, screenY, scx, scy);
      if (d <= ev.size / 2 + threshold) candidates.push({ ev, d });
    }
    if (!candidates.length) return null;
    candidates.sort((a, b) => a.d - b.d);
    return candidates[0].ev;
  };
  return tryLayer(0, true) || tryLayer(1, false);
}

function isEventVisible(ev) {
  // 检查事件层在该地图坐标的 alpha
  try {
    const px = state.fogLayers.event.ctx.getImageData(
      Math.floor(clamp(ev.x, 0, state.fogLayers.event.canvas.width - 1)),
      Math.floor(clamp(ev.y, 0, state.fogLayers.event.canvas.height - 1)),
      1, 1
    ).data;
    return px[3] < 128;
  } catch (e) { return true; }
}

function serializeEvent(ev) {
  return {
    id: ev.id, x: ev.x, y: ev.y,
    icon: ev.icon.type === 'image'
      ? { type: 'image', blob: ev.icon.blob }
      : (ev.icon.type === 'svg-symbol'
         ? { type: 'svg-symbol', symbolId: ev.icon.symbolId }
         : { type: 'emoji', value: ev.icon.value }),
    title: ev.title, content: ev.content, size: ev.size, zOrder: ev.zOrder,
    layer: (ev.layer === 0 ? 0 : 1),
  };
}

async function deserializeEventIcon(iconSer) {
  if (iconSer.type === 'image') {
    let bitmap = null;
    try { bitmap = await createImageBitmap(iconSer.blob); } catch (e) {}
    return { type: 'image', blob: iconSer.blob, bitmap };
  } else if (iconSer.type === 'svg-symbol') {
    return { type: 'svg-symbol', symbolId: iconSer.symbolId };
  }
  return { type: 'emoji', value: iconSer.value };
}

async function deserializeEvent(s) {
  return {
    id: s.id, x: s.x, y: s.y,
    icon: await deserializeEventIcon(s.icon),
    title: s.title || '', content: s.content || '',
    size: s.size || EVENT_DEFAULT_SIZE,
    zOrder: s.zOrder || nextEventZOrder(),
    layer: (s.layer === 0 ? 0 : 1),  // 旧存档无 layer 字段，默认 1
  };
}

// ============== 事件小卡片 ==============
function showEventCard(eventId) {
  const ev = state.events.find((e) => e.id === eventId);
  if (!ev) return;
  state.eventCardOpenId = eventId;
  const card = $('event-card');
  const iconHTML = ev.icon.type === 'emoji' ? escapeHtml(ev.icon.value)
    : (ev.icon.type === 'image' ? `<img>` : '❓');
  card.innerHTML = `
    <div class="event-card-header">
      <span class="event-card-icon">${iconHTML}</span>
      <span class="event-card-title">${escapeHtml(ev.title || '（未命名）')}</span>
    </div>
    <div class="event-card-content">${escapeHtml(ev.content || '（无描述）')}</div>
    <div class="event-card-actions">
      <button id="evcard-edit">编辑</button>
      <button id="evcard-del" class="danger" style="background: var(--theme-danger); border-color: var(--theme-danger); color: #fff;">删除</button>
    </div>
  `;
  card.classList.add('visible');
  if (ev.icon.type === 'image' && ev.icon.blob) {
    const img = card.querySelector('.event-card-icon img');
    if (img) img.src = URL.createObjectURL(ev.icon.blob);
  }
  positionEventCard();
  $('evcard-edit').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!requireEditSurface()) return;
    hideEventCard();
    openEventEditDialog(null, eventId);
  });
  $('evcard-del').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!requireEditSurface()) return;
    showConfirm('删除事件', `确定删除"${ev.title || '（未命名）'}"？可用 Ctrl+Z 撤销。`, () => {
      deleteEvent(eventId);
    }, { danger: true, yesText: '删除' });
  });
}

function hideEventCard() {
  const card = $('event-card');
  if (!card) return;
  // 清理 image src
  const img = card.querySelector('.event-card-icon img');
  if (img && img.src) try { URL.revokeObjectURL(img.src); } catch (_) {}
  card.classList.remove('visible');
  card.innerHTML = '';
  state.eventCardOpenId = null;
}

function positionEventCard() {
  if (!state.eventCardOpenId) return;
  const ev = state.events.find((e) => e.id === state.eventCardOpenId);
  if (!ev) { hideEventCard(); return; }
  const card = $('event-card');
  const [scx, scy] = mapToScreen(ev.x, ev.y);
  const containerRect = state.mainCanvas.parentElement.getBoundingClientRect();
  // 估算卡片高度
  const cardRect = card.getBoundingClientRect();
  const cardW = cardRect.width || 240;
  const cardH = cardRect.height || 140;
  let left = scx - cardW / 2;
  let top = scy - ev.size / 2 - cardH - 12;
  if (top < 8) top = scy + ev.size / 2 + 12;
  left = clamp(left, 8, containerRect.width - cardW - 8);
  card.style.left = left + 'px';
  card.style.top = top + 'px';
}

// ============== Token 浮动操作条 ==============
function updateTokenActionBar() {
  const bar = $('token-action-bar');
  if (!state.selectedTokenId || !state.isCoarsePointer || !isEditSurface()) {
    bar.classList.remove('visible');
    bar.innerHTML = '';
    return;
  }
  const t = state.tokens.find((x) => x.id === state.selectedTokenId);
  if (!t) { bar.classList.remove('visible'); return; }
  bar.innerHTML = '';
  const sizeInput = document.createElement('input');
  sizeInput.type = 'range';
  sizeInput.min = 20;
  sizeInput.max = Math.floor(state.mapCanvas.width / 2);
  sizeInput.value = Math.round(t.size);
  sizeInput.addEventListener('input', (e) => {
    t.size = parseFloat(e.target.value);
    scheduleRender('all');
    triggerDebouncedSave();
    positionTokenActionBar();
    updateObjectPanel();
  });
  sizeInput.addEventListener('change', () => triggerImmediateSave());
  const editBtn = document.createElement('button');
  editBtn.textContent = '编辑';
  editBtn.addEventListener('click', () => openEditTokenModal(t.id));
  const delBtn = document.createElement('button');
  delBtn.textContent = '删除';
  delBtn.style.background = 'var(--theme-danger)';
  delBtn.style.borderColor = 'var(--theme-danger)';
  delBtn.style.color = '#fff';
  delBtn.addEventListener('click', deleteSelectedToken);
  bar.appendChild(sizeInput);
  bar.appendChild(editBtn);
  bar.appendChild(delBtn);
  bar.classList.add('visible');
  positionTokenActionBar();
}

function positionTokenActionBar() {
  const bar = $('token-action-bar');
  if (!bar.classList.contains('visible')) return;
  const t = state.tokens.find((x) => x.id === state.selectedTokenId);
  if (!t) return;
  const [scx, scy] = mapToScreen(t.x, t.y);
  const halfScreen = (t.size / 2) * state.view.scale;
  let left = scx;
  let top = scy - halfScreen - 52;
  if (top < 8) top = scy + halfScreen + 8;
  bar.style.left = left + 'px';
  bar.style.top = top + 'px';
  bar.style.transform = 'translateX(-50%)';
}

// ============== Pointer 状态机 ==============
function getCanvasOffset() {
  const rect = state.mainCanvas.getBoundingClientRect();
  return { x: rect.left, y: rect.top };
}

function onPointerDown(e) {
  if (state.uiMode === 'modal' || state.uiMode === 'present+modal') return;
  if (!state.hasMap) return;
  state.mainCanvas.setPointerCapture(e.pointerId);
  const off = getCanvasOffset();
  const sx = e.clientX - off.x;
  const sy = e.clientY - off.y;
  const info = {
    id: e.pointerId, type: e.pointerType,
    startX: sx, startY: sy, lastX: sx, lastY: sy,
    role: undefined,
  };
  state.pointers.set(e.pointerId, info);

  if (state.gridCalibration) {
    handleGridCalibrationPointerDown(info, e, sx, sy);
    return;
  }

  // 第二指落下：进入 pinch
  if (state.pointers.size === 2) {
    if (state.activeStroke) onStrokeEnd(false);
    let hadDrag = false;
    for (const [, p] of state.pointers) {
      if (p.role === 'token-drag' || p.role === 'event-drag' || p.role === 'annotation-drag') hadDrag = true;
      p.role = 'pinch';
    }
    if (hadDrag) triggerImmediateSave();
    cancelLongPress();
    enterPinch();
    return;
  }
  if (state.pointers.size >= 3) { info.role = 'ignore'; return; }

  // 中键 / 空格+左键 = pan
  if ((e.pointerType === 'mouse' && e.button === 1) ||
      (e.pointerType === 'mouse' && e.button === 0 && state.spaceHeld)) {
    info.role = 'pan';
    state.panAnchor = { x: state.view.x, y: state.view.y, sx: info.startX, sy: info.startY };
    return;
  }
  // 触屏空格不存在；触屏单指拖动直接走 reveal/cover/event-interact 路径

  // 鼠标右键不再做平移（保留浏览器默认右键菜单），左键 = button 0
  if (e.pointerType === 'mouse' && e.button !== 0) return;

  // Shift + 左键单击 = 创建事件（编辑态）
  if (e.button === 0 && e.shiftKey) {
    if (!requireEditSurface()) return;
    const [mx, my] = screenToMap(sx, sy);
    if (insideMap(mx, my)) {
      info.role = 'create-event';
      info.createMx = mx; info.createMy = my;
    }
    return;
  }

  // placeEventMode 下任何左键点击 = 创建事件
  if (state.placeEventMode) {
    if (!requireEditSurface()) { togglePlaceEventMode(false); return; }
    const [mx, my] = screenToMap(sx, sy);
    if (insideMap(mx, my)) {
      info.role = 'create-event';
      info.createMx = mx; info.createMy = my;
    }
    return;
  }

  // hit-test 优先级：events → tokens → annotations → fog
  const hitEvent = findTopEventAt(sx, sy, e.pointerType);
  if (hitEvent) {
    info.role = 'event-interact';
    info.eventId = hitEvent.id;
    info.eventStartX = hitEvent.x;
    info.eventStartY = hitEvent.y;
    info.dragStartMapX = (sx - state.view.x) / state.view.scale;
    info.dragStartMapY = (sy - state.view.y) / state.view.scale;
    return;
  }

  const [mx, my] = screenToMap(sx, sy);
  const hitToken = findTopTokenAt(mx, my);
  if (hitToken) {
    setSelectedObject('token', hitToken.id, { render: false });
    info.role = isEditSurface() ? 'token-drag' : 'token-select';
    info.tokenId = hitToken.id;
    info.tokenStartX = hitToken.x;
    info.tokenStartY = hitToken.y;
    info.dragStartMapX = mx;
    info.dragStartMapY = my;
    scheduleRender('all');
    return;
  }

  const hitAnnotation = findTopAnnotationAt(mx, my);
  if (hitAnnotation) {
    setSelectedObject('annotation', hitAnnotation.id, { render: false });
    info.role = isEditSurface() ? 'annotation-drag' : 'annotation-select';
    info.annotationId = hitAnnotation.id;
    info.annotationStartX = hitAnnotation.x;
    info.annotationStartY = hitAnnotation.y;
    info.dragStartMapX = mx;
    info.dragStartMapY = my;
    scheduleRender('all');
    return;
  }

  // 空白：触屏长按预备 + 笔刷 stroke
  if (isEditSurface() && (e.pointerType === 'touch' || e.pointerType === 'pen')) {
    startLongPressTimer(info, sx, sy);
  }

  // 取消选中
  if (state.selectedTokenId || state.selectedEventId || state.selectedAnnotationId) {
    clearSelection({ render: false });
  }

  info.role = state.brush.mode;
  onStrokeStart(state.brush.mode === 'reveal-all' ? 'all' : state.currentLayer, state.brush.mode);
  paintBrushAt(sx, sy);
}

function insideMap(mx, my) {
  return mx >= 0 && my >= 0 && mx < state.mapCanvas.width && my < state.mapCanvas.height;
}

function startLongPressTimer(info, sx, sy) {
  cancelLongPress();
  state.longPressInfo = { sx, sy, pointerId: info.id };
  state.longPressTimer = setTimeout(() => {
    if (!state.longPressInfo) return;
    const [mx, my] = screenToMap(sx, sy);
    if (!insideMap(mx, my)) return;
    // 取消正在进行的 stroke
    if (state.activeStroke) {
      // 撤回这一笔的影响（直接重画 tile）
      for (const [, snap] of state.activeStroke.affectedTiles) {
        if (snap.images) {
          for (const layerKey of getStrokeLayerKeys(state.activeStroke)) {
            const img = snap.images[layerKey];
            if (img) state.fogLayers[layerKey].ctx.putImageData(img, snap.rect.x, snap.rect.y);
          }
        } else if (snap.imageData && state.activeStroke.layer !== 'all') {
          state.fogLayers[state.activeStroke.layer].ctx.putImageData(snap.imageData, snap.rect.x, snap.rect.y);
        }
      }
      state.activeStroke = null;
    }
    state.pointers.delete(info.id);
    try { state.mainCanvas.releasePointerCapture(info.id); } catch (_) {}
    cancelLongPress();
    openEventEditDialog(null, null, mx, my);
  }, LONG_PRESS_MS);
}

function cancelLongPress() {
  if (state.longPressTimer) clearTimeout(state.longPressTimer);
  state.longPressTimer = null;
  state.longPressInfo = null;
}

function onPointerMove(e) {
  const off = getCanvasOffset();
  const x = e.clientX - off.x;
  const y = e.clientY - off.y;
  state.cursorScreenX = x;
  state.cursorScreenY = y;
  if (e.pointerType === 'mouse') {
    state.showBrushPreview = state.hasMap && (state.brush.mode === 'reveal' || state.brush.mode === 'cover' || state.brush.mode === 'reveal-all');
    scheduleRender('all');
  }
  // 长按位移取消
  if (state.longPressInfo && state.longPressInfo.pointerId === e.pointerId) {
    if (Math.abs(x - state.longPressInfo.sx) > LONG_PRESS_TOLERANCE ||
        Math.abs(y - state.longPressInfo.sy) > LONG_PRESS_TOLERANCE) {
      cancelLongPress();
    }
  }
  const info = state.pointers.get(e.pointerId);
  if (!info) return;
  if (info.role === 'grid-calibration') {
    moveGridCalibration(info, x, y);
  } else if (state.pointers.size >= 2 && info.role === 'pinch') {
    onPinchMove();
    info.lastX = x; info.lastY = y;
    return;
  } else if (info.role === 'reveal' || info.role === 'cover' || info.role === 'reveal-all') {
    interpolatePaintBrush(info.lastX, info.lastY, x, y);
  } else if (info.role === 'token-drag') {
    const t = state.tokens.find((tt) => tt.id === info.tokenId);
    if (t) {
      const [mx, my] = screenToMap(x, y);
      const dx = mx - info.dragStartMapX;
      const dy = my - info.dragStartMapY;
      t.x = info.tokenStartX + dx;
      t.y = info.tokenStartY + dy;
      clampTokenToMap(t);
      scheduleRender('all');
      positionTokenActionBar();
    }
  } else if (info.role === 'annotation-drag') {
    const ann = state.annotations.find((a) => a.id === info.annotationId);
    if (ann) {
      const [mx, my] = screenToMap(x, y);
      const dx = mx - info.dragStartMapX;
      const dy = my - info.dragStartMapY;
      ann.x = info.annotationStartX + dx;
      ann.y = info.annotationStartY + dy;
      clampAnnotationToMap(ann);
      scheduleRender('all');
      positionAnnotationActionBar();
    }
  } else if (info.role === 'event-interact' || info.role === 'event-drag') {
    // 距起点超过阈值则进入 drag
    const ds = dist(info.startX, info.startY, x, y);
    if (info.role === 'event-interact' && isEditSurface() && ds > EVENT_DRAG_THRESHOLD) {
      info.role = 'event-drag';
    }
    if (info.role === 'event-drag') {
      const ev = state.events.find((e) => e.id === info.eventId);
      if (ev) {
        const [mx, my] = screenToMap(x, y);
        const dx = mx - info.dragStartMapX;
        const dy = my - info.dragStartMapY;
        ev.x = clamp(info.eventStartX + dx, 0, state.mapCanvas.width);
        ev.y = clamp(info.eventStartY + dy, 0, state.mapCanvas.height);
        scheduleRender('all');
      }
    }
  } else if (info.role === 'pan') {
    const dx = x - info.startX;
    const dy = y - info.startY;
    state.view.x = state.panAnchor.x + dx;
    state.view.y = state.panAnchor.y + dy;
    state.viewIsPristineFit = false;
    scheduleRender('all');
    hideEventCard();
  }
  info.lastX = x; info.lastY = y;
}

function onPointerUp(e) {
  const info = state.pointers.get(e.pointerId);
  cancelLongPress();
  if (!info) return;
  if (info.role === 'grid-calibration') {
    if (state.gridCalibration) state.gridCalibration.pointerId = null;
  } else if (info.role === 'reveal' || info.role === 'cover' || info.role === 'reveal-all') {
    onStrokeEnd(false);
  } else if (info.role === 'token-drag') {
    triggerImmediateSave();
  } else if (info.role === 'annotation-drag') {
    const ann = state.annotations.find((a) => a.id === info.annotationId);
    if (ann && (ann.x !== info.annotationStartX || ann.y !== info.annotationStartY)) {
      pushUndo({ type: 'annotation-move', id: ann.id, prevX: info.annotationStartX, prevY: info.annotationStartY });
    }
    triggerImmediateSave();
  } else if (info.role === 'event-drag') {
    const ev = state.events.find((e) => e.id === info.eventId);
    if (ev) pushUndo({ type: 'event-move', id: ev.id, prevX: info.eventStartX, prevY: info.eventStartY });
    triggerImmediateSave();
  } else if (info.role === 'token-select' || info.role === 'annotation-select') {
    // 跑团态只选中查看，不移动或保存对象。
  } else if (info.role === 'event-interact') {
    // 单击：根据是否双击决定
    const now = performance.now();
    const isDouble = state.lastEventClickId === info.eventId &&
                     (now - state.lastEventClickTime) < DBL_CLICK_MS;
    state.lastEventClickId = info.eventId;
    state.lastEventClickTime = now;
    setSelectedObject('event', info.eventId, { render: false, keepEventCard: true });
    if (isDouble && !state.presentMode && isEditSurface()) {
      hideEventCard();
      openEventEditDialog(null, info.eventId);
    } else {
      showEventCard(info.eventId);
    }
    scheduleRender('all');
  } else if (info.role === 'create-event') {
    openEventEditDialog(null, null, info.createMx, info.createMy);
    if (state.placeEventMode) togglePlaceEventMode(false);
  }
  state.pointers.delete(e.pointerId);
  if (state.pointers.size < 2) state.pinchAnchor = null;
  try { state.mainCanvas.releasePointerCapture(e.pointerId); } catch (_) {}
}

function onPointerCancel(e) {
  const info = state.pointers.get(e.pointerId);
  cancelLongPress();
  if (!info) return;
  if (info.role === 'grid-calibration') {
    if (state.gridCalibration) state.gridCalibration.pointerId = null;
  } else if (info.role === 'reveal' || info.role === 'cover' || info.role === 'reveal-all') {
    if (state.activeStroke && state.activeStroke.affectedTiles.size >= 1) onStrokeEnd(true);
    else state.activeStroke = null;
  }
  if (info.role === 'token-drag') {
    const t = state.tokens.find((tt) => tt.id === info.tokenId);
    if (t) { t.x = info.tokenStartX; t.y = info.tokenStartY; scheduleRender('all'); }
  }
  if (info.role === 'annotation-drag') {
    const ann = state.annotations.find((a) => a.id === info.annotationId);
    if (ann) { ann.x = info.annotationStartX; ann.y = info.annotationStartY; scheduleRender('all'); positionAnnotationActionBar(); }
  }
  if (info.role === 'event-drag') {
    const ev = state.events.find((e) => e.id === info.eventId);
    if (ev) { ev.x = info.eventStartX; ev.y = info.eventStartY; scheduleRender('all'); }
  }
  state.pointers.delete(e.pointerId);
  if (state.pointers.size < 2) state.pinchAnchor = null;
  try { state.mainCanvas.releasePointerCapture(e.pointerId); } catch (_) {}
}

function onPointerLeave() {
  state.cursorScreenX = -1000;
  state.cursorScreenY = -1000;
  state.showBrushPreview = false;
  cancelLongPress();
  scheduleRender('all');
}

// ============== 双指 Pinch+Pan ==============
function enterPinch() {
  const ps = [...state.pointers.values()];
  if (ps.length < 2) return;
  const [a, b] = ps;
  const midScreen = { x: (a.lastX + b.lastX) / 2, y: (a.lastY + b.lastY) / 2 };
  const startDist = Math.max(1, dist(a.lastX, a.lastY, b.lastX, b.lastY));
  const [mmx, mmy] = screenToMap(midScreen.x, midScreen.y);
  state.pinchAnchor = { midMapX: mmx, midMapY: mmy, startDist, startScale: state.view.scale };
}
function onPinchMove() {
  const ps = [...state.pointers.values()].filter((p) => p.role === 'pinch');
  if (ps.length < 2 || !state.pinchAnchor) return;
  const [a, b] = ps;
  const midScreen = { x: (a.lastX + b.lastX) / 2, y: (a.lastY + b.lastY) / 2 };
  const d = Math.max(1, dist(a.lastX, a.lastY, b.lastX, b.lastY));
  const factor = d / state.pinchAnchor.startDist;
  const newScale = clamp(state.pinchAnchor.startScale * factor, SCALE_MIN, SCALE_MAX);
  state.view.scale = newScale;
  state.view.x = midScreen.x - state.pinchAnchor.midMapX * newScale;
  state.view.y = midScreen.y - state.pinchAnchor.midMapY * newScale;
  state.viewIsPristineFit = false;
  scheduleRender('all');
  updateZoomStatus();
  hideEventCard();
}

// ============== 滚轮 ==============
function onWheel(e) {
  if (!state.hasMap) return;
  if (state.uiMode === 'modal' || state.uiMode === 'present+modal') return;
  e.preventDefault();
  const off = getCanvasOffset();
  const x = e.clientX - off.x;
  const y = e.clientY - off.y;
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  if (state.gridCalibration) {
    if (e.shiftKey) {
      state.grid.rotation = normalizeGridRotationForType(state.grid.type, (state.grid.rotation || 0) + (e.deltaY > 0 ? -0.5 : 0.5));
    } else {
      state.grid.cellSize = clamp(Math.round(state.grid.cellSize * factor), 20, 240);
    }
    updateGridCalibrationPanel();
    invalidateGridCache();
    scheduleRender('all');
  } else if (isEditSurface() && state.selectedTokenId && !e.shiftKey) {
    const t = state.tokens.find((tt) => tt.id === state.selectedTokenId);
    if (t) {
      const maxSize = Math.min(state.mapCanvas.width, state.mapCanvas.height) / 2;
      t.size = clamp(t.size * factor, BRUSH_MIN, maxSize);
      scheduleRender('all');
      positionTokenActionBar();
      updateObjectPanel();
      triggerDebouncedSave();
    }
  } else if (isEditSurface() && state.selectedAnnotationId && !e.shiftKey) {
    const ann = state.annotations.find((a) => a.id === state.selectedAnnotationId);
    if (ann) {
      setAnnotationPrimarySize(ann, annotationPrimarySize(ann) * factor);
      scheduleRender('all');
      positionAnnotationActionBar();
      updateObjectPanel();
      triggerDebouncedSave();
    }
  } else if (isEditSurface() && state.selectedEventId && !e.shiftKey) {
    const ev = state.events.find((e2) => e2.id === state.selectedEventId);
    if (ev) {
      ev.size = clamp(ev.size * factor, 16, 96);
      scheduleRender('all');
      updateObjectPanel();
      triggerDebouncedSave();
    }
  } else {
    zoomAt(x, y, factor);
    triggerDebouncedSave();
  }
}

// ============== 键盘 ==============
function onKeyDown(e) {
  if (state.gridCalibration && e.key === 'Escape') {
    finishGridCalibration(false);
    e.preventDefault();
    return;
  }
  if (state.gridCalibration && e.key === 'Enter') {
    finishGridCalibration(true);
    e.preventDefault();
    return;
  }
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (state.gridCalibration) {
    e.preventDefault();
    return;
  }

  // Ctrl+Shift+T 主题输入（开发者快捷键）
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 't' || e.key === 'T')) {
    e.preventDefault();
    openThemePrompt();
    return;
  }

  // Space 平移（按住）
  if (e.code === 'Space') {
    if (!state.spaceHeld) {
      state.spaceHeld = true;
      document.body.style.cursor = 'grab';
    }
    e.preventDefault();
    return;
  }

  // 拖 token / 事件 / 标注 时 ESC 还原
  if (e.key === 'Escape') {
    let dragging = null;
    for (const [, p] of state.pointers) {
      if (p.role === 'token-drag' || p.role === 'event-drag' || p.role === 'annotation-drag') { dragging = p; break; }
    }
    if (dragging) {
      if (dragging.role === 'token-drag') {
        const t = state.tokens.find((tt) => tt.id === dragging.tokenId);
        if (t) { t.x = dragging.tokenStartX; t.y = dragging.tokenStartY; scheduleRender('all'); }
      } else if (dragging.role === 'annotation-drag') {
        const ann = state.annotations.find((a) => a.id === dragging.annotationId);
        if (ann) { ann.x = dragging.annotationStartX; ann.y = dragging.annotationStartY; scheduleRender('all'); positionAnnotationActionBar(); }
      } else {
        const ev = state.events.find((e2) => e2.id === dragging.eventId);
        if (ev) { ev.x = dragging.eventStartX; ev.y = dragging.eventStartY; scheduleRender('all'); }
      }
      try { state.mainCanvas.releasePointerCapture(dragging.id); } catch (_) {}
      state.pointers.delete(dragging.id);
      e.preventDefault();
      return;
    }
  }

  // modal 中只处理 ESC 关闭
  if (state.uiMode === 'modal' || state.uiMode === 'present+modal') {
    if (e.key === 'Escape') { e.preventDefault(); closeModal(); }
    return;
  }

  // present 模式与选中态
  if (e.key === 'Escape') {
    if (state.placeEventMode) {
      togglePlaceEventMode(false);
      e.preventDefault();
      return;
    }
    if (state.eventCardOpenId) {
      hideEventCard();
      e.preventDefault();
      return;
    }
    if (state.selectedTokenId || state.selectedEventId || state.selectedAnnotationId) {
      clearSelection();
      e.preventDefault();
      return;
    }
    if (state.presentMode) {
      const now = performance.now();
      if (now - state.lastEscTime < 600) {
        togglePresentMode(false);
        state.lastEscTime = 0;
      } else {
        state.lastEscTime = now;
        showToast('再按一次 Esc 退出演示模式');
      }
      e.preventDefault();
      return;
    }
  }
  if (e.key === 'f' || e.key === 'F') { togglePresentMode(); e.preventDefault(); return; }
  if (e.key === 'e' || e.key === 'E') { setBrushMode('reveal'); e.preventDefault(); return; }
  if (e.key === 'r' || e.key === 'R') { setBrushMode('cover'); e.preventDefault(); return; }
  if (e.key === 'q' || e.key === 'Q') { setBrushMode('reveal-all'); e.preventDefault(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) { undo(); e.preventDefault(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (!isEditSurface()) { showToast('删除对象请先进入编辑态'); e.preventDefault(); return; }
    if (state.selectedEventId) { deleteEvent(state.selectedEventId); e.preventDefault(); return; }
    if (state.selectedTokenId) { deleteSelectedToken(); e.preventDefault(); return; }
    if (state.selectedAnnotationId) { deleteSelectedAnnotation(); e.preventDefault(); return; }
  }
  if (e.key === '1') { setBrushSize(40); e.preventDefault(); return; }
  if (e.key === '2') { setBrushSize(120); e.preventDefault(); return; }
  if (e.key === '3') { setBrushSize(220); e.preventDefault(); return; }
}

function onKeyUp(e) {
  if (e.code === 'Space') {
    state.spaceHeld = false;
    document.body.style.cursor = '';
  }
}

function setLayer(layer) {
  // 切层前若有进行中 stroke，先 commit
  if (state.activeStroke) onStrokeEnd(false);
  state.currentLayer = layer;
  $('btn-layer-terrain').classList.toggle('active', layer === 'terrain');
  $('btn-layer-event').classList.toggle('active', layer === 'event');
  updateModeStatus();
  scheduleRender('all');
  triggerDebouncedSave();
}

function setBrushMode(mode) {
  if (state.activeStroke) onStrokeEnd(false);
  if (!['reveal', 'cover', 'reveal-all'].includes(mode)) mode = 'reveal';
  state.brush.mode = mode;
  $('btn-mode-reveal').classList.toggle('active', mode === 'reveal');
  $('btn-mode-reveal-all').classList.toggle('active', mode === 'reveal-all');
  $('btn-mode-cover').classList.toggle('active', mode === 'cover');
  updateModeStatus();
  scheduleRender('all');
  triggerDebouncedSave();
}

function updateModeStatus() {
  const layer = state.brush.mode === 'reveal-all'
    ? '双层'
    : (state.currentLayer === 'terrain' ? '地形' : '事件');
  const mode = state.brush.mode === 'cover' ? '盖' : (state.brush.mode === 'reveal-all' ? '全揭' : '揭');
  $('status-mode').textContent = `${layer}·${mode}`;
}

function setBrushSize(v) {
  v = clamp(v, BRUSH_MIN, BRUSH_MAX);
  state.brush.sizeScreen = v;
  $('brush-size-input').value = Math.round(v);
  $('brush-size-rail').value = v;
  scheduleRender('all');
  triggerDebouncedSave();
}

function togglePlaceEventMode(force) {
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  const next = (force === undefined) ? !state.placeEventMode : force;
  if (next && !isEditSurface()) { showToast('放置事件请先进入编辑态'); return; }
  const prev = state.placeEventMode;
  state.placeEventMode = next;
  $('btn-place-event').classList.toggle('active', next);
  state.mainCanvas.style.cursor = next ? 'crosshair' : '';
  if (state.activeStroke) onStrokeEnd(false);
  // 状态栏提示
  $('status-place-event').textContent = next ? '🎯 放置事件中 · 点击地图添加 · Esc 退出' : '';
  // 演示模式下也要可见
  $('app').classList.toggle('placing-event', next);
  // 进入时弹一次 toast 强调
  if (next && !prev) showToast('放置事件模式：点击地图添加，Esc 退出', 3000);
}

// ============== 演示模式 ==============
function togglePresentMode(force) {
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  const next = (force === undefined) ? !state.presentMode : force;
  if (next && isEditSurface()) {
    state.surfaceMode = 'live';
    hideObjectPanel();
    updateSurfaceChrome();
  }
  state.presentMode = next;
  $('app').classList.toggle('present-mode', next);
  state.uiMode = next ? 'present' : 'normal';
  if (!next) $('toolbar').classList.remove('peeked');
  hideDropdown();
}
function peekToolbar() {
  $('toolbar').classList.add('peeked');
  clearTimeout(state.toolbarPeekTimer);
  state.toolbarPeekTimer = setTimeout(() => {
    if (state.presentMode) $('toolbar').classList.remove('peeked');
  }, 2500);
}
