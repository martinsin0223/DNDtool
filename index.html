<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>战争迷雾</title>
<style>
/* ============== Theme tokens ============== */
:root {
  --theme-bg: #0a0a0a;
  --theme-bg-panel: #1a1a1a;
  --theme-panel-blur-alpha: 0.85;
  --theme-bg-input: #27272a;
  --theme-border: #3f3f46;
  --theme-text: #e4e4e7;
  --theme-text-muted: #71717a;
  --theme-accent: #3b82f6;
  --theme-danger: #ef4444;
  --theme-warn: #facc15;
  --theme-shadow-color: rgba(0,0,0,0.4);
  --theme-shadow-spread: 0 4px 16px;
  --theme-radius-sm: 4px;
  --theme-radius-md: 8px;
  --theme-radius-lg: 12px;
  --theme-font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --theme-splash-text: #52525b;
  --theme-loading-spinner: #3b82f6;
  color-scheme: dark;
}

/* ============== Reset / 基础 ============== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  position: fixed;
  overscroll-behavior: none;
}
body {
  font-family: var(--theme-font-family);
  background: var(--theme-bg);
  color: var(--theme-text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}
canvas {
  display: block;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
}
button {
  min-height: 36px;
  background: var(--theme-bg-input);
  color: var(--theme-text);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-md);
  padding: 6px 12px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  white-space: nowrap;
}
button:hover { background: color-mix(in srgb, var(--theme-bg-input) 60%, var(--theme-accent) 40%); }
button:focus-visible { outline: 2px solid var(--theme-accent); outline-offset: 2px; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.active { background: var(--theme-accent); border-color: var(--theme-accent); color: #fff; }
button.icon { padding: 6px 10px; }

#app {
  width: 100vw; height: 100vh;
  position: fixed; top: 0; left: 0;
  display: flex; flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ============== Toolbar ============== */
#toolbar {
  min-height: 56px;
  background: var(--theme-bg-panel);
  border-bottom: 1px solid var(--theme-bg-input);
  display: flex;
  align-items: center;
  padding: 8px 12px;
  gap: 8px;
  flex-shrink: 0;
  transition: opacity 250ms, transform 250ms;
  z-index: 30;
  flex-wrap: wrap;
}
.toolbar-divider {
  width: 1px; height: 28px;
  background: var(--theme-border);
  margin: 0 2px;
}
.toolbar-group {
  display: flex; align-items: center; gap: 6px;
}
.toolbar-label { font-size: 12px; color: var(--theme-text-muted); }
#btn-surface-toggle {
  border-color: color-mix(in srgb, var(--theme-accent) 60%, var(--theme-border));
}
#app.surface-edit #btn-surface-toggle {
  background: var(--theme-accent);
  border-color: var(--theme-accent);
  color: #fff;
}
#app.surface-live [data-surface="edit"] { display: none; }

/* ============== Canvas 区 ============== */
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: color-mix(in srgb, var(--theme-bg) 50%, black);
  min-height: 0;
}
#main {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ============== Status bar ============== */
#status-bar {
  height: 24px;
  background: color-mix(in srgb, var(--theme-bg) 80%, black);
  border-top: 1px solid var(--theme-bg-input);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  color: var(--theme-text-muted);
  gap: 16px;
  flex-shrink: 0;
  transition: opacity 200ms, height 200ms, padding 200ms, border-color 200ms;
  overflow: hidden;
}
#status-bar .seg { white-space: nowrap; }
#status-bar .error { color: var(--theme-danger); font-weight: 500; }
#status-bar .toast { color: var(--theme-warn); }

/* ============== Brush rail（触屏右侧竖滑条） ============== */
#brush-rail {
  position: absolute;
  right: 8px;
  top: 12px;
  bottom: 12px;
  width: 36px;
  background: color-mix(in srgb, var(--theme-bg-panel) calc(var(--theme-panel-blur-alpha) * 100%), transparent);
  border-radius: 18px;
  border: 1px solid var(--theme-bg-input);
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  z-index: 8;
  backdrop-filter: blur(6px);
}
@media (pointer: coarse) {
  #brush-rail { display: flex; }
}
#brush-rail input[type="range"] {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
  writing-mode: bt-lr;
  width: 8px;
  flex: 1;
  margin: 8px 0;
}
#brush-rail .label { font-size: 10px; color: var(--theme-text-muted); }

/* ============== Grid calibration ============== */
#grid-calibration-panel {
  position: absolute;
  left: 12px;
  bottom: 12px;
  width: min(420px, calc(100vw - 24px));
  background: color-mix(in srgb, var(--theme-bg-panel) 95%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  padding: 10px 12px;
  z-index: 18;
  display: grid;
  gap: 8px;
  backdrop-filter: blur(8px);
}
#grid-calibration-panel .panel-title {
  font-weight: 600;
  color: var(--theme-text);
}
#grid-calibration-panel .panel-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
#grid-calibration-panel .panel-row input[type="range"] {
  flex: 1;
}
#grid-calibration-panel .panel-meta {
  font-size: 12px;
  color: var(--theme-text-muted);
}
#grid-calibration-panel .panel-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ============== Token / 标注浮动操作条 ============== */
#token-action-bar,
#annotation-action-bar {
  position: absolute;
  background: color-mix(in srgb, var(--theme-bg-panel) 95%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  padding: 6px 8px;
  display: none;
  align-items: center;
  gap: 6px;
  z-index: 9;
  backdrop-filter: blur(8px);
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
}
#token-action-bar.visible,
#annotation-action-bar.visible { display: flex; }
#token-action-bar input[type="range"],
#annotation-action-bar input[type="range"] { width: 100px; }
#token-action-bar button,
#annotation-action-bar button { min-height: 32px; padding: 4px 10px; font-size: 13px; }

/* ============== 编辑态对象侧栏 ============== */
#object-panel {
  position: absolute;
  top: 12px;
  right: 12px;
  bottom: 12px;
  width: min(340px, calc(100vw - 24px));
  background: color-mix(in srgb, var(--theme-bg-panel) 94%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-md);
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  backdrop-filter: blur(8px);
  z-index: 12;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#app.surface-edit:not(.present-mode) #object-panel { display: flex; }
.object-panel-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--theme-bg-input);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.object-panel-title { font-weight: 600; }
.object-panel-meta {
  color: var(--theme-text-muted);
  font-size: 12px;
}
.object-panel-tools {
  border-bottom: 1px solid var(--theme-bg-input);
  padding: 8px;
  display: grid;
  gap: 7px;
}
.object-panel-search {
  width: 100%;
  min-height: 34px;
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  background: var(--theme-bg-input);
  color: var(--theme-text);
  padding: 0 10px;
  font-size: 13px;
}
.object-filter-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}
.object-filter {
  min-height: 30px;
  padding: 0 6px;
  font-size: 12px;
}
.object-filter.active {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 18%, var(--theme-bg-input));
}
.object-panel-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 8px;
}
.object-section-title {
  color: var(--theme-text-muted);
  font-size: 12px;
  padding: 8px 4px 5px;
}
.object-row {
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  color: var(--theme-text);
  border-radius: var(--theme-radius-sm);
  min-height: 48px;
  padding: 6px 6px;
  margin-bottom: 4px;
  display: grid;
  grid-template-columns: 34px 1fr 32px 32px;
  gap: 8px;
  align-items: center;
  text-align: left;
}
.object-row:hover { background: var(--theme-bg-input); }
.object-row.selected {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 22%, transparent);
}
.object-thumb {
  width: 32px;
  height: 32px;
  border-radius: var(--theme-radius-sm);
  background: var(--theme-bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-size: 17px;
}
.object-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.object-main {
  min-width: 0;
  display: grid;
  gap: 2px;
}
.object-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
}
.object-sub {
  color: var(--theme-text-muted);
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.object-locate,
.object-edit {
  width: 32px;
  height: 32px;
  min-height: 32px;
  padding: 0;
  border-radius: var(--theme-radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--theme-text-muted);
}
.object-locate:hover,
.object-edit:hover {
  background: color-mix(in srgb, var(--theme-accent) 18%, transparent);
  color: var(--theme-text);
}
.object-empty {
  color: var(--theme-text-muted);
  font-size: 13px;
  padding: 18px 8px;
  text-align: center;
}

/* ============== 事件小卡片 ============== */
#event-card {
  position: absolute;
  background: color-mix(in srgb, var(--theme-bg-panel) 95%, transparent);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-lg);
  padding: 12px 14px;
  z-index: 11;
  min-width: 220px;
  max-width: 320px;
  box-shadow: var(--theme-shadow-spread) var(--theme-shadow-color);
  backdrop-filter: blur(8px);
  display: none;
}
#event-card.visible { display: block; }
.event-card-header {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 600;
  margin-bottom: 8px;
  word-break: break-all;
}
.event-card-icon {
  font-size: 22px;
  width: 28px; height: 28px;
  display: inline-flex;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.event-card-icon img {
  width: 100%; height: 100%; object-fit: contain;
}
.event-card-content {
  font-size: 13px;
  color: var(--theme-text);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 10px;
  line-height: 1.5;
}
.event-card-actions {
  display: flex; gap: 6px; justify-content: flex-end;
}
.event-card-actions button { min-height: 32px; padding: 4px 10px; font-size: 13px; }

/* ============== Present handle ============== */
#present-handle {
  position: absolute;
  right: 12px;
  bottom: 36px;
  width: 36px;
  height: 36px;
  background: color-mix(in srgb, var(--theme-bg-panel) 50%, transparent);
  border: 1px solid color-mix(in srgb, var(--theme-border) 50%, transparent);
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0.4;
  transition: opacity 200ms;
  font-size: 18px;
  user-select: none;
}
#present-handle:hover { opacity: 1; }

#top-hover-zone {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 24px;
  z-index: 25;
  display: none;
}

/* ============== 演示模式 ============== */
#app.present-mode #toolbar {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-110%);
}
#app.present-mode #toolbar.peeked {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
#app.present-mode #status-bar {
  opacity: 0;
  pointer-events: none;
  height: 0;
  padding: 0;
  border: none;
}
#app.present-mode #brush-rail { opacity: 0.25; }
#app.present-mode #present-handle { display: flex; }
#app.present-mode #top-hover-zone { display: block; }
#app.present-mode .event-card-actions { display: none; }
#app.surface-live .event-card-actions { display: none; }

/* 演示模式下，若 placeEventMode 开着，status-bar 仅显示放置事件提示（其它段隐藏） */
#app.present-mode.placing-event #status-bar {
  opacity: 1;
  height: 24px;
  padding: 0 12px;
  border-top: 1px solid var(--theme-bg-input);
}
#app.present-mode.placing-event #status-bar > .seg { display: none; }
#app.present-mode.placing-event #status-bar > #status-place-event { display: inline; }

/* ============== Dropdown menu ============== */
#dropdown-menu {
  position: absolute;
  background: var(--theme-bg-panel);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-md);
  padding: 4px;
  display: none;
  z-index: 50;
  min-width: 240px;
  box-shadow: 0 8px 24px var(--theme-shadow-color);
}
#dropdown-menu.visible { display: block; }
.menu-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: var(--theme-radius-sm);
  font-size: 14px;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--theme-text);
  text-align: left;
  min-height: 36px;
}
.menu-item:hover { background: var(--theme-bg-input); }
.menu-item.danger { color: var(--theme-danger); }
.menu-item:disabled { opacity: 0.4; cursor: not-allowed; }
.menu-section {
  padding: 8px 12px;
  font-size: 12px;
  color: var(--theme-text-muted);
}
.menu-section input[type="range"] { width: 100%; margin-top: 6px; }
.menu-divider {
  border-top: 1px solid var(--theme-bg-input);
  margin: 4px 0;
}
.fog-color-presets {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.fog-color-btn {
  width: 26px; height: 26px; padding: 0;
  border: 2px solid var(--theme-border);
  border-radius: 50%;
  cursor: pointer;
  min-height: unset; min-width: unset;
  transition: transform 80ms, border-color 80ms;
}
.fog-color-btn:hover { transform: scale(1.1); }
.fog-color-btn.selected {
  border-color: var(--theme-accent);
  transform: scale(1.2);
}
.fog-color-hex {
  flex: 1;
  min-width: 70px;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 4px 8px;
  color: var(--theme-text);
  font-size: 12px;
  font-family: monospace;
}

/* ============== 场景管理 modal ============== */
.scene-list { max-height: 360px; overflow-y: auto; margin: 12px 0; }
.scene-row {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  margin-bottom: 6px;
  gap: 12px;
}
.scene-row.current {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 12%, var(--theme-bg-input));
}
.scene-name { flex: 1; font-size: 14px; font-weight: 500; }
.scene-meta { font-size: 11px; color: var(--theme-text-muted); white-space: nowrap; }
.scene-actions { display: flex; gap: 4px; }
.scene-actions button {
  min-height: 28px;
  padding: 4px 8px;
  font-size: 12px;
}

/* ============== Modal ============== */
#modal-root {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, black 60%, transparent);
  backdrop-filter: blur(4px);
  z-index: 1000;
  padding: 16px;
}
#modal-root.visible { display: flex; }
.modal-card {
  background: color-mix(in srgb, var(--theme-bg-panel) 90%, white 5%);
  border-radius: var(--theme-radius-lg);
  padding: 24px;
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--theme-border);
}
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.modal-desc { font-size: 13px; color: var(--theme-text-muted); margin-bottom: 16px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
  flex-wrap: wrap;
}
.modal-actions button.primary { background: var(--theme-accent); border-color: var(--theme-accent); color: #fff; }
.modal-actions button.primary:hover { background: color-mix(in srgb, var(--theme-accent) 80%, black 20%); }
.modal-actions button.danger { background: var(--theme-danger); border-color: var(--theme-danger); color: #fff; }
.modal-actions button.danger:hover { background: color-mix(in srgb, var(--theme-danger) 80%, black 20%); }

.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 13px; color: var(--theme-text-muted); margin-bottom: 6px; }
.form-row input[type="text"],
.form-row textarea {
  width: 100%;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 10px 12px;
  color: var(--theme-text);
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
}
.form-row textarea { min-height: 96px; max-height: 240px; line-height: 1.5; }
.shape-options, .color-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.option-btn {
  background: var(--theme-bg-input);
  border: 2px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 8px 14px;
  cursor: pointer;
  color: var(--theme-text);
  font-size: 13px;
}
.option-btn.selected {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 30%, var(--theme-bg-input));
}
.color-swatch {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  position: relative;
}
.color-swatch.selected { border-color: var(--theme-text); }
.color-swatch.player { background: var(--theme-accent); }
.color-swatch.enemy { background: var(--theme-danger); border-style: dashed; }
.color-swatch.npc { background: var(--theme-warn); }
.color-swatch.npc::after {
  content: ''; position: absolute; inset: 4px; border-radius: 50%;
  border: 1px solid color-mix(in srgb, black 40%, transparent);
}
.color-swatch.none {
  background: var(--theme-text-muted);
}

/* ============== 事件 icon 选择器 ============== */
.icon-source-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.icon-source-tab {
  flex: 1;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  color: var(--theme-text);
  text-align: center;
}
.icon-source-tab.selected {
  background: color-mix(in srgb, var(--theme-accent) 30%, var(--theme-bg-input));
  border-color: var(--theme-accent);
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}
.emoji-cell {
  background: var(--theme-bg-input);
  border: 2px solid var(--theme-border);
  border-radius: var(--theme-radius-sm);
  padding: 8px 0;
  cursor: pointer;
  font-size: 22px;
  text-align: center;
  user-select: none;
  transition: transform 80ms;
}
.emoji-cell:hover { transform: scale(1.1); }
.emoji-cell.selected {
  border-color: var(--theme-accent);
  background: color-mix(in srgb, var(--theme-accent) 30%, var(--theme-bg-input));
}
.icon-custom-input {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.icon-custom-input input {
  flex: 1;
  background: var(--theme-bg-input);
  border: 1px solid var(--theme-border);

<script>

  presentMode: false,

// 初始化 fogLayers 的 ctx
state.fogLayers.terrain.ctx = state.fogLayers.terrain.canvas.getContext('2d', { willReadFrequently: true });
state.fogLayers.event.ctx = state.fogLayers.event.canvas.getContext('2d', { willReadFrequently: true });

// ============== 工具函数 ==============
const $ = (id) => document.getElementById(id);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const lerp = (a, b, t) => a + (b - a) * t;
const uuid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Math.random().toString(36).slice(2) + Date.now());
function normalizeGridType(type) {
  return type === 'square' ? 'square' : 'hex';
}
function gridRotationLimit(type) {
  return normalizeGridType(type) === 'square' ? 45 : 30;
}
function gridRotationPeriod(type) {
  return normalizeGridType(type) === 'square' ? 90 : 60;
}
function normalizeGridRotation(v) {
  return normalizeGridRotationForType('hex', v);
}
function normalizeGridRotationForType(type, v) {
  const raw = Number(v) || 0;
  const period = gridRotationPeriod(type);
  const limit = period / 2;
  let n = raw;
  n = ((n % period) + period) % period;
  if (n > limit) n -= period;
  if (n === limit && raw < 0) n = -limit;
  return Math.round(n * 10) / 10;
}

// ============== Hex 网格几何（pointy-top） ==============
// size = 顶点到中心距离，宽 = sqrt(3)*size，高 = 2*size
// axial 坐标 (q, r)：q 横向，r 斜向
const SQRT3 = Math.sqrt(3);
function rotateAroundOrigin(x, y, ox, oy, rad) {
  if (!rad) return [x, y];
  const dx = x - ox, dy = y - oy;
  const c = Math.cos(rad), s = Math.sin(rad);
  return [ox + dx * c - dy * s, oy + dx * s + dy * c];
}
function hexCenter(q, r, size, ox, oy, rotation = 0) {
  const x = size * SQRT3 * (q + r / 2) + ox;
  const y = size * 1.5 * r + oy;
  return rotateAroundOrigin(x, y, ox, oy, rotation * Math.PI / 180);
}
function hexAtPoint(x, y, size, ox, oy, rotation = 0) {
  const [ux, uy] = rotateAroundOrigin(x, y, ox, oy, -rotation * Math.PI / 180);
  const px = ux - ox, py = uy - oy;
  // 像素 → fractional axial
  const q = (SQRT3 / 3 * px - py / 3) / size;
  const r = (2 / 3 * py) / size;
  // round to nearest hex (cube round)
  return hexRound(q, r);
}
function hexRound(qf, rf) {
  const sf = -qf - rf;
  let q = Math.round(qf), r = Math.round(rf), s = Math.round(sf);
  const qd = Math.abs(q - qf), rd = Math.abs(r - rf), sd = Math.abs(s - sf);
  if (qd > rd && qd > sd) q = -r - s;
  else if (rd > sd) r = -q - s;
  return { q, r };
}
function hexVertices(cx, cy, size, rotation = 0) {
  // pointy-top：顶点角度从 -30° 开始
  const verts = [];
  for (let i = 0; i < 6; i++) {
    const ang = Math.PI / 180 * (60 * i - 30 + rotation);
    verts.push([cx + size * Math.cos(ang), cy + size * Math.sin(ang)]);
  }
  return verts;
}
function hexPath(ctx, cx, cy, size, rotation = 0) {
  const v = hexVertices(cx, cy, size, rotation);
  ctx.beginPath();
  ctx.moveTo(v[0][0], v[0][1]);
  for (let i = 1; i < 6; i++) ctx.lineTo(v[i][0], v[i][1]);
  ctx.closePath();
}

// ============== 通用网格几何（hex / square） ==============
// square：offset 表示网格线交点原点，cellSize 表示方格边长。
function squareCenter(col, row, size, ox, oy, rotation = 0) {
  const x = ox + (col + 0.5) * size;
  const y = oy + (row + 0.5) * size;
  return rotateAroundOrigin(x, y, ox, oy, rotation * Math.PI / 180);
}
function squareAtPoint(x, y, size, ox, oy, rotation = 0) {
  const [ux, uy] = rotateAroundOrigin(x, y, ox, oy, -rotation * Math.PI / 180);
  return {
    col: Math.floor((ux - ox) / size),
    row: Math.floor((uy - oy) / size),
  };
}
function squareVertices(col, row, size, ox, oy, rotation = 0) {
  const x = ox + col * size;
  const y = oy + row * size;
  const corners = [[x, y], [x + size, y], [x + size, y + size], [x, y + size]];
  const rad = rotation * Math.PI / 180;
  return corners.map(([px, py]) => rotateAroundOrigin(px, py, ox, oy, rad));
}
function pathFromVertices(ctx, verts) {
  ctx.beginPath();
  ctx.moveTo(verts[0][0], verts[0][1]);
  for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0], verts[i][1]);
  ctx.closePath();
}
function gridCellAtPoint(mx, my, grid) {
  const type = normalizeGridType(grid.type);
  const rotation = normalizeGridRotationForType(type, grid.rotation || 0);
  if (type === 'square') {
    const p = squareAtPoint(mx, my, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
    return { type, col: p.col, row: p.row };
  }
  const p = hexAtPoint(mx, my, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  return { type, q: p.q, r: p.r };
}
function gridCellCenter(cell, grid) {
  const type = normalizeGridType(grid.type);
  const rotation = normalizeGridRotationForType(type, grid.rotation || 0);
  if (type === 'square') return squareCenter(cell.col, cell.row, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  return hexCenter(cell.q, cell.r, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
}
function gridCellVertices(cell, grid) {
  const type = normalizeGridType(grid.type);
  const rotation = normalizeGridRotationForType(type, grid.rotation || 0);
  if (type === 'square') return squareVertices(cell.col, cell.row, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  const [cx, cy] = hexCenter(cell.q, cell.r, grid.cellSize, grid.offsetX, grid.offsetY, rotation);
  return hexVertices(cx, cy, grid.cellSize, rotation);

  pathFromVertices(ctx, gridCellVertices(cell, grid));
}

  const verts = gridCellVertices(cell, grid);
  const xs = verts.map((v) => v[0]);
  const ys = verts.map((v) => v[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

}

}

function isEditSurface() { return state.surfaceMode === 'edit'; }
function isLiveSurface() { return state.surfaceMode !== 'edit'; }

function setSurfaceMode(mode) {
  const next = mode === 'edit' ? 'edit' : 'live';
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  if (state.uiMode === 'modal' || state.uiMode === 'present+modal') { showToast('请先关闭当前弹窗'); return; }
  if (next === 'edit' && state.presentMode) togglePresentMode(false);
  state.surfaceMode = next;
  if (next === 'live') {
    if (state.placeEventMode) togglePlaceEventMode(false);
    clearSelection({ render: false });
    hideObjectPanel();
  }
  updateSurfaceChrome();
  refreshSelectionUi();
  hideDropdown();
  scheduleRender('all');
}

function updateSurfaceChrome() {
  const app = $('app');
  if (!app) return;
  app.classList.toggle('surface-edit', isEditSurface());
  app.classList.toggle('surface-live', isLiveSurface());
  const btn = $('btn-surface-toggle');
  if (btn) {
    btn.textContent = isEditSurface() ? '回到跑团' : '编辑';
    btn.title = isEditSurface() ? '回到跑团态' : '进入编辑态';
  }
  const status = $('status-saved');
  if (status) status.dataset.surface = state.surfaceMode;
}

function canUseEditTools() {
  return isEditSurface() && !state.presentMode && !state.gridCalibration &&
    state.uiMode !== 'modal' && state.uiMode !== 'present+modal' && state.uiMode !== 'grid-calibration';
}

function requireEditSurface() {
  if (canUseEditTools()) return true;
  if (state.gridCalibration) showToast('请先完成或取消网格校准');
  else showToast('请先进入编辑态');
  return false;
}

function refreshSelectionUi() {
  updateTokenActionBar();
  updateAnnotationActionBar();
  updateObjectPanel();
}

function getSelectedObject() {
  if (state.selectedTokenId) {
    const item = state.tokens.find((t) => t.id === state.selectedTokenId);
    if (item) return { kind: 'token', item };
  }
  if (state.selectedAnnotationId) {
    const item = state.annotations.find((a) => a.id === state.selectedAnnotationId);
    if (item) return { kind: 'annotation', item };
  }
  if (state.selectedEventId) {
    const item = state.events.find((e) => e.id === state.selectedEventId);
    if (item) return { kind: 'event', item };
  }
  return null;
}

function setSelectedObject(kind, id, opts = {}) {
  state.selectedTokenId = kind === 'token' ? id : null;
  state.selectedAnnotationId = kind === 'annotation' ? id : null;
  state.selectedEventId = kind === 'event' ? id : null;
  if (kind !== 'event' || !opts.keepEventCard) hideEventCard();
  refreshSelectionUi();
  if (opts.locate) locateSelectedObject();
  if (opts.render !== false) scheduleRender('all');
}

function clearSelection(opts = {}) {
  if (!state.selectedTokenId && !state.selectedAnnotationId && !state.selectedEventId && !state.eventCardOpenId) return;
  state.selectedTokenId = null;
  state.selectedAnnotationId = null;
  state.selectedEventId = null;
  if (!opts.keepEventCard) hideEventCard();
  refreshSelectionUi();
  if (opts.render !== false) scheduleRender('all');
}

function hideObjectPanel() {
  const panel = $('object-panel');
  if (panel) panel.innerHTML = '';
}

function objectMaskLabel(kind, item) {
  if (kind === 'event') return item.layer === 0 ? '公开事件' : '受事件雾';
  if (kind === 'annotation') {
    const mode = normalizeAnnotationMaskMode(item.maskMode);
    if (mode === 'terrain') return isAnnotationVisible(item) ? '受地形雾 · 可见' : '受地形雾 · 被遮挡';
    if (mode === 'event') return isAnnotationVisible(item) ? '受事件雾 · 可见' : '受事件雾 · 被遮挡';
    return '公开标注';
  }
  return 'Token';
}

function objectKindLabel(kind) {
  if (kind === 'event') return '事件';
  if (kind === 'token') return 'Token';
  if (kind === 'annotation') return '标注';
  return '对象';
}

function objectTitle(kind, item) {
  if (kind === 'event') return item.title || '（未命名事件）';
  if (kind === 'annotation') {
    if (item.type === 'text') return item.text || '（空文字）';
    return '图片标注';
  }
  return item.name || 'Token';
}

function objectThumb(kind, item) {
  if (kind === 'event') {
    if (item.icon && item.icon.type === 'emoji') return escapeHtml(item.icon.value || '？');
    return '事';
  }
  if (kind === 'annotation') return item.type === 'text' ? '文' : '图';
  return 'T';
}

function objectSizeSummary(kind, item) {
  if (kind === 'event') return `${Math.round(item.size || EVENT_DEFAULT_SIZE)}px`;
  if (kind === 'annotation') return `${Math.round(annotationPrimarySize(item))}px`;
  return `${Math.round(item.size || TOKEN_DEFAULT_SIZE)}px`;
}

function objectMatchesPanelQuery(kind, item, q) {
  if (!q) return true;
  const haystack = [
    objectKindLabel(kind),
    objectTitle(kind, item),
    objectMaskLabel(kind, item),
    objectSizeSummary(kind, item),
    kind === 'event' ? item.content : '',
    kind === 'annotation' && item.type === 'text' ? item.text : '',
  ].join(' ').toLowerCase();
  return haystack.includes(q);
}

function getFilteredObjectPanelItems() {
  const filter = ['all', 'event', 'token', 'annotation'].includes(state.objectPanelFilter)
    ? state.objectPanelFilter
    : 'all';
  const query = String(state.objectPanelQuery || '').trim().toLowerCase();
  const itemsAll = [
    ...state.events.map((item) => ({ kind: 'event', item })),
    ...state.tokens.map((item) => ({ kind: 'token', item })),
    ...state.annotations.map((item) => ({ kind: 'annotation', item })),
  ];
  const items = itemsAll.filter((row) => (
    (filter === 'all' || row.kind === filter) &&
    objectMatchesPanelQuery(row.kind, row.item, query)
  ));
  return { filter, itemsAll, items };
}

function renderObjectPanelList() {
  const panel = $('object-panel');
  const list = $('object-panel-list');
  if (!panel || !list || !isEditSurface()) return;
  const { itemsAll, items } = getFilteredObjectPanelItems();
  const selected = getSelectedObject();
  const sceneName = state.currentSceneId && state.scenes[state.currentSceneId]
    ? (state.scenes[state.currentSceneId].name || '当前场景')
    : '当前场景';
  const meta = $('object-panel-meta');
  if (meta) meta.textContent = `${sceneName} · ${items.length}/${itemsAll.length} 项`;
  list.innerHTML = '';
  if (itemsAll.length === 0) {
    list.innerHTML = '<div class="object-empty">当前场景还没有事件、Token 或标注。</div>';
    return;
  }
  if (items.length === 0) {
    list.innerHTML = '<div class="object-empty">没有匹配的对象。</div>';
    return;
  }
  const sections = [
    ['event', '事件', items.filter((x) => x.kind === 'event')],
    ['token', 'Token', items.filter((x) => x.kind === 'token')],
    ['annotation', '标注', items.filter((x) => x.kind === 'annotation')],
  ];
  for (const [, label, rows] of sections) {
    if (rows.length === 0) continue;
    const title = document.createElement('div');
    title.className = 'object-section-title';
    title.textContent = `${label} · ${rows.length}`;
    list.appendChild(title);
    for (const row of rows) {
      const isSelected = selected && selected.kind === row.kind && selected.item.id === row.item.id;
      const btn = document.createElement('button');
      btn.className = 'object-row' + (isSelected ? ' selected' : '');
      btn.dataset.kind = row.kind;
      btn.dataset.id = row.item.id;
      btn.innerHTML = `
        <span class="object-thumb">${objectThumb(row.kind, row.item)}</span>
        <span class="object-main">
          <span class="object-name">${escapeHtml(objectTitle(row.kind, row.item))}</span>
          <span class="object-sub">${escapeHtml(objectMaskLabel(row.kind, row.item))} · ${escapeHtml(objectSizeSummary(row.kind, row.item))}</span>
        </span>
        <span class="object-locate" title="定位">⌖</span>
        <span class="object-edit" title="编辑">✎</span>
      `;
      btn.addEventListener('click', (e) => {
        const locate = Boolean(e.target.closest('.object-locate'));
        const edit = Boolean(e.target.closest('.object-edit'));
        if (edit) {
          setSelectedObject(row.kind, row.item.id, { render: false });
          editObjectFromPanel(row.kind, row.item.id);
          return;
        }
        setSelectedObject(row.kind, row.item.id, { locate });
      });
      btn.addEventListener('dblclick', () => editObjectFromPanel(row.kind, row.item.id));
      list.appendChild(btn);
    }
  }
}

function updateObjectPanel() {
  const panel = $('object-panel');
  if (!panel || !isEditSurface()) return;
  const { filter } = getFilteredObjectPanelItems();
  const filterTabs = [
    ['all', '全部'],
    ['event', '事件'],
    ['token', 'Token'],
    ['annotation', '标注'],
  ].map(([value, label]) => (
    `<button class="object-filter${filter === value ? ' active' : ''}" data-filter="${value}">${label}</button>`
  )).join('');
  panel.innerHTML = `
    <div class="object-panel-header">
      <div>
        <div class="object-panel-title">对象</div>
        <div id="object-panel-meta" class="object-panel-meta"></div>
      </div>
      <button id="object-panel-live" title="回到跑团态">回到跑团</button>
    </div>
    <div class="object-panel-tools">
      <input id="object-panel-search" class="object-panel-search" type="search" placeholder="搜索对象、内容或遮罩层" value="${escapeHtml(state.objectPanelQuery || '')}">
      <div class="object-filter-tabs">${filterTabs}</div>
    </div>
    <div class="object-panel-list" id="object-panel-list"></div>
  `;
  $('object-panel-live').addEventListener('click', () => setSurfaceMode('live'));
  const search = $('object-panel-search');
  search.addEventListener('input', (e) => {
    state.objectPanelQuery = e.target.value;
    renderObjectPanelList();
  });
  document.querySelectorAll('.object-filter').forEach((btn) => {
    btn.addEventListener('click', () => {
      state.objectPanelFilter = btn.dataset.filter || 'all';
      document.querySelectorAll('.object-filter').forEach((x) => x.classList.toggle('active', x === btn));
      renderObjectPanelList();
    });
  });
  renderObjectPanelList();
}

function editObjectFromPanel(kind, id) {
  if (!requireEditSurface()) return;
  if (kind === 'event') { hideEventCard(); openEventEditDialog(null, id); return; }
  if (kind === 'token') { openEditTokenModal(id); return; }
  if (kind === 'annotation') openAnnotationEditDialog(id);
}

function locateSelectedObject() {
  const selected = getSelectedObject();
  if (!selected || !state.hasMap) return;
  const item = selected.item;
  const rect = state.mainCanvas.parentElement.getBoundingClientRect();
  const panel = $('object-panel');
  const panelShown = panel && getComputedStyle(panel).display !== 'none';
  let panelW = 0;
  let panelH = 0;
  if (panelShown) {
    const panelRect = panel.getBoundingClientRect();
    if (panelRect.height > rect.height * 0.7) panelW = panelRect.width;
    else panelH = panelRect.height;
  }
  const targetCx = Math.max(1, rect.width - panelW) / 2;
  const targetCy = Math.max(1, rect.height - panelH) / 2;
  state.view.x = targetCx - item.x * state.view.scale;
  state.view.y = targetCy - item.y * state.view.scale;
  state.viewIsPristineFit = false;
  updateZoomStatus();
  if (selected.kind === 'event') positionEventCard();
  else hideEventCard();
  scheduleRender('all');
}

function applyRestoredView(savedView, opts = {}) {
  if (opts.fitViewAfterRestore || !savedView) {
    fitView();
    return;
  }
  const scale = Number(savedView.scale);
  const x = Number(savedView.x);
  const y = Number(savedView.y);
  if (!Number.isFinite(scale) || !Number.isFinite(x) || !Number.isFinite(y)) {
    fitView();
    return;
  }
  const clampedScale = clamp(scale, SCALE_MIN, SCALE_MAX);
  const rect = state.mainCanvas.parentElement.getBoundingClientRect();
  const mapW = state.mapCanvas.width * clampedScale;
  const mapH = state.mapCanvas.height * clampedScale;
  const hasVisibleArea = x < rect.width - 24 && y < rect.height - 24 && x + mapW > 24 && y + mapH > 24;
  if (!hasVisibleArea) {
    fitView();
    return;
  }
  state.view = { x, y, scale: clampedScale };
  state.viewIsPristineFit = false;
  updateZoomStatus();
  hideEventCard();
}
function assertFogBitmapMatchesMap(bitmap, label) {
  const w = state.mapCanvas.width;
  const h = state.mapCanvas.height;
  if (!bitmap || bitmap.width !== w || bitmap.height !== h) {
    const got = bitmap ? `${bitmap.width}×${bitmap.height}` : '未知';
    throw new Error(`${label}尺寸 ${got} 与当前地图 ${w}×${h} 不一致`);
  }
}
function drawFogBitmapToLayer(layerKey, bitmap) {
  assertFogBitmapMatchesMap(bitmap, layerKey === 'terrain' ? '地形迷雾' : '事件迷雾');
  const layer = state.fogLayers[layerKey];
  layer.ctx.save();
  layer.ctx.globalCompositeOperation = 'copy';
  layer.ctx.drawImage(bitmap, 0, 0);
  layer.ctx.restore();
}
function assertFogBitmapPairMatchesMap(terrainBmp, eventFogBmp) {
  assertFogBitmapMatchesMap(terrainBmp, '地形迷雾');
  assertFogBitmapMatchesMap(eventFogBmp, '事件迷雾');
}
async function decodeAndValidateFogPair(saved, mapSize) {
  let terrainBmp = null;
  let eventFogBmp = null;
  try {
    terrainBmp = await createImageBitmap(saved.fogLayers.terrain.blob);
    eventFogBmp = await createImageBitmap(saved.fogLayers.event.blob);
    const w = mapSize.w;
    const h = mapSize.h;
    if (terrainBmp.width !== w || terrainBmp.height !== h) {
      throw new Error(`地形迷雾尺寸 ${terrainBmp.width}×${terrainBmp.height} 与当前地图 ${w}×${h} 不一致`);
    }
    if (eventFogBmp.width !== w || eventFogBmp.height !== h) {
      throw new Error(`事件迷雾尺寸 ${eventFogBmp.width}×${eventFogBmp.height} 与当前地图 ${w}×${h} 不一致`);
    }
    return { terrainBmp, eventFogBmp };
  } catch (e) {
    if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
    if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
    throw e;
  }
}
function loadImageElementFromBlob(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(blob);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('图片格式不支持'));
    };
    img.src = objectUrl;
  });
}
async function prepareMapFromBlob(blob, opts = {}) {
  const img = await loadImageElementFromBlob(blob);
  let w = img.naturalWidth || img.width;
  let h = img.naturalHeight || img.height;
  const originalW = w, originalH = h;
  if (Math.max(w, h) > MAP_MAX_DIMENSION) {
    const ratio = MAP_MAX_DIMENSION / Math.max(w, h);
    w = Math.floor(w * ratio);
    h = Math.floor(h * ratio);
    if (opts.showDownsampleToast) showToast(`地图已降采样到 ${w}×${h} 以适配设备`);
  }
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  return { canvas, w, h, originalW, originalH, downsampled: w !== originalW || h !== originalH };
}
function commitPreparedMap(prepared) {
  if (state.mapImage && typeof state.mapImage.close === 'function') {
    try { state.mapImage.close(); } catch (_) {}
  }
  state.mapCanvas.width = prepared.w;
  state.mapCanvas.height = prepared.h;
  state.fogLayers.terrain.canvas.width = prepared.w;
  state.fogLayers.terrain.canvas.height = prepared.h;
  state.fogLayers.event.canvas.width = prepared.w;
  state.fogLayers.event.canvas.height = prepared.h;
  state.mapCtx = state.mapCanvas.getContext('2d');
  state.fogLayers.terrain.ctx = state.fogLayers.terrain.canvas.getContext('2d', { willReadFrequently: true });
  state.fogLayers.event.ctx = state.fogLayers.event.canvas.getContext('2d', { willReadFrequently: true });
  state.mapCtx.drawImage(prepared.canvas, 0, 0);
  state.mapImage = null;
  state.hasMap = true;
  $('splash').style.display = 'none';
  invalidateGridCache();
}
async function loadMapBlobIntoCanvases(blob, opts = {}) {
  const prepared = await prepareMapFromBlob(blob, opts);
  commitPreparedMap(prepared);
  return prepared;
}

// ============== Theme ==============
function validateTheme(obj) {
  const result = { ok: true, missing: [], extra: [] };
  for (const k of Object.keys(DEFAULT_DARK_THEME)) {
    if (obj[k] === undefined) { result.missing.push(k); result.ok = false; }
  }
  for (const k of Object.keys(obj)) {
    if (!(k in DEFAULT_DARK_THEME) && !OPTIONAL_THEME_FIELDS.has(k)) {
      result.extra.push(k);
    }
  }
  return result;
}

function applyTheme(theme) {
  // 同帧提交：CSS 变量与 Canvas 重绘一帧内完成
  requestAnimationFrame(() => {
    state.theme = theme;
    const root = document.documentElement;
    root.style.setProperty('--theme-bg', theme.bg);
    root.style.setProperty('--theme-bg-panel', theme.bgPanel);
    root.style.setProperty('--theme-panel-blur-alpha', String(theme.panelBlurAlpha));
    root.style.setProperty('--theme-bg-input', theme.bgInput);
    root.style.setProperty('--theme-border', theme.border);
    root.style.setProperty('--theme-text', theme.text);
    root.style.setProperty('--theme-text-muted', theme.textMuted);
    root.style.setProperty('--theme-accent', theme.accent);
    root.style.setProperty('--theme-danger', theme.danger);
    root.style.setProperty('--theme-warn', theme.warn);
    root.style.setProperty('--theme-shadow-color', theme.shadowColor);
    root.style.setProperty('--theme-shadow-spread', theme.shadowSpread);
    root.style.setProperty('--theme-radius-sm', theme.radiusSm + 'px');
    root.style.setProperty('--theme-radius-md', theme.radiusMd + 'px');
    root.style.setProperty('--theme-radius-lg', theme.radiusLg + 'px');
    root.style.setProperty('--theme-font-family', theme.fontFamily);
    root.style.setProperty('--theme-splash-text', theme.splashTextColor);
    root.style.setProperty('--theme-loading-spinner', theme.loadingSpinnerColor);
    root.style.setProperty('color-scheme', 'dark');
    scheduleRender('all');
  });
}

function loadCustomTheme(custom) {
  const merged = Object.assign({}, DEFAULT_DARK_THEME, custom || {});
  if (custom && custom.semantic) merged.semantic = Object.assign({}, DEFAULT_DARK_THEME.semantic, custom.semantic);
  const v = validateTheme(merged);
  if (!v.ok) {
    console.warn('Theme missing fields, fallback to default:', v.missing);
    applyTheme(DEFAULT_DARK_THEME);
    return;
  }
  applyTheme(merged);
}

function openThemePrompt() {
  // Ctrl+Shift+T 开发者快捷键，输入 JSON 切主题
  const json = prompt('粘贴主题 JSON（取消恢复默认主题）');
  if (json === null) return;
  if (!json.trim()) { applyTheme(DEFAULT_DARK_THEME); showToast('已恢复默认主题'); return; }
  try {
    const partial = JSON.parse(json);
    loadCustomTheme(partial);
    showToast('主题已应用');
  } catch (e) { alert('JSON 解析失败: ' + e.message); }
}

// 为 Token 描边色返回主题色（按 v1.3 兼容写死的色 → 映射到 theme.semantic）
function semanticColorOf(borderColor) {
  if (!borderColor) return null;
  // preserveSemanticHue=true（默认）→ 保留 token 上传时选的 hex，主题切换不改
  // false → 主题包提供的 semantic 色生效
  if (state.theme.preserveSemanticHue) return borderColor;
  const map = {
    '#3b82f6': state.theme.semantic.player,
    '#ef4444': state.theme.semantic.enemy,
    '#eab308': state.theme.semantic.npc,
  };
  return map[borderColor] || borderColor;
}

// ============== IndexedDB ==============
const migrations = {
  1: (db) => {
    if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
  },
  2: (db) => {
    // schema 不变，数据迁移在 loadAndMigrate 中做
    if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
  },
};

const dbPromise = new Promise((resolve) => {
  let req;
  try { req = indexedDB.open(DB_NAME, SCHEMA_VERSION); }
  catch (e) { setStatusError('无法保存（IDB 不可用）'); state.dbReady = true; resolve(null); return; }
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    for (let v = e.oldVersion + 1; v <= SCHEMA_VERSION; v++) {
      if (migrations[v]) migrations[v](db);
    }
  };
  req.onsuccess = () => {
    state.db = req.result;
    state.dbReady = true;
    resolve(req.result);
  };
  req.onerror = () => {
    setStatusError('无法保存（IDB 不可用）');
    state.dbReady = true;
    resolve(null);
  };
});

function ensureDb() { return dbPromise; }

function idbGet(key) {
  return new Promise((resolve, reject) => {
    if (!state.db) return resolve(null);
    const tx = state.db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

function idbPut(key, value) {
  return new Promise((resolve, reject) => {
    if (!state.db) return resolve();
    try {
      const tx = state.db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
      tx.onerror = () => reject(tx.error);
    } catch (e) { reject(e); }
  });
}

function idbDelete(key) {
  return new Promise((resolve) => {
    if (!state.db) return resolve();
    try {
      const tx = state.db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    } catch (e) { resolve(); }
  });
}

// ============== v1 → v2 迁移 ==============
async function migrateV1ToV2(saved) {
  // 用 fogBlob 解码取尺寸（必然 = mapCanvas 尺寸）
  const bitmap = await createImageBitmap(saved.fogBlob);
  const w = bitmap.width, h = bitmap.height;
  // 同尺寸全黑 event blob
  const blackCanvas = document.createElement('canvas');
  blackCanvas.width = w; blackCanvas.height = h;
  const bctx = blackCanvas.getContext('2d');
  bctx.fillStyle = '#000';
  bctx.fillRect(0, 0, w, h);
  const eventBlob = await new Promise((r) => blackCanvas.toBlob((b) => r(b), 'image/png'));
  if (!eventBlob) throw new Error('无法生成事件层迁移数据');
  const newSaved = { ...saved };
  newSaved.fogLayers = {
    terrain: { blob: saved.fogBlob },
    event:   { blob: eventBlob },
  };
  delete newSaved.fogBlob;
  newSaved.events = [];
  newSaved.version = 2;
  return newSaved;
}

// ============== v2 → v3 迁移（多场景化） ==============
// v2 saved 是单场景。v3 main = { scenes: {id: SceneData}, currentSceneId, ... }
function migrateV2ToV3(v2Saved) {
  const sceneId = uuid();
  const scene = {
    // v2 saved 内部结构原样保留
    ...v2Saved,
    // v3 scene 元数据
    mapBlob: null,  // v2 没存图，迁移后用户需重新选地图（fog/tokens/events 会等待对接）
    name: '场景 1',
    createdAt: v2Saved.ts || Date.now(),
    lastUsedAt: v2Saved.ts || Date.now(),
  };
  return {
    version: 3,
    scenes: { [sceneId]: scene },
    currentSceneId: sceneId,
    themeId: v2Saved.themeId || 'default-dark',
    customTheme: v2Saved.customTheme || null,
    ts: Date.now(),
  };
}

async function loadAndMigrateMain() {
  const saved = await idbGet('main');
  if (!saved) return null;
  try {
    let s = saved;
    if (!s.version || s.version === 1) s = await migrateV1ToV2(s);
    if (s.version === 2) s = migrateV2ToV3(s);
    if (s !== saved) await idbPut('main', s);
    return s;
  } catch (e) {
    console.warn('存档迁移失败，保留旧数据', e);
    showToast('存档迁移失败，已保留旧数据', 6000);
    return null;
  }
}

// ============== 持久化串行队列 ==============
function triggerImmediateSave() {
  state.saveQueue = state.saveQueue.then(doSaveMain).catch((e) => {
    if (e && e.name === 'QuotaExceededError') setStatusError('存储已满，自动备份失败');
    else { console.warn('save error', e); setStatusError('保存失败：' + (e && e.message || e)); }
  });
  return state.saveQueue;
}
async function saveMainStrict() {
  await ensureDb();
  await state.saveQueue;
  await doSaveMain();
}
function triggerDebouncedSave() {
  clearTimeout(state.debouncedSaveTimer);
  state.debouncedSaveTimer = setTimeout(triggerImmediateSave, 500);
}
function flushAllPendingSaves() {
  clearTimeout(state.debouncedSaveTimer);
  return state.saveQueue;
}

async function canvasToBlob(canvas) {
  return new Promise((resolve) => canvas.toBlob((b) => resolve(b), 'image/png'));
}

// 把当前渲染层 state 序列化为 v2-saved 格式的 scene 内容
async function serializeActiveSceneData() {
  const terrainBlob = await canvasToBlob(state.fogLayers.terrain.canvas);
  const eventFogBlob = await canvasToBlob(state.fogLayers.event.canvas);
  if (!terrainBlob || !eventFogBlob) return null;
  const tokensSerialized = state.tokens.map((t) => ({
    id: t.id, blob: t.blob, shape: t.shape, borderColor: t.borderColor,
    borderPattern: t.borderPattern, name: t.name,
    x: t.x, y: t.y, size: t.size, zOrder: t.zOrder,
  }));
  const eventsSerialized = state.events.map((ev) => ({
    id: ev.id, x: ev.x, y: ev.y,
    icon: ev.icon.type === 'image'
      ? { type: 'image', blob: ev.icon.blob }
      : (ev.icon.type === 'svg-symbol' ? { type: 'svg-symbol', symbolId: ev.icon.symbolId }
         : { type: 'emoji', value: ev.icon.value }),
    title: ev.title, content: ev.content, size: ev.size, zOrder: ev.zOrder,
    layer: (ev.layer === 0 ? 0 : 1),
  }));
  const annotationsSerialized = state.annotations.map(serializeAnnotation);
  return {
    version: 2,  // scene 内部仍按 v2 saved 结构（向后兼容）
    fogLayers: {
      terrain: { blob: terrainBlob },
      event:   { blob: eventFogBlob },
    },
    mapSize: { w: state.mapCanvas.width, h: state.mapCanvas.height },
    tokens: tokensSerialized,
    events: eventsSerialized,
    annotations: annotationsSerialized,
    view: { ...state.view },
    settings: {
      brushSize: state.brush.sizeScreen,
      brushMode: state.brush.mode,
      currentLayer: state.currentLayer,
      fogOpacity: state.fogOpacity,
      terrainFogOpacity: state.terrainFogOpacity,
      eventFogOpacity: state.eventFogOpacity,
      terrainFogColor: state.terrainFogColor,
      eventFogColor: state.eventFogColor,
      grid: { ...state.grid },  // v3.1
    },
    mapFingerprint: state.mapFingerprint,
    ts: Date.now(),
  };
}

async function syncActiveSceneToMemory() {
  if (!state.hasMap || !state.currentSceneId) return false;
  const sceneCore = await serializeActiveSceneData();
  if (!sceneCore) return false;
  const prev = state.scenes[state.currentSceneId] || {};
  state.scenes[state.currentSceneId] = {
    ...sceneCore,
    mapBlob: prev.mapBlob || null,
    name: prev.name || '场景 1',
    createdAt: prev.createdAt || Date.now(),
    lastUsedAt: Date.now(),
  };
  return true;
}

async function doSaveMain() {
  if (!state.dbReady) return;
  if (!state.currentSceneId) return;  // 没场景就不写
  if (state.hasMap) {
    // 把当前 active state 写到 state.scenes[currentSceneId]
    const ok = await syncActiveSceneToMemory();
    if (!ok) return;
  }
  const isDefault = state.theme === DEFAULT_DARK_THEME;
  const main = {
    version: SCHEMA_VERSION,
    scenes: state.scenes,
    currentSceneId: state.currentSceneId,
    themeId: 'default-dark',
    customTheme: isDefault ? null : state.theme,
    ts: Date.now(),
  };
  await idbPut('main', main);
  setStatusSaved('已保存 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false }));
  updateSceneStatus();
}

async function saveCheckpoint() {
  if (!state.dbReady || !state.hasMap) return;
  const terrainBlob = await canvasToBlob(state.fogLayers.terrain.canvas);
  const eventFogBlob = await canvasToBlob(state.fogLayers.event.canvas);
  if (!terrainBlob || !eventFogBlob) return;
  const ts = Date.now();
  state.checkpoints.push({ ts, terrainBlob, eventFogBlob });
  if (state.checkpoints.length > CHECKPOINT_LIMIT) state.checkpoints.shift();
  for (let i = 0; i < state.checkpoints.length; i++) {
    await idbPut('checkpoint-' + i, state.checkpoints[i]).catch(() => {});
  }
}

async function loadCheckpoints() {
  state.checkpoints = [];
  for (let i = 0; i < CHECKPOINT_LIMIT; i++) {
    const c = await idbGet('checkpoint-' + i);
    if (c) state.checkpoints.push(c);
  }
}

async function clearAllData() {
  if (!state.db) return;
  await idbDelete('main');
  for (let i = 0; i < CHECKPOINT_LIMIT; i++) await idbDelete('checkpoint-' + i);
  state.scenes = {};
  state.currentSceneId = null;
}

async function clearCheckpoints() {
  for (let i = 0; i < CHECKPOINT_LIMIT; i++) await idbDelete('checkpoint-' + i);
  state.checkpoints = [];
  setStatusError('');
  showToast('已清理全部 Checkpoint');
}

// ============== 导出 / 导入项目 ==============
// 不含地图本身（用户自己传地图文件）。
// schemaVersion 2 = 旧单场景 fogsave（只保留导入兼容）
// schemaVersion 3 = 全部场景 fogbundle（当前主流程）
const EXPORT_SCHEMA_VERSION = 2;
const BUNDLE_EXPORT_SCHEMA_VERSION = 3;

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    if (!blob) return resolve(null);
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);  // 'data:image/png;base64,xxx'
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

async function base64ToBlob(dataUrl) {
  if (!dataUrl) return null;
  // 通过 fetch 把 data URL 转回 Blob（浏览器原生，无依赖）
  const res = await fetch(dataUrl);
  return await res.blob();
}

async function serializeSceneForBundle(sceneId, scene) {
  if (!scene || !scene.fogLayers?.terrain?.blob || !scene.fogLayers?.event?.blob) {
    throw new Error(`场景"${scene?.name || sceneId || '未命名'}"缺少迷雾数据，无法导出全部场景`);
  }
  const [terrainB64, eventFogB64] = await Promise.all([
    blobToBase64(scene.fogLayers.terrain.blob),
    blobToBase64(scene.fogLayers.event.blob),
  ]);
  const tokensExported = await Promise.all((scene.tokens || []).map(async (t) => ({
    id: t.id,
    blob: await blobToBase64(t.blob),
    shape: t.shape, borderColor: t.borderColor, borderPattern: t.borderPattern,
    name: t.name, x: t.x, y: t.y, size: t.size, zOrder: t.zOrder,
  })));
  const eventsExported = await Promise.all((scene.events || []).map(async (ev) => {
    const icon = ev.icon || { type: 'emoji', value: '❓' };
    const iconSer = icon.type === 'image'
      ? { type: 'image', blob: await blobToBase64(icon.blob) }
      : (icon.type === 'svg-symbol'
         ? { type: 'svg-symbol', symbolId: icon.symbolId }
         : { type: 'emoji', value: icon.value });
    return {
      id: ev.id, x: ev.x, y: ev.y, icon: iconSer,
      title: ev.title, content: ev.content, size: ev.size, zOrder: ev.zOrder,
      layer: (ev.layer === 0 ? 0 : 1),
    };
  }));
  const annotationsExported = await Promise.all((scene.annotations || []).map(async (ann) => {
    const ser = serializeAnnotation(ann);
    if (ser.type === 'image') ser.blob = await blobToBase64(ann.blob);
    return ser;
  }));
  return {
    sceneId,
    name: scene.name || '场景',
    createdAt: scene.createdAt || null,
    lastUsedAt: scene.lastUsedAt || scene.ts || null,
    mapFingerprint: scene.mapFingerprint || null,
    mapSize: scene.mapSize || null,
    fogLayers: { terrain: { base64: terrainB64 }, event: { base64: eventFogB64 } },
    tokens: tokensExported,
    events: eventsExported,
    annotations: annotationsExported,
    view: scene.view || null,
    settings: scene.settings || {},
  };
}

async function exportProject() {
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  if (!state.hasMap) { showToast('请先加载地图'); return; }
  setLoading('正在打包全部场景…');
  try {
    await syncActiveSceneToMemory();
    const sceneEntries = Object.entries(state.scenes || {});
    const scenes = [];
    for (const [sceneId, scene] of sceneEntries) {
      const packed = await serializeSceneForBundle(sceneId, scene);
      scenes.push(packed);
    }
    if (!scenes.length) throw new Error('没有可导出的场景');
    // 主题：仅在非默认时导出
    const isDefaultTheme = state.theme === DEFAULT_DARK_THEME;
    const payload = {
      format: 'fog-of-war-map.fogbundle',
      schemaVersion: BUNDLE_EXPORT_SCHEMA_VERSION,
      appVersion: 'v3.7.1',
      exportedAt: new Date().toISOString(),
      sceneCount: scenes.length,
      currentSceneId: state.currentSceneId,
      scenes,
      themeId: 'default-dark',
      customTheme: isDefaultTheme ? null : state.theme,
    };
    const json = JSON.stringify(payload);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = url;
    a.download = `战争迷雾-全部场景-${ts}.fogbundle.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    hideLoading();
    const sizeMB = (blob.size / 1024 / 1024).toFixed(1);
    showToast(`已导出 ${scenes.length} 个场景（${sizeMB} MB）`, 3500);
  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('导出失败：' + (e.message || e));
  }
}

function mapFingerprintForPreparedFile(file, prepared) {
  return `${file.name}-${file.size}-${file.lastModified || 0}-${prepared.w}x${prepared.h}`;
}

async function bundleScenePayloadToSaved(scenePayload) {
  if (!scenePayload?.fogLayers?.terrain?.base64 || !scenePayload?.fogLayers?.event?.base64) {
    throw new Error(`场景"${scenePayload?.name || '未命名'}" fog 数据缺失`);
  }
  const terrainBlob = await base64ToBlob(scenePayload.fogLayers.terrain.base64);
  const eventFogBlob = await base64ToBlob(scenePayload.fogLayers.event.base64);
  if (!terrainBlob || !eventFogBlob) throw new Error(`场景"${scenePayload.name || '未命名'}" fog 数据解码失败`);
  const tokens = await Promise.all((scenePayload.tokens || []).map(async (t) => ({
    ...t,
    blob: await base64ToBlob(t.blob),
  })));
  const events = await Promise.all((scenePayload.events || []).map(async (ev) => {
    const icon = ev.icon || { type: 'emoji', value: '❓' };
    let restoredIcon = icon;
    if (icon.type === 'image') restoredIcon = { type: 'image', blob: await base64ToBlob(icon.blob) };
    return { ...ev, icon: restoredIcon };
  }));
  const annotations = await Promise.all((scenePayload.annotations || []).map(async (ann) => {
    if (ann.type === 'image') return { ...ann, blob: await base64ToBlob(ann.blob) };
    return ann;
  }));
  return {
    version: 2,
    fogLayers: {
      terrain: { blob: terrainBlob },
      event: { blob: eventFogBlob },
    },
    mapSize: scenePayload.mapSize || null,
    tokens,
    events,
    annotations,
    view: scenePayload.view || null,
    settings: scenePayload.settings || {},
    mapFingerprint: scenePayload.mapFingerprint || null,
    ts: Date.now(),
  };
}

function openSceneBundleImportWizard(payload) {
  const scenes = Array.isArray(payload.scenes) ? payload.scenes : [];
  if (!scenes.length) {
    showConfirm('场景包为空', '这个场景包没有可导入的场景。', closeModal);
    return;
  }
  const rows = scenes.map((s, i) => {
    const size = s.mapSize ? `${s.mapSize.w}×${s.mapSize.h}` : '未知尺寸';
    const name = escapeHtml(s.name || `场景 ${i + 1}`);
    return `
      <div class="scene-row" data-bundle-scene="${i}">
        <div style="flex:1;min-width:0;">
          <div class="scene-name">${name}</div>
          <div class="scene-meta">地图 ${escapeHtml(size)} · 选择本机地图，不选则跳过</div>
        </div>
        <input class="bundle-map-input" data-index="${i}" type="file" accept="image/png,image/jpeg,image/jpg,image/webp" style="max-width:210px;">
      </div>
    `;
  }).join('');
  showModal(`
    <div class="modal-title">导入全部场景</div>
    <div class="modal-desc">导出文件不包含地图原图。请为要导入的场景选择本机地图；尺寸必须与该场景迷雾一致。未选择地图的场景会跳过。</div>
    <div class="scene-list">${rows}</div>
    <div class="modal-actions">
      <button id="bundle-import-cancel">取消</button>
      <button id="bundle-import-confirm" class="primary">导入已选择场景</button>
    </div>
  `, {
    onMounted: () => {
      const selectedFiles = new Array(scenes.length).fill(null);
      document.querySelectorAll('.bundle-map-input').forEach((input) => {
        input.addEventListener('change', (e) => {
          const idx = Number(e.target.dataset.index);
          selectedFiles[idx] = e.target.files && e.target.files[0] ? e.target.files[0] : null;
        });
      });
      $('bundle-import-cancel').addEventListener('click', closeModal);
      $('bundle-import-confirm').addEventListener('click', () => {
        if (!selectedFiles.some(Boolean)) {
          showToast('请至少为一个场景选择地图');
          return;
        }
        closeModal();
        doImportSceneBundle(payload, selectedFiles);
      });
    }
  });
}

async function doImportSceneBundle(payload, selectedFiles) {
  setLoading('正在导入场景包…');
  const scenes = Array.isArray(payload.scenes) ? payload.scenes : [];
  const preparedEntries = [];
  try {
    await syncActiveSceneToMemory();
    for (let i = 0; i < scenes.length; i++) {
      const file = selectedFiles[i];
      if (!file) continue;
      const scenePayload = scenes[i];
      const preparedMap = await prepareMapFromBlob(file, { showDownsampleToast: true });
      if (scenePayload.mapSize && (scenePayload.mapSize.w !== preparedMap.w || scenePayload.mapSize.h !== preparedMap.h)) {
        throw new Error(`场景"${scenePayload.name || i + 1}"地图尺寸不匹配：需要 ${scenePayload.mapSize.w}×${scenePayload.mapSize.h}，当前 ${preparedMap.w}×${preparedMap.h}`);
      }
      const saved = await bundleScenePayloadToSaved(scenePayload);
      const pair = await decodeAndValidateFogPair(saved, { w: preparedMap.w, h: preparedMap.h });
      if (pair.terrainBmp && typeof pair.terrainBmp.close === 'function') pair.terrainBmp.close();
      if (pair.eventFogBmp && typeof pair.eventFogBmp.close === 'function') pair.eventFogBmp.close();
      const newId = uuid();
      const mapFingerprint = mapFingerprintForPreparedFile(file, preparedMap);
      preparedEntries.push({
        newId,
        preparedMap,
        scene: {
          ...saved,
          mapBlob: file,
          mapFingerprint,
          mapSize: { w: preparedMap.w, h: preparedMap.h },
          name: scenePayload.name || `导入场景 ${preparedEntries.length + 1}`,
          createdAt: Date.now(),
          lastUsedAt: Date.now(),
          importedFromSceneId: scenePayload.sceneId || null,
        },
      });
    }
    if (!preparedEntries.length) throw new Error('没有选择可导入的场景');
    const preferred = preparedEntries.find((entry) => entry.scene.importedFromSceneId && entry.scene.importedFromSceneId === payload.currentSceneId)
      || preparedEntries[0];
    const preferredPreparedRestore = await prepareSavedRestore(preferred.scene, preferred.scene.mapSize);
    for (const entry of preparedEntries) {
      state.scenes[entry.newId] = entry.scene;
    }
    state.currentSceneId = preferred.newId;
    state.mapFingerprint = preferred.scene.mapFingerprint;
    commitPreparedMap(preferred.preparedMap);
    applyPreparedRestore(preferredPreparedRestore, { fitViewAfterRestore: true });
    if (Object.prototype.hasOwnProperty.call(payload, 'customTheme')) {
      try {
        if (payload.customTheme) loadCustomTheme(payload.customTheme);
        else applyTheme(DEFAULT_DARK_THEME);
      } catch (e) { console.warn('导入主题失败', e); }
    }
    await saveMainStrict();
    hideLoading();
    showToast(`已导入 ${preparedEntries.length} 个场景`, 3500);
  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('导入失败：' + (e.message || e), 4200);
  }
}

async function importProject(file) {
  if (!file) return;
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  setLoading('正在解析导入文件…');
  let payload;
  try {
    const text = await file.text();
    payload = JSON.parse(text);
  } catch (e) {
    hideLoading();
    showConfirm('文件解析失败', 'JSON 格式错误或文件损坏。', closeModal);
    return;
  }
  if (payload && payload.format === 'fog-of-war-map.fogbundle') {
    hideLoading();
    if (!payload.schemaVersion || payload.schemaVersion > BUNDLE_EXPORT_SCHEMA_VERSION) {
      showConfirm('版本不兼容', `导入文件 schemaVersion=${payload.schemaVersion}，本工具仅支持 ≤ ${BUNDLE_EXPORT_SCHEMA_VERSION}。请升级工具。`, closeModal);
      return;
    }
    openSceneBundleImportWizard(payload);
    return;
  }
  // schema 校验
  if (!payload || payload.format !== 'fog-of-war-map.fogsave') {
    hideLoading();
    showConfirm('文件格式不正确', '这不是战争迷雾工具的导出文件。', closeModal);
    return;
  }
  if (!payload.schemaVersion || payload.schemaVersion > EXPORT_SCHEMA_VERSION) {
    hideLoading();
    showConfirm('版本不兼容', `导入文件 schemaVersion=${payload.schemaVersion}，本工具仅支持 ≤ ${EXPORT_SCHEMA_VERSION}。请升级工具。`, closeModal);
    return;
  }
  if (!state.hasMap) {
    hideLoading();
    showConfirm('请先加载地图', '旧版单场景导入需要先加载对应的地图图片。新版“全部场景”导入会在向导中逐个选择地图。', closeModal);
    return;
  }
  // fog 尺寸校验（底线，不允许尺寸不一致；旧导出缺 mapSize 时由实际 fog bitmap 兜底）
  const mapW = state.mapCanvas.width, mapH = state.mapCanvas.height;
  if (payload.mapSize && (payload.mapSize.w !== mapW || payload.mapSize.h !== mapH)) {
    hideLoading();
    showConfirm('地图尺寸不匹配',
      `当前地图 ${mapW}×${mapH}，导入文件迷雾 ${payload.mapSize ? payload.mapSize.w + '×' + payload.mapSize.h : '未知'}。请在原机器上重新加载同一张图并重新导出，或先在本机加载相同的地图。`,
      closeModal);
    return;
  }
  // fingerprint 比对（宽松，仅用于提示）
  const fingerprintMatch = (payload.mapFingerprint === state.mapFingerprint);
  hideLoading();
  const missingMapSizeNote = payload.mapSize ? '' : '\n\n导入文件缺少地图尺寸元信息，将改用迷雾图片实际尺寸做底线校验。';
  const desc = fingerprintMatch
    ? '此操作将用导入文件的内容覆盖当前所有迷雾、Token、事件和标注。地图本身不受影响。'
    : `指纹不匹配（文件可能来自另一台机器或同图的不同拷贝），但地图尺寸 ${mapW}×${mapH} 一致，可以导入。\n\n此操作将覆盖当前所有迷雾、Token、事件和标注。`;
  showConfirm('确认导入',
    desc + missingMapSizeNote,
    () => doImportProject(payload),
    { danger: true, yesText: '覆盖并导入' });
}

async function doImportProject(payload) {
  setLoading('正在导入…');
  try {
    // 反序列化为 saved 对象格式（复用 restoreFromSaved 路径）
    if (!payload.fogLayers?.terrain?.base64 || !payload.fogLayers?.event?.base64) {
      throw new Error('fog 数据缺失');
    }
    const terrainBlob = await base64ToBlob(payload.fogLayers.terrain.base64);
    const eventFogBlob = await base64ToBlob(payload.fogLayers.event.base64);
    if (!terrainBlob || !eventFogBlob) throw new Error('fog 数据解码失败');
    const tokensRestored = await Promise.all((payload.tokens || []).map(async (t) => ({
      ...t,
      blob: await base64ToBlob(t.blob),
    })));
    const eventsRestored = await Promise.all((payload.events || []).map(async (ev) => {
      const icon = ev.icon || { type: 'emoji', value: '❓' };
      let restoredIcon;
      if (icon.type === 'image') {
        const blob = await base64ToBlob(icon.blob);
        restoredIcon = { type: 'image', blob };
      } else {
        restoredIcon = icon;
      }
      return { ...ev, icon: restoredIcon };
    }));
    const annotationsRestored = await Promise.all((payload.annotations || []).map(async (ann) => {
      if (ann.type === 'image') return { ...ann, blob: await base64ToBlob(ann.blob) };
      return ann;
    }));
    // 构造 saved 对象，重用 restoreFromSaved
    const fakeSaved = {
      version: SCHEMA_VERSION,
      fogLayers: {
        terrain: { blob: terrainBlob },
        event:   { blob: eventFogBlob },
      },
      tokens: tokensRestored,
      events: eventsRestored,
      annotations: annotationsRestored,
      view: null,
      settings: payload.settings || {},
      customTheme: payload.customTheme || null,
      mapFingerprint: state.mapFingerprint,  // 对齐当前指纹
      ts: Date.now(),
    };
    const restored = await restoreFromSaved(fakeSaved, { fitViewAfterRestore: true });
    if (!restored) return;
    // 写 IDB（这样刷新后能继续）
    await triggerImmediateSave();
    hideLoading();
    showToast(`已导入 ${tokensRestored.length} Token / ${eventsRestored.length} 事件 / ${annotationsRestored.length} 标注`, 3500);
  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('导入失败：' + (e.message || e));
  }
}

// ============== 多场景管理（v3.0） ==============
async function switchScene(targetId) {
  if (!state.scenes[targetId]) { showToast('场景不存在'); return; }
  if (targetId === state.currentSceneId) return;
  // 保存当前场景到 state.scenes
  if (state.hasMap && state.currentSceneId) {
    const sceneCore = await serializeActiveSceneData();
    if (sceneCore) {
      const prev = state.scenes[state.currentSceneId] || {};
      state.scenes[state.currentSceneId] = {
        ...sceneCore,
        mapBlob: prev.mapBlob || null,
        mapSize: sceneCore.mapSize,
        name: prev.name || '场景',
        createdAt: prev.createdAt || Date.now(),
        lastUsedAt: Date.now(),
      };
    }
  }
  const target = state.scenes[targetId];
  if (!target.mapBlob) {
    showToast('目标场景无地图，请重新加载地图');
    state.currentSceneId = targetId;
    state.hasMap = false;
    clearAnnotationRuntimeResources();
    state.tokens = [];
    state.events = [];
    state.annotations = [];
    clearSelection({ render: false });
    state.undoStack = [];
    updateTokensStatus();
    updateEventsStatus();
    updateAnnotationsStatus();
    updateUndoButton();
    $('splash').style.display = 'flex';
    updateSceneStatus();
    updateObjectPanel();
    triggerImmediateSave();
    return;
  }
  const prevSceneId = state.currentSceneId;
  const prevHasMap = state.hasMap;
  setLoading('切换场景中…');
  try {
    const preparedMap = await prepareMapFromBlob(target.mapBlob);
    const preparedRestore = await prepareSavedRestore(target, { w: preparedMap.w, h: preparedMap.h });
    const mapInfo = preparedMap;
    commitPreparedMap(preparedMap);
    state.mapFingerprint = target.mapFingerprint;
    $('splash').style.display = 'none';
    state.currentSceneId = targetId;
    target.mapSize = { w: mapInfo.w, h: mapInfo.h };
    const restored = await restoreFromSaved(target, { preparedRestore });
    if (!restored) throw new Error('恢复场景数据失败');
    state.undoStack = [];
    updateUndoButton();
    fitView();
    setupBrushSizeFromState();
    updateSceneStatus();
    triggerImmediateSave();
    showToast('已切换到 "' + (target.name || '场景') + '"', 2000);
  } catch (e) {
    console.error(e);
    // 回滚：保持原 currentSceneId 不变
    state.currentSceneId = prevSceneId;
    state.hasMap = prevHasMap;
    showToast('切换场景失败：' + (e.message || e));
  }
  hideLoading();
}

async function deleteScene(id) {
  if (!state.scenes[id]) return;
  const wasCurrent = (id === state.currentSceneId);
  delete state.scenes[id];
  if (wasCurrent) {
    // 按 lastUsedAt 倒序选最近用过的
    const remaining = Object.keys(state.scenes)
      .sort((a, b) => (state.scenes[b].lastUsedAt || 0) - (state.scenes[a].lastUsedAt || 0));
    if (remaining.length > 0) {
      state.currentSceneId = null;  // 防 switchScene 短路（targetId === current）
      await switchScene(remaining[0]);
    } else {
      state.currentSceneId = null;
      state.hasMap = false;
      clearAnnotationRuntimeResources();
      state.tokens = []; state.events = []; state.annotations = [];
      clearSelection({ render: false });
      state.undoStack = [];
      // 释放 mapImage
      if (state.mapImage && typeof state.mapImage.close === 'function') {
        try { state.mapImage.close(); } catch (_) {}
      }
      state.mapImage = null;
      updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus(); updateUndoButton(); updateSceneStatus();
      refreshSelectionUi();
      $('splash').style.display = 'flex';
      scheduleRender('all');
    }
  } else {
    updateSceneStatus();
  }
  triggerImmediateSave();
}

function openSceneManagerModal() {
  const ids = Object.keys(state.scenes);
  const canEditScenes = isEditSurface();
  // 按 lastUsedAt 倒序
  ids.sort((a, b) => (state.scenes[b].lastUsedAt || 0) - (state.scenes[a].lastUsedAt || 0));
  const rows = ids.map((id) => {
    const s = state.scenes[id];
    const isCurrent = (id === state.currentSceneId);
    const name = escapeHtml(s.name || '场景');
    const hasMap = !!s.mapBlob;
    const ago = s.lastUsedAt ? Math.max(1, Math.round((Date.now() - s.lastUsedAt) / 60000)) + ' 分钟前' : '';
    return `
      <div class="scene-row ${isCurrent ? 'current' : ''}">
        <span class="scene-name">${isCurrent ? '✓ ' : ''}${name}</span>
        <span class="scene-meta">${hasMap ? '🗺' : '⚠ 无图'} ${ago}</span>
        <div class="scene-actions">
          ${isCurrent ? '' : `<button class="scene-switch" data-id="${id}">切换</button>`}
          ${canEditScenes ? `<button class="scene-rename" data-id="${id}">改名</button>` : ''}
          ${canEditScenes ? `<button class="scene-delete" data-id="${id}">删</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
  showModal(`
    <div class="modal-title">${canEditScenes ? '场景管理' : '切换场景'}（${ids.length}）</div>
    <div class="modal-desc">${canEditScenes ? '每个场景含独立的地图、迷雾、Token、事件、视口。"新建场景"会让你选一张新地图。' : '跑团态只用于切换已准备好的场景。新建、改名和删除请进入编辑态。'}</div>
    <div class="scene-list">${rows || '<div style="color:var(--theme-text-muted);padding:20px;text-align:center;">暂无场景，先加载一张地图</div>'}</div>
    <div class="modal-actions">
      <button id="scene-close">关闭</button>
      ${canEditScenes ? '<button id="scene-new" class="primary">+ 新建场景（加载地图）</button>' : ''}
    </div>
  `, {
    onMounted: () => {
      $('scene-close').addEventListener('click', closeModal);
      if (canEditScenes) {
        $('scene-new').addEventListener('click', () => {
          closeModal();
          $('file-input-map').click();
        });
      }
      document.querySelectorAll('.scene-switch').forEach((b) => {
        b.addEventListener('click', () => {
          closeModal();
          switchScene(b.dataset.id);
        });
      });
      document.querySelectorAll('.scene-rename').forEach((b) => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          const cur = state.scenes[id]?.name || '';
          const newName = prompt('场景名', cur);
          if (newName && newName.trim()) {
            state.scenes[id].name = newName.trim();
            triggerImmediateSave();
            closeModal();
            openSceneManagerModal();
          }
        });
      });
      document.querySelectorAll('.scene-delete').forEach((b) => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          const name = state.scenes[id]?.name || '场景';
          if (Object.keys(state.scenes).length === 1) {
            showToast('至少保留一个场景');
            return;
          }
          closeModal();
          showConfirm(`删除场景"${name}"?`, '该场景的所有迷雾、Token、事件、地图都会删除。',
            async () => { await deleteScene(id); openSceneManagerModal(); },
            { danger: true, yesText: '删除' });
        });
      });
    }
  });
}

// ============== 网格设置 modal（v3.1） ==============

function cloneGridSettings(grid) {
  return normalizeGridSettings(grid);
}

function startGridCalibration() {
  if (!state.hasMap) {
    showToast('请先加载地图');
    return;
  }
  clearTimeout(state.debouncedSaveTimer);
  state.debouncedSaveTimer = null;
  hideDropdown();
  if (state.activeStroke) onStrokeEnd(false);
  cancelLongPress();
  clearSelection({ render: false });
  state.gridCalibration = {
    originalGrid: cloneGridSettings(state.grid),
    pointerId: null,
    startX: 0,
    startY: 0,
    startOffsetX: 0,
    startOffsetY: 0,
  };
  state.uiMode = 'grid-calibration';
  state.grid.enabled = true;
  state.grid.type = normalizeGridType(state.grid.type);
  state.grid.rotation = normalizeGridRotationForType(state.grid.type, state.grid.rotation || 0);
  invalidateGridCache();
  renderGridCalibrationPanel();
  scheduleRender('all');
  showToast('正在校准网格：拖动对位，滑杆调大小/旋转');
}

function renderGridCalibrationPanel() {
  let panel = $('grid-calibration-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'grid-calibration-panel';
    $('canvas-container').appendChild(panel);
  }
  const gridType = normalizeGridType(state.grid.type);
  const rotLimit = gridRotationLimit(gridType);
  const sizeLabel = gridType === 'square' ? '方格边长' : '六边形边长';
  panel.innerHTML = `
    <div class="panel-title">网格校准</div>
    <div class="panel-row">
      <label for="grid-calibration-size">${sizeLabel} <span id="grid-calibration-size-val">${Math.round(state.grid.cellSize)}</span></label>
      <input id="grid-calibration-size" type="range" min="20" max="240" value="${Math.round(state.grid.cellSize)}">
    </div>
    <div class="panel-row">
      <label for="grid-calibration-rotation">旋转 <span id="grid-calibration-rotation-val">${formatGridNumber(state.grid.rotation || 0)}°</span></label>
      <input id="grid-calibration-rotation" type="range" min="${-rotLimit}" max="${rotLimit}" step="0.5" value="${normalizeGridRotationForType(gridType, state.grid.rotation || 0)}">
    </div>
    <div class="panel-meta" id="grid-calibration-meta">X ${formatGridNumber(state.grid.offsetX)} / Y ${formatGridNumber(state.grid.offsetY)} / 旋转 ${formatGridNumber(state.grid.rotation || 0)}°</div>
    <div class="panel-actions">
      <button id="grid-calibration-cancel">取消</button>
      <button id="grid-calibration-done" class="primary">完成校准</button>
    </div>
  `;
  $('grid-calibration-size').addEventListener('input', (e) => {
    state.grid.cellSize = parseInt(e.target.value, 10) || 80;
    updateGridCalibrationPanel();
    invalidateGridCache();
    scheduleRender('all');
  });
  $('grid-calibration-rotation').addEventListener('input', (e) => {
    state.grid.rotation = normalizeGridRotationForType(state.grid.type, e.target.value);
    updateGridCalibrationPanel();
    invalidateGridCache();
    scheduleRender('all');
  });
  $('grid-calibration-cancel').addEventListener('click', () => finishGridCalibration(false));
  $('grid-calibration-done').addEventListener('click', () => finishGridCalibration(true));
}

function updateGridCalibrationPanel() {
  const sizeVal = $('grid-calibration-size-val');
  if (sizeVal) sizeVal.textContent = Math.round(state.grid.cellSize);
  const sizeInput = $('grid-calibration-size');
  if (sizeInput && String(Math.round(state.grid.cellSize)) !== sizeInput.value) {
    sizeInput.value = Math.round(state.grid.cellSize);
  }
  const rotationVal = $('grid-calibration-rotation-val');
  if (rotationVal) rotationVal.textContent = formatGridNumber(state.grid.rotation || 0) + '°';
  const rotationInput = $('grid-calibration-rotation');
  const rotationValue = String(normalizeGridRotationForType(state.grid.type, state.grid.rotation || 0));
  if (rotationInput && rotationValue !== rotationInput.value) {
    rotationInput.value = rotationValue;
  }
  const meta = $('grid-calibration-meta');
  if (meta) meta.textContent = `X ${formatGridNumber(state.grid.offsetX)} / Y ${formatGridNumber(state.grid.offsetY)} / 旋转 ${formatGridNumber(state.grid.rotation || 0)}°`;
}

function formatGridNumber(v) {
  return (Math.round((v || 0) * 10) / 10).toString();
}

function defaultGridSettings() {
  return { enabled: false, type: 'hex', cellSize: 80, offsetX: 0, offsetY: 0, rotation: 0, lineColor: '#ffffff', lineOpacity: 0.25 };
}

function normalizeGridSettings(grid) {
  if (!grid) return defaultGridSettings();
  const type = normalizeGridType(grid.type);
  const cellSize = clamp(Math.round(Number(grid.cellSize) || 80), 20, 240);
  const rawOffsetX = Number(grid.offsetX);
  const rawOffsetY = Number(grid.offsetY);
  const offsetLimit = Math.max(100000, (state.mapCanvas.width || 0) * 4, (state.mapCanvas.height || 0) * 4);
  const offsetX = Number.isFinite(rawOffsetX) ? clamp(rawOffsetX, -offsetLimit, offsetLimit) : 0;
