// 改色：用 source-in 把已有覆盖区域重涂为新色（保留 alpha 不影响揭示形状）
function applyEventFogColor(newColor) {
  applyFogColor('event', newColor);
}
function applyTerrainFogColor(newColor) {
  applyFogColor('terrain', newColor);
}
function applyFogColor(layerKey, newColor) {
  if (!newColor) return;
  newColor = normalizeHex(newColor);
  const field = layerKey + 'FogColor';
  if (state[field].toLowerCase() === newColor.toLowerCase()) return;
  state[field] = newColor;
  recolorFogLayer(layerKey, newColor);
  scheduleRender('all');
  triggerImmediateSave();
}

function normalizeHex(hex) {
  if (!hex || typeof hex !== 'string') return '#000000';
  hex = hex.trim().toLowerCase();
  if (!hex.startsWith('#')) hex = '#' + hex;
  // 3 位扩展为 6 位
  if (/^#[0-9a-f]{3}$/.test(hex)) {
    const c = hex.slice(1);
    return '#' + c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
  }
  if (/^#[0-9a-f]{6}$/.test(hex)) return hex;
  return '#000000';
}
function mkMenuItem(text) {
  const b = document.createElement('button');
  b.className = 'menu-item';
  b.textContent = text;
  return b;
}
function appendMenuDivider(menu) {
  const d = document.createElement('div');
  d.className = 'menu-divider';
  menu.appendChild(d);
}
function hideDropdown() { $('dropdown-menu').classList.remove('visible'); }

function showCheckpointList() {
  if (state.checkpoints.length === 0) return;
  const items = state.checkpoints.slice().reverse().map((cp, i) => {
    const ago = Math.max(1, Math.round((Date.now() - cp.ts) / 60000));
    return `<button class="menu-item" data-idx="${state.checkpoints.length - 1 - i}">约 ${ago} 分钟前</button>`;
  }).join('');
  showModal(`
    <div class="modal-title">恢复迷雾 Checkpoint</div>
    <div class="modal-desc">Checkpoint 只恢复地形层和事件层迷雾，不恢复 Token、事件、标注或云端历史。恢复后当前撤销栈会清空。</div>
    <div style="display:flex;flex-direction:column;gap:6px;">${items}</div>
    <div class="modal-actions"><button id="cp-cancel">取消</button></div>
  `, {
    onMounted: () => {
      $('cp-cancel').addEventListener('click', closeModal);
      document.querySelectorAll('#modal-root .menu-item').forEach((b) => {
        b.addEventListener('click', async () => {
          const idx = parseInt(b.dataset.idx, 10);
          const cp = state.checkpoints[idx];
          if (!cp) return;
          closeModal();
          setLoading('恢复中…');
          try {
            let terrainBmp = null;
            let eventFogBmp = null;
            try {
              if (cp.terrainBlob) terrainBmp = await createImageBitmap(cp.terrainBlob);
              if (cp.eventFogBlob) eventFogBmp = await createImageBitmap(cp.eventFogBlob);
              if (!cp.terrainBlob && cp.fogBlob) terrainBmp = await createImageBitmap(cp.fogBlob); // 兼容老 checkpoint
              if (terrainBmp) assertFogBitmapMatchesMap(terrainBmp, '地形迷雾');
              if (eventFogBmp) assertFogBitmapMatchesMap(eventFogBmp, '事件迷雾');
              if (terrainBmp) drawFogBitmapToLayer('terrain', terrainBmp);
              if (eventFogBmp) drawFogBitmapToLayer('event', eventFogBmp);
            } finally {
              if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
              if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
            }
            state.undoStack = [];
            updateUndoButton();
            scheduleRender('all');
            triggerImmediateSave();
            showToast('已恢复到 Checkpoint');
          } catch (e) { showToast('恢复失败：' + e.message); }
          hideLoading();
        });
      });
    }
  });
}

// ============== visibilitychange / hydrate ==============
async function onVisibilityChange() {
  if (document.hidden) {
    state.hiddenAt = performance.now();
    flushAllPendingSaves();
  } else {
    cloudSync_disarmPlaceholderFilePickAfterWindowRefocus();
    if (state.hiddenAt) {
      state.lastCheckpointAt += (performance.now() - state.hiddenAt);
      state.hiddenAt = 0;
    }
    if (!state.hasMap) return;
    // v3: 从 main.scenes[currentSceneId] 读 fog 数据
    const main = await loadAndMigrateMain();
    if (!main || !main.scenes || !state.currentSceneId) return;
    const scene = main.scenes[state.currentSceneId];
    if (scene && scene.mapFingerprint === state.mapFingerprint && scene.fogLayers) {
      try {
        const [terrainBmp, eventFogBmp] = await Promise.all([
          createImageBitmap(scene.fogLayers.terrain.blob),
          createImageBitmap(scene.fogLayers.event.blob),
        ]);
        try {
          assertFogBitmapPairMatchesMap(terrainBmp, eventFogBmp);
          drawFogBitmapToLayer('terrain', terrainBmp);
          drawFogBitmapToLayer('event', eventFogBmp);
        } finally {
          if (terrainBmp && typeof terrainBmp.close === 'function') terrainBmp.close();
          if (eventFogBmp && typeof eventFogBmp.close === 'function') eventFogBmp.close();
        }
        if (state.undoStack.length > 0) {
          state.undoStack = [];
          updateUndoButton();
          showToast('已从后台恢复，撤销栈已重置');
        }
        scheduleRender('all');
      } catch (e) {
        console.warn('后台恢复迷雾失败', e);
      }
    }
  }
}

async function tryAutoLoadCurrentScene() {
  const main = await loadAndMigrateMain();
  if (!main) return;
  state.scenes = main.scenes || {};
  state.currentSceneId = main.currentSceneId || null;
  state.diceHistory = normalizeDiceHistory(main.diceHistory || []);
  state.diceLastExpression = state.diceHistory[0]?.expression || 'd20';
  renderDiceHistory();
  if (main.customTheme) {
    try { loadCustomTheme(main.customTheme); } catch (_) {}
  }
  const id = state.currentSceneId;
  if (!id || !state.scenes[id]) return;
  const scene = state.scenes[id];
  if (!scene.mapBlob) {
    if (!sceneNeedsLocalMap(scene)) {
      // v2 迁移过来无 mapBlob —— 等用户加载地图
      showToast('上次场景需要重新加载地图（升级后图片需重选）', 5000);
      return;
    }
  }
  // 自动加载图 + 恢复 scene
  setLoading('恢复场景中…');
  try {
    const preparedMap = await prepareSceneMapForRestore(scene);
    const preparedRestore = await prepareSavedRestore(scene, { w: preparedMap.w, h: preparedMap.h });
    const mapInfo = preparedMap;
    commitPreparedMap(preparedMap);
    state.mapFingerprint = scene.mapFingerprint;
    $('splash').style.display = 'none';
    scene.mapSize = { w: mapInfo.w, h: mapInfo.h };
    const restored = await restoreFromSaved(scene, { preparedRestore });
    if (!restored) return;
    await loadCheckpoints();
    fitView();
    setupBrushSizeFromState();
    const suffix = sceneNeedsLocalMap(scene) ? '（占位地图，需绑定地图）' : '';
    showToast('已恢复场景 "' + (scene.name || '场景') + '"' + suffix, 3600);
  } catch (e) {
    console.error(e);
    showToast('恢复场景失败：' + e.message);
  }
  hideLoading();
}

function setupEventListeners() {
  const cv = state.mainCanvas;
  cv.addEventListener('pointerdown', onPointerDown);
  cv.addEventListener('pointermove', onPointerMove);
  cv.addEventListener('pointerup', onPointerUp);
  cv.addEventListener('pointercancel', onPointerCancel);
  cv.addEventListener('pointerleave', onPointerLeave);
  cv.addEventListener('wheel', onWheel, { passive: false });

  // 双击：先尝试编辑事件 → 再尝试编辑 token → 否则 fitView
  cv.addEventListener('dblclick', (e) => {
    if (state.uiMode !== 'normal') return;
    const off = getCanvasOffset();
    const x = e.clientX - off.x, y = e.clientY - off.y;
    const hitEvent = findTopEventAt(x, y, e.pointerType || 'mouse', { ignoreVisibility: isEditSurface() });
    if (hitEvent && isEditSurface()) {
      hideEventCard();
      openEventEditDialog(null, hitEvent.id);
      return;
    }
    const [mx, my] = screenToMap(x, y);
    const hitToken = findTopTokenAt(mx, my);
    if (hitToken && isEditSurface()) {
      openEditTokenModal(hitToken.id);
      return;
    }
    const hitAnnotation = findTopAnnotationAt(mx, my);
    if (hitAnnotation && isEditSurface()) {
      openAnnotationEditDialog(hitAnnotation.id);
      return;
    }
    fitView();
  });

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('visibilitychange', onVisibilityChange);
  window.addEventListener('pagehide', () => flushAllPendingSaves());
  window.addEventListener('beforeunload', () => flushAllPendingSaves());
  window.addEventListener('resize', () => {
    resizeMainCanvas();
    if (state.viewIsPristineFit) fitView();
  });
  if (window.visualViewport) {
    visualViewport.addEventListener('resize', () => {
      if (state.viewIsPristineFit) fitView();
    });
  }

  $('btn-load-map').addEventListener('click', () => {
    if (!requireEditSurface()) return;
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    $('file-input-map').click();
  });
  $('file-input-map').addEventListener('change', (e) => {
    const f = e.target.files[0];
    state.placeholderRestore.awaitingLocalFilePick = false;
    if (!f) {
      cloudSync_clearPlaceholderRestoreTarget();
      e.target.value = '';
      return;
    }
    if (requireEditSurface()) loadMapFile(f);
    else cloudSync_clearPlaceholderRestoreTarget();
    e.target.value = '';
  });

  $('btn-load-token').addEventListener('click', () => {
    if (!requireEditSurface()) return;
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    if (!state.hasMap) { showToast('请先加载地图'); return; }
    $('file-input-token').click();
  });
  $('file-input-token').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f && !requireEditSurface()) { e.target.value = ''; return; }
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); e.target.value = ''; return; }
    if (f) {
      const lower = f.name.toLowerCase();
      if (f.type === 'image/heic' || lower.endsWith('.heic')) {
        showConfirm('格式不支持', '请用截图或 PNG/JPG 代替', closeModal);
        e.target.value = '';
        return;
      }
      openTokenUploadDialog(f);
    }
    e.target.value = '';
  });

  $('btn-add-text').addEventListener('click', () => {
    if (!requireEditSurface()) return;
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    if (!state.hasMap) { showToast('请先加载地图'); return; }
    openTextAnnotationDialog();
  });
  $('btn-add-image').addEventListener('click', () => {
    if (!requireEditSurface()) return;
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    if (!state.hasMap) { showToast('请先加载地图'); return; }
    $('file-input-annotation-image').click();
  });
  $('file-input-annotation-image').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f && !requireEditSurface()) { e.target.value = ''; return; }
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); e.target.value = ''; return; }
    if (f) {
      const lower = f.name.toLowerCase();
      if (f.type === 'image/heic' || f.type === 'image/heif' || lower.endsWith('.heic') || lower.endsWith('.heif')) {
        showConfirm('格式不支持', '请用截图或 PNG/JPG/WebP 代替', closeModal);
        e.target.value = '';
        return;
      }
      openImageAnnotationDialog(f);
    }
    e.target.value = '';
  });

  // 导入项目（.fogbundle.json / 旧 .fogsave.json）
  $('file-input-import').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importProject(f);
    e.target.value = '';
  });

  $('btn-place-event').addEventListener('click', () => {
    if (!requireEditSurface()) return;
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    if (!state.hasMap) { showToast('请先加载地图'); return; }
    togglePlaceEventMode(state.placeEventPreset === EVENT_ACTION_SCENE_LINK ? true : undefined, null);
  });

  $('btn-place-scene-link').addEventListener('click', () => {
    if (!requireEditSurface()) return;
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    if (!state.hasMap) { showToast('请先加载地图'); return; }
    const sceneCount = Object.keys(state.scenes || {}).length;
    if (sceneCount < 2) { showToast('请先准备至少两个场景'); return; }
    togglePlaceEventMode(state.placeEventPreset === EVENT_ACTION_SCENE_LINK ? undefined : true, EVENT_ACTION_SCENE_LINK);
  });

  $('btn-layer-terrain').addEventListener('click', () => setLayer('terrain'));
  $('btn-layer-event').addEventListener('click', () => setLayer('event'));

  $('brush-size-input').addEventListener('change', (e) => setBrushSize(parseInt(e.target.value, 10) || BRUSH_DEFAULT));
  $('btn-brush-dec').addEventListener('click', () => setBrushSize(state.brush.sizeScreen - 20));
  $('btn-brush-inc').addEventListener('click', () => setBrushSize(state.brush.sizeScreen + 20));
  $('brush-size-rail').addEventListener('input', (e) => setBrushSize(parseInt(e.target.value, 10)));

  $('btn-mode-reveal').addEventListener('click', () => setBrushMode('reveal'));
  $('btn-mode-reveal-all').addEventListener('click', () => setBrushMode('reveal-all'));
  $('btn-mode-cover').addEventListener('click', () => setBrushMode('cover'));

  $('btn-undo').addEventListener('click', () => {
    if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
    undo();
  });

  $('btn-surface-toggle').addEventListener('click', () => setSurfaceMode(isEditSurface() ? 'live' : 'edit'));
  $('btn-entry-spotlight').addEventListener('click', openEntrySpotlightModal);
  $('btn-edit-chapter').addEventListener('click', openChapterModal);
  $('btn-dice').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleDicePanel();
  });
  $('dice-close').addEventListener('click', closeDicePanel);
  $('dice-roll').addEventListener('click', () => rollDiceFromInput());
  $('dice-reroll').addEventListener('click', () => rollDiceFromInput({ expression: state.diceLastExpression }));
  $('dice-clear-history').addEventListener('click', () => {
    state.diceHistory = [];
    state.diceLastExpression = 'd20';
    renderDiceResult(null);
    renderDiceHistory();
    triggerImmediateSave();
  });
  $('dice-expression').addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      rollDiceFromInput();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      closeDicePanel();
    }
  });
  $('dice-overlay').addEventListener('pointerdown', (e) => {
    if (e.target === $('dice-overlay')) closeDicePanel();
  });

  $('btn-more').addEventListener('click', (e) => {
    e.stopPropagation();
    if ($('dropdown-menu').classList.contains('visible')) hideDropdown();
    else showDropdown();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#dropdown-menu') && !e.target.closest('#btn-more')) hideDropdown();
    // 点击事件卡片外部关闭卡片
    if (state.eventCardOpenId && !e.target.closest('#event-card')) {
      // 但要避免点击事件 icon 立即被这里关掉——pointerup 的事件互动逻辑会重新打开
      // 这里只在非 canvas 区域关
      if (!e.target.closest('#main') && !e.target.closest('#canvas-container')) {
        hideEventCard();
      }
    }
  });

  // 拖拽上传
  document.addEventListener('dragover', (e) => { e.preventDefault(); });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    if (state.gridCalibration) {
      showToast('请先完成或取消网格校准');
      return;
    }
    if (state.uiMode === 'modal') {
      showToast('请先关闭当前弹窗');
      return;
    }
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (!requireEditSurface()) return;
    if (state.hasMap) {
      showConfirm('文件用途', '把拖入的图片作为？', () => {
        loadMapFile(f);
      }, {
        yesText: '替换地图', noText: '作为 Token',
        onNo: () => openTokenUploadDialog(f),
      });
    } else {
      loadMapFile(f);
    }
  });
}

// ============== 启动 ==============
init().catch((e) => {
  console.error(e);
  setStatusError('初始化失败：' + e.message);
});

// 暴露给开发调试
window.__fogState = state;
</script>
