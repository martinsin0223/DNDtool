  if (Math.max(w, h) > MAP_MAX_DIMENSION) {
    const ratio = MAP_MAX_DIMENSION / Math.max(w, h);
    w = Math.floor(w * ratio);
    h = Math.floor(h * ratio);
    if (opts.showDownsampleToast) showToast(`地图已降采样到 ${w}×${h} 以适配设备`);
  }
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  return { canvas, w, h, originalW, originalH, downsampled: w !== originalW || h !== originalH };
}

  state.mapCanvas.height = prepared.h;
  state.fogLayers.terrain.canvas.width = prepared.w;
  state.fogLayers.terrain.canvas.height = prepared.h;
  state.fogLayers.event.canvas.width = prepared.w;
  state.fogLayers.event.canvas.height = prepared.h;
  state.mapCtx = state.mapCanvas.getContext('2d');
  state.fogLayers.terrain.ctx = state.fogLayers.terrain.canvas.getContext('2d', { willReadFrequently: true });
  state.fogLayers.event.ctx = state.fogLayers.event.canvas.getContext('2d', { willReadFrequently: true });

async function loadMapBlobIntoCanvases(blob, opts = {}) {

// ============== Theme ==============
function themeCss(name, fallback = '') {

function colorWithAlpha(color, alpha) {
  const hex = normalizeHex(color || '#000000').replace('#', '');
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);

function syncRuntimeThemeFromCss() {

  const panelRadius = parseInt(themeCss('--t-panel-radius', '12'), 10) || DEFAULT_DARK_THEME.radiusLg;
  const runtimeFields = {

  const runtime = currentThemeId === 'stone'

function setTheme(themeId) {
  const normalized = THEMES.some((theme) => theme.id === themeId) ? themeId : 'stone';
  currentThemeId = normalized;
  customThemeActive = false;
  document.documentElement.setAttribute('data-theme', normalized);
  try { localStorage.setItem(THEME_STORAGE_KEY, normalized); } catch (_) {}
  document.documentElement.offsetHeight;
  syncRuntimeThemeFromCss();
  scheduleRender('all');
}

function initTheme() {
  let saved = 'stone';
  try { saved = localStorage.getItem(THEME_STORAGE_KEY) || 'stone'; } catch (_) {}
  setTheme(saved);

function validateTheme(obj) {
  const result = { ok: true, missing: [], extra: [] };
  for (const k of Object.keys(DEFAULT_DARK_THEME)) {
    if (obj[k] === undefined) { result.missing.push(k); result.ok = false; }
  }
  for (const k of Object.keys(obj)) {
    if (!(k in DEFAULT_DARK_THEME) && !OPTIONAL_THEME_FIELDS.has(k)) {
      result.extra.push(k);
    }
  }
  return result;
}

function applyTheme(theme, opts = {}) {
  const preserveCssTheme = Boolean(opts.preserveCssTheme);
  customThemeActive = !preserveCssTheme;
  const commit = () => {
    state.theme = theme;
    const root = document.documentElement;
    if (!preserveCssTheme) {
      currentThemeId = 'custom';
      root.removeAttribute('data-theme');
      try { localStorage.removeItem(THEME_STORAGE_KEY); } catch (_) {}
    }
    root.style.setProperty('--theme-bg', theme.bg);
    root.style.setProperty('--theme-bg-panel', theme.bgPanel);
    root.style.setProperty('--theme-panel-blur-alpha', String(theme.panelBlurAlpha));
    root.style.setProperty('--theme-bg-input', theme.bgInput);
    root.style.setProperty('--theme-border', theme.border);
    root.style.setProperty('--theme-text', theme.text);
    root.style.setProperty('--theme-text-muted', theme.textMuted);
    root.style.setProperty('--theme-accent', theme.accent);
    root.style.setProperty('--theme-danger', theme.danger);
    root.style.setProperty('--theme-warn', theme.warn);
    root.style.setProperty('--theme-shadow-color', theme.shadowColor);
    root.style.setProperty('--theme-shadow-spread', theme.shadowSpread);
    root.style.setProperty('--theme-radius-sm', theme.radiusSm + 'px');

    root.style.setProperty('--theme-radius-lg', theme.radiusLg + 'px');
    root.style.setProperty('--theme-font-family', theme.fontFamily);
    root.style.setProperty('--theme-splash-text', theme.splashTextColor);
    root.style.setProperty('--theme-loading-spinner', theme.loadingSpinnerColor);
    root.style.setProperty('color-scheme', currentThemeId === 'parchment' ? 'light' : 'dark');
    scheduleRender('all');

  if (preserveCssTheme) commit();

function loadCustomTheme(custom) {
  const merged = Object.assign({}, DEFAULT_DARK_THEME, custom || {});
  if (custom && custom.semantic) merged.semantic = Object.assign({}, DEFAULT_DARK_THEME.semantic, custom.semantic);
  const v = validateTheme(merged);
  if (!v.ok) {

// 为 Token 描边色返回主题色（按 v1.3 兼容写死的色 → 映射到 theme.semantic）
function semanticColorOf(borderColor) {

// ============== IndexedDB ==============
const migrations = {
  1: (db) => {
    if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
  },
  2: (db) => {
    // schema 不变，数据迁移在 loadAndMigrate 中做
    if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
  },
};

const dbPromise = new Promise((resolve) => {
  let req;
  try { req = indexedDB.open(DB_NAME, SCHEMA_VERSION); }
  catch (e) { setStatusError('无法保存（IDB 不可用）'); state.dbReady = true; resolve(null); return; }
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    for (let v = e.oldVersion + 1; v <= SCHEMA_VERSION; v++) {
      if (migrations[v]) migrations[v](db);
    }
  };
  req.onsuccess = () => {
    state.db = req.result;
    state.dbReady = true;
    resolve(req.result);
  };
  req.onerror = () => {
    setStatusError('无法保存（IDB 不可用）');
    state.dbReady = true;
    resolve(null);
  };
});

function ensureDb() { return dbPromise; }

function idbGet(key) {
  return new Promise((resolve, reject) => {
    if (!state.db) return resolve(null);
    const tx = state.db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

function idbPut(key, value) {
  return new Promise((resolve, reject) => {
    if (!state.db) return resolve();
    try {
      const tx = state.db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
      tx.onerror = () => reject(tx.error);
    } catch (e) { reject(e); }
  });
}

function idbDelete(key) {
  return new Promise((resolve) => {
    if (!state.db) return resolve();
    try {
      const tx = state.db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    } catch (e) { resolve(); }
  });
}

// ============== v1 → v2 迁移 ==============
async function migrateV1ToV2(saved) {
  // 用 fogBlob 解码取尺寸（必然 = mapCanvas 尺寸）
  const bitmap = await createImageBitmap(saved.fogBlob);
  const w = bitmap.width, h = bitmap.height;
  // 同尺寸全黑 event blob
  const blackCanvas = document.createElement('canvas');
  blackCanvas.width = w; blackCanvas.height = h;
  const bctx = blackCanvas.getContext('2d');
  bctx.fillStyle = '#000';
  bctx.fillRect(0, 0, w, h);
  const eventBlob = await new Promise((r) => blackCanvas.toBlob((b) => r(b), 'image/png'));
  if (!eventBlob) throw new Error('无法生成事件层迁移数据');
  const newSaved = { ...saved };
  newSaved.fogLayers = {
    terrain: { blob: saved.fogBlob },
    event:   { blob: eventBlob },
  };
  delete newSaved.fogBlob;
  newSaved.events = [];
  newSaved.version = 2;
  return newSaved;
}

// ============== v2 → v3 迁移（多场景化） ==============
// v2 saved 是单场景。v3 main = { scenes: {id: SceneData}, currentSceneId, ... }
function migrateV2ToV3(v2Saved) {
  const sceneId = uuid();
  const scene = {
    // v2 saved 内部结构原样保留
    ...v2Saved,
    // v3 scene 元数据
    mapBlob: null,  // v2 没存图，迁移后用户需重新选地图（fog/tokens/events 会等待对接）
    name: '场景 1',
    chapterNumber: DEFAULT_CHAPTER_NUMBER,
    chapterTitle: DEFAULT_CHAPTER_TITLE,
    createdAt: v2Saved.ts || Date.now(),
    lastUsedAt: v2Saved.ts || Date.now(),
  };
  return {
    version: 3,
    scenes: { [sceneId]: scene },
    currentSceneId: sceneId,
    themeId: v2Saved.themeId || 'default-dark',
    customTheme: v2Saved.customTheme || null,
    ts: Date.now(),
  };
}

async function loadAndMigrateMain() {
  const saved = await idbGet('main');
  if (!saved) return null;
  try {
    let s = saved;
    if (!s.version || s.version === 1) s = await migrateV1ToV2(s);
    if (s.version === 2) s = migrateV2ToV3(s);
    if (s !== saved) await idbPut('main', s);
    return s;
  } catch (e) {
    console.warn('存档迁移失败，保留旧数据', e);
    showToast('存档迁移失败，已保留旧数据', 6000);
    return null;
  }
}

// ============== 持久化串行队列 ==============
function triggerImmediateSave() {

    else { console.warn('save error', e); setStatusError('保存失败：' + (e && e.message || e)); }
  });

}
async function saveMainStrict() {
  await ensureDb();
  await state.saveQueue;
  await doSaveMain();
}
function triggerDebouncedSave() {
  clearTimeout(state.debouncedSaveTimer);
  state.debouncedSaveTimer = setTimeout(triggerImmediateSave, 500);
}
function flushAllPendingSaves() {
  clearTimeout(state.debouncedSaveTimer);
  return state.saveQueue;
}

async function canvasToBlob(canvas) {
  return new Promise((resolve) => canvas.toBlob((b) => resolve(b), 'image/png'));
}

function isValidMapSize(size) {
  return Boolean(size && Number.isFinite(size.w) && Number.isFinite(size.h) && size.w > 0 && size.h > 0);
}

function sceneHasRestorableGeometry(scene) {
  return Boolean(scene && isValidMapSize(scene.mapSize) && scene.fogLayers?.terrain?.blob && scene.fogLayers?.event?.blob);
}

function sceneNeedsLocalMap(scene) {
  return Boolean(scene && !scene.mapBlob && sceneHasRestorableGeometry(scene) && (scene.mapMissing || scene.mapSource?.type === 'placeholder'));
}

function sceneMapRuntimeFields(prev) {
  const hasBlob = Boolean(prev && prev.mapBlob);
  const manualRemoteSource = prev?.mapSource?.type === 'manualRemote' ? { ...prev.mapSource } : null;
  return {
    mapBlob: hasBlob ? prev.mapBlob : null,
    mapMissing: hasBlob ? false : Boolean(prev && (prev.mapMissing || prev.mapSource?.type === 'placeholder')),
    mapSource: hasBlob ? manualRemoteSource : (prev && prev.mapSource ? { ...prev.mapSource } : null),
  };
}

function createPlaceholderPreparedMap(mapSize, label = '地图待绑定') {
  if (!isValidMapSize(mapSize)) throw new Error('缺少地图尺寸，无法创建占位地图');
  const w = Math.round(mapSize.w);
  const h = Math.round(mapSize.h);
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#11100d';
  ctx.fillRect(0, 0, w, h);
  const step = Math.max(96, Math.min(320, Math.round(Math.max(w, h) / 12)));
  ctx.strokeStyle = 'rgba(214, 174, 92, 0.13)';
  ctx.lineWidth = Math.max(1, Math.round(step / 80));
  for (let x = 0; x <= w; x += step) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  for (let y = 0; y <= h; y += step) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(241, 226, 190, 0.72)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `700 ${Math.max(24, Math.min(72, Math.round(Math.min(w, h) / 14)))}px ${state.theme.fontFamily}`;
  ctx.fillText(label, w / 2, h / 2);
  ctx.font = `500 ${Math.max(14, Math.min(32, Math.round(Math.min(w, h) / 28)))}px ${state.theme.fontFamily}`;
  ctx.fillStyle = 'rgba(241, 226, 190, 0.5)';
  ctx.fillText(`${w} × ${h}`, w / 2, h / 2 + Math.max(34, Math.min(86, Math.round(Math.min(w, h) / 10))));
  return { canvas, w, h, originalW: w, originalH: h, downsampled: false, placeholder: true };
}

async function prepareSceneMapForRestore(scene) {
  if (scene?.mapBlob) return await prepareMapFromBlob(scene.mapBlob);
  if (sceneNeedsLocalMap(scene)) return createPlaceholderPreparedMap(scene.mapSize);
  throw new Error('目标场景无地图，请重新加载地图');
}

// 把当前渲染层 state 序列化为 v2-saved 格式的 scene 内容
async function serializeActiveSceneData() {
  const terrainBlob = await canvasToBlob(state.fogLayers.terrain.canvas);
  const eventFogBlob = await canvasToBlob(state.fogLayers.event.canvas);
  if (!terrainBlob || !eventFogBlob) return null;
  const tokensSerialized = state.tokens.map((t) => ({
    id: t.id, blob: t.blob, shape: t.shape, borderColor: t.borderColor,
    borderPattern: t.borderPattern, name: t.name,
    x: t.x, y: t.y, size: t.size, zOrder: t.zOrder,
    entryIds: objectEntryIds(t),
    explorerEnabled: !!t.explorerEnabled,
    exploreRadius: normalizeTokenExploreRadius(t.exploreRadius),
  }));
  const eventsSerialized = state.events.map((ev) => ({
    id: ev.id, x: ev.x, y: ev.y,
    icon: ev.icon.type === 'image'
      ? { type: 'image', blob: ev.icon.blob }
      : (ev.icon.type === 'svg-symbol' ? { type: 'svg-symbol', symbolId: ev.icon.symbolId }
         : { type: 'emoji', value: ev.icon.value }),
    title: ev.title, content: ev.content, size: ev.size, zOrder: ev.zOrder,
    layer: (ev.layer === 0 ? 0 : 1),
    entryIds: objectEntryIds(ev),
    ...serializeEventAction(ev),
  }));
  const annotationsSerialized = state.annotations.map(serializeAnnotation);
  const revealZonesSerialized = normalizeRevealZones(state.revealZones, state.entries);
  const curScene = state.scenes[state.currentSceneId] || {};
  return {
    version: 2,  // scene 内部仍按 v2 saved 结构（向后兼容）
    chapterNumber: sceneChapterNumber(curScene),
    chapterTitle: sceneChapterTitle(curScene),
    fogLayers: {
      terrain: { blob: terrainBlob },
      event:   { blob: eventFogBlob },
    },
    mapSize: { w: state.mapCanvas.width, h: state.mapCanvas.height },
    tokens: tokensSerialized,
    events: eventsSerialized,
    annotations: annotationsSerialized,
    entries: normalizeEntries(state.entries),
    revealZones: revealZonesSerialized,
    view: { ...state.view },
    settings: {
      brushSize: state.brush.sizeScreen,
      brushMode: state.brush.mode,
      currentLayer: state.currentLayer,
      fogOpacity: state.fogOpacity,
      terrainFogOpacity: state.terrainFogOpacity,
      eventFogOpacity: state.eventFogOpacity,
      terrainFogColor: state.terrainFogColor,
      eventFogColor: state.eventFogColor,
      grid: { ...state.grid },  // v3.1
    },
    mapFingerprint: state.mapFingerprint,
    ts: Date.now(),
  };
}

async function syncActiveSceneToMemory() {
  if (!state.hasMap || !state.currentSceneId) return false;
  const sceneCore = await serializeActiveSceneData();
  if (!sceneCore) return false;
  const prev = state.scenes[state.currentSceneId] || {};
  state.scenes[state.currentSceneId] = {
    ...sceneCore,
    ...sceneMapRuntimeFields(prev),
    name: prev.name || '场景 1',
    chapterNumber: sceneChapterNumber(prev),
    chapterTitle: sceneChapterTitle(prev),
    createdAt: prev.createdAt || Date.now(),
    lastUsedAt: Date.now(),
  };
  return true;
}

async function doSaveMain() {
  if (!state.dbReady) return;
  if (state.hasMap && state.currentSceneId) {
    // 把当前 active state 写到 state.scenes[currentSceneId]
    const ok = await syncActiveSceneToMemory();
    if (!ok) return;
  }
  const isDefault = !customThemeActive;
  const main = {
    version: SCHEMA_VERSION,
    scenes: state.scenes,
    currentSceneId: state.currentSceneId,
    diceHistory: serializeDiceHistory(),
    themeId: 'default-dark',
    customTheme: isDefault ? null : state.theme,
    ts: Date.now(),
  };
  await idbPut('main', main);
  setStatusSaved('已保存 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false }));
  updateSceneStatus();
}

async function saveCheckpoint() {
  if (!state.dbReady || !state.hasMap) return;
  const terrainBlob = await canvasToBlob(state.fogLayers.terrain.canvas);
  const eventFogBlob = await canvasToBlob(state.fogLayers.event.canvas);
  if (!terrainBlob || !eventFogBlob) return;
  const ts = Date.now();
  state.checkpoints.push({ ts, terrainBlob, eventFogBlob });
  if (state.checkpoints.length > CHECKPOINT_LIMIT) state.checkpoints.shift();
  for (let i = 0; i < state.checkpoints.length; i++) {
    await idbPut('checkpoint-' + i, state.checkpoints[i]).catch(() => {});
  }
}

async function loadCheckpoints() {
  state.checkpoints = [];
  for (let i = 0; i < CHECKPOINT_LIMIT; i++) {
    const c = await idbGet('checkpoint-' + i);
    if (c) state.checkpoints.push(c);
  }
}

async function clearAllData() {
  if (!state.db) return;
  await idbDelete('main');
  for (let i = 0; i < CHECKPOINT_LIMIT; i++) await idbDelete('checkpoint-' + i);
  state.scenes = {};
  state.currentSceneId = null;
}

async function clearCheckpoints() {
  for (let i = 0; i < CHECKPOINT_LIMIT; i++) await idbDelete('checkpoint-' + i);
  state.checkpoints = [];
  setStatusError('');
  showToast('已清理全部 Checkpoint');
}

// ============== 导出 / 导入项目 ==============
// 不含地图本身（用户自己传地图文件）。
// schemaVersion 2 = 旧单场景 fogsave（只保留导入兼容）
// schemaVersion 3 = 全部场景 fogbundle（当前主流程）
const EXPORT_SCHEMA_VERSION = 2;
const BUNDLE_EXPORT_SCHEMA_VERSION = 3;

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    if (!blob) return resolve(null);
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);  // 'data:image/png;base64,xxx'
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

async function base64ToBlob(dataUrl) {
  if (!dataUrl) return null;
  // 通过 fetch 把 data URL 转回 Blob（浏览器原生，无依赖）
  const res = await fetch(dataUrl);
  return await res.blob();
}

async function serializeSceneForBundle(sceneId, scene, opts = {}) {
  if (!scene || !scene.fogLayers?.terrain?.blob || !scene.fogLayers?.event?.blob) {
    throw new Error(`场景"${scene?.name || sceneId || '未命名'}"缺少迷雾数据，无法导出全部场景`);
  }
  const [terrainB64, eventFogB64] = await Promise.all([
    blobToBase64(scene.fogLayers.terrain.blob),
    blobToBase64(scene.fogLayers.event.blob),
  ]);
  const sceneEntries = normalizeEntries(scene.entries || []);
  const tokensExported = await Promise.all((scene.tokens || []).map(async (t) => ({
    id: t.id,
    blob: await blobToBase64(t.blob),
    shape: t.shape, borderColor: t.borderColor, borderPattern: t.borderPattern,
    name: t.name, x: t.x, y: t.y, size: t.size, zOrder: t.zOrder,
    entryIds: normalizeEntryIdsForEntries(t.entryIds || [], sceneEntries),
    explorerEnabled: !!t.explorerEnabled,
    exploreRadius: normalizeTokenExploreRadius(t.exploreRadius),
  })));
  const eventsExported = await Promise.all((scene.events || []).map(async (ev) => {
    const icon = ev.icon || { type: 'emoji', value: '❓' };
    const iconSer = icon.type === 'image'
      ? { type: 'image', blob: await blobToBase64(icon.blob) }
      : (icon.type === 'svg-symbol'
         ? { type: 'svg-symbol', symbolId: icon.symbolId }
         : { type: 'emoji', value: icon.value });
    return {
      id: ev.id, x: ev.x, y: ev.y, icon: iconSer,
      title: ev.title, content: ev.content, size: ev.size, zOrder: ev.zOrder,
      layer: (ev.layer === 0 ? 0 : 1),
      entryIds: normalizeEntryIdsForEntries(ev.entryIds || [], sceneEntries),
      ...serializeEventAction(ev),
    };
  }));
  const annotationsExported = await Promise.all((scene.annotations || []).map(async (ann) => {
    const ser = serializeAnnotation(ann);
    ser.entryIds = normalizeEntryIdsForEntries(ann.entryIds || [], sceneEntries);
    if (ser.type === 'image') ser.blob = await blobToBase64(ann.blob);
    return ser;
  }));
  const mapSource = Object.prototype.hasOwnProperty.call(opts, 'mapSource') ? opts.mapSource : (scene.mapSource || null);
  const mapMissing = Object.prototype.hasOwnProperty.call(opts, 'mapMissing') ? opts.mapMissing : Boolean(scene.mapMissing);
  const payload = {
    sceneId,
    name: scene.name || '场景',
    chapterNumber: sceneChapterNumber(scene),
    chapterTitle: sceneChapterTitle(scene),
    createdAt: scene.createdAt || null,
    lastUsedAt: scene.lastUsedAt || scene.ts || null,
    mapFingerprint: scene.mapFingerprint || null,
    mapSize: scene.mapSize || null,
    fogLayers: { terrain: { base64: terrainB64 }, event: { base64: eventFogB64 } },
    tokens: tokensExported,
    events: eventsExported,
    annotations: annotationsExported,
    entries: sceneEntries,
    revealZones: normalizeRevealZones(scene.revealZones || [], sceneEntries),
    view: scene.view || null,
    settings: scene.settings || {},
  };
  if (mapSource) payload.mapSource = mapSource;
  if (mapMissing || mapSource) payload.mapMissing = Boolean(mapMissing || mapSource?.type === 'placeholder');
  return payload;
}

async function exportProject() {
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  if (!state.hasMap) { showToast('请先加载地图'); return; }
  setLoading('正在打包全部场景…');
  try {
    await syncActiveSceneToMemory();
    const sceneEntries = Object.entries(state.scenes || {});
    const scenes = [];
    for (const [sceneId, scene] of sceneEntries) {
      const packed = await serializeSceneForBundle(sceneId, scene);
      scenes.push(packed);
    }
    if (!scenes.length) throw new Error('没有可导出的场景');
    // 主题：仅在非默认时导出
    const isDefaultTheme = !customThemeActive;
    const payload = {
      format: 'fog-of-war-map.fogbundle',
      schemaVersion: BUNDLE_EXPORT_SCHEMA_VERSION,
      appVersion: CLOUD_SYNC_TOOL_VERSION,
      exportedAt: new Date().toISOString(),
      sceneCount: scenes.length,
      currentSceneId: state.currentSceneId,
      diceHistory: serializeDiceHistory(),
      scenes,
      themeId: 'default-dark',
      customTheme: isDefaultTheme ? null : state.theme,
    };
    const json = JSON.stringify(payload);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = url;
    a.download = `战争迷雾-全部场景-${ts}.fogbundle.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    hideLoading();
    const sizeMB = (blob.size / 1024 / 1024).toFixed(1);
    showToast(`已导出 ${scenes.length} 个场景（${sizeMB} MB）`, 3500);
  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('导出失败：' + (e.message || e));
  }
}

function mapFingerprintForPreparedFile(file, prepared) {
  return `${file.name}-${file.size}-${file.lastModified || 0}-${prepared.w}x${prepared.h}`;
}

async function bundleScenePayloadToSaved(scenePayload) {
  if (!scenePayload?.fogLayers?.terrain?.base64 || !scenePayload?.fogLayers?.event?.base64) {
    throw new Error(`场景"${scenePayload?.name || '未命名'}" fog 数据缺失`);
  }
  const terrainBlob = await base64ToBlob(scenePayload.fogLayers.terrain.base64);
  const eventFogBlob = await base64ToBlob(scenePayload.fogLayers.event.base64);
  if (!terrainBlob || !eventFogBlob) throw new Error(`场景"${scenePayload.name || '未命名'}" fog 数据解码失败`);
  const entries = normalizeEntries(scenePayload.entries || []);
  const tokens = await Promise.all((scenePayload.tokens || []).map(async (t) => ({
    ...t,
    blob: await base64ToBlob(t.blob),
    entryIds: normalizeEntryIdsForEntries(t.entryIds || [], entries),
  })));
  const events = await Promise.all((scenePayload.events || []).map(async (ev) => {
    const icon = ev.icon || { type: 'emoji', value: '❓' };
    let restoredIcon = icon;
    if (icon.type === 'image') restoredIcon = { type: 'image', blob: await base64ToBlob(icon.blob) };
    return {
      ...ev,
      icon: restoredIcon,
      entryIds: normalizeEntryIdsForEntries(ev.entryIds || [], entries),
      ...serializeEventAction(ev),
    };
  }));
  const annotations = await Promise.all((scenePayload.annotations || []).map(async (ann) => {
    const base = { ...ann, entryIds: normalizeEntryIdsForEntries(ann.entryIds || [], entries) };
    if (ann.type === 'image') return { ...base, blob: await base64ToBlob(ann.blob) };
    return base;
  }));
  const revealZones = normalizeRevealZones(scenePayload.revealZones || [], entries);
  return {
    version: 2,
    chapterNumber: sceneChapterNumber(scenePayload),
    chapterTitle: sceneChapterTitle(scenePayload),
    fogLayers: {
      terrain: { blob: terrainBlob },
      event: { blob: eventFogBlob },
    },
    mapSize: scenePayload.mapSize || null,
    tokens,
    events,
    annotations,
    entries,
    revealZones,
    view: scenePayload.view || null,
    settings: scenePayload.settings || {},
    mapFingerprint: scenePayload.mapFingerprint || null,
    mapMissing: Boolean(scenePayload.mapMissing),
    mapSource: scenePayload.mapSource || null,
    ts: Date.now(),
  };
}

function openSceneBundleImportWizard(payload) {
  const scenes = Array.isArray(payload.scenes) ? payload.scenes : [];
  if (!scenes.length) {
    showConfirm('场景包为空', '这个场景包没有可导入的场景。', closeModal);
    return;
  }
  const rows = scenes.map((s, i) => {
    const size = s.mapSize ? `${s.mapSize.w}×${s.mapSize.h}` : '未知尺寸';
    const name = escapeHtml(s.name || `场景 ${i + 1}`);
    return `
      <div class="scene-row" data-bundle-scene="${i}">
        <div style="flex:1;min-width:0;">
          <div class="scene-name">${name}</div>
          <div class="scene-meta">地图 ${escapeHtml(size)} · 选择本机地图，不选则跳过</div>
        </div>
        <input class="bundle-map-input" data-index="${i}" type="file" accept="image/png,image/jpeg,image/jpg,image/webp" style="max-width:210px;">
      </div>
    `;
  }).join('');
  showModal(`
    <div class="modal-title">导入全部场景</div>
    <div class="modal-desc">导出文件不包含地图原图。请为要导入的场景选择本机地图；尺寸必须与该场景迷雾一致。未选择地图的场景会跳过。</div>
    <div class="scene-list">${rows}</div>
    <div class="modal-actions">
      <button id="bundle-import-cancel">取消</button>
      <button id="bundle-import-confirm" class="primary">导入已选择场景</button>
    </div>
  `, {
    onMounted: () => {
      const selectedFiles = new Array(scenes.length).fill(null);
      document.querySelectorAll('.bundle-map-input').forEach((input) => {
        input.addEventListener('change', (e) => {
          const idx = Number(e.target.dataset.index);
          selectedFiles[idx] = e.target.files && e.target.files[0] ? e.target.files[0] : null;
        });
      });
      $('bundle-import-cancel').addEventListener('click', closeModal);
      $('bundle-import-confirm').addEventListener('click', () => {
        if (!selectedFiles.some(Boolean)) {
          showToast('请至少为一个场景选择地图');
          return;
        }
        closeModal();
        doImportSceneBundle(payload, selectedFiles);
      });
    }
  });
}

async function doImportSceneBundle(payload, selectedFiles) {
  setLoading('正在导入场景包…');
  const scenes = Array.isArray(payload.scenes) ? payload.scenes : [];
  const preparedEntries = [];
  try {
    await syncActiveSceneToMemory();
    for (let i = 0; i < scenes.length; i++) {
      const file = selectedFiles[i];
      if (!file) continue;
      const scenePayload = scenes[i];
      const preparedMap = await prepareMapFromBlob(file, { showDownsampleToast: true });
      if (scenePayload.mapSize && (scenePayload.mapSize.w !== preparedMap.w || scenePayload.mapSize.h !== preparedMap.h)) {
        throw new Error(`场景"${scenePayload.name || i + 1}"地图尺寸不匹配：需要 ${scenePayload.mapSize.w}×${scenePayload.mapSize.h}，当前 ${preparedMap.w}×${preparedMap.h}`);
      }
      const saved = await bundleScenePayloadToSaved(scenePayload);
      const pair = await decodeAndValidateFogPair(saved, { w: preparedMap.w, h: preparedMap.h });
      if (pair.terrainBmp && typeof pair.terrainBmp.close === 'function') pair.terrainBmp.close();
      if (pair.eventFogBmp && typeof pair.eventFogBmp.close === 'function') pair.eventFogBmp.close();
      const newId = uuid();
      const mapFingerprint = mapFingerprintForPreparedFile(file, preparedMap);
      preparedEntries.push({
        newId,
        preparedMap,
        scene: {
          ...saved,
          mapBlob: file,
          mapFingerprint,
          mapSize: { w: preparedMap.w, h: preparedMap.h },
          name: scenePayload.name || `导入场景 ${preparedEntries.length + 1}`,
          chapterNumber: sceneChapterNumber(scenePayload),
          chapterTitle: sceneChapterTitle(scenePayload),
          createdAt: Date.now(),
          lastUsedAt: Date.now(),
          importedFromSceneId: scenePayload.sceneId || null,
        },
      });
    }
    if (!preparedEntries.length) throw new Error('没有选择可导入的场景');
    const sceneIdMap = new Map();
    preparedEntries.forEach((entry) => {
      if (entry.scene.importedFromSceneId) sceneIdMap.set(entry.scene.importedFromSceneId, entry.newId);
    });
    preparedEntries.forEach((entry) => remapEventSceneLinksInScene(entry.scene, sceneIdMap));
    const preferred = preparedEntries.find((entry) => entry.scene.importedFromSceneId && entry.scene.importedFromSceneId === payload.currentSceneId)
      || preparedEntries[0];
    const preferredPreparedRestore = await prepareSavedRestore(preferred.scene, preferred.scene.mapSize);
    for (const entry of preparedEntries) {
      state.scenes[entry.newId] = entry.scene;
    }
    state.currentSceneId = preferred.newId;
    state.mapFingerprint = preferred.scene.mapFingerprint;
    commitPreparedMap(preferred.preparedMap);
    applyPreparedRestore(preferredPreparedRestore, { fitViewAfterRestore: true });
    if (Object.prototype.hasOwnProperty.call(payload, 'customTheme')) {
      try {
        if (payload.customTheme) loadCustomTheme(payload.customTheme);
        else setTheme('stone');
      } catch (e) { console.warn('导入主题失败', e); }
    }
    state.diceHistory = normalizeDiceHistory(payload.diceHistory || []);
    state.diceLastExpression = state.diceHistory[0]?.expression || 'd20';
    renderDiceHistory();
    await saveMainStrict();
    hideLoading();
    showToast(`已导入 ${preparedEntries.length} 个场景`, 3500);
  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('导入失败：' + (e.message || e), 4200);
  }
}

async function importProject(file) {
  if (!file) return;
  if (state.gridCalibration) { showToast('请先完成或取消网格校准'); return; }
  setLoading('正在解析导入文件…');
  let payload;
  try {
    const text = await file.text();
    payload = JSON.parse(text);
  } catch (e) {
    hideLoading();
    showConfirm('文件解析失败', 'JSON 格式错误或文件损坏。', closeModal);
    return;
  }
  if (payload && payload.format === 'fog-of-war-map.fogbundle') {
    hideLoading();
    if (!payload.schemaVersion || payload.schemaVersion > BUNDLE_EXPORT_SCHEMA_VERSION) {
      showConfirm('版本不兼容', `导入文件 schemaVersion=${payload.schemaVersion}，本工具仅支持 ≤ ${BUNDLE_EXPORT_SCHEMA_VERSION}。请升级工具。`, closeModal);
      return;
    }
    openSceneBundleImportWizard(payload);
    return;
  }
  // schema 校验
  if (!payload || payload.format !== 'fog-of-war-map.fogsave') {
    hideLoading();
    showConfirm('文件格式不正确', '这不是战争迷雾工具的导出文件。', closeModal);
    return;
  }
  if (!payload.schemaVersion || payload.schemaVersion > EXPORT_SCHEMA_VERSION) {
    hideLoading();
    showConfirm('版本不兼容', `导入文件 schemaVersion=${payload.schemaVersion}，本工具仅支持 ≤ ${EXPORT_SCHEMA_VERSION}。请升级工具。`, closeModal);
    return;
  }
  if (!state.hasMap) {
    hideLoading();
    showConfirm('请先加载地图', '旧版单场景导入需要先加载对应的地图图片。新版“全部场景”导入会在向导中逐个选择地图。', closeModal);
    return;
  }
  // fog 尺寸校验（底线，不允许尺寸不一致；旧导出缺 mapSize 时由实际 fog bitmap 兜底）
  const mapW = state.mapCanvas.width, mapH = state.mapCanvas.height;
  if (payload.mapSize && (payload.mapSize.w !== mapW || payload.mapSize.h !== mapH)) {
    hideLoading();
    showConfirm('地图尺寸不匹配',
      `当前地图 ${mapW}×${mapH}，导入文件迷雾 ${payload.mapSize ? payload.mapSize.w + '×' + payload.mapSize.h : '未知'}。请在原机器上重新加载同一张图并重新导出，或先在本机加载相同的地图。`,
      closeModal);
    return;
  }
  // fingerprint 比对（宽松，仅用于提示）
  const fingerprintMatch = (payload.mapFingerprint === state.mapFingerprint);
  hideLoading();
  const missingMapSizeNote = payload.mapSize ? '' : '\n\n导入文件缺少地图尺寸元信息，将改用迷雾图片实际尺寸做底线校验。';
  const desc = fingerprintMatch
    ? '此操作将用导入文件的内容覆盖当前所有迷雾、Token、事件和标注。地图本身不受影响。'
    : `指纹不匹配（文件可能来自另一台机器或同图的不同拷贝），但地图尺寸 ${mapW}×${mapH} 一致，可以导入。\n\n此操作将覆盖当前所有迷雾、Token、事件和标注。`;
  showConfirm('确认导入',
    desc + missingMapSizeNote,
    () => doImportProject(payload),
    { danger: true, yesText: '覆盖并导入' });
}

async function doImportProject(payload) {
  setLoading('正在导入…');
  try {
    // 反序列化为 saved 对象格式（复用 restoreFromSaved 路径）
    if (!payload.fogLayers?.terrain?.base64 || !payload.fogLayers?.event?.base64) {
      throw new Error('fog 数据缺失');
    }
    const terrainBlob = await base64ToBlob(payload.fogLayers.terrain.base64);
    const eventFogBlob = await base64ToBlob(payload.fogLayers.event.base64);
    if (!terrainBlob || !eventFogBlob) throw new Error('fog 数据解码失败');
    const entries = normalizeEntries(payload.entries || []);
    const tokensRestored = await Promise.all((payload.tokens || []).map(async (t) => ({
      ...t,
      blob: await base64ToBlob(t.blob),
      entryIds: normalizeEntryIdsForEntries(t.entryIds || [], entries),
    })));
    const eventsRestored = await Promise.all((payload.events || []).map(async (ev) => {
      const icon = ev.icon || { type: 'emoji', value: '❓' };
      let restoredIcon;
      if (icon.type === 'image') {
        const blob = await base64ToBlob(icon.blob);
        restoredIcon = { type: 'image', blob };
      } else {
        restoredIcon = icon;
      }
      return {
        ...ev,
        icon: restoredIcon,
        entryIds: normalizeEntryIdsForEntries(ev.entryIds || [], entries),
        ...serializeEventAction(ev),
      };
    }));
    const annotationsRestored = await Promise.all((payload.annotations || []).map(async (ann) => {
      const base = { ...ann, entryIds: normalizeEntryIdsForEntries(ann.entryIds || [], entries) };
      if (ann.type === 'image') return { ...base, blob: await base64ToBlob(ann.blob) };
      return base;
    }));
    // 构造 saved 对象，重用 restoreFromSaved
    const fakeSaved = {
      version: SCHEMA_VERSION,
      fogLayers: {
        terrain: { blob: terrainBlob },
        event:   { blob: eventFogBlob },
      },
      tokens: tokensRestored,
      events: eventsRestored,
      annotations: annotationsRestored,
      entries,
      view: null,
      settings: payload.settings || {},
      chapterNumber: sceneChapterNumber(payload),
      chapterTitle: sceneChapterTitle(payload),
      customTheme: payload.customTheme || null,
      mapFingerprint: state.mapFingerprint,  // 对齐当前指纹
      ts: Date.now(),
    };
    const restored = await restoreFromSaved(fakeSaved, { fitViewAfterRestore: true });
    if (!restored) return;
    if (state.currentSceneId && state.scenes[state.currentSceneId]) {
      state.scenes[state.currentSceneId].chapterNumber = sceneChapterNumber(payload);
      state.scenes[state.currentSceneId].chapterTitle = sceneChapterTitle(payload);
      updateSceneStatus();
    }
    // 写 IDB（这样刷新后能继续）
    await triggerImmediateSave();
    hideLoading();
    showToast(`已导入 ${tokensRestored.length} Token / ${eventsRestored.length} 事件 / ${annotationsRestored.length} 标注`, 3500);
  } catch (e) {
    hideLoading();
    console.error(e);
    showToast('导入失败：' + (e.message || e));
  }
}

// ============== 多场景管理（v3.0） ==============
async function switchScene(targetId) {
  if (!state.scenes[targetId]) { showToast('场景不存在'); return; }
  if (targetId === state.currentSceneId) return;
  // 保存当前场景到 state.scenes
  if (state.hasMap && state.currentSceneId) {
    const sceneCore = await serializeActiveSceneData();
    if (sceneCore) {
      const prev = state.scenes[state.currentSceneId] || {};
      state.scenes[state.currentSceneId] = {
        ...sceneCore,
        ...sceneMapRuntimeFields(prev),
        mapSize: sceneCore.mapSize,
        name: prev.name || '场景',
        chapterNumber: sceneChapterNumber(prev),
        chapterTitle: sceneChapterTitle(prev),
        createdAt: prev.createdAt || Date.now(),
        lastUsedAt: Date.now(),
      };
    }
  }
  const target = state.scenes[targetId];
  const prevSceneId = state.currentSceneId;
  const prevHasMap = state.hasMap;
  setLoading('切换场景中…');
  try {
    const preparedMap = await prepareSceneMapForRestore(target);
    const preparedRestore = await prepareSavedRestore(target, { w: preparedMap.w, h: preparedMap.h });
    const mapInfo = preparedMap;
    commitPreparedMap(preparedMap);
    state.mapFingerprint = target.mapFingerprint;
    $('splash').style.display = 'none';
    state.currentSceneId = targetId;
    target.mapSize = { w: mapInfo.w, h: mapInfo.h };
    const restored = await restoreFromSaved(target, { preparedRestore });
    if (!restored) throw new Error('恢复场景数据失败');
    state.undoStack = [];
    updateUndoButton();
    fitView();
    setupBrushSizeFromState();
    updateSceneStatus();
    triggerImmediateSave();
    const suffix = sceneNeedsLocalMap(target) ? '（占位地图，需绑定地图）' : '';
    showToast('已切换到 "' + (target.name || '场景') + '"' + suffix, 2600);
  } catch (e) {
    console.error(e);
    // 回滚：保持原 currentSceneId 不变
    state.currentSceneId = prevSceneId;
    state.hasMap = prevHasMap;
    showToast('切换场景失败：' + (e.message || e));
  }
  hideLoading();
}

async function deleteScene(id) {
  if (!state.scenes[id]) return;
  const wasCurrent = (id === state.currentSceneId);
  delete state.scenes[id];
  if (wasCurrent) {
    // 按 lastUsedAt 倒序选最近用过的
    const remaining = Object.keys(state.scenes)
      .sort((a, b) => (state.scenes[b].lastUsedAt || 0) - (state.scenes[a].lastUsedAt || 0));
    if (remaining.length > 0) {
      state.currentSceneId = null;  // 防 switchScene 短路（targetId === current）
      await switchScene(remaining[0]);
    } else {
      state.currentSceneId = null;
      state.hasMap = false;
      clearAnnotationRuntimeResources();
      state.tokens = []; state.events = []; state.annotations = [];
      state.entries = [];
      state.activeEntryId = null;
      clearSelection({ render: false });
      state.undoStack = [];
      // 释放 mapImage
      if (state.mapImage && typeof state.mapImage.close === 'function') {
        try { state.mapImage.close(); } catch (_) {}
      }
      state.mapImage = null;
      updateTokensStatus(); updateEventsStatus(); updateAnnotationsStatus(); updateEntryButton(); updateUndoButton(); updateSceneStatus();
      refreshSelectionUi();
      $('splash').style.display = 'flex';
      scheduleRender('all');
    }
  } else {
    updateSceneStatus();
  }
  triggerImmediateSave();
}

function openSceneManagerModal() {
  const ids = Object.keys(state.scenes);
  const canEditScenes = isEditSurface();
  const placeholderCount = ids.filter((id) => sceneNeedsLocalMap(state.scenes[id])).length;
  // 按 lastUsedAt 倒序
  ids.sort((a, b) => (state.scenes[b].lastUsedAt || 0) - (state.scenes[a].lastUsedAt || 0));
  const rows = ids.map((id) => {
    const s = state.scenes[id];
    const isCurrent = (id === state.currentSceneId);
    const name = escapeHtml(s.name || '场景');
    const mapLabel = s.mapBlob ? '🗺' : (sceneNeedsLocalMap(s) ? '□ 待绑定地图' : '⚠ 无图');
    const ago = s.lastUsedAt ? Math.max(1, Math.round((Date.now() - s.lastUsedAt) / 60000)) + ' 分钟前' : '';
    return `
      <div class="scene-row ${isCurrent ? 'current' : ''}">
        <span class="scene-name">${isCurrent ? '✓ ' : ''}${name}</span>
        <span class="scene-meta">${mapLabel} ${ago}</span>
        <div class="scene-actions">
          ${isCurrent ? '' : `<button class="scene-switch" data-id="${id}">切换</button>`}
          ${canEditScenes ? `<button class="scene-rename" data-id="${id}">改名</button>` : ''}
          ${canEditScenes ? `<button class="scene-delete" data-id="${id}">删</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
  showModal(`
    <div class="modal-title">${canEditScenes ? '场景管理' : '切换场景'}（${ids.length}）</div>
    <div class="modal-desc">${canEditScenes ? '每个场景含独立的地图、迷雾、Token、事件、视口。"新建场景"会让你选一张新地图。' : '跑团态只用于切换已准备好的场景。新建、改名和删除请进入编辑态。'}</div>
    <div class="scene-list">${rows || '<div style="color:var(--theme-text-muted);padding:20px;text-align:center;">暂无场景，先加载一张地图</div>'}</div>
    <div class="modal-actions">
      <button id="scene-close">关闭</button>
      ${canEditScenes && placeholderCount ? `<button id="scene-placeholder-wizard">恢复占位地图（${placeholderCount}）</button>` : ''}
      ${canEditScenes ? '<button id="scene-new" class="primary">+ 新建场景（加载地图）</button>' : ''}
    </div>
  `, {
    onMounted: () => {
      $('scene-close').addEventListener('click', closeModal);
      if (canEditScenes && placeholderCount) {
        $('scene-placeholder-wizard').addEventListener('click', () => {
          showPlaceholderRestoreWizard();
        });
      }
      if (canEditScenes) {
        $('scene-new').addEventListener('click', () => {
          closeModal();
          $('file-input-map').click();
        });
      }
      document.querySelectorAll('.scene-switch').forEach((b) => {
        b.addEventListener('click', () => {
          closeModal();
          switchScene(b.dataset.id);
        });
      });
      document.querySelectorAll('.scene-rename').forEach((b) => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          const cur = state.scenes[id]?.name || '';
          const newName = prompt('场景名', cur);
          if (newName && newName.trim()) {
            state.scenes[id].name = newName.trim();
            triggerImmediateSave();
            closeModal();
            openSceneManagerModal();
          }
        });
      });
      document.querySelectorAll('.scene-delete').forEach((b) => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          const name = state.scenes[id]?.name || '场景';
          if (Object.keys(state.scenes).length === 1) {
            showToast('至少保留一个场景');
            return;
          }
          closeModal();
          showConfirm(`删除场景"${name}"?`, '该场景的所有迷雾、Token、事件、地图都会删除。',
            async () => { await deleteScene(id); openSceneManagerModal(); },
            { danger: true, yesText: '删除' });
        });
      });
    }
  });
}

function cloneGridSettings(grid) {
  return normalizeGridSettings(grid);
}

function startGridCalibration() {
  if (!state.hasMap) {
    showToast('请先加载地图');
    return;
  }
  clearTimeout(state.debouncedSaveTimer);
  state.debouncedSaveTimer = null;
  hideDropdown();
  if (state.activeStroke) onStrokeEnd(false);
  cancelLongPress();
  clearSelection({ render: false });
  state.gridCalibration = {
    originalGrid: cloneGridSettings(state.grid),
    pointerId: null,
    startX: 0,
    startY: 0,
    startOffsetX: 0,
    startOffsetY: 0,
  };
  state.uiMode = 'grid-calibration';
  state.grid.enabled = true;
  state.grid.type = normalizeGridType(state.grid.type);
  state.grid.rotation = normalizeGridRotationForType(state.grid.type, state.grid.rotation || 0);
  invalidateGridCache();
  renderGridCalibrationPanel();
  scheduleRender('all');
  showToast('正在校准网格：拖动对位，滑杆调大小/旋转');
}

function renderGridCalibrationPanel() {
  let panel = $('grid-calibration-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'grid-calibration-panel';
    $('canvas-container').appendChild(panel);
  }
  const gridType = normalizeGridType(state.grid.type);
  const rotLimit = gridRotationLimit(gridType);
  const sizeLabel = gridType === 'square' ? '方格边长' : '六边形边长';
  panel.innerHTML = `
    <div class="panel-title">网格校准</div>
    <div class="panel-row">
      <label for="grid-calibration-size">${sizeLabel} <span id="grid-calibration-size-val">${Math.round(state.grid.cellSize)}</span></label>
      <input id="grid-calibration-size" type="range" min="20" max="240" value="${Math.round(state.grid.cellSize)}">
    </div>
    <div class="panel-row">
      <label for="grid-calibration-rotation">旋转 <span id="grid-calibration-rotation-val">${formatGridNumber(state.grid.rotation || 0)}°</span></label>
      <input id="grid-calibration-rotation" type="range" min="${-rotLimit}" max="${rotLimit}" step="0.5" value="${normalizeGridRotationForType(gridType, state.grid.rotation || 0)}">
    </div>
    <div class="panel-meta" id="grid-calibration-meta">X ${formatGridNumber(state.grid.offsetX)} / Y ${formatGridNumber(state.grid.offsetY)} / 旋转 ${formatGridNumber(state.grid.rotation || 0)}°</div>
    <div class="panel-actions">
      <button id="grid-calibration-cancel">取消</button>
      <button id="grid-calibration-done" class="primary">完成校准</button>
    </div>
  `;
  $('grid-calibration-size').addEventListener('input', (e) => {
    state.grid.cellSize = parseInt(e.target.value, 10) || 80;
    updateGridCalibrationPanel();
    invalidateGridCache();
    scheduleRender('all');
  });
  $('grid-calibration-rotation').addEventListener('input', (e) => {
    state.grid.rotation = normalizeGridRotationForType(state.grid.type, e.target.value);
    updateGridCalibrationPanel();
    invalidateGridCache();
    scheduleRender('all');
  });
  $('grid-calibration-cancel').addEventListener('click', () => finishGridCalibration(false));
  $('grid-calibration-done').addEventListener('click', () => finishGridCalibration(true));
}

function updateGridCalibrationPanel() {
  const sizeVal = $('grid-calibration-size-val');
  if (sizeVal) sizeVal.textContent = Math.round(state.grid.cellSize);
  const sizeInput = $('grid-calibration-size');
  if (sizeInput && String(Math.round(state.grid.cellSize)) !== sizeInput.value) {
    sizeInput.value = Math.round(state.grid.cellSize);
  }
  const rotationVal = $('grid-calibration-rotation-val');
  if (rotationVal) rotationVal.textContent = formatGridNumber(state.grid.rotation || 0) + '°';
  const rotationInput = $('grid-calibration-rotation');
  const rotationValue = String(normalizeGridRotationForType(state.grid.type, state.grid.rotation || 0));
  if (rotationInput && rotationValue !== rotationInput.value) {
    rotationInput.value = rotationValue;
  }
  const meta = $('grid-calibration-meta');
  if (meta) meta.textContent = `X ${formatGridNumber(state.grid.offsetX)} / Y ${formatGridNumber(state.grid.offsetY)} / 旋转 ${formatGridNumber(state.grid.rotation || 0)}°`;
}

function formatGridNumber(v) {
  return (Math.round((v || 0) * 10) / 10).toString();
}

function defaultGridSettings() {
  return { enabled: false, type: 'hex', cellSize: 80, offsetX: 0, offsetY: 0, rotation: 0, lineColor: '#ffffff', lineOpacity: 0.25 };
}

function normalizeGridSettings(grid) {
  if (!grid) return defaultGridSettings();
  const type = normalizeGridType(grid.type);
  const cellSize = clamp(Math.round(Number(grid.cellSize) || 80), 20, 240);
  const rawOffsetX = Number(grid.offsetX);
  const rawOffsetY = Number(grid.offsetY);
  const offsetLimit = Math.max(100000, (state.mapCanvas.width || 0) * 4, (state.mapCanvas.height || 0) * 4);
  const offsetX = Number.isFinite(rawOffsetX) ? clamp(rawOffsetX, -offsetLimit, offsetLimit) : 0;
  const offsetY = Number.isFinite(rawOffsetY) ? clamp(rawOffsetY, -offsetLimit, offsetLimit) : 0;
  const rawOpacity = Number(grid.lineOpacity != null ? grid.lineOpacity : 0.25);
  const lineOpacity = Number.isFinite(rawOpacity) ? clamp(rawOpacity, 0, 1) : 0.25;
  return {
    enabled: !!grid.enabled,
    type,
    cellSize,
    offsetX,
    offsetY,
    rotation: normalizeGridRotationForType(type, grid.rotation || 0),
    lineColor: normalizeHex(grid.lineColor || '#ffffff'),
    lineOpacity,
  };
}

function finishGridCalibration(save) {
  const calibration = state.gridCalibration;
  if (!calibration) return;
  if (!save) {
    state.grid = cloneGridSettings(calibration.originalGrid);
  }
  state.gridCalibration = null;
  state.uiMode = 'normal';
  cancelLongPress();
  for (const [id] of state.pointers) {
    try { state.mainCanvas.releasePointerCapture(id); } catch (_) {}
  }
  state.pointers.clear();
  state.pinchAnchor = null;
  state.panAnchor = null;
  const panel = $('grid-calibration-panel');
  if (panel) panel.remove();
  invalidateGridCache();
  scheduleRender('all');
  if (save) {
    triggerImmediateSave();
    showToast('网格校准已保存');
  } else {
    triggerImmediateSave();
    showToast('已取消网格校准');
  }
}

function handleGridCalibrationPointerDown(info, e, sx, sy) {
  e.preventDefault();
  cancelLongPress();
  hideEventCard();
  if (state.pointers.size >= 2 || (e.pointerType === 'mouse' && e.button !== 0)) {
    info.role = 'grid-calibration-ignore';
    return;
  }
  const calibration = state.gridCalibration;
  info.role = 'grid-calibration';
  calibration.pointerId = e.pointerId;
  calibration.startX = sx;
  calibration.startY = sy;
  calibration.startOffsetX = state.grid.offsetX || 0;
  calibration.startOffsetY = state.grid.offsetY || 0;
  state.showBrushPreview = false;
}

function moveGridCalibration(info, x, y) {
  const calibration = state.gridCalibration;
  if (!calibration || calibration.pointerId !== info.id) return;
  const dx = (x - calibration.startX) / state.view.scale;
  const dy = (y - calibration.startY) / state.view.scale;
  state.grid.offsetX = calibration.startOffsetX + dx;
  state.grid.offsetY = calibration.startOffsetY + dy;
  updateGridCalibrationPanel();
  invalidateGridCache();
  scheduleRender('all');
}

// ============== 渲染 ==============
function scheduleRender(rectOrAll) {
  if (rectOrAll === 'all') state.dirtyRect = 'all';
  else if (state.dirtyRect !== 'all') {
    if (!state.dirtyRect) state.dirtyRect = { x: rectOrAll.x, y: rectOrAll.y, w: rectOrAll.w, h: rectOrAll.h };
    else mergeRectInto(state.dirtyRect, rectOrAll);
  }
  if (state.rafId != null) return;
  state.rafId = requestAnimationFrame(renderFrame);
}

function mergeRectInto(a, b) {
  const x1 = Math.min(a.x, b.x), y1 = Math.min(a.y, b.y);
  const x2 = Math.max(a.x + a.w, b.x + b.w), y2 = Math.max(a.y + a.h, b.y + b.h);
  a.x = x1; a.y = y1; a.w = x2 - x1; a.h = y2 - y1;
}

function renderFrame() {
  state.rafId = null;
  if (state.dirtyRect == null) return;
  const ctx = state.mainCtx;
  const cv = state.mainCanvas;
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.restore();
  drawAll();
  drawBrushPreview();
  drawSelectedHighlight();
  state.dirtyRect = null;
  positionTokenActionBar();
  positionAnnotationActionBar();
  positionGridMaskActionBar();
  positionEventCard();
}

function drawAll() {
  if (!state.hasMap) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const setMapTransform = () => ctx.setTransform(state.view.scale * dpr, 0, 0, state.view.scale * dpr, state.view.x * dpr, state.view.y * dpr);
  const setScreenTransform = () => ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // 1. 地图
  drawMapSurfaceShadow(ctx, setScreenTransform);
  setMapTransform();
  ctx.drawImage(state.mapCanvas, 0, 0);

  // 2. 地形层 fog
  ctx.globalAlpha = state.terrainFogOpacity;
  ctx.drawImage(state.fogLayers.terrain.canvas, 0, 0);
  ctx.globalAlpha = 1;

  // 3. 事件 icon · layer 1（屏幕坐标，会被事件 fog 遮）
  setScreenTransform();
  drawAllEvents(ctx, 1);

  // 4. 事件层 fog（地图坐标，遮 layer 1 事件）
  setMapTransform();
  ctx.globalAlpha = state.eventFogOpacity;
  ctx.drawImage(state.fogLayers.event.canvas, 0, 0);
  ctx.globalAlpha = 1;

  // 5. 地图标注（按遮罩中心点判定可见）+ 事件 icon · layer 0（在所有 fog 之上）
  drawAllAnnotations(ctx, 'terrain');
  drawAllAnnotations(ctx, 'event');
  drawAllAnnotations(ctx, 'public');
  setScreenTransform();
  drawAllEvents(ctx, 0);

  // 6. 网格线 overlay（v3.1，地图坐标系，token 之下）
  setMapTransform();
  drawGridOverlay(ctx);
  drawRevealZoneOverlays(ctx);
  drawGridMaskSelectionOverlay(ctx);

  // 7. Token（最上层，永远可见）
  drawTokens(ctx);
}

function drawMapSurfaceShadow(ctx, setScreenTransform) {
  if (currentThemeId !== 'parchment') return;
  const w = state.mapCanvas.width * state.view.scale;
  const h = state.mapCanvas.height * state.view.scale;
  if (w <= 0 || h <= 0) return;
  setScreenTransform();
  ctx.save();

  // parchment 采用单一柔光投影，避免出现硬朗的 L 型阴影带。
  const x = state.view.x;
  const y = state.view.y;
  ctx.shadowColor = 'rgba(55,34,14,0.5)';
  ctx.shadowBlur = 34;
  ctx.shadowOffsetX = 18;
  ctx.shadowOffsetY = 24;
  ctx.fillStyle = 'rgba(55,34,14,0.2)';
  ctx.fillRect(x, y, w, h);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  ctx.strokeStyle = 'rgba(58,36,16,0.34)';
  ctx.lineWidth = 2;
  ctx.strokeRect(state.view.x + 0.5, state.view.y + 0.5, Math.max(0, w - 1), Math.max(0, h - 1));
  ctx.restore();
}

function drawTokens(ctx) {
  // 地图坐标系下画 token 图，描边/标签切屏幕坐标
  const sorted = state.tokens.slice().sort((a, b) => {
    if (a.id === state.selectedTokenId) return 1;
    if (b.id === state.selectedTokenId) return -1;
    return a.zOrder - b.zOrder;
  });
  for (const t of sorted) drawSingleToken(ctx, t);
}

function drawSingleToken(ctx, t) {
  const dpr = state._dpr || 1;
  const ratio = t.imageBitmap ? (t.imageBitmap.width / t.imageBitmap.height) : 1;
  let drawW, drawH;
  if (t.shape === 'circle' || t.shape === 'square') {
    drawW = t.size; drawH = t.size;
  } else {
    if (ratio >= 1) { drawW = t.size; drawH = t.size / ratio; }
    else { drawH = t.size; drawW = t.size * ratio; }
  }
  const dx = t.x - drawW / 2;
  const dy = t.y - drawH / 2;
  ctx.save();
  if (t.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    if (t.imageBitmap) ctx.drawImage(t.imageBitmap, dx, dy, drawW, drawH);
  } else {
    if (t.imageBitmap) ctx.drawImage(t.imageBitmap, dx, dy, drawW, drawH);
  }
  ctx.restore();

  // 描边和标签：切屏幕坐标
  if ((t.borderColor && t.borderPattern !== 'none') || t.name) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const [scx, scy] = mapToScreen(t.x, t.y);
    if (t.borderColor && t.borderPattern !== 'none') {
      const halfScreen = (t.size / 2) * state.view.scale;
      ctx.strokeStyle = semanticColorOf(t.borderColor);
      ctx.lineWidth = 3;
      if (t.borderPattern === 'dashed') ctx.setLineDash([8, 6]);
      else ctx.setLineDash([]);
      if (t.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(scx, scy, halfScreen, 0, Math.PI * 2);
        ctx.stroke();
        if (t.borderPattern === 'double') {
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(scx, scy, halfScreen - 4, 0, Math.PI * 2);
          ctx.stroke();
        }
      } else {
        const sw = drawW * state.view.scale, sh = drawH * state.view.scale;
        ctx.strokeRect(scx - sw / 2, scy - sh / 2, sw, sh);
        if (t.borderPattern === 'double') {
          ctx.lineWidth = 2;
          ctx.strokeRect(scx - sw / 2 + 4, scy - sh / 2 + 4, sw - 8, sh - 8);
        }
      }
    }
    if (t.name) {
      const halfScreen = (t.size / 2) * state.view.scale;
      const labelY = scy + halfScreen + 6;
      ctx.font = '600 13px ' + state.theme.fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.lineWidth = 3;
      ctx.strokeStyle = state.theme.textOutline;
      ctx.strokeText(t.name, scx, labelY);
      ctx.fillStyle = '#fff';
      ctx.fillText(t.name, scx, labelY);
    }
    ctx.restore();
  }
  if (objectHasActiveEntry(t)) drawTokenEntryHalo(ctx, t, drawW, drawH);
}

// ============== 事件 icon 渲染 ==============
function drawAllEvents(ctx, layerFilter) {
  // layerFilter: 0 (永远可见层) 或 1 (被事件 fog 遮的普通层)
  // layer 1 事件：检查事件层 fog 在该位置的 alpha，被遮则不渲染（与 hit-test 一致）
  const sorted = state.events.slice()
    .filter((e) => (e.layer === 0 ? 0 : 1) === layerFilter)
    .filter((e) => layerFilter === 0 ? true : isEventVisible(e))
    .sort((a, b) => {
      if (a.id === state.selectedEventId) return 1;
      if (b.id === state.selectedEventId) return -1;
      return a.zOrder - b.zOrder;
    });
  for (const ev of sorted) drawEventIcon(ctx, ev);
}

function eventsForEntry(entryId) {
  if (!entryId) return [];
  const entry = getEntryById(entryId);
  if (!entryCanSpotlight(entry)) return [];
  return (state.events || []).filter((ev) => objectEntryIds(ev).includes(entryId));
}

async function toggleEventsForEntryId(entryId) {
  const entry = getEntryById(entryId);
  const events = eventsForEntry(entryId);
  if (!entry || !events.length) {
    showToast('当前词条没有绑定事件', 1800);
    return 0;
  }
  const shouldPromote = events.some((ev) => ev.layer !== 0);
  for (const ev of events) {
    await modifyEvent(ev.id, { layer: shouldPromote ? 0 : 1 });
  }
  state.activeEntryId = null;
  updateEntryButton();
  refreshSelectionUi();
  const action = shouldPromote ? '显露到遮罩上层' : '放回事件遮罩下';
  showToast(`已将 ${events.length} 个「${entry.name}」事件${action}`, 1800);
  return events.length;
}

function drawEventIcon(ctx, ev) {
  const [scx, scy] = mapToScreen(ev.x, ev.y);
  const r = ev.size / 2;
  // 半透明白底
  ctx.fillStyle = state.theme.eventIconBg;
  ctx.beginPath();
  ctx.arc(scx, scy, r + 2, 0, Math.PI * 2);
  ctx.fill();
  // 描边（轻微深色边）
  ctx.strokeStyle = state.theme.eventIconEdge;
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(scx, scy, r + 2, 0, Math.PI * 2);
  ctx.stroke();

  // icon 本体
  if (ev.icon.type === 'emoji') {
    ctx.font = `${Math.floor(ev.size * 0.7)}px ${state.theme.fontFamily}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000';
    ctx.fillText(ev.icon.value, scx, scy + 1);
  } else if (ev.icon.type === 'image' && ev.icon.bitmap) {
    const bm = ev.icon.bitmap;
    const ratio = bm.width / bm.height;
    let dw, dh;
    if (ratio >= 1) { dw = ev.size * 0.85; dh = dw / ratio; }
    else { dh = ev.size * 0.85; dw = dh * ratio; }
    ctx.save();
    ctx.beginPath();
    ctx.arc(scx, scy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(bm, scx - dw / 2, scy - dh / 2, dw, dh);
    ctx.restore();
  } else if (ev.icon.type === 'svg-symbol') {
    // 占位：v2.0 不实施 SVG 主题包，降级为 ❓
    ctx.font = `${Math.floor(ev.size * 0.7)}px ${state.theme.fontFamily}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000';
    ctx.fillText('❓', scx, scy + 1);
  }
}

function entryHaloColor(item) {
  const entry = getEntryById(state.activeEntryId);
  return entry?.color || state.theme.warn || '#fbbf24';
}

function drawScreenHalo(ctx, x, y, radius, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 5]);
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, radius + 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawEventEntryHalo(ctx, ev) {
  const [scx, scy] = mapToScreen(ev.x, ev.y);
  drawScreenHalo(ctx, scx, scy, (ev.size / 2) + 8, entryHaloColor(ev));
}

function drawEntrySpotlightEvents(ctx) {
  if (!state.activeEntryId) return;
  const sorted = state.events.slice()
    .filter((ev) => objectHasActiveEntry(ev))
    .sort((a, b) => (a.zOrder || 0) - (b.zOrder || 0));
  for (const ev of sorted) {
    drawEventIcon(ctx, ev);
    drawEventEntryHalo(ctx, ev);
  }
}

function drawTokenEntryHalo(ctx, t, drawW, drawH) {
  const dpr = state._dpr || 1;
  const [scx, scy] = mapToScreen(t.x, t.y);
  const color = entryHaloColor(t);
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (t.shape === 'circle') {
    drawScreenHalo(ctx, scx, scy, (t.size / 2) * state.view.scale + 8, color);
  } else {
    const sw = drawW * state.view.scale;
    const sh = drawH * state.view.scale;
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 14;
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 5]);
    ctx.strokeRect(scx - sw / 2 - 8, scy - sh / 2 - 8, sw + 16, sh + 16);
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = color;
    ctx.fillRect(scx - sw / 2 - 8, scy - sh / 2 - 8, sw + 16, sh + 16);
  }
  ctx.restore();
}

function drawSelectedHighlight() {
  if (state.selectedTokenId) drawSelectedTokenHighlight();
  else if (state.selectedAnnotationId) drawSelectedAnnotationHighlight();
  else if (state.selectedEventId) drawSelectedEventHighlight();
}

function drawSelectedTokenHighlight() {
  const t = state.tokens.find((x) => x.id === state.selectedTokenId);
  if (!t) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const [scx, scy] = mapToScreen(t.x, t.y);
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = state.theme.tokenSelectedGlow;
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 3]);
  if (t.shape === 'circle') {
    const r = (t.size / 2) * state.view.scale + 6;
    ctx.beginPath();
    ctx.arc(scx, scy, r, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    let drawW, drawH;
    const ratio = t.imageBitmap ? (t.imageBitmap.width / t.imageBitmap.height) : 1;
    if (t.shape === 'square') { drawW = t.size; drawH = t.size; }
    else { if (ratio >= 1) { drawW = t.size; drawH = t.size / ratio; } else { drawH = t.size; drawW = t.size * ratio; } }
    const sw = drawW * state.view.scale + 12, sh = drawH * state.view.scale + 12;
    ctx.strokeRect(scx - sw / 2, scy - sh / 2, sw, sh);
  }
  ctx.restore();
}

function drawSelectedEventHighlight() {
  const ev = state.events.find((x) => x.id === state.selectedEventId);
  if (!ev) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  const [scx, scy] = mapToScreen(ev.x, ev.y);
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = state.theme.eventSelectedGlow;
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.arc(scx, scy, ev.size / 2 + 7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawBrushPreview() {
  if (state.gridCalibration) return;
  if (state.spaceHeld) { drawSafeSelectPreview(); return; }
  if (!state.showBrushPreview || !state.hasMap) return;
  if (state.uiMode !== 'normal') return;
  if (state.cursorScreenX < 0) return;
  if (state.placeEventMode) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const color = state.brush.mode === 'reveal-all'
    ? state.theme.warn
    : (state.currentLayer === 'terrain' ? state.theme.brushPreviewTerrain : state.theme.brushPreviewEvent);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  if (state.brush.mode === 'reveal' || state.brush.mode === 'reveal-all') ctx.setLineDash([4, 4]);
  else ctx.setLineDash([]);

  let previewRadius;  // 用于文字标签定位
  if (state.grid && state.grid.enabled) {
    // 网格模式：画当前指向格子的轮廓（hex / square）
    const [mx, my] = screenToMap(state.cursorScreenX, state.cursorScreenY);
    const cell = gridCellAtPoint(mx, my, state.grid);
    const verts = gridCellVertices(cell, state.grid).map(([vx, vy]) => mapToScreen(vx, vy));
    ctx.beginPath();
    ctx.moveTo(verts[0][0], verts[0][1]);
    for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0], verts[i][1]);
    ctx.closePath();
    ctx.stroke();
    const [ccx, ccy] = mapToScreen(...gridCellCenter(cell, state.grid));
    previewRadius = Math.max(...verts.map(([vx, vy]) => Math.hypot(vx - ccx, vy - ccy)));
  } else {
    const r = state.brush.sizeScreen / 2;
    ctx.beginPath();
    ctx.arc(state.cursorScreenX, state.cursorScreenY, r, 0, Math.PI * 2);
    ctx.stroke();
    previewRadius = r;
  }
  // 文字标签
  ctx.font = '12px ' + state.theme.fontFamily;
  ctx.fillStyle = state.theme.brushLabelColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.setLineDash([]);
  const labelX = state.cursorScreenX + previewRadius + 8;
  const labelY = state.cursorScreenY;
  const layerLabel = state.brush.mode === 'reveal-all'
    ? '双层'
    : (state.currentLayer === 'terrain' ? '地形' : '事件');
  const modeLabel = state.brush.mode === 'cover' ? '盖' : (state.brush.mode === 'reveal-all' ? '全揭' : '揭');
  const gridLabel = (state.grid && state.grid.enabled) ? '·格' : '';
  const text = layerLabel + '·' + modeLabel + gridLabel;
  ctx.lineWidth = 3;
  ctx.strokeStyle = state.theme.brushLabelOutline;
  ctx.strokeText(text, labelX, labelY);
  ctx.fillText(text, labelX, labelY);
  ctx.restore();
}

function drawSafeSelectPreview() {
  if (!state.hasMap || state.uiMode !== 'normal') return;
  if (state.cursorScreenX < 0) return;
  const ctx = state.mainCtx;
  const dpr = state._dpr || 1;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const x = state.cursorScreenX;
  const y = state.cursorScreenY;
  ctx.strokeStyle = state.theme.warn;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.68)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.arc(x, y, 13, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillRect(x + 18, y - 15, 128, 30);
  ctx.strokeStyle = state.theme.warn;
  ctx.strokeRect(x + 18, y - 15, 128, 30);
  ctx.font = '600 12px ' + state.theme.fontFamily;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = state.theme.text || '#fff';
  ctx.fillText('安全选择 · 不擦雾', x + 26, y);
  ctx.restore();
}

function resizeMainCanvas() {
  const cv = state.mainCanvas;
  const dpr = Math.min(window.devicePixelRatio || 1, state.theme.maxDpr || 2);
  const rect = cv.parentElement.getBoundingClientRect();
  cv.width = Math.floor(rect.width * dpr);
  cv.height = Math.floor(rect.height * dpr);
  cv.style.width = rect.width + 'px';
  cv.style.height = rect.height + 'px';
  state._dpr = dpr;
  scheduleRender('all');
}

// ============== 视口 ==============
function fitView() {
  if (!state.hasMap) return;
  const cv = state.mainCanvas;
  const rect = cv.parentElement.getBoundingClientRect();
  const pad = 32;
  const screenW = Math.max(1, rect.width - pad);
  const screenH = Math.max(1, rect.height - pad);
  const scale = Math.min(screenW / state.mapCanvas.width, screenH / state.mapCanvas.height);
  state.view.scale = clamp(scale, SCALE_MIN, SCALE_MAX);
  state.view.x = (rect.width - state.mapCanvas.width * state.view.scale) / 2;
  state.view.y = (rect.height - state.mapCanvas.height * state.view.scale) / 2;
  state.viewIsPristineFit = true;
  scheduleRender('all');
  updateZoomStatus();
  hideEventCard();
}

function zoomAt(sx, sy, factor) {
  const oldScale = state.view.scale;
  const newScale = clamp(oldScale * factor, SCALE_MIN, SCALE_MAX);
  if (newScale === oldScale) return;
  const [mx, my] = screenToMap(sx, sy);
  state.view.scale = newScale;
  state.view.x = sx - mx * newScale;
  state.view.y = sy - my * newScale;
  state.viewIsPristineFit = false;
  scheduleRender('all');
  updateZoomStatus();
  hideEventCard();
}

function updateZoomStatus() {
  $('status-zoom').textContent = Math.round(state.view.scale * 100) + '%';
}

// ============== 笔刷 ==============
function getStrokeLayerKeys(stroke) {
  if (!stroke) return [];
  return stroke.layer === 'all' ? ['terrain', 'event'] : [stroke.layer];
}

function captureStrokeTile(stroke, tx, ty, rect, layerKeys) {
  const key = tx + ',' + ty;
  let snap = stroke.affectedTiles.get(key);
  if (!snap) {
    snap = { rect, images: {} };
    stroke.affectedTiles.set(key, snap);
  }
  for (const layerKey of layerKeys) {
    if (snap.images[layerKey]) continue;
    const ctx = state.fogLayers[layerKey].ctx;
    try {
      snap.images[layerKey] = ctx.getImageData(rect.x, rect.y, rect.w, rect.h);
    } catch (e) {}
  }
}

function paintCircleOnFogLayer(layerKey, mx, my, rMap, mode) {
  const layer = state.fogLayers[layerKey];
  const ctx = layer.ctx;
  ctx.save();
  if (mode === 'reveal' || mode === 'reveal-all') {
    const grad = ctx.createRadialGradient(mx, my, rMap * 0.7, mx, my, rMap);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = grad;
    ctx.fillRect(mx - rMap, my - rMap, rMap * 2, rMap * 2);
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = layerFogColor(layerKey);
    ctx.beginPath();
    ctx.arc(mx, my, rMap, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function normalizeTokenExploreRadius(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return TOKEN_EXPLORE_RADIUS_DEFAULT;
  return clamp(n, TOKEN_EXPLORE_RADIUS_MIN, TOKEN_EXPLORE_RADIUS_MAX);
}

function createTokenExploreStroke() {
  return {
    layer: 'all',
    mode: 'reveal',
    affectedTiles: new Map(),
    bounds: null,
  };
}

function paintTokenExploreFogIntoStroke(token, stroke) {
  if (!token || !token.explorerEnabled || !state.hasMap || !stroke) return false;
  const radius = normalizeTokenExploreRadius(token.exploreRadius);
  const mx = clamp(token.x, 0, state.mapCanvas.width);
  const my = clamp(token.y, 0, state.mapCanvas.height);
  const layerKeys = ['terrain', 'event'];
  const beforeTileCount = stroke.affectedTiles.size;
  const minTx = Math.max(0, Math.floor((mx - radius) / TILE_SIZE));
  const maxTx = Math.min(Math.floor((state.mapCanvas.width - 1) / TILE_SIZE), Math.floor((mx + radius) / TILE_SIZE));
  const minTy = Math.max(0, Math.floor((my - radius) / TILE_SIZE));
  const maxTy = Math.min(Math.floor((state.mapCanvas.height - 1) / TILE_SIZE), Math.floor((my + radius) / TILE_SIZE));
  for (let ty = minTy; ty <= maxTy; ty++) {
    for (let tx = minTx; tx <= maxTx; tx++) {
      const rx = tx * TILE_SIZE, ry = ty * TILE_SIZE;
      const rw = Math.min(TILE_SIZE, state.mapCanvas.width - rx);
      const rh = Math.min(TILE_SIZE, state.mapCanvas.height - ry);
      if (rw > 0 && rh > 0) captureStrokeTile(stroke, tx, ty, { x: rx, y: ry, w: rw, h: rh }, layerKeys);
    }
  }
  if (stroke.affectedTiles.size === beforeTileCount && beforeTileCount === 0) return false;
  for (const layerKey of layerKeys) paintCircleOnFogLayer(layerKey, mx, my, radius, 'reveal');
  const dirty = { x: mx - radius, y: my - radius, w: radius * 2, h: radius * 2 };
  if (!stroke.bounds) stroke.bounds = { ...dirty };
  else mergeRectInto(stroke.bounds, dirty);
  return true;
}

function commitTokenExploreStroke(stroke) {
  if (!stroke || stroke.affectedTiles.size === 0) return false;
  pushUndo({ type: 'fog', kind: 'tiles', layer: 'all', tiles: [...stroke.affectedTiles.values()] });
  state.strokesSinceCheckpoint += 1;
  maybeCheckpoint();
  refreshSelectionUi();
  return true;
}

function paintTokenExploreFog(token) {
  const stroke = createTokenExploreStroke();
  const painted = paintTokenExploreFogIntoStroke(token, stroke);
  if (!painted) return false;
  commitTokenExploreStroke(stroke);
  scheduleRender(stroke.bounds || 'all');
  return true;
}

function beginTokenExploreDrag(info, token) {
  if (!info || !token || !token.explorerEnabled || info.exploreStroke) return;
  info.exploreStroke = createTokenExploreStroke();
  info.exploreLastMapX = null;
  info.exploreLastMapY = null;
  info.exploreLastAt = 0;
}

function paintTokenExploreDrag(info, token, opts = {}) {
  if (!info || !token || !token.explorerEnabled || !state.hasMap) return false;
  beginTokenExploreDrag(info, token);
  const now = performance.now();
  const mx = clamp(token.x, 0, state.mapCanvas.width);
  const my = clamp(token.y, 0, state.mapCanvas.height);
  const moved = info.exploreLastMapX == null
    ? Infinity
    : dist(info.exploreLastMapX, info.exploreLastMapY, mx, my);
  if (!opts.force && moved < TOKEN_EXPLORE_DRAG_STEP && (now - info.exploreLastAt) < TOKEN_EXPLORE_DRAG_INTERVAL_MS) {
    return false;
  }
  const ok = paintTokenExploreFogIntoStroke(token, info.exploreStroke);
  if (ok) {
    info.exploreLastMapX = mx;
    info.exploreLastMapY = my;
    info.exploreLastAt = now;
    scheduleRender(info.exploreStroke.bounds || 'all');
  }
  return ok;
}

function finishTokenExploreDrag(info) {
  if (!info || !info.exploreStroke) return false;
  const stroke = info.exploreStroke;
  info.exploreStroke = null;
  return commitTokenExploreStroke(stroke);
}

function cancelTokenExploreDrag(info) {
  if (!info || !info.exploreStroke) return;
  const stroke = info.exploreStroke;
  const layerKeys = ['terrain', 'event'];
  for (const [, snap] of stroke.affectedTiles) {
    if (!snap.images) continue;
    for (const layerKey of layerKeys) {
      const img = snap.images[layerKey];
      if (img) state.fogLayers[layerKey].ctx.putImageData(img, snap.rect.x, snap.rect.y);
    }
  }
  info.exploreStroke = null;
  scheduleRender(stroke.bounds || 'all');
}

function paintBrushAt(sx, sy) {
  if (!state.activeStroke) return;
  if (!state.hasMap) return;
  // v3.1: 网格模式分流
  if (state.grid && state.grid.enabled) return paintGridCellAt(sx, sy);
  const layerKeys = getStrokeLayerKeys(state.activeStroke);
  const rScreen = state.brush.sizeScreen / 2;
  let rMap = rScreen / state.view.scale;
  const rMax = Math.min(state.mapCanvas.width, state.mapCanvas.height) / 4;
  if (rMap > rMax) {
    rMap = rMax;
    if (!state._warnedBrushCap) {
      state._warnedBrushCap = true;
      showToast('笔刷过大，已自动限制');
    }
  }
  const [mx, my] = screenToMap(sx, sy);
  // 抓取本 stroke 中首次受影响的 tile
  const minTx = Math.max(0, Math.floor((mx - rMap) / TILE_SIZE));
  const maxTx = Math.min(Math.floor((state.mapCanvas.width - 1) / TILE_SIZE), Math.floor((mx + rMap) / TILE_SIZE));
  const minTy = Math.max(0, Math.floor((my - rMap) / TILE_SIZE));
  const maxTy = Math.min(Math.floor((state.mapCanvas.height - 1) / TILE_SIZE), Math.floor((my + rMap) / TILE_SIZE));
  for (let ty = minTy; ty <= maxTy; ty++) {
    for (let tx = minTx; tx <= maxTx; tx++) {
      const rx = tx * TILE_SIZE, ry = ty * TILE_SIZE;
      const rw = Math.min(TILE_SIZE, state.mapCanvas.width - rx);
      const rh = Math.min(TILE_SIZE, state.mapCanvas.height - ry);
      if (rw > 0 && rh > 0) {
        captureStrokeTile(state.activeStroke, tx, ty, { x: rx, y: ry, w: rw, h: rh }, layerKeys);
      }
    }
  }
  // 绘制
  for (const layerKey of layerKeys) paintCircleOnFogLayer(layerKey, mx, my, rMap, state.activeStroke.mode);
  const dirty = { x: mx - rMap, y: my - rMap, w: rMap * 2, h: rMap * 2 };
  if (!state.activeStroke.bounds) state.activeStroke.bounds = { ...dirty };
  else mergeRectInto(state.activeStroke.bounds, dirty);
  scheduleRender(dirty);
}

function interpolatePaintBrush(prevX, prevY, currX, currY) {
  const d = dist(prevX, prevY, currX, currY);
  // hex 模式：插值步长按 cellSize 的屏幕投影一半，防快拖跳格
  const step = (state.grid && state.grid.enabled)
    ? Math.max(8, state.grid.cellSize * state.view.scale * 0.5)
    : state.brush.sizeScreen / 4;
  const steps = Math.max(1, Math.ceil(d / step));
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    paintBrushAt(lerp(prevX, currX, t), lerp(prevY, currY, t));
  }
}

// 网格模式：按整格揭示/覆盖（hex / square）
function paintGridCellAt(sx, sy) {
  const layerKeys = getStrokeLayerKeys(state.activeStroke);
  const g = state.grid;
  const [mx, my] = screenToMap(sx, sy);
  const cell = gridCellAtPoint(mx, my, g);
  const cellKey = gridCellKey(cell);
  if (state.activeStroke.lastGridCell === cellKey) return;  // 同格不重画
  state.activeStroke.lastGridCell = cellKey;
  const bounds = gridCellBounds(cell, g);
  const minX = bounds.x, maxX = bounds.x + bounds.w;
  const minY = bounds.y, maxY = bounds.y + bounds.h;
  if (maxX < 0 || minX > state.mapCanvas.width) return;
  if (maxY < 0 || minY > state.mapCanvas.height) return;
  // 抓 tile（格子外接矩形）
  const minTx = Math.max(0, Math.floor(minX / TILE_SIZE));
  const maxTx = Math.min(Math.floor((state.mapCanvas.width - 1) / TILE_SIZE), Math.floor(maxX / TILE_SIZE));
  const minTy = Math.max(0, Math.floor(minY / TILE_SIZE));
  const maxTy = Math.min(Math.floor((state.mapCanvas.height - 1) / TILE_SIZE), Math.floor(maxY / TILE_SIZE));
  for (let ty = minTy; ty <= maxTy; ty++) {
    for (let tx = minTx; tx <= maxTx; tx++) {
      const rx = tx * TILE_SIZE, ry = ty * TILE_SIZE;
      const rw = Math.min(TILE_SIZE, state.mapCanvas.width - rx);
      const rh = Math.min(TILE_SIZE, state.mapCanvas.height - ry);
      if (rw > 0 && rh > 0) {
        captureStrokeTile(state.activeStroke, tx, ty, { x: rx, y: ry, w: rw, h: rh }, layerKeys);
      }
    }
  }
  for (const layerKey of layerKeys) {
    const ctx = state.fogLayers[layerKey].ctx;
    ctx.save();
    gridCellPath(ctx, cell, g);
    if (state.activeStroke.mode === 'reveal' || state.activeStroke.mode === 'reveal-all') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = layerFogColor(layerKey);
    }
    ctx.fill();
    ctx.restore();
  }
  const dirty = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  if (!state.activeStroke.bounds) state.activeStroke.bounds = { ...dirty };
  else mergeRectInto(state.activeStroke.bounds, dirty);
  scheduleRender(dirty);
}

function captureGridCellTiles(stroke, cell, grid, layerKeys) {
  const bounds = gridCellBounds(cell, grid);
  const minX = bounds.x, maxX = bounds.x + bounds.w;
  const minY = bounds.y, maxY = bounds.y + bounds.h;
  if (maxX < 0 || minX > state.mapCanvas.width) return null;
  if (maxY < 0 || minY > state.mapCanvas.height) return null;
  const minTx = Math.max(0, Math.floor(minX / TILE_SIZE));
  const maxTx = Math.min(Math.floor((state.mapCanvas.width - 1) / TILE_SIZE), Math.floor(maxX / TILE_SIZE));
  const minTy = Math.max(0, Math.floor(minY / TILE_SIZE));
  const maxTy = Math.min(Math.floor((state.mapCanvas.height - 1) / TILE_SIZE), Math.floor(maxY / TILE_SIZE));
  for (let ty = minTy; ty <= maxTy; ty++) {
    for (let tx = minTx; tx <= maxTx; tx++) {
      const rx = tx * TILE_SIZE, ry = ty * TILE_SIZE;
      const rw = Math.min(TILE_SIZE, state.mapCanvas.width - rx);
      const rh = Math.min(TILE_SIZE, state.mapCanvas.height - ry);
      if (rw > 0 && rh > 0) {
        captureStrokeTile(stroke, tx, ty, { x: rx, y: ry, w: rw, h: rh }, layerKeys);
      }
    }
  }
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

function paintGridCellIntoStroke(stroke, cell, grid) {
  const layerKeys = getStrokeLayerKeys(stroke);
  const dirty = captureGridCellTiles(stroke, cell, grid, layerKeys);
  if (!dirty) return false;
  for (const layerKey of layerKeys) {
    const ctx = state.fogLayers[layerKey].ctx;
    ctx.save();
    gridCellPath(ctx, cell, grid);
    if (stroke.mode === 'reveal' || stroke.mode === 'reveal-all') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = layerFogColor(layerKey);
    }
    ctx.fill();
    ctx.restore();
  }
  if (!stroke.bounds) stroke.bounds = { ...dirty };
